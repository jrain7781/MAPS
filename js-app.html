    function toggleAllTelegramRequestCheckboxes(headerCb) {
        const tb = document.getElementById('tg-req-tbody');
        if (!tb) return;
        tb.querySelectorAll('input.tg-req-cb').forEach(cb => { cb.checked = !!headerCb.checked; });
    }

    function getSelectedTelegramRequestIds_() {
        const tb = document.getElementById('tg-req-tbody');
        if (!tb) return [];
        const cbs = tb.querySelectorAll('input.tg-req-cb:checked');
        return Array.from(cbs).map(cb => String(cb.value || '').trim()).filter(Boolean);
    }

    function renderTelegramRequests_(rows) {
        const tb = document.getElementById('tg-req-tbody');
        if (!tb) return;
        telegramRequestCache_ = Array.isArray(rows) ? rows : [];
        if (!telegramRequestCache_.length) {
            tb.innerHTML = `<tr><td colspan="8" class="py-4 text-center text-gray-500">승인 대기 요청이 없습니다.</td></tr>`;
            const all = document.getElementById('tg-req-checkall');
            if (all) all.checked = false;
            return;
        }

        // 기존 체크된 ID 저장 (갱신 후 유지용)
        const checkedIds = getSelectedTelegramRequestIds_();

        tb.innerHTML = telegramRequestCache_.map(r => {
            const a = String(r.action || '').trim();
            const actionLabel = (a === 'REQUEST_BID')
                ? '입찰확정 요청'
                : (a === 'REQUEST_CANCEL')
                    ? '입찰취소 요청'
                    : (r.action || '');
            const isChecked = checkedIds.includes(String(r.req_id));
            return `
            <tr class="border-b border-gray-100 hover:bg-gray-50">
              <td class="py-2 px-2 text-center"><input type="checkbox" class="tg-req-cb rounded" value="${String(r.req_id || '').replace(/"/g, '&quot;')}" ${isChecked ? 'checked' : ''}></td>
              <td class="py-2 px-2 text-left whitespace-nowrap">${r.requested_at || ''}</td>
              <td class="py-2 px-2 text-left">${(r.m_name || '')}</td>
              <td class="py-2 px-2 text-left">${(r.sakun_no || '')}</td>
              <td class="py-2 px-2 text-left">${(r.court || '')}</td>
              <td class="py-2 px-2 text-center">${(r.in_date || '')}</td>
              <td class="py-2 px-2 text-center">${(r.stu_member || '')}</td>
              <td class="py-2 px-2 text-left">${actionLabel}</td>
            </tr>
          `;
        }).join('');
        const all = document.getElementById('tg-req-checkall');
        if (all && !checkedIds.length) all.checked = false;
    }

    function loadTelegramRequests(isSilent) {
        if (IS_MEMBER_VIEW) return;
        const panel = document.getElementById('telegram-requests-panel');
        const tb = document.getElementById('tg-req-tbody');
        if (!panel || !tb) return;
        if (typeof google === 'undefined' || !google.script || !google.script.run) return;

        // ★ Silent 모드가 아닐 때만 "로딩 중" 표시
        if (!isSilent) {
            tb.innerHTML = '<tr><td colspan="8" class="py-4 text-center text-gray-500">요청을 불러오는 중...</td></tr>';
        }

        var startTime = Date.now();
        google.script.run
            .withSuccessHandler(function (rows) {
                // 조용히 데이터만 갱신
                renderTelegramRequests_(rows);
            })
            .withFailureHandler(function (err) {
                if (!isSilent) {
                    tb.innerHTML = '<tr><td colspan="8" class="py-4 text-center text-red-600">요청 로드 오류: ' + (err && err.message ? err.message : String(err)) + '</td></tr>';
                }
            })
            .listTelegramRequests('PENDING');
    }

    function approveSelectedTelegramRequests() {
        const ids = getSelectedTelegramRequestIds_();
        if (!ids.length) { showStatus('승인할 요청을 선택해 주세요.', 'error'); return; }
        showConfirmInStatus_(`선택한 ${ids.length}건을 승인할까요?`, () => {
            showStatus('승인 처리 중...', 'warning');
            google.script.run
                .withSuccessHandler(res => {
                    if (res && res.success) {
                        showStatus(res.message || '승인 완료', 'success');

                        // [최적화] 로컬 캐시 즉시 반영
                        if (res.data && res.data.length > 0) {
                            res.data.forEach(updatedItem => {
                                const idx = allBiddingData.findIndex(it => String(it.id) === String(updatedItem.id));
                                if (idx >= 0) {
                                    allBiddingData[idx] = Object.assign({}, allBiddingData[idx], updatedItem);
                                } else {
                                    allBiddingData.push(updatedItem);
                                }
                            });
                            allBiddingData.sort(dataComparator);
                            dataCache = { data: allBiddingData, timestamp: Date.now() };
                        }

                        // 전체 리로딩 대신 로컬 기반 즉시 렌더링
                        applyFilters();
                        if (typeof renderCalendar === 'function') renderCalendar();
                        if (typeof renderMemberDashboardSummary === 'function') renderMemberDashboardSummary();

                        loadTelegramRequests(); // 요청 목록 소리는 유지 (PENDING -> DONE)
                    } else {
                        showStatus((res && res.message) ? res.message : '승인 실패', 'error');
                    }
                })
                .withFailureHandler(err => showStatus('승인 오류: ' + err.message, 'error'))
                .approveTelegramRequests(ids, 'admin');
        }, () => { });
    }

    function rejectSelectedTelegramRequests() {
        const ids = getSelectedTelegramRequestIds_();
        if (!ids.length) { showStatus('거절할 요청을 선택해 주세요.', 'error'); return; }
        showConfirmInStatus_(`선택한 ${ids.length}건을 거절할까요?`, () => {
            showStatus('거절 처리 중...', 'warning');
            google.script.run
                .withSuccessHandler(res => {
                    if (res && res.success) {
                        showStatus(res.message || '거절 완료', 'success');
                        loadTelegramRequests();
                    } else {
                        showStatus((res && res.message) ? res.message : '거절 실패', 'error');
                    }
                })
                .withFailureHandler(err => showStatus('거절 오류: ' + err.message, 'error'))
                .rejectTelegramRequests(ids, 'admin');
        }, () => { });
    }

        if (allCb.checked) {
            document.querySelectorAll('input[name="cal-search-manager-cb"]').forEach(cb => cb.checked = false);
        }
    }
    function handleCalManagerOther(otherCb) {
        if (otherCb.checked) {
            const allCb = document.getElementById('cal-search-manager-all');
            if (allCb) allCb.checked = false;
        }
    }
    function matchesCalManager(item) {
        const allCb = document.getElementById('cal-search-manager-all');
        if (allCb && allCb.checked) return true;
        const selected = getSelectedCalManagerValues();
        if (selected.length === 0) return true;
        return selected.includes(String(item.m_name_id || '').trim());
    }

    // --- 중복 감지 헬퍼 ---
    function _getDupMap() {
        if (!_dupMap) {
            // 1패스: 키별 항목 수 카운트 (m_name_id 빈 값 포함)
            var keyCount = {};
            allBiddingData.forEach(function (item) {
                var key = String(item['in-date'] || '') + '_' + String(item.sakun_no || '') + '_' + String(item.court || '');
                keyCount[key] = (keyCount[key] || 0) + 1;
            });
            // 2패스: 2건 이상인 키만 담당자 목록 수집 (빈 담당자는 '미지정'으로 표시)
            _dupMap = {};
            allBiddingData.forEach(function (item) {
                var key = String(item['in-date'] || '') + '_' + String(item.sakun_no || '') + '_' + String(item.court || '');
                if (keyCount[key] > 1) {
                    if (!_dupMap[key]) _dupMap[key] = [];
                    var mgr = String(item.m_name_id || '').trim() || '미지정';
                    if (!_dupMap[key].includes(mgr)) _dupMap[key].push(mgr);
                }
            });
        }
        return _dupMap;
    }
    function getDupManagers(item) {
        var key = String(item['in-date'] || '') + '_' + String(item.sakun_no || '') + '_' + String(item.court || '');
        var mgrs = _getDupMap()[key];
        return (mgrs && mgrs.length > 0) ? mgrs : null;
    }
    function dupSakunHtml(bid) {
        var sakun = String(bid.sakun_no || '미상');
        var dupMgrs = getDupManagers(bid);
        if (!dupMgrs) return escapeHtml(sakun);
        return '<span class="text-red-600 font-bold cursor-help" title="중복 등록되었습니다. (' + escapeHtml(dupMgrs.join(', ')) + ')">' + escapeHtml(sakun) + '</span>';
    }

    // --- [4] 필터링 로직 ---
    function handleStatusAll(allCb) {
        if (allCb.checked) {
            const cbs = document.querySelectorAll('input[name="search-status-cb"]');
            cbs.forEach(cb => cb.checked = false);
        } else {
            // "전체"를 해제하면? (보통 전체 해제 시 아무것도 안 선택된 상태가 됨 -> applyFilters에서 처리)
        }
    }

    function handleStatusOther(otherCb) {

            const allCb = document.getElementById('search-status-all');
            if (allCb) allCb.checked = false;
        }
    }

    // --- [4] 필터링 로직 ---
    function applyFilters() {
        const currentFocusId = document.activeElement ? document.activeElement.id : '';
        const termIndate = (searchIndateInput && searchIndateInput.value) ? searchIndateInput.value.trim() : '';
        const termSakunNo = (searchSakunNoInput && searchSakunNoInput.value) ? searchSakunNoInput.value.toLowerCase().trim() : '';
        const termCourt = (searchCourtInput && searchCourtInput.value) ? searchCourtInput.value.toLowerCase().trim() : '';
        const selectedStatuses = getSelectedStatusValues();
        const allStatusCb = document.getElementById('search-status-all');
        const isAllStatus = (allStatusCb && allStatusCb.checked);
        const termRegDate = (searchRegDateInput && searchRegDateInput.value) ? searchRegDateInput.value.trim() : '';
        const allManagerCb = document.getElementById('search-manager-all');
        const isAllManager = (allManagerCb && allManagerCb.checked);
        const selectedManagers = getSelectedManagerValues();
        const termMName = (searchMNameInput && searchMNameInput.value) ? searchMNameInput.value.toLowerCase().trim() : '';
        // 수업 필터 (입찰물건관리)
        const termBidClassType = document.getElementById('bid-class-type')?.value || '';
        const termBidClassName = document.getElementById('bid-class-name')?.value || '';
        const termBidClassGrade = document.getElementById('bid-class-grade')?.value || '';

        // 입력값 유무에 따라 실시간 강조 스타일 적용
        if (searchIndateInput) searchIndateInput.classList.toggle('filter-active-input', !!termIndate);
        if (searchSakunNoInput) searchSakunNoInput.classList.toggle('filter-active-input', !!termSakunNo);
        if (searchCourtInput) searchCourtInput.classList.toggle('filter-active-input', !!termCourt);
        if (searchRegDateInput) searchRegDateInput.classList.toggle('filter-active-input', !!termRegDate);
        const mgrBtn = document.getElementById('search-manager-btn');
        if (mgrBtn) mgrBtn.classList.toggle('filter-active-input', !isAllManager);
        if (searchMNameInput) searchMNameInput.classList.toggle('filter-active-input', !!termMName);
        if (searchMNameInput) searchMNameInput.classList.toggle('filter-active-input', !!termMName);
        // 수업 필터 강조
        const bidClassTypeSel = document.getElementById('bid-class-type');
        const bidClassNameSel = document.getElementById('bid-class-name');
        const bidClassGradeSel = document.getElementById('bid-class-grade');
        if (bidClassTypeSel) bidClassTypeSel.classList.toggle('filter-active-input', !!termBidClassType);
        if (bidClassNameSel) bidClassNameSel.classList.toggle('filter-active-input', !!termBidClassName);
        if (bidClassGradeSel) bidClassGradeSel.classList.toggle('filter-active-input', !!termBidClassGrade);
        const sBtn = document.getElementById('search-status-btn');
        // 전체가 아니면 강조 (미선택 포함)
        if (sBtn) sBtn.classList.toggle('filter-active-input', !isAllStatus);

        const activeFilterBanner = document.getElementById('activeFilterBanner');
        const activeFilterText = document.getElementById('activeFilterText');
        const syncFilterBanner = document.getElementById('syncFilterBanner');
        const syncFilterText = document.getElementById('syncFilterText');
        if (syncSakunFilter.active && syncFilterBanner && syncFilterText) {
            syncFilterBanner.classList.remove('content-hidden');
            syncFilterText.textContent = `이미지동기화 필터: ${syncSakunFilter.label}`;
            if (activeFilterBanner) activeFilterBanner.classList.add('content-hidden');
        } else if (dashboardFilter.active && activeFilterBanner && activeFilterText) {
            if (syncFilterBanner) syncFilterBanner.classList.add('content-hidden');
            activeFilterBanner.classList.remove('content-hidden');
            let filterDesc = "";
            const managerText = (dashboardFilter.manager && dashboardFilter.manager !== 'All')
                ? `[${dashboardFilter.manager}] `
                : '';
            if (dashboardFilter.type === 'total_status') {
                filterDesc = `당일 이후 전체 [${dashboardFilter.status}] 건`;
            } else if (dashboardFilter.type === 'missing_multi') {
                filterDesc = `${(dashboardFilter.dates || []).length}개 날짜 입찰가 미입력 건`;
            } else {
                const d = dashboardFilter.date;
                const niceDate = `${d.substring(0, 2)}/${d.substring(2, 4)}/${d.substring(4, 6)}`;
                if (dashboardFilter.type === 'missing') {
                    filterDesc = `${niceDate} 입찰가 미입력 건`;
                } else if (dashboardFilter.type === 'status') {
                    filterDesc = `${niceDate} [${dashboardFilter.status}] 건`;
                } else if (dashboardFilter.type === 'auto_all') {
                    filterDesc = `${niceDate} 물건추천 전체`;
                } else if (dashboardFilter.type === 'bid_state') {
                    filterDesc = `${niceDate} 입찰가 [${dashboardFilter.status}] 건`;
                } else if (dashboardFilter.type === 'all_status') {
                    const st = Array.isArray(dashboardFilter.status) ? dashboardFilter.status.join('/') : dashboardFilter.status;
                    filterDesc = `전체 [${st}] 건`;
                } else if (dashboardFilter.type === 'all_bid_state') {
                    filterDesc = `전체 입찰가 [${dashboardFilter.status}] 건`;
                } else if (dashboardFilter.type === 'item_ids') {
                    const cnt = Array.isArray(dashboardFilter.status) ? dashboardFilter.status.length : 0;
                    filterDesc = `${dashboardFilter.label || '텔레그램'} (${cnt}건)`;
                }
            }
            activeFilterText.textContent = `${filterDesc} 필터링 중`;
        } else {
            if (activeFilterBanner) activeFilterBanner.classList.add('content-hidden');
            if (syncFilterBanner) syncFilterBanner.classList.add('content-hidden');
        }

        if (allBiddingData.length === 0 && loadingIndicator && !loadingIndicator.classList.contains('content-hidden')) {
            renderFilteredData([]);
            return;
        }

        // 수업 필터 사용 중인데 데이터 미로드 → 로드 후 재필터
        if ((termBidClassType || termBidClassName || termBidClassGrade) &&
            (allMembersNewData.length === 0 || allClassesData.length === 0)) {
            ensureClassDataLoaded(() => applyFilters());
            return;
        }

        let filteredData = allBiddingData.filter(item => {
            const inDate = String(item['in-date'] || '');
            const regDate = String(item.reg_date || '');
            // 입찰일자 필터링: syncSakunFilter 활성 시 날짜 제한 없음
            const inDateStr = String(inDate || '');
            const inDateNum = inDateStr.replace(/\D/g, '');
            // all_status/all_bid_state/item_ids 타입은 날짜 전체 범위를 조회 (과거 날짜 포함)
            const bypassDateFilter = dashboardFilter.active &&
                (dashboardFilter.type === 'all_status' || dashboardFilter.type === 'all_bid_state' || dashboardFilter.type === 'item_ids' || dashboardFilter.type === 'missing_multi');
            const matchesIndate = bypassDateFilter
                ? true
                : (syncSakunFilter.active
                    ? true
                    : (termIndate
                        ? (inDateStr.includes(termIndate) || inDateNum.includes(termIndate.replace(/\D/g, '')))
                        : (parseInt(inDateNum || '0') >= parseInt(todayYYMMDD.replace(/\D/g, '')))));
            const matchesSakunNo = !termSakunNo || String(item.sakun_no || '').toLowerCase().includes(termSakunNo);
            // 정확한 매칭: 입력값과 정확히 일치하는 경우만 통과
            const matchesCourt = !termCourt || String(item.court || '').toLowerCase().trim() === termCourt.toLowerCase().trim();
            // 상태 필터링: "전체" 체크 시 모든 상태 통과, 아무것도 선택 안 하면 조회 안 됨
            const matchesStatus = isAllStatus ? true : (selectedStatuses.length > 0 && selectedStatuses.includes(String(item.stu_member || '').trim()));
            const matchesRegDate = !termRegDate || regDate.includes(termRegDate) || regDate.replace(/\D/g, '').includes(String(termRegDate).replace(/\D/g, ''));
            const matchesManager = isAllManager || (selectedManagers.length > 0 && selectedManagers.includes(String(item.m_name_id || '').trim()));
            const matchesMName = !termMName || `${String(item.m_name || '')} ${String(item.m_name2 || '')}`.toLowerCase().includes(termMName);
            // 수업 필터: member_id → allMembersNewData → class_id → allClassesData
            let matchesClass = true;
            if (termBidClassType || termBidClassName || termBidClassGrade) {
                const mem = allMembersNewData.find(m => String(m.member_id) === String(item.member_id));
                const cls = mem ? allClassesData.find(c => String(c.class_id) === String(mem.class_id)) : null;
                if (termBidClassType && (cls?.class_type || '') !== termBidClassType) matchesClass = false;
                if (termBidClassName && (cls?.class_name || '') !== termBidClassName) matchesClass = false;
                if (termBidClassGrade && (cls?.class_grade || '') !== termBidClassGrade) matchesClass = false;
            }
            return matchesIndate && matchesSakunNo && matchesCourt && matchesStatus && matchesRegDate && matchesManager && matchesMName && matchesClass;
        });

        filteredData = filteredData.filter(item => {
            const itemDate = String(item['in-date']);
            const price = parseInt(String(item.bidprice || 0));

            if (dashboardFilter.active) {
                const isManagerMatch = (dashboardFilter.manager === 'All' || !dashboardFilter.manager) ||
                    (item.m_name_id === dashboardFilter.manager);

                if (!isManagerMatch) return false;

                if (dashboardFilter.type === 'missing') {
                    return itemDate === dashboardFilter.date && (isNaN(price) || price === 0) && item.stu_member === '입찰';
                } else if (dashboardFilter.type === 'missing_multi') {
                    return (dashboardFilter.dates || []).includes(itemDate) && (isNaN(price) || price === 0) && item.stu_member === '입찰';
                } else if (dashboardFilter.type === 'status') {
                    return itemDate === dashboardFilter.date && item.stu_member === dashboardFilter.status;
                } else if (dashboardFilter.type === 'total_status') {
                    return itemDate >= todayYYMMDD && item.stu_member === dashboardFilter.status;
                } else if (dashboardFilter.type === 'auto_all') {
                    return itemDate === dashboardFilter.date && ['추천', '입찰', '검증', '취소'].includes(item.stu_member);
                } else if (dashboardFilter.type === 'bid_state') {
                    return itemDate === dashboardFilter.date && String(item.bid_state || '') === dashboardFilter.status;
                } else if (dashboardFilter.type === 'all_status') {
                    const st = Array.isArray(dashboardFilter.status) ? dashboardFilter.status : [dashboardFilter.status];
                    return st.includes(item.stu_member);
                } else if (dashboardFilter.type === 'all_bid_state') {
                    return String(item.bid_state || '') === dashboardFilter.status;
                } else if (dashboardFilter.type === 'item_ids') {
                    // 텔레그램 승인현황/가입현황 클릭: 해당 item_id 목록에 속하는 물건만
                    var ids = Array.isArray(dashboardFilter.status) ? dashboardFilter.status : [];
                    var itemIdStr = String(item.id || '').trim();
                    return ids.some(function (id) { return String(id).trim() === itemIdStr; });
                }
            } else {
                // 입찰물건 관리 기본은 "전체"를 보여주고, 필요 시 사용자가 검색/필터로 좁히도록 함
                return true;
            }
            return true;
        });
        // syncSakunFilter: 특정 사건번호 목록으로만 좁히기
        if (syncSakunFilter.active && syncSakunFilter.sakunNos.length > 0) {
            filteredData = filteredData.filter(item =>
                syncSakunFilter.sakunNos.includes(String(item.sakun_no || '').trim())
            );
        }
        if (itemListSort.key) {
            const k = itemListSort.key;
            const d = itemListSort.dir;
            filteredData = filteredData.slice().sort((a, b) => {
                // IMG 정렬: 이미지+옥션 > 이미지만 > 옥션만 > 없음
                if (k === 'has_images') {
                    const va = (a.has_images && a.auction_id) ? 2 : (a.has_images ? 1.5 : (a.auction_id ? 1 : 0));
                    const vb = (b.has_images && b.auction_id) ? 2 : (b.has_images ? 1.5 : (b.auction_id ? 1 : 0));
                    return d * (va < vb ? -1 : va > vb ? 1 : 0);
                }
                // 텔레그램 T 정렬: allMembersNewData 기준
                if (k === 'telegram_enabled') {
                    const memA = allMembersNewData.find(m => String(m.member_id) === String(a.member_id));
                    const memB = allMembersNewData.find(m => String(m.member_id) === String(b.member_id));
                    const va = (memA && memA.telegram_enabled === 'Y') ? 'Y' : '';
                    const vb = (memB && memB.telegram_enabled === 'Y') ? 'Y' : '';
                    return d * (va < vb ? -1 : va > vb ? 1 : 0);
                }
                // 입찰가 정렬: 숫자 비교
                if (k === 'bidprice') {
                    const va = parseFloat(String(a.bidprice || 0).replace(/,/g, '')) || 0;
                    const vb = parseFloat(String(b.bidprice || 0).replace(/,/g, '')) || 0;
                    return d * (va < vb ? -1 : va > vb ? 1 : 0);
                }
                // 사건번호: 숫자 추출 후 숫자 비교
                if (k === 'sakun_no') {
                    const na = _sakunNum(a.sakun_no), nb = _sakunNum(b.sakun_no);
                    return d * (na - nb);
                }
                let va = a[k] != null ? String(a[k]) : '';
                let vb = b[k] != null ? String(b[k]) : '';
                if (k === 'in-date' || k === 'reg_date') { va = va.replace(/\D/g, ''); vb = vb.replace(/\D/g, ''); }
                return d * (va < vb ? -1 : va > vb ? 1 : 0);
            });
        }
        // summaryClickFilter: 썸머리 클릭 시 현재 조회 결과 내 추가 필터
        renderItemListSummary(filteredData); // 클릭 필터 적용 전 전체 기준으로 썸머리 표시
        if (summaryClickFilter && summaryClickFilter !== '__all__') {
            if (summaryClickFilter === 'bid_missing') {
                filteredData = filteredData.filter(item => {
                    const price = parseInt(String(item.bidprice || 0));
                    return item.stu_member === '입찰' && (isNaN(price) || price === 0);
                });
            } else {
                filteredData = filteredData.filter(item => item.stu_member === summaryClickFilter);
            }
        }
        renderFilteredData(filteredData);

        // 전송 컬럼 제거 (렌더링 후 즉시 + 지연 실행)
        removeSendColumn();
        setTimeout(removeSendColumn, 10);
        setTimeout(removeSendColumn, 50);
        setTimeout(removeSendColumn, 100);

        const searchIds = ['search-indate', 'search-sakunno', 'search-court', 'search-regdate', 'search-mname'];
        if (searchIds.indexOf(currentFocusId) !== -1) {
            setTimeout(() => {
                const el = document.getElementById(currentFocusId);
                if (el) el.focus();
            }, 0);
        }
        const statusLabel = document.getElementById('search-status-label');
        if (statusLabel) statusLabel.textContent = selectedStatuses.length ? selectedStatuses.join(',') : '상태';
    }

    function clearDashboardFilter() {
        dashboardFilter = { active: false, date: null, status: null, type: null, manager: null };
        syncSakunFilter = { active: false, sakunNos: [], label: '' };
        summaryClickFilter = null;
        applyFilters();
    }

    function sortItemList(key) {
        if (itemListSort.key === key) itemListSort.dir = -itemListSort.dir;
        else { itemListSort.key = key; itemListSort.dir = 1; }
        applyFilters();
    }

    function syncItemManagementSearchFromDashboard() {
        if (!dashboardFilter.active) return;

        // 관련 입력 필드 강조 (파란 배경)
        if (searchIndateInput && dashboardFilter.date) {
            searchIndateInput.value = dashboardFilter.date;
            searchIndateInput.classList.add('filter-active-input');
        }

        if (dashboardFilter.manager && dashboardFilter.manager !== 'All') {
            const allMgrCb = document.getElementById('search-manager-all');
            if (allMgrCb) allMgrCb.checked = false;
            document.querySelectorAll('input[name="search-manager-cb"]').forEach(cb => {
                cb.checked = (cb.value === dashboardFilter.manager);
            });
            updateManagerLabel();
            const mgrBtn2 = document.getElementById('search-manager-btn');
            if (mgrBtn2) mgrBtn2.classList.add('filter-active-input');
        }

        // all_status / all_bid_state / item_ids 타입: dashboardFilter가 2단계에서 처리하므로
        // 1단계 상태 체크박스는 '전체' 로 설정 (모두 통과)
        if (dashboardFilter.type === 'all_status' || dashboardFilter.type === 'all_bid_state' || dashboardFilter.type === 'item_ids') {
            const allStatusCb = document.getElementById('search-status-all');
            if (allStatusCb) allStatusCb.checked = true;
            document.querySelectorAll('input[name="search-status-cb"]').forEach(cb => { cb.checked = false; });
            const statusBtn = document.getElementById('search-status-btn');
            const statusLabel = document.getElementById('search-status-label');
            if (statusBtn) statusBtn.classList.add('filter-active-input');
            if (statusLabel) {
                if (dashboardFilter.type === 'item_ids') {
                    const cnt = dashboardFilter.status ? dashboardFilter.status.length : 0;
                    statusLabel.textContent = (dashboardFilter.label || '텔레그램') + ' (' + cnt + '건)';
                } else {
                    const label = Array.isArray(dashboardFilter.status)
                        ? dashboardFilter.status.join('/')
                        : String(dashboardFilter.status || '');
                    statusLabel.textContent = label || '전체';
                }
            }
            return;
        }

        const statusToSet = (dashboardFilter.type === 'missing') ? '입찰' : (
            Array.isArray(dashboardFilter.status) ? dashboardFilter.status[0] : (dashboardFilter.status || '')
        );
        if (statusToSet) {
            document.querySelectorAll('input[name="search-status-cb"]').forEach(cb => {
                cb.checked = (cb.value === statusToSet);
            });
            const allStatusCb = document.getElementById('search-status-all');
            if (allStatusCb) allStatusCb.checked = false;
            const statusBtn = document.getElementById('search-status-btn');
            const statusLabel = document.getElementById('search-status-label');
            if (statusBtn) statusBtn.classList.add('filter-active-input');
            if (statusLabel) {
                statusLabel.textContent = statusToSet;
            }
        }
    }

    function resetItemManagementSearch() {
        summaryClickFilter = null;
        // 모든 입력 필드 강조 제거
        document.querySelectorAll('#ItemManagement .filter-active-input').forEach(el => {
            el.classList.remove('filter-active-input');
        });
        const statusLabel = document.getElementById('search-status-label');
        if (statusLabel) {
            statusLabel.textContent = '전체';
            statusLabel.style.fontWeight = '';
            statusLabel.style.color = '';
        }

        if (searchIndateInput) {
            searchIndateInput.value = ''; // 검색초기화 시 입찰일자 비우기
        }
        if (searchSakunNoInput) searchSakunNoInput.value = '';
        if (searchCourtInput) searchCourtInput.value = '';
        if (searchRegDateInput) searchRegDateInput.value = '';
        if (searchManagerInput) searchManagerInput.value = '';
        if (searchMNameInput) searchMNameInput.value = '';
        // 수업 필터 초기화
        const bidClassTypeEl = document.getElementById('bid-class-type');
        const bidClassNameEl = document.getElementById('bid-class-name');
        const bidClassGradeEl = document.getElementById('bid-class-grade');
        if (bidClassTypeEl) bidClassTypeEl.value = '';
        if (bidClassNameEl) bidClassNameEl.value = '';
        if (bidClassGradeEl) bidClassGradeEl.value = '';
        const bidClassNameWrap = document.getElementById('bid-class-name-wrap');
        const bidClassGradeWrap = document.getElementById('bid-class-grade-wrap');

    async function handleItemCaptureListDownload() {
        const cbs = dataTableBody ? dataTableBody.querySelectorAll('input.item-row-cb:checked') : [];
        const list = Array.from(cbs).map(cb => (cb.getAttribute('data-sakun-no') || cb.dataset.sakunNo || '').trim()).filter(Boolean);
        if (list.length === 0) {
            if (typeof showStatus === 'function') showStatus('캡처할 항목을 체크해 주세요.', 'warning');
            return;
        }
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const h = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        const sec = String(now.getSeconds()).padStart(2, '0');
        const filename = '' + y + m + d + h + min + sec + '.txt';
        const content = list.join('\n');

        // File System Access API: 저장 위치 선택 다이얼로그 (Chrome 86+)
        if (window.showSaveFilePicker) {
            try {
                const fileHandle = await window.showSaveFilePicker({
                    suggestedName: filename,
                    types: [{ description: '텍스트 파일', accept: { 'text/plain': ['.txt'] } }]
                });
                const writable = await fileHandle.createWritable();
                await writable.write(content);
                await writable.close();
                if (typeof showStatus === 'function') showStatus('파일(' + fileHandle.name + ') 저장 완료. 건변등록.bat을 실행하세요.', 'success');
                return;
            } catch (err) {
                if (err.name === 'AbortError') return; // 취소 시 아무것도 안 함
                // 기타 오류 시 기존 방식으로 폴백
            }
        }

        // 폴백: 브라우저 기본 다운로드 폴더에 저장
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
        if (typeof showStatus === 'function') showStatus('파일(' + filename + ')이 다운로드 폴더에 저장됩니다. 해당 파일을 아래 폴더로 이동한 뒤 건변등록.bat을 실행하세요. → C:\\LJW\\MAPS_TEST\\00.imageup\\건별 캡쳐 리스트', 'success');
    }

    function handleBulkTelegramSendFromItemList() {
        if (IS_MEMBER_VIEW) return;
        if (typeof google === 'undefined' || !google.script || !google.script.run) {
            showStatus('Google Apps Script 환경이 아닙니다.', 'error');
            return;
        }
        const ids = getSelectedItemIdsFromList_();
        if (!ids || ids.length === 0) {
            showStatus('전송할 항목을 체크해 주세요.', 'error');
            return;
        }

        showConfirmInStatus_(`선택한 ${ids.length}건을 텔레그램으로 전송할까요?`, () => {
            const styleEl = document.getElementById('telegram-style-select-bulk');
            const styleKey = styleEl ? String(styleEl.value || '').trim() : 'card';
            let ok = 0;
            let fail = 0;
            let idx = 0;
            const failedIds = []; // 전송 실패 물건 ID (card 전용)

            const next = () => {
                const done = ok + fail;
                showStatus(`전송 중... (${done}/${ids.length})`, 'warning');
                if (idx >= ids.length) {
                    const statusMsg = `전송 완료: 성공 ${ok}건 / 실패 ${fail}건`;
                    if (styleKey === 'card' && failedIds.length > 0) {
                        // 전송 실패 건도 chuchen_state 전달완료 업데이트
                        const nowIso = new Date().toISOString();
                        showStatus(statusMsg + ' (실패 건 추천상태 전달완료로 업데이트 됩니다.)', 'warning');
                        google.script.run
                            .withSuccessHandler(() => { if (typeof loadData === 'function') loadData(); })
                            .withFailureHandler(() => { if (typeof loadData === 'function') loadData(); })
                            .updateChuchenState(failedIds, '전달완료', nowIso);
                    } else {
                        showStatus(statusMsg, fail > 0 ? 'warning' : 'success');
                        if (typeof loadData === 'function') loadData();
                    }
                    return;
                }
                const currentId = ids[idx++];
                const item = getBidItemById(currentId);
                if (!item || !item.member_id) {
                    fail++;
                    if (styleKey === 'card') failedIds.push(currentId);
                    next();
                    return;
                }
                google.script.run
                    .withSuccessHandler(res => {
                        if (res && res.success) ok++;
                        else {
                            fail++;
                            if (styleKey === 'card') failedIds.push(currentId);
                        }
                        next();
                    })
                    .withFailureHandler(_err => {
                        fail++;
                        if (styleKey === 'card') failedIds.push(currentId);
                        next();
                    })
                    .sendItemToMemberTelegramWithStyle(item.member_id, item.id, styleKey);
            };

            next();
        }, () => { });
    }

    let calendarWheelHandler = null;
    function setupCalendarWheelScroll() {
        const calendarWeekView = document.getElementById('calendar-week-view');
        if (!calendarWeekView) return;

        // 기존 이벤트 리스너 제거 (중복 방지)
        const existingHandler = calendarWeekView._wheelHandler;
        if (existingHandler) {
            calendarWeekView.removeEventListener('wheel', existingHandler);
        }

        // 마우스 휠 이벤트 핸들러
        const wheelHandler = (e) => {
            // 위로 스크롤 시도 (deltaY < 0)이고 맨 위에 있을 때
            if (e.deltaY < 0 && calendarWeekView.scrollTop <= 5) { // 5px 여유를 둠
                // 아직 이전 주를 모두 로드하지 않았을 때

                    e.preventDefault(); // 기본 스크롤 방지
                    loadPreviousWeeks(4); // 4주씩 추가
                }
            }
        };

        // 이벤트 리스너 추가
        calendarWeekView.addEventListener('wheel', wheelHandler, { passive: false });
        calendarWeekView._wheelHandler = wheelHandler; // 참조 저장 (나중에 제거용)
    }

    function jumpToEarliestDate(filterCriteria) {
        let filteredItems = allBiddingData;

        // 관련 입력 필드 강조
        if (filterCriteria.member && calSearchMember) {
            calSearchMember.value = filterCriteria.member;
            calSearchMember.classList.add('filter-active-input');
        }

        if (filterCriteria.status) {
            document.querySelectorAll('input[name="cal-search-status-cb"]').forEach(cb => {
                cb.checked = (cb.value === filterCriteria.status);
            });
            const allCalStatusCb = document.getElementById('cal-search-status-all');
            if (allCalStatusCb) allCalStatusCb.checked = false;
            updateCalendarStatusLabel();
            const statusBtn = document.getElementById('cal-search-status-btn');
            const statusLabel = document.getElementById('cal-search-status-label');
            if (statusBtn) statusBtn.classList.add('filter-active-input');
            // 스타일은 CSS 클래스(filter-active-input)로만 처리
        }

        if (filterCriteria.member) {
            filteredItems = filteredItems.filter(item => isMemberMatch(item, filterCriteria.member));
        }
        if (filterCriteria.status) {
            filteredItems = filteredItems.filter(item => item.stu_member === filterCriteria.status);
        }

        let earliestDate = null;
        filteredItems.forEach(item => {
            const itemDateStr = String(item['in-date']);
            if (itemDateStr.length === 6) {
                const year = 2000 + parseInt(itemDateStr.substring(0, 2));
                const month = parseInt(itemDateStr.substring(2, 4)) - 1;
                const day = parseInt(itemDateStr.substring(4, 6));
                const d = new Date(year, month, day);
                if (!earliestDate || d < earliestDate) {
                    earliestDate = d;
                }
            }
        });
        if (earliestDate) {
            currentCalendarDate = getWeekStart(earliestDate);
        } else {
            currentCalendarDate = getWeekStart(new Date());
        }

        calendarFilter = {
            active: true,
            member: filterCriteria.member || null,
            status: filterCriteria.status || null
        };

        navigateTo('BiddingSchedule');
        renderCalendar();
    }

    function copyMemberTokenToClipboard() {
        const token = memMemberToken ? String(memMemberToken.value || '').trim() : '';
        if (!token) {
            showStatus('복사할 토큰이 없습니다. 먼저 토큰을 재발급하세요.', 'error');
            return;
        }
        // clipboard API 우선
        if (navigator && navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(token).then(() => {
                showStatus('토큰을 복사했습니다.', 'success');
            }).catch(() => {
                // fallback
                try {
                    memMemberToken.focus();
                    memMemberToken.select();
                    document.execCommand('copy');
                    showStatus('토큰을 복사했습니다.', 'success');
                } catch (e) {
                    showStatus('복사에 실패했습니다. 토큰을 길게 눌러 복사하세요.', 'error');
                }
            });
            return;
        }
        try {
            memMemberToken.focus();
            memMemberToken.select();
            document.execCommand('copy');
            showStatus('토큰을 복사했습니다.', 'success');
        } catch (e) {
            showStatus('복사에 실패했습니다. 토큰을 길게 눌러 복사하세요.', 'error');
        }
    }

    // --- [6] 이미지 동기화 (단계별 처리) ---
    function handleSyncImages() {
        const button = document.getElementById('syncImagesButton');
        const statusDiv = document.getElementById('syncImagesStatus');
        const detailsDiv = document.getElementById('syncImagesDetails');
        const tbody = document.getElementById('syncLogsTableBody');
        const container = document.getElementById('syncLogsListContainer');

        if (!button || !statusDiv) return;

        button.disabled = true;
        button.classList.add('opacity-50', 'cursor-not-allowed');
        statusDiv.textContent = '동기화 시작 중...';

        if (detailsDiv) {
            detailsDiv.classList.add('content-hidden');
            detailsDiv.innerHTML = '';
        }
        if (tbody) tbody.innerHTML = '';
        if (container) container.classList.remove('content-hidden');

        let totalProcessed = 0;
        let totalNew = 0;
        let totalMatch = 0;
        let totalConflict = 0;
        let totalSkip = 0;
        let totalError = 0;

        function runBatch() {
            statusDiv.textContent = `동기화 진행 중... (현재까지 ${totalProcessed}건 처리 완료)`;

            google.script.run
                .withSuccessHandler(result => {
                    if (result.success) {
                        const d = result.details;
                        totalProcessed += d.processCount;
                        totalNew += d.newCount;
                        totalMatch += d.matchCount;
                        totalConflict += d.conflictCount;
                        totalSkip += d.skipCount;
                        totalError += d.errorCount;

                        // 로그 테이블에 실시간 추가 (역순으로 쌓기 위해 앞에 추가)
                        if (d.logs && d.logs.length > 0) {
                            const newRows = d.logs.map(log => createSyncLogRowHtml(log)).join('');
                            tbody.innerHTML = newRows + tbody.innerHTML;
                        }

                        // 통계 실시간 업데이트
                        displaySyncDetails({
                            processCount: totalProcessed,
                            newCount: totalNew,
                            matchCount: totalMatch,
                            conflictCount: totalConflict,
                            skipCount: totalSkip,
                            errorCount: totalError,
                            remainingFiles: d.remainingFiles,
                            skippedFiles: d.skippedFiles,
                            errorFiles: d.errorFiles
                        }, detailsDiv);

                        if (d.remainingFiles > 0) {
                            // 아직 남은 파일이 있으면 다음 배치 실행
                            setTimeout(runBatch, 500);
                        } else {
                            // 최종 완료
                            button.disabled = false;
                            button.classList.remove('opacity-50', 'cursor-not-allowed');
                            statusDiv.textContent = `동기화가 모두 완료되었습니다. (총 ${totalProcessed}건)`;
                            statusDiv.classList.add('text-green-600');
                            showStatus('이미지 동기화가 완료되었습니다.', 'success');

                            // 대시보드 이미지 현황 갱신
                            if (typeof loadDashboardImageStats === 'function') loadDashboardImageStats();
                        }
                    } else {
                        statusDiv.textContent = '오류: ' + result.message;
                        statusDiv.classList.add('text-red-600');
                        button.disabled = false;
                        button.classList.remove('opacity-50', 'cursor-not-allowed');
                        showStatus(result.message, 'error');
                    }
                })
                .withFailureHandler(error => {
                    statusDiv.textContent = '치명적 오류: ' + error.message;
                    button.disabled = false;
                    button.classList.remove('opacity-50', 'cursor-not-allowed');
                    showStatus('동기화 실패: ' + error.message, 'error');
                })
                .syncImages(10); // 10건씩 나누어 처리
        }

        runBatch();
    }

    function displaySyncDetails(details, container, isError = false) {
        if (!details || !container) return;

        container.classList.remove('content-hidden');
        let html = '';

        // 통계 정보
        html += '<div class="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-4">';
        html += '<h3 class="font-semibold text-gray-800 mb-2">처리 통계</h3>';
        html += '<div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-sm">';
        html += `<div><span class="text-gray-600">총 처리:</span> <span class="font-bold text-indigo-600">${details.processCount || 0}</span></div>`;
        html += `<div><span class="text-gray-600">신규 추가:</span> <span class="font-bold text-green-600">${details.newCount || 0}</span></div>`;
        html += `<div><span class="text-gray-600">매칭 성공:</span> <span class="font-bold text-blue-600">${details.matchCount || 0}</span></div>`;
        if (details.conflictCount > 0) {
            html += `<div><span class="text-gray-600">충돌(대기):</span> <span class="font-bold text-red-600">${details.conflictCount}</span></div>`;
        }
        if (details.skipCount > 0) {
            html += `<div><span class="text-gray-600">건너뜀:</span> <span class="font-bold text-yellow-600">${details.skipCount}</span></div>`;
        }
        if (details.errorCount > 0) {
            html += `<div><span class="text-gray-600">오류:</span> <span class="font-bold text-red-600">${details.errorCount}</span></div>`;
        }
        if (details.remainingFiles > 0) {
            html += `<div><span class="text-gray-600">남은 파일:</span> <span class="font-bold text-orange-600">${details.remainingFiles}</span></div>`;
        }
        html += '</div></div>';

        // 건너뜀 파일 목록
        if (details.skippedFiles && details.skippedFiles.length > 0) {
            html += '<div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-4">';
            html += '<h3 class="font-semibold text-yellow-800 mb-2">건너뜀 파일 (파일명 형식 오류)</h3>';
            html += '<div class="max-h-40 overflow-y-auto text-sm">';
            details.skippedFiles.forEach(file => {
                html += `<div class="mb-1"><span class="font-mono text-xs">${file.name}</span> <span class="text-yellow-700 text-xs">(${file.reason})</span></div>`;
            });
            if (details.skipCount > details.skippedFiles.length) {
                html += `<div class="text-yellow-700 text-xs mt-2">... 외 ${details.skipCount - details.skippedFiles.length}개 파일</div>`;
            }
            html += '</div></div>';
        }

        // 오류 파일 목록
        if (details.errorFiles && details.errorFiles.length > 0) {
            html += '<div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-4">';
            html += '<h3 class="font-semibold text-red-800 mb-2">처리 오류 파일</h3>';
            html += '<div class="max-h-40 overflow-y-auto text-sm">';
            details.errorFiles.forEach(file => {
                html += `<div class="mb-1"><span class="font-mono text-xs">${file.name}</span> <span class="text-red-700 text-xs">(${file.error})</span></div>`;
            });
            if (details.errorCount > details.errorFiles.length) {
                html += `<div class="text-red-700 text-xs mt-2">... 외 ${details.errorCount - details.errorFiles.length}개 파일</div>`;
            }
            html += '</div></div>';
        }

        // 중복 파일 목록
        if (details.duplicateFiles && details.duplicateFiles.length > 0) {
            html += '<div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">';
            html += '<h3 class="font-semibold text-blue-800 mb-2">중복 파일 (기존 파일 삭제됨)</h3>';
            html += '<div class="max-h-40 overflow-y-auto text-sm">';
            details.duplicateFiles.forEach(fileName => {
                html += `<div class="mb-1"><span class="font-mono text-xs">${fileName}</span></div>`;
            });
            html += '</div></div>';
        }

        container.innerHTML = html;
    }

    function renderSyncLogsTable(logs) {
        const tbody = document.getElementById('syncLogsTableBody');
        const container = document.getElementById('syncLogsListContainer');
        if (!tbody) return;

        if (!logs || logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="p-4 text-center text-gray-500">조회된 이력이 없습니다.</td></tr>';
            return;
        }

        let html = '';
        logs.forEach(log => {
            html += createSyncLogRowHtml(log);
        });
        tbody.innerHTML = html;
        if (container) container.classList.remove('content-hidden');
    }

    function createSyncLogRowHtml(log) {
        const dateStr = log.timestamp ? log.timestamp : (log[0] ? new Date(log[0]).toLocaleString() : '-');

        // 데이터 구조 보정 (배열 형태 호환성)
        const status = log.status || log[1] || '-';
        const sakun = log.sakun_no || log[2] || '-';
        const inDate = log.in_date || log[3] || '-';
        const court = log.court || log[4] || '-';
        const fileName = log.file_name || log[5] || '-';
        const msg = log.message || log[6] || '-';
        const imgId = log.image_code || log.image_id || log[7] || '-';
        const aucId = log.auction_id || log[8] || '-';
        const existingUploader = log.existing_uploader || log[9] || '';
        const fileUploader = log.file_uploader || log[10] || '';

        let statusClass = 'text-gray-600';
        if (status.includes('신규')) statusClass = 'text-green-600';
        else if (status.includes('매칭')) statusClass = 'text-blue-600';
        else if (status.includes('충돌')) statusClass = 'text-red-600';

        // 충돌 여부: 두 담당자가 다를 때 빨간색 표시
        const isConflict = existingUploader && fileUploader && existingUploader !== fileUploader;
        const existingCell = existingUploader
            ? `<span class="${isConflict ? 'text-red-600 font-bold' : 'text-gray-600'} text-[10px]">${existingUploader}</span>`
            : '<span class="text-gray-300">-</span>';
        const fileCell = fileUploader
            ? `<span class="${isConflict ? 'text-red-600 font-bold' : 'text-gray-600'} text-[10px]">${fileUploader}</span>`
            : '<span class="text-gray-300">-</span>';

        return `
            <tr class="hover:bg-gray-50 border-b border-gray-100 last:border-0${isConflict ? ' bg-red-50' : ''}">
                <td class="px-3 py-2 text-[11px] text-gray-500">${dateStr}</td>
                <td class="px-3 py-2 text-xs font-bold ${statusClass}">${status}</td>
                <td class="px-3 py-2 text-xs font-bold">
                    <a href="javascript:void(0)" onclick="searchFromSyncLog('${sakun}')" class="text-indigo-600 hover:text-indigo-800 hover:underline">
                        ${sakun}
                    </a>
                </td>
                <td class="px-3 py-2 text-xs text-gray-600">${inDate}</td>
                <td class="px-3 py-2 text-xs text-gray-600">${court}</td>
                <td class="px-3 py-2 text-xs">${existingCell}</td>
                <td class="px-3 py-2 text-xs">${fileCell}</td>
                <td class="px-3 py-2 text-xs text-gray-500 truncate max-w-[150px]" title="${fileName}">${msg}</td>
                <td class="px-3 py-2 text-[10px] text-gray-400 font-mono">${imgId}</td>
                <td class="px-3 py-2 text-[10px] text-gray-400">${aucId}</td>
            </tr>
        `;
    }

    function _calSetDefaultRules() {
        // 구버전(mode+쉼표) → 표현식 변환
        _calColorRules.forEach(function (r) {
            if (r.mode && r.keywords && r.keywords.indexOf(',') >= 0) {
                var parts = r.keywords.split(',').map(function (s) { return s.trim(); }).filter(Boolean);
                if (parts.length > 1) r.keywords = parts.join(' ' + r.mode + ' ');
            }
            delete r.mode;
        });
        while (_calColorRules.length < 8) {
            var idx = _calColorRules.length;

    function _calInitRules(callback) {
        if (_calRulesInited) { if (callback) callback(); return; }
        if (_calRulesLoading) return; // 로딩 중이면 중복 호출 무시

        if (typeof google !== 'undefined' && google.script && google.script.run) {

                .withSuccessHandler(function (rules) {

                    if (callback) callback();

                .getCalColorRules();
        } else {
            _calRulesLoading = false;
            _calRulesInited = true;
            _calSetDefaultRules();
            if (callback) callback();
        }
    }

    function _calHighlightExpr(text) {
        var result = '', i = 0;
        text = text || '';
        while (i < text.length) {
            if (text[i] === '(') { result += '<span style="color:#6b7280;font-weight:700;">(</span>'; i++; continue; }
            if (text[i] === ')') { result += '<span style="color:#6b7280;font-weight:700;">)</span>'; i++; continue; }
            if (text[i] === ' ') { result += ' '; i++; continue; }
            var j = i;
            while (j < text.length && text[j] !== ' ' && text[j] !== '(' && text[j] !== ')') j++;
            var word = text.substring(i, j);
            var up = word.toUpperCase();
            if (up === 'AND') result += '<span style="color:#3b82f6;font-weight:700;">AND</span>';
            else if (up === 'OR') result += '<span style="color:#f97316;font-weight:700;">OR</span>';
            else result += word.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            i = j;
        }
        return result;
    }

    function _calGetCaretOffset(el) {
        var sel = window.getSelection();
        if (!sel || !sel.rangeCount) return 0;
        var r = sel.getRangeAt(0).cloneRange();
        r.selectNodeContents(el);
        r.setEnd(sel.getRangeAt(0).endContainer, sel.getRangeAt(0).endOffset);
        return r.toString().length;
    }

    function _calSetCaretOffset(el, offset) {
        var sel = window.getSelection();
        if (!sel) return;
        var range = document.createRange();
        var rem = offset, found = false;
        function walk(n) {
            if (found) return;
            if (n.nodeType === 3) {
                if (rem <= n.length) { range.setStart(n, rem); range.setEnd(n, rem); found = true; }
                else rem -= n.length;
            } else { for (var k = 0; k < n.childNodes.length; k++) walk(n.childNodes[k]); }
        }
        walk(el);
        if (!found) { range.selectNodeContents(el); range.collapse(false); }
        sel.removeAllRanges();
        sel.addRange(range);
    }

    function calKwInput(el, idx) {
        var pos = _calGetCaretOffset(el);
        var text = el.innerText || el.textContent || '';

    // ── AND/OR/() 표현식 파서 ────────────────────────────────────────────────
    function _calTokenize(expr) {
        var tokens = [], i = 0;
        expr = (expr || '').trim();
        while (i < expr.length) {
            while (i < expr.length && expr[i] === ' ') i++;
            if (i >= expr.length) break;
            if (expr[i] === '(') { tokens.push('('); i++; continue; }
            if (expr[i] === ')') { tokens.push(')'); i++; continue; }
            var j = i;
            while (j < expr.length && expr[j] !== ' ' && expr[j] !== '(' && expr[j] !== ')') j++;
            var word = expr.substring(i, j);
            var up = word.toUpperCase();
            if (up === 'AND') tokens.push('AND');
            else if (up === 'OR') tokens.push('OR');
            else if (word) tokens.push({ kw: word.toLowerCase() });
            i = j;
        }
        return tokens;
    }
    function _calParseExpr(tok, p) {
        var r = _calParseAnd(tok, p); p = r.p; var n = r.n;
        while (p < tok.length && tok[p] === 'OR') {
            p++;
            r = _calParseAnd(tok, p); p = r.p;
            n = { op: 'OR', l: n, r: r.n };
        }
        return { n: n, p: p };
    }
    function _calParseAnd(tok, p) {
        var r = _calParseAtom(tok, p); p = r.p; var n = r.n;
        while (p < tok.length && tok[p] === 'AND') {
            p++;
            r = _calParseAtom(tok, p); p = r.p;
            n = { op: 'AND', l: n, r: r.n };
        }
        return { n: n, p: p };
    }
    function _calParseAtom(tok, p) {
        if (p >= tok.length) return { n: null, p: p };
        if (tok[p] === '(') {
            p++;
            var r = _calParseExpr(tok, p); p = r.p;
            if (p < tok.length && tok[p] === ')') p++;
            return { n: r.n, p: p };
        }
        if (tok[p] && tok[p].kw !== undefined) return { n: tok[p], p: p + 1 };
        return { n: null, p: p + 1 };
    }
    function _calEvalNode(n, text) {
        if (!n) return false;
        if (n.kw !== undefined) return text.indexOf(n.kw) >= 0;
        if (n.op === 'AND') return _calEvalNode(n.l, text) && _calEvalNode(n.r, text);
        if (n.op === 'OR') return _calEvalNode(n.l, text) || _calEvalNode(n.r, text);
        return false;
    }
    function _calMatchExpr(keywords, title) {
        if (!keywords || !keywords.trim()) return false;
        try {
            var tok = _calTokenize(keywords);
            if (!tok.length) return false;
            return _calEvalNode(_calParseExpr(tok, 0).n, (title || '').toLowerCase());
        } catch (e) { return false; }
    }

    function _getEventRuleIndex(title) {
        for (var i = 0; i < _calColorRules.length; i++) {
            if (_calMatchExpr(_calColorRules[i].keywords, title)) return i;
        }
        return _calColorRules.length; // 매칭 없으면 맨 뒤
    }

    function _getEventColor(title) {
        var i = _getEventRuleIndex(title);
        if (i < _calColorRules.length) return _calColorRules[i].color;
        return null; // 기본: 회색
    }

    function _calGetWeekStart(offset) {
        var now = new Date();
        var dow = (now.getDay() + 6) % 7; // 월=0
        var monday = new Date(now);
        monday.setDate(now.getDate() - dow + offset * 7);
        monday.setHours(0, 0, 0, 0);
        return monday;
    }

    function calGoToday() {
        _calWeekOffset = 0;
        _calEventsCache = {};
        loadDashboardCalendar(false);
    }

    function calMoveWeek(delta) {
        _calWeekOffset += delta;
        loadDashboardCalendar(false);
        // 이동 후 다음 방향 미리 pre-fetch
        setTimeout(function () { _calPrefetch(_calWeekOffset + delta); }, 300);
    }

    function loadDashboardCalendar(forceRefresh) {
        if (typeof google === 'undefined' || !google.script || !google.script.run) return;
        var grid = document.getElementById('cal-grid');
        if (!grid) return;

        if (!_calRulesInited) {
            _calInitRules(function () { loadDashboardCalendar(forceRefresh); });
            return;
        }

        var weekStart = _calGetWeekStart(_calWeekOffset);
        var weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 14);

        var label = document.getElementById('cal-week-label');
        if (label) {
            var w2End = new Date(weekStart);
            w2End.setDate(weekStart.getDate() + 13);
            label.textContent = (weekStart.getMonth() + 1) + '/' + weekStart.getDate()
                + ' ~ ' + (w2End.getMonth() + 1) + '/' + w2End.getDate();
        }

        var cacheKey = weekStart.getTime();
        if (!forceRefresh && _calEventsCache[cacheKey]) {
            _renderCalGrid(weekStart, _calEventsCache[cacheKey]);
            return;
        }

        grid.innerHTML = '<div class="col-span-7 py-8 text-center text-gray-400 text-xs">불러오는 중...</div>';

        google.script.run
            .withSuccessHandler(function (res) {
                if (!res || !res.success) {
                    if (grid) grid.innerHTML = '<div class="col-span-7 py-4 text-center text-red-400 text-xs">캘린더 오류: ' + (res && res.error ? res.error : '알 수 없음') + '</div>';
                    return;
                }
                _calEventsCache[cacheKey] = res.events || [];
                _renderCalGrid(weekStart, res.events || []);
                // 현재 뷰 로드 완료 후 인접 주 백그라운드 pre-fetch
                setTimeout(function () {
                    _calPrefetch(_calWeekOffset - 1);
                    _calPrefetch(_calWeekOffset + 1);
                }, 200);
            })
            .withFailureHandler(function (err) {
                if (grid) grid.innerHTML = '<div class="col-span-7 py-4 text-center text-red-400 text-xs">오류: ' + err.message + '</div>';
            })
            .getCalendarEvents(weekStart.getTime(), weekEnd.getTime());
    }

    function _calPrefetch(offset) {
        var ws = _calGetWeekStart(offset);
        var key = ws.getTime();
        if (_calEventsCache[key]) return; // 이미 캐시됨
        var we = new Date(ws);
        we.setDate(ws.getDate() + 14);
        google.script.run
            .withSuccessHandler(function (res) {
                if (res && res.success) _calEventsCache[key] = res.events || [];
            })
            .withFailureHandler(function () { }) // 백그라운드 실패는 무시
            .getCalendarEvents(ws.getTime(), we.getTime());
    }

    function _renderCalGrid(weekStart, events) {
        var grid = document.getElementById('cal-grid');
        if (!grid) return;

        // 날짜별 이벤트 맵
        var evMap = {};
        events.forEach(function (ev) {
            var s = new Date(ev.start);
            var e = new Date(ev.end || ev.start);
            var cur = new Date(s.getFullYear(), s.getMonth(), s.getDate());
            var endDay = new Date(e.getFullYear(), e.getMonth(), e.getDate());
            if (ev.allDay && endDay > cur) endDay.setDate(endDay.getDate() - 1);
            while (cur <= endDay) {
                var k = cur.getFullYear() + '-' + _pad2(cur.getMonth() + 1) + '-' + _pad2(cur.getDate());
                if (!evMap[k]) evMap[k] = [];
                evMap[k].push(ev);
                cur.setDate(cur.getDate() + 1);
            }
        });

        var today = new Date();
        var todayKey = today.getFullYear() + '-' + _pad2(today.getMonth() + 1) + '-' + _pad2(today.getDate());
        var html = '';

        for (var week = 0; week < 2; week++) {
            for (var d = 0; d < 7; d++) {
                var cur = new Date(weekStart);
                cur.setDate(weekStart.getDate() + week * 7 + d);
                var k = cur.getFullYear() + '-' + _pad2(cur.getMonth() + 1) + '-' + _pad2(cur.getDate());
                var isToday = (k === todayKey);
                var isSat = (d === 5);
                var isSun = (d === 6);
                var dayEvs = (evMap[k] || []).slice().sort(function (a, b) {
                    var ai = _getEventRuleIndex(a.title);
                    var bi = _getEventRuleIndex(b.title);
                    if (ai !== bi) return ai - bi;
                    return new Date(a.start) - new Date(b.start);
                });

                var dateNumCls = 'inline-flex items-center justify-center w-6 h-6 text-xs font-bold rounded-full ';
                if (isToday) dateNumCls += 'bg-blue-600 text-white';
                else if (isSun) dateNumCls += 'text-red-400';
                else if (isSat) dateNumCls += 'text-blue-400';
                else dateNumCls += 'text-gray-700';

                var cellBg = isToday ? 'bg-blue-50' : '';
                var borderB = (week === 0) ? 'border-b border-gray-200 ' : '';
                var borderR = (d < 6) ? 'border-r border-gray-100 ' : '';

                var evHtml = '';
                var kSafe = k.replace(/'/g, '');
                dayEvs.slice(0, 4).forEach(function (ev, i) {
                    var color = _getEventColor(ev.title);
                    var bg = color || '#9ca3af';
                    var st = ev.allDay ? '' : (_fmtTime(new Date(ev.start)) + ' ');
                    evHtml += '<div class="text-xs px-1 py-0 mb-0.5 rounded truncate leading-5 cursor-pointer text-white hover:opacity-80"'
                        + ' style="background:' + bg + ';" title="' + _esc(ev.title) + '"'
                        + ' onclick="showCalEventPopup(\'' + kSafe + '\',' + i + ')">'
                        + _esc(st + ev.title) + '</div>';
                });
                if (dayEvs.length > 4) {
                    evHtml += '<div class="text-xs text-blue-500 pl-1 cursor-pointer hover:underline"'
                        + ' onclick="showCalDayPopup(\'' + kSafe + '\')">+' + (dayEvs.length - 4) + '개 더보기</div>';
                }

                html += '<div class="p-1 ' + cellBg + ' ' + borderB + borderR + '" style="min-height:100px;">'
                    + '<div class="mb-1"><span class="' + dateNumCls + '">' + cur.getDate() + '</span></div>'
                    + evHtml + '</div>';
            }
        }

        _calLastEvMap = evMap;
        grid.innerHTML = html;
    }

                + '</div></div>';
        });
        _openCalPopup(titleHtml, bodyHtml);

    function _pad2(n) { return n < 10 ? '0' + n : '' + n; }
    function _fmtTime(d) { return _pad2(d.getHours()) + ':' + _pad2(d.getMinutes()); }
    function _esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    /**
     * 이미지 동기화 현황 숫자 클릭 → 해당 사건번호 목록으로 입찰물건관리 이동
     * @param {number} statsIdx - _imgSyncStatsCache 인덱스
     * @param {string} type - '전체'|'신규등록'|'매칭'|'충돌'|'옥션매칭'|'옥션미매칭'
     */
    function navigateToSyncItemsBySakunNos(statsIdx, type) {
        const s = _imgSyncStatsCache[statsIdx];
        if (!s) return;
        let sakunNos, label;
        if (type === '전체') { sakunNos = s.allSakunNos; label = '전체'; }
        else if (type === '신규등록') { sakunNos = s.newSakunNos; label = '신규등록'; }
        else if (type === '매칭') { sakunNos = s.matchSakunNos; label = '매칭(이미지)'; }
        else if (type === '충돌') { sakunNos = s.conflictSakunNos; label = '충돌'; }
        else if (type === '옥션매칭') { sakunNos = s.aucMatchSakunNos; label = '매칭(옥션ID)'; }
        else if (type === '옥션미매칭') { sakunNos = s.aucNoMatchSakunNos; label = '매칭X(옥션ID)'; }
        else { sakunNos = s.allSakunNos; label = '전체'; }

        if (!sakunNos || sakunNos.length === 0) {
            if (typeof showStatus === 'function') showStatus('조회할 사건번호가 없습니다.', 'warning');
            return;
        }

        syncSakunFilter = { active: true, sakunNos, label: `${s.time} ${s.manager} [${label}] ${sakunNos.length}건` };
        dashboardFilter = { active: false, date: null, status: null, type: null, manager: null };

        navigateTo('ItemManagement');
        setTimeout(() => {
            // 모든 검색 필드 초기화
            const allStatusCb = document.getElementById('search-status-all');
            if (allStatusCb) { allStatusCb.checked = true; if (typeof handleStatusAll === 'function') handleStatusAll(allStatusCb); }
            const allMgrCbR = document.getElementById('search-manager-all');
            if (allMgrCbR) allMgrCbR.checked = true;
            document.querySelectorAll('input[name="search-manager-cb"]').forEach(cb => cb.checked = false);
            if (typeof updateManagerLabel === 'function') updateManagerLabel();
            const sakunInput = document.getElementById('search-sakunno');
            if (sakunInput) sakunInput.value = '';
            const indateInput = document.getElementById('search-indate');
            if (indateInput) indateInput.value = '';
            if (typeof applyFilters === 'function') applyFilters();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (typeof showStatus === 'function') showStatus(`${syncSakunFilter.label} 조회 중`, 'success');
        }, 150);
    }

            if (allStatusCb) { allStatusCb.checked = true; if (typeof handleStatusAll === 'function') handleStatusAll(allStatusCb); }

    function onAutoSyncToggleChange(el) {
        const enabled = el.checked;
        const label = document.getElementById('auto-sync-label');
        const track = document.getElementById('auto-sync-track');
        const thumb = document.getElementById('auto-sync-thumb');

        // UI 즉시 반영 (낙관적 UI 업데이트)
        updateAutoSyncToggleUI(enabled, label, track, thumb);
        if (label) label.textContent = "저장 중...";

        google.script.run
            .withSuccessHandler(function () {
                updateAutoSyncToggleUI(enabled, label, track, thumb);
                showStatus('자동 동기화 설정이 저장되었습니다.', 'success');
            })
            .withFailureHandler(function (e) {
                console.error("오류:", e);
                // 실패 시 원래 상태로 복구
                el.checked = !enabled;
                updateAutoSyncToggleUI(!enabled, label, track, thumb);
                showStatus('저장에 실패했습니다: ' + e.message, 'error');
            })
            .setAutoSyncSetting(enabled);
    }

    function updateAutoSyncToggleUI(enabled, label, track, thumb) {
        if (!label || !track || !thumb) return;
        if (enabled) {
            track.classList.replace('bg-gray-300', 'bg-indigo-500');
            thumb.classList.add('translate-x-5');
            label.textContent = 'ON';
            label.classList.replace('bg-gray-200', 'bg-indigo-100');
            label.classList.replace('text-gray-500', 'text-indigo-700');
        } else {
            track.classList.replace('bg-indigo-500', 'bg-gray-300');
            thumb.classList.remove('translate-x-5');
            label.textContent = 'OFF';
            label.classList.replace('bg-indigo-100', 'bg-gray-200');
            label.classList.replace('text-indigo-700', 'text-gray-500');
        }
    }

    function switchPrefTab(tab) {
        // 상단 탭 버튼 스타일
        ['image', 'telegram', 'kakao', 'appinfo'].forEach(function (t) {
            var btn = document.getElementById('pref-tab-btn-' + t);
            var panel = document.getElementById('pref-panel-' + t);
            if (!btn || !panel) return;
            var isActive = (t === tab);
            btn.className = 'pref-tab-btn px-4 py-2 text-sm font-semibold rounded-t-lg border-b-2 bg-white '
                + (isActive ? 'border-indigo-500 text-indigo-600' : 'border-transparent text-gray-500 hover:text-gray-700');
            panel.style.display = isActive ? (t === 'telegram' ? 'flex' : 'block') : 'none';
            if (isActive && t === 'telegram') {
                panel.style.flexDirection = 'column';
            }
        });
        // 텔레그램 탭 진입 시 첫 하위탭 활성화
        if (tab === 'telegram') {
            switchPrefSubTab('msgEditor');
        }
        // 카카오 탭 진입 시 설정 로드
        if (tab === 'kakao') {
            loadKakaoAutoEnterSetting();
        }
        // 이미지 탭 진입 시 캐시 즉시 적용, 없으면 GAS 호출
        if (tab === 'image') {
            if (_prefSettingsCache && _prefSettingsCache.autoSync !== undefined) {
                const toggle = document.getElementById('auto-sync-toggle');
                const label = document.getElementById('auto-sync-label');
                const track = document.getElementById('auto-sync-track');
                const thumb = document.getElementById('auto-sync-thumb');
                if (toggle) toggle.checked = _prefSettingsCache.autoSync;
                updateAutoSyncToggleUI(_prefSettingsCache.autoSync, label, track, thumb);
            } else {
                try { loadAutoSyncSetting(); } catch (e) { }
            }
        }
    }

    function switchPrefSubTab(sub) {
        ['msgEditor', 'notify', 'webhook', 'chatId', 'autoApprove'].forEach(function (s) {
            var btn = document.getElementById('pref-sub-btn-' + s);
            var panel = document.getElementById('pref-sub-panel-' + s);
            if (!btn || !panel) return;
            var isActive = (s === sub);
            btn.className = 'pref-sub-btn px-3 py-1.5 text-xs font-semibold rounded-t border-b-2 bg-white '
                + (isActive ? 'border-purple-500 text-purple-600' : 'border-transparent text-gray-500 hover:text-gray-700');
            panel.style.display = isActive ? (s === 'msgEditor' ? 'flex' : 'block') : 'none';
        });
        // 메시지편집 탭 진입 시 템플릿 로드
        if (sub === 'msgEditor') {
            if (_msgTemplates.length === 0) loadMsgTemplates_();
        }
        // 알림설정 탭: 캐시 즉시 적용, 없으면 GAS 호출
        if (sub === 'notify') {
            if (_prefSettingsCache && _prefSettingsCache.notify) {
                applyNotifySettingsFromCache_(_prefSettingsCache.notify);
            } else {
                try { loadNotifySettings(); } catch (e) { }
            }
        }
        // chat_id 연동 탭: 캐시 즉시 적용
        if (sub === 'chatId') {
            applyChatIdAutoApproveUI_(_prefSettingsCache ? _prefSettingsCache.chatIdAutoApprove : null);
        }
        // 자동승인 탭: 승인 대기 목록 로드
        if (sub === 'autoApprove') {
            try { loadTelegramRequests(); } catch (e) { }
        }
    }

    function toggleDataField(fieldKey, enabled) {
        if (!_msgCurrentDataCfg) {
            // 기본값(모두 true)으로 초기화
            _msgCurrentDataCfg = {};
            _DATA_FIELDS_ALL.forEach(function (f) { _msgCurrentDataCfg[f.key] = true; });

        _updateMapsCardPreview_();

    function saveDataConfigUI() {
        var item = _MSG_FLOW.find(function (x) { return x.seq === _msgSelectedSeq; });
        if (!item || item.type !== 'maps_card') return;
        // 현재 체크박스 상태 수집
        var cfg = {};
        _DATA_FIELDS_ALL.forEach(function (field) {
            var el = document.getElementById('dc_' + field.key + '_' + item.mainKey.replace(/\./g, '_'));
            if (el) cfg[field.key] = el.checked;
        });
        var cfgJson = JSON.stringify(cfg);
        showStatus('데이터 설정 저장 중...', 'info');
        google.script.run
            .withSuccessHandler(function (r) {
                if (r && r.success) {
                    _msgDataConfigs[item.mainKey] = cfg;
                    _msgCurrentDataCfg = cfg;
                    showStatus('데이터 설정 저장 완료', 'success');
                } else showStatus('저장 실패: ' + (r && r.message || ''), 'error');
            })
            .withFailureHandler(function (e) { showStatus('저장 실패: ' + e, 'error'); })
            .saveDataConfig(item.mainKey, cfgJson);
    }

    function _updateMapsCardPreview_() {
        var preview = document.getElementById('msgFlowPreview');
        if (!preview) return;
        var item = _MSG_FLOW.find(function (x) { return x.seq === _msgSelectedSeq; });
        if (!item) return;
        var getVal = function (id, fallback) { var el = document.getElementById(id); return el ? el.value : fallback; };
        var bottomKey = item.mainKey + '.bottom';
        var mainTpl = getVal('msgFlowTmpl_main', _getTpl(item.mainKey));
        var bottomTpl = getVal('msgFlowTmpl_bottom', _getTpl(bottomKey));
        var statusMap = { 'item_card.card': '추천', 'item_card.check_request': '입찰', 'item_card.status': '취소' };
        var status = statusMap[item.mainKey] || '추천';
        var statusIcon = status === '입찰' ? '🔵' : '🔴';
        var hasBidPrice = (item.mainKey !== 'item_card.card');
        var v = MSG_SAMPLE_VARS;

        // 체크박스 상태 읽기 (UI 우선, 없으면 저장된 값, 없으면 기본 true)
        var sf = function (field) {
            var el = document.getElementById('dc_' + field + '_' + item.mainKey.replace(/\./g, '_'));
            if (el) return el.checked;
            if (_msgCurrentDataCfg && _msgCurrentDataCfg[field] !== undefined) return _msgCurrentDataCfg[field];
            return true;
        };

        var lines = ['MJMAPS', _fillVarsMsg(mainTpl), ''];
        if (sf('status')) lines.push(statusIcon + ' 물건상태: ' + status);
        if (sf('in_date')) lines.push('📅 입찰일자: ' + v.in_date);
        if (sf('sakun_no')) lines.push('📄 사건번호: ' + v.sakun_no);
        if (sf('court')) lines.push('🏛️ 법원: ' + v.court);
        if (sf('member_name')) lines.push('👤 회원: ' + v.member_name);
        if (sf('manager')) lines.push('👨‍💼 담당: ' + v.manager);
        if (hasBidPrice && sf('bid_price')) { lines.push(''); lines.push('💰 입찰가: ' + v.bid_price + '원'); }
        lines.push('');
        if (bottomTpl) bottomTpl.split('\n').forEach(function (l) { lines.push(_fillVarsMsg(l)); });
        lines.push('');
        // 버튼
        var btns = _msgCurrentBtns || _msgBtnConfigs[item.mainKey] || _BTN_DEFAULTS[item.mainKey] || [];
        var enabled = btns.filter(function (b) { return b.enabled !== false; });
        if (enabled.length) lines.push(enabled.map(function (b) { return '[ ' + b.text + ' ]'; }).join('  '));
        preview.textContent = lines.join('\n');
    }

    // 전송 컬럼 강제 제거 함수
    // - 문제 원인: 실제 DOM은 `.item-list-table`이 아닐 수 있음 (사용자 selector 기준)
    // - 해결: `#listPane` 내부의 테이블을 기준으로 전송 컬럼/셀을 무조건 제거
    function removeSendColumn() {
        const root = document.getElementById('listPane') || document;
        const tables = Array.from(root.querySelectorAll('table'));

        // listPane 안에 테이블이 없을 때도, 혹시 모를 직접 selector 처리
        const forceRemoveNodes = (scope) => {
            Array.from(scope.querySelectorAll('th.item-col-action, td.item-col-action')).forEach(n => {
                try { n.remove(); } catch (e) { }
            });
            Array.from(scope.querySelectorAll('thead th')).forEach(th => {
                if (String(th.textContent || '').trim() === '전송') {
                    try { th.remove(); } catch (e) { }
                }
            });
        };

        tables.forEach(table => {
            forceRemoveNodes(table);

            // 헤더가 10개를 초과하면 11번째부터 잘라내기 (입찰가 컬럼까지 10개 유지)
            const headerRow = table.querySelector('thead tr');
            if (headerRow) {
                while (headerRow.children && headerRow.children.length > 10) {
                    try { headerRow.removeChild(headerRow.children[10]); } catch (e) { break; }
                }
            }

            // 바디 행도 10개 초과 셀 제거
            const bodyRows = Array.from(table.querySelectorAll('tbody tr'));
            bodyRows.forEach(row => {
                // item-col-action을 우선 제거
                Array.from(row.querySelectorAll('td.item-col-action, th.item-col-action')).forEach(n => {
                    try { n.remove(); } catch (e) { }
                });
                // 남아있으면 11번째 이상을 강제로 자름 (입찰가 컬럼까지 10개 유지)
                while (row.cells && row.cells.length > 10) {
                    try { row.deleteCell(10); } catch (e) { break; }
                }
            });
        });

        // 사용자 제공 selector 케이스를 직접 타격
        forceRemoveNodes(document);

        // 로딩 메시지 row의 colspan이 깨졌을 수 있어 보정
        const firstRowTd = document.querySelector('#dataTableBody tr td[colspan]');
        if (firstRowTd) {
            firstRowTd.setAttribute('colspan', '10');
        }
    }
