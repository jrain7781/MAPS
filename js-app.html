    // ── 물건카드 Div 컬럼 드래그 리사이즈 ──────────────────────
    function initBidCardResize() {
        const STORAGE_KEY = 'bidCardColWidths';
        let widths = { top: 15, bot: 45 };
        try { const s = localStorage.getItem(STORAGE_KEY); if (s) widths = { ...widths, ...JSON.parse(s) }; } catch (e) { }

        function applyWidths() {
            let st = document.getElementById('bid-card-col-style');
            if (!st) { st = document.createElement('style'); st.id = 'bid-card-col-style'; document.head.appendChild(st); }
            st.textContent = `.bid-top-left{width:${widths.top}%!important}.bid-card-bottom{grid-template-columns:${widths.bot}% 6px 1fr!important}`;
        }
        applyWidths();

        let active = null;
        document.addEventListener('mousedown', e => {
            const handle = e.target.closest('.bid-bid-col-resizer');
            if (!handle) return;
            const section = handle.dataset.bidSection;
            const row = handle.parentElement;
            handle.classList.add('active');
            active = { section, startX: e.clientX, startW: widths[section], rowW: row.offsetWidth };
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault(); e.stopPropagation();
        });
        document.addEventListener('mousemove', e => {
            if (!active) return;
            const dx = e.clientX - active.startX;
            widths[active.section] = Math.max(8, Math.min(85, active.startW + dx / active.rowW * 100));
            applyWidths();
        });
        document.addEventListener('mouseup', () => {
            if (!active) return;
            document.querySelectorAll('.bid-bid-col-resizer.active').forEach(el => el.classList.remove('active'));
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            localStorage.setItem(STORAGE_KEY, JSON.stringify(widths));
            active = null;
        });
    }

    // ── 대시보드 카드 드래그 리사이즈 ────────────────────────────
    function initDashboardResize() {
        _loadDashLayout();

        // ① 카드 높이 — 하단 경계 드래그
        document.querySelectorAll('.dash-card-h-resizer').forEach(handle => {
            handle.addEventListener('mousedown', e => {
                const card = document.getElementById(handle.dataset.card);
                if (!card) return;
                const startY = e.clientY, startH = card.offsetHeight;
                handle.classList.add('active');
                document.body.style.cursor = 'row-resize';
                document.body.style.userSelect = 'none';
                const onMove = e2 => {
                    card.style.height = Math.max(100, startH + (e2.clientY - startY)) + 'px';
                };
                const onUp = () => {
                    handle.classList.remove('active');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    _saveDashLayout();
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
                e.preventDefault();
            });
        });

        // ② 컬럼 너비 — 수직 경계 드래그
        document.querySelectorAll('.dash-col-resizer').forEach(handle => {
            handle.addEventListener('mousedown', e => {
                const leftEl = document.getElementById(handle.dataset.left);
                const rightEl = document.getElementById(handle.dataset.right);
                if (!leftEl || !rightEl) return;
                const startX = e.clientX, startLW = leftEl.offsetWidth, startRW = rightEl.offsetWidth;
                const isLastCol = handle.dataset.right === 'dashCol3';
                handle.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                const onMove = e2 => {
                    const dx = e2.clientX - startX;
                    const newLW = Math.max(120, startLW + dx);
                    leftEl.style.flex = `0 0 ${newLW}px`;
                    leftEl.style.width = newLW + 'px';
                    if (!isLastCol) {
                        const newRW = Math.max(120, startRW - dx);
                        rightEl.style.flex = `0 0 ${newRW}px`;
                        rightEl.style.width = newRW + 'px';
                    }
                };
                const onUp = () => {
                    handle.classList.remove('active');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    _saveDashLayout();
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
                e.preventDefault();
            });
        });

        // ③ 물건 상태 관리 테이블 컬럼 — 헤더 우측 드래그
        document.querySelectorAll('#statusTable .th-resize-handle').forEach(handle => {
            handle.addEventListener('mousedown', e => {
                const colIdx = parseInt(handle.dataset.col);
                const cols = document.querySelectorAll('#statusTableColgroup col');
                const table = document.getElementById('statusTable');
                if (!cols[colIdx] || !table) return;
                const tableW = table.offsetWidth;
                const startX = e.clientX;
                const startW = parseFloat(cols[colIdx].style.width) / 100 * tableW;
                handle.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                const onMove = e2 => {
                    const newW = Math.max(28, startW + (e2.clientX - startX));
                    cols[colIdx].style.width = (newW / tableW * 100).toFixed(2) + '%';
                };
                const onUp = () => {
                    handle.classList.remove('active');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    const widths = Array.from(cols).map(c => c.style.width);
                    localStorage.setItem('statusColWidths', JSON.stringify(widths));
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
                e.preventDefault();
                e.stopPropagation();
            });
        });

        // 저장된 테이블 컬럼 너비 복원
        try {
            const saved = localStorage.getItem('statusColWidths');
            if (saved) {
                const widths = JSON.parse(saved);
                const cols = document.querySelectorAll('#statusTableColgroup col');
                widths.forEach((w, i) => { if (cols[i]) cols[i].style.width = w; });
            }
        } catch (e) { }
    }

    function _saveDashLayout() {
        const layout = {};
        ['dashCol1', 'dashCol2'].forEach(id => {
            const el = document.getElementById(id);
            if (el) layout[id] = el.offsetWidth;
        });
        ['missingBidCard', 'statusManagementCard', 'auto-approval-panel', 'telegram-join-panel', 'imageStatCard'].forEach(id => {
            const el = document.getElementById(id);
            if (el) layout[id + '_h'] = el.offsetHeight;
        });
        localStorage.setItem('dashLayout', JSON.stringify(layout));
    }

    function _loadDashLayout() {
        try {
            const saved = localStorage.getItem('dashLayout');
            if (!saved) return;
            const layout = JSON.parse(saved);
            ['dashCol1', 'dashCol2'].forEach(id => {
                if (layout[id]) {
                    const el = document.getElementById(id);
                    if (el) { el.style.flex = `0 0 ${layout[id]}px`; el.style.width = layout[id] + 'px'; }
                }
            });
            ['missingBidCard', 'statusManagementCard', 'auto-approval-panel', 'telegram-join-panel', 'imageStatCard'].forEach(id => {
                if (layout[id + '_h']) {
                    const el = document.getElementById(id);
                    if (el) el.style.height = layout[id + '_h'] + 'px';
                }
            });
        } catch (e) { }
    }

    var _autoApprovalStatsCache = null;
    function loadAutoApprovalStats(forceRefresh) {
        var el = document.getElementById('autoApprovalBody');
        if (!el) return;
        var testMode = !!(document.getElementById('approvalTestMode') && document.getElementById('approvalTestMode').checked);
        if (!forceRefresh && _autoApprovalStatsCache && _autoApprovalStatsCache._testMode === testMode) {
            renderAutoApprovalStats(_autoApprovalStatsCache);
            return;
        }
        el.innerHTML = '<div class="p-4 text-center text-gray-400 text-sm">조회 중...</div>';
        google.script.run
            .withSuccessHandler(function (stats) {
                if (stats) stats._testMode = testMode;
                _autoApprovalStatsCache = stats;
                renderAutoApprovalStats(stats);
            })
            .withFailureHandler(function (err) {
                if (el) el.innerHTML = '<div class="p-4 text-center text-red-500 text-sm">' + (err && err.message ? err.message : '오류 발생') + '</div>';
            })
            .getAutoApprovalStats(testMode);
    }

    function renderAutoApprovalStats(stats) {
        var el = document.getElementById('autoApprovalBody');
        if (!el) return;
        if (!stats || stats.length === 0) {
            el.innerHTML = '<div class="py-4 text-center text-gray-400 text-sm">데이터 없음</div>';
            return;
        }
        // item_id 목록을 전역에 저장해 onclick에서 참조 (인코딩 이슈 없이 안전)
        window._approvalStats = stats;
        var DAYS_KO = ['일', '월', '화', '수', '목', '금', '토'];
        var fmtDateDay = function (s) {
            try { var p = s.split('/'); var dt = new Date(2000 + parseInt(p[0], 10), parseInt(p[1], 10) - 1, parseInt(p[2], 10)); return s + ' (' + DAYS_KO[dt.getDay()] + ')'; } catch (e) { return s; }
        };
        // "합계 (텔레, 수작업[, 만료])" 형식 셀 렌더링 - 합계/각 항목 개별 클릭 가능
        var mkCell = function (row, baseField, color, rowIdx) {
            var total = row[baseField] || 0;
            if (!total) return '<td class="py-1.5 px-1 text-center text-gray-200 text-xs">-</td>';
            var tele = row[baseField + '_tele'] || 0;
            var web = row[baseField + '_web'] || 0;
            var sys = row[baseField + '_sys'] || 0;
            var mkSub = function (cnt, field) {
                if (!cnt) return '0';
                return '<span class="hover:underline cursor-pointer" onclick="event.stopPropagation();navigateToItemsByIds(' + rowIdx + ',\'' + field + '\')">' + cnt + '</span>';
            };
            var sub = '';
            if (tele > 0 || web > 0 || sys > 0) {
                var parts = mkSub(tele, baseField + '_tele_ids') + ', ' + mkSub(web, baseField + '_web_ids');
                if (sys > 0) parts += ', ' + mkSub(sys, baseField + '_sys_ids');
                sub = '<span class="font-normal text-gray-400"> (' + parts + ')</span>';
            }
            var click = 'onclick="navigateToItemsByIds(' + rowIdx + ',\'' + baseField + '_ids\')" style="cursor:pointer"';
            return '<td class="py-1.5 px-1 text-center text-xs font-bold hover:underline ' + color + '" ' + click + '>' + total + sub + '</td>';
        };
        var tbodyHtml = '';
        stats.forEach(function (row, i) {
            tbodyHtml += '<tr class="border-b border-gray-100 hover:bg-gray-50">'
                + '<td class="py-1.5 px-2 whitespace-nowrap text-xs border-r bg-gray-50 font-bold text-gray-700 text-center">' + fmtDateDay(row.date) + '</td>'
                + mkCell(row, 'recommend', 'text-gray-700', i)
                + mkCell(row, 'bid_approved', 'text-indigo-600', i)
                + mkCell(row, 'bid_pending', 'text-orange-500', i)
                + mkCell(row, 'cancel_approved', 'text-gray-500', i)
                + mkCell(row, 'delivered', 'text-blue-600', i)
                + mkCell(row, 'confirmed', 'text-green-600', i)
                + mkCell(row, 'status_notify', 'text-red-500', i)
                + '</tr>';
        });
        el.innerHTML = '<table class="w-full text-xs border-collapse">'
            + '<thead class="sticky top-0 z-10 bg-gray-50">'
            + '<tr class="border-b border-gray-100 text-gray-600">'
            + '<th class="py-1.5 px-2 text-center font-bold border-r" rowspan="2">날짜</th>'
            + '<th class="py-1 px-1 text-center font-bold" rowspan="2">물건<br>추천</th>'
            + '<th class="py-1 px-1 text-center font-bold border-l border-gray-200" colspan="2">추천물건</th>'
            + '<th class="py-1 px-1 text-center font-bold border-l border-gray-200">입찰물건</th>'
            + '<th class="py-1 px-1 text-center font-bold border-l border-gray-200" colspan="2">입찰가</th>'
            + '<th class="py-1 px-1 text-center font-bold border-l border-gray-200" rowspan="2">변경<br>취소</th>'
            + '</tr>'
            + '<tr class="bg-gray-50 border-b border-gray-200 text-gray-500">'
            + '<th class="py-1 px-1 text-center border-l border-gray-200">입찰확정</th>'
            + '<th class="py-1 px-1 text-center">미선택</th>'
            + '<th class="py-1 px-1 text-center border-l border-gray-200">입찰취소</th>'
            + '<th class="py-1 px-1 text-center border-l border-gray-200">전달</th>'
            + '<th class="py-1 px-1 text-center">확인</th>'

    // 차트 그리기
    function renderMemberBidChart() {
        if (!memberBidChartCanvas || !summaryText) return;

        const memberData = {};
        const uniqueMembers = new Set();
        const summaryCounts = { recommend: 0, bid: 0, change: 0 };
        allBiddingData.forEach(item => {
            let memberName = item.m_name;
            if (!memberName || memberName.trim() === '' || memberName === '미등록') {
                memberName = '미정';
            }
            uniqueMembers.add(memberName);

            const status = item.stu_member;
            if (status === '추천') summaryCounts.recommend++;
            else if (status === '입찰') summaryCounts.bid++;
            else if (status === '취소') summaryCounts.change++;
            else if (status === '검증') summaryCounts.verify++;

            if (!memberData[memberName]) {
                memberData[memberName] = { '추천': 0, '입찰': 0, '검증': 0, '취소': 0 };
            }

            if (['추천', '입찰', '검증', '취소'].includes(status)) {
                memberData[memberName][status]++;
            }
        });
        summaryText.innerHTML = `
          전체 회원수: ${uniqueMembers.size}명
          (<span class="summary-item" onclick="filterCalendarByStatus('추천')">추천 ${summaryCounts.recommend}건</span> |
           <span class="summary-item" onclick="filterCalendarByStatus('입찰')">입찰 ${summaryCounts.bid}건</span> |
           <span class="summary-item" onclick="filterCalendarByStatus('검증')">검증 ${summaryCounts.verify}건</span> |
           <span class="summary-item" onclick="filterCalendarByStatus('취소')">취소 ${summaryCounts.change}건</span>)
       `;
        const labels = Object.keys(memberData).sort();

        const recommendData = labels.map(name => memberData[name]['추천']);
        const bidData = labels.map(name => memberData[name]['입찰']);
        const verifyData = labels.map(name => memberData[name]['검증']);
        const changeData = labels.map(name => memberData[name]['취소']);
        if (memberBidChartInstance) {
            memberBidChartInstance.destroy();
        }

        memberBidChartInstance = new Chart(memberBidChartCanvas, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: '추천', data: recommendData, backgroundColor: 'rgba(251, 191, 36, 0.8)', stack: 'Stack 0' },
                    { label: '입찰', data: bidData, backgroundColor: 'rgba(79, 70, 229, 0.8)', stack: 'Stack 0' },
                    { label: '검증', data: verifyData, backgroundColor: 'rgba(147, 51, 234, 0.8)', stack: 'Stack 0' },
                    { label: '취소', data: changeData, backgroundColor: 'rgba(75, 85, 99, 0.8)', stack: 'Stack 0' }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, ticks: { precision: 0 } } },
                onClick: (e, activeElements) => {
                    if (activeElements.length > 0) {
                        const element = activeElements[0];
                        const index = element.index;
                        const memberName = labels[index];
                        filterCalendarByMemberAndStatus(memberName, null);
                    }
                },
                plugins: { tooltip: { mode: 'index', intersect: false }, legend: { position: 'top' } }
            }
        });
        toggleDashboardLoading(false);
    }

    function validateCourt(input) {
        const val = input.value.trim();
        if (val && !COURT_CODES.includes(val)) {
            alert('허용되지 않은 법원명입니다.\n목록에서 선택해주세요.');
            input.value = '';
            input.focus();
        }
    }

    function validateMember(input) {
        const mName = input.value.trim();
        if (!mName) return;

        const isModal = input.id && input.id.indexOf('modal') !== -1;

        // member_id가 이미 설정된 경우(자동완성으로 선택된 경우) 검증 통과
        const memberIdEl = isModal
            ? document.getElementById('modal-form-member-id')
            : document.getElementById('form-member-id');
        if (memberIdEl && memberIdEl.value) return;

        const stuMemberEl = isModal
            ? document.getElementById('modal-form-stu-member')
            : document.getElementById('form-stu-member');
        const stuMember = stuMemberEl ? stuMemberEl.value : '';

        // "(MJ) 임준희" 또는 "임준희 (MJ) 한한한" 형식에서 기본 이름 추출
        const cleanMName = mName.replace(/^\([^)]+\)\s*/, '').split(/[\s(]/)[0].trim();
        const memberList = (typeof allMembersNewData !== 'undefined' && allMembersNewData.length > 0) ? allMembersNewData : (allMemberData || []);
        const isValidMember = memberList && memberList.some(m => {
            const name = String(m.member_name || m.name || '').trim();
            const cleanName = name.replace(/^\([^)]+\)\s*/, '').split(/[\s(]/)[0].trim();
            return cleanName === cleanMName || name === mName;
        });

        if (!isValidMember) {
            alert('등록되지 않은 회원입니다.');
            input.value = '';
            input.focus();
        }
    }

    // ── 히스토리 테이블 렌더러 ──────────────────────────────────────
    function renderHistoryTable_(rows, el, currentItem) {
        if (!rows || !rows.length) {
            el.innerHTML = '<div class="text-gray-400 py-1 text-xs">이력 없음</div>';
            return;
        }

        // 같은 분+액션+트리거 단위로 그룹화
        var groups = [];
        var seen = {};
        rows.forEach(function (r) {
            // ITEM_CREATE: 날짜 기반(같은 날 1줄 유지). 나머지: req_id 앞 10자리(초 단위)로 분리
            var tsKey = (r.action === 'ITEM_CREATE')
                ? r.requested_at.substring(0, 11)
                : ((r.req_id && r.req_id.length >= 10) ? r.req_id.substring(0, 10) : r.requested_at.substring(0, 11));
            var key = tsKey + '|' + r.action + '|' + r.trigger_type;
            if (!seen[key]) {
                seen[key] = {
                    dt: r.requested_at, action: r.action,
                    trigger: r.trigger_type, member_name: r.member_name,
                    note: r.note, changes: {}
                };
                groups.push(seen[key]);
            }
            if (r.field_name) {
                seen[key].changes[r.field_name] = { from: r.from_value || '', to: r.to_value || '' };
            }
            if (!seen[key].member_name && r.member_name) seen[key].member_name = r.member_name;
        });

        var FIELD_COLS = ['stu_member', 'chuchen_state', 'bidprice', 'bid_state', 'm_name', 'm_name_id'];

        // groups are currently from oldest to newest.
        // 역산 기반 당대 스냅샷 구축 시작. 최신값을 모른다면 빈칸.
        var currentState = {
            'stu_member': currentItem && currentItem.stu_member ? currentItem.stu_member : '',
            'chuchen_state': currentItem && currentItem.chuchen_state ? currentItem.chuchen_state : '',
            'bidprice': currentItem && currentItem.bidprice ? currentItem.bidprice : '',
            'bid_state': currentItem && currentItem.bid_state ? currentItem.bid_state : '',
            'm_name': currentItem && currentItem.m_name ? currentItem.m_name : '',
            'm_name_id': currentItem && currentItem.m_name_id ? currentItem.m_name_id : ''
        };

        // 뒤집어서 (가장 최신 -> 가장 오래된 순) 역산 진행
        groups.reverse();

        groups.forEach(function (g) {
            // 1. 현재 이 액션이 완료된 직후(더 최신)의 상태가 currentState
            // 즉, 현재 액션이 일어난 "이후 결과" = currentState
            // 그러나 이 화면(해당 시점 줄)에 보여줄 "당시 스냅샷"은, 액션이 일어난 "결과" 상태입니다.
            // 다만, 여기서 표시할 것은 "변경 후의 값"과 "변경되지 않은 나머지 값"입니다.

            // 당시 해당 컬럼의 스냅샷 = currentState
            g.snapshot = Object.assign({}, currentState);

            // 2. 이 그룹의 변경사항(from -> to)을 보고, 
            // 이 액션이 일어나기 이전 시점(더 오래된 과거)의 상태로 currentState를 되돌림(Rollback)
            FIELD_COLS.forEach(function (col) {
                if (g.changes[col] && g.changes[col].from !== undefined) { // from이 빈 문자열인 경우도 롤백 적용
                    currentState[col] = g.changes[col].from;
                }
            });
        });

        function fmtDt(dt) {
            var s = String(dt);
            // 텔레그램 수신 날짜 파싱 오류 대응
            if (s.includes(' ') || s.includes('-') || s.includes(':')) {
                var d = new Date(s);
                if (!isNaN(d.getTime())) {
                    var yy = String(d.getFullYear()).substr(-2);
                    var MM = String(d.getMonth() + 1).padStart(2, '0');
                    var dd = String(d.getDate()).padStart(2, '0');
                    var HH = String(d.getHours()).padStart(2, '0');
                    var mm = String(d.getMinutes()).padStart(2, '0');
                    return { d: '20' + yy + '-' + MM + '-' + dd, t: HH + ':' + mm };
                }
            }
            // 일반 포맷 (YYMMDD HHMMSS)
            if (s.length < 13) return { d: s, t: '' };
            return {
                d: '20' + s.substr(0, 2) + '-' + s.substr(2, 2) + '-' + s.substr(4, 2),
                t: s.substr(7, 2) + ':' + s.substr(9, 2) + ' ' + s.substr(11, 2)
            };
        }

        function renderCell(change, snapshotVal, isCreate) {
            var snap = (snapshotVal !== undefined && snapshotVal !== '') ? snapshotVal : '-';

            // 최초등록(ITEM_CREATE) 일 때 처리

                    return '<td class="px-1 py-1 text-center text-blue-600 font-bold text-[11px] border-r border-gray-100 overflow-hidden">' + escapeHtml(change.to) + '</td>';
                } else if (snap !== '-') {
                    return '<td class="px-1 py-1 text-center text-blue-600 font-bold text-[11px] border-r border-gray-100 overflow-hidden">' + escapeHtml(snap) + '</td>';
                }
                return '<td class="px-1 py-1 text-center text-gray-300 text-[11px] border-r border-gray-100 overflow-hidden">-</td>';
            }

            // 미변경 값일 때 검은색
            if (!change) {
                var colorClass = snap !== '-' ? 'text-gray-900' : 'text-gray-300';
                return '<td class="px-1 py-1 text-center ' + colorClass + ' text-[11px] border-r border-gray-100 overflow-hidden">' + escapeHtml(snap) + '</td>';
            }

            // 일반 FIELD_CHANGE
            var fv = (change.from !== undefined && change.from !== '') ? change.from : '-';
            var tv = (change.to !== undefined && change.to !== '') ? change.to : '-';
            if (fv === tv) {
                var colorClass = fv !== '-' ? 'text-gray-800' : 'text-gray-300';
                return '<td class="px-1 py-1 text-center ' + colorClass + ' text-[11px] border-r border-gray-100 overflow-hidden">' + escapeHtml(tv) + '</td>';
            }
            return '<td class="px-1 py-1 text-center text-[11px] border-r border-gray-100 overflow-hidden">'
                + '<div class="text-red-600 font-bold">' + escapeHtml(tv) + '</div>'
                + '<div class="text-gray-400 text-[10px] line-through">' + escapeHtml(fv) + '</div>'
                + '</td>';
        }

        var html = '<div class="overflow-x-auto"><table class="w-full text-xs border-collapse table-fixed">'
            + '<colgroup>'
            + '<col style="width:22px">'
            + '<col style="width:68px">'
            + '<col style="width:40px">'
            + '<col style="width:88px">'
            + '<col style="width:90px">'
            + '<col style="width:41px">'
            + '<col style="width:34px">'
            + '<col style="width:100px">'
            + '<col style="width:34px">'
            + '<col style="width:110px">'
            + '<col style="width:36px">'
            + '</colgroup>'
            + '<thead><tr class="bg-gray-100 border-b-2 border-gray-300">'
            + '<th class="px-1 py-1 text-gray-600 font-semibold text-center border-r border-gray-200 truncate">#</th>'
            + '<th class="px-1 py-1 text-gray-600 font-semibold text-center border-r border-gray-200 truncate">날짜</th>'
            + '<th class="px-1 py-1 text-gray-600 font-semibold text-center border-r border-gray-200 truncate">시간</th>'
            + '<th class="px-1 py-1 text-gray-600 font-semibold text-center border-r border-gray-200 truncate">변경자</th>'
            + '<th class="px-1 py-1 text-gray-600 font-semibold text-center border-r border-gray-200 truncate">작업</th>'
            + '<th class="px-1 py-1 text-gray-600 font-semibold text-center border-r border-gray-200 truncate">물건</th>'
            + '<th class="px-1 py-1 text-gray-600 font-semibold text-center border-r border-gray-200 truncate">전달</th>'
            + '<th class="px-1 py-1 text-gray-600 font-semibold text-center border-r border-gray-200 truncate">입찰가</th>'
            + '<th class="px-1 py-1 text-gray-600 font-semibold text-center border-r border-gray-200 truncate">전달</th>'
            + '<th class="px-1 py-1 text-gray-600 font-semibold text-center border-r border-gray-200 truncate">회원</th>'
            + '<th class="px-1 py-1 text-gray-600 font-semibold text-center truncate">담당자</th>'
            + '</tr></thead><tbody>';

        var noteMap = { 'card': '추천물건전달', 'bid_price': '입찰가전달', 'status': '진행상태전달', 'check_request': '확인요청전달' };
        var FIELD_DISP_ = {
            chuchen_state: { '전달완료': '전달', '신규': '' },
            bid_state: { '전달완료': '전달', '확인완료': '확인', '신규': '' }
        };
        function applyFieldDisp_(col, v) {
            if (col === 'bidprice' && v && v !== '') {
                var num = parseInt(String(v).replace(/[^0-9]/g, ''), 10);
                if (!isNaN(num) && num > 0) return num.toLocaleString('ko-KR');
            }
            var dm = FIELD_DISP_[col];
            if (!dm) return v;
            return dm[v] !== undefined ? dm[v] : v;
        }

        groups.forEach(function (g, i) {
            var dt = fmtDt(g.dt);
            var actionLabel = HISTORY_ACTION_LABEL[g.action] || g.action;

            // 텔레그램 기록 상세 2줄 표시
            if ((g.action === 'TELEGRAM_SENT' || g.action === 'TELEGRAM_RECEIVED') && g.note) {
                var dispNote = noteMap[g.note] || g.note;
                var prefix = g.action === 'TELEGRAM_SENT' ? '텔레그램' : '텔레그램회신';
                actionLabel = prefix + '<br><span class="text-[10px] text-gray-500">(' + escapeHtml(dispNote) + ')</span>';
            }

            var trig = g.trigger || 'sys';
            if (trig === 'member-telegram' || trig === 'mem-belegram') trig = 'mem-telegram'; // 사용자가 원한 표기로 변경

            var triggerDisp = '';
            var trigLower = trig.toLowerCase();
            if (trigLower === 'web' || (g.action === 'FIELD_CHANGE' && trigLower === 'web-telegram')) {
                triggerDisp = '<span class="text-red-500 font-bold">Web</span>';
            } else if (trigLower.indexOf('web') !== -1) {
                triggerDisp = '<span class="text-red-500 font-bold">' + escapeHtml(trig) + '</span>';
            } else if (trigLower.indexOf('tele') !== -1) {
                triggerDisp = '<span class="text-blue-500 font-bold">' + escapeHtml(trig) + '</span>';
            } else {
                triggerDisp = '<span class="text-gray-500">' + escapeHtml(trig) + '</span>';
            }

            var bgClass = i % 2 === 0 ? 'bg-white' : 'bg-gray-50';
            var isCreate = (g.action === 'ITEM_CREATE');

            html += '<tr class="border-b border-gray-100 ' + bgClass + '">';
            html += '<td class="px-1 py-1 text-gray-400 font-mono text-[10px] text-center border-r border-gray-100 overflow-hidden">' + (groups.length - i) + '</td>';
            html += '<td class="px-1 py-1 text-gray-600 text-center border-r border-gray-100 overflow-hidden">' + dt.d + '</td>';
            html += '<td class="px-1 py-1 text-gray-600 text-center font-mono border-r border-gray-100 overflow-hidden">' + dt.t + '</td>';
            html += '<td class="px-1 py-1 text-center border-r border-gray-100 overflow-hidden">' + triggerDisp + '</td>';
            // action 칸에는 직접 html을 만들 수 있어서 escape 제외하고 actionLabel 그대로 출력 (안에 <br> span 등 있음)
            html += '<td class="px-1 py-1 text-gray-700 text-center border-r border-gray-100 overflow-hidden">' + actionLabel + '</td>';

            FIELD_COLS.forEach(function (col) {
                var chg = g.changes[col];
                var snap = applyFieldDisp_(col, g.snapshot[col]);
                if (chg) chg = { from: applyFieldDisp_(col, chg.from), to: applyFieldDisp_(col, chg.to) };
                html += renderCell(chg, snap, isCreate);
            });
            html += '</tr>';
        });

        html += '</tbody></table></div>';
        el.innerHTML = html;
    }

    function updateMemberDatalist() {
        const datalist = document.getElementById('member-name-with-myungui-datalist');
        if (!datalist) return;
        datalist.innerHTML = '';

        if (!allMemberData || !Array.isArray(allMemberData)) return;

        allMemberData.forEach(member => {
            const option = document.createElement('option');
            // Format: Name (ID) Name1 Name2 Name3
            let label = `${member.member_name || member.name} (${member.member_id})`;
            const extras = [];
            if (member.name1) extras.push(member.name1);
            if (member.name2) extras.push(member.name2);
            if (member.name3) extras.push(member.name3);

            if (extras.length > 0) {
                label += ' ' + extras.join(' ');
            }

            option.value = label;
            datalist.appendChild(option);
        });

        // input 이벤트 리스너 연결 (datalist 선택 감지용)
        const input = document.getElementById('form-m-name');
        if (input) {
            // 중복 방지를 위해 기존 리스너 제거 방식은 복잡하므로, 속성에 저장된 핸들러가 없으면 추가
            if (!input.dataset.hasMemberListener) {
                input.addEventListener('input', onMemberNameInput);
                input.dataset.hasMemberListener = 'true';
            }
        }
    }

    function onMemberNameInput(e) {
        const val = e.target.value;
        // "(ID)" 패턴 찾기
        const match = val.match(/\(([^)]+)\)/);
        if (match && match[1]) {
            const id = match[1];
            const memberIdField = document.getElementById('form-member-id');
            if (memberIdField && memberIdField.value !== id) {
                memberIdField.value = id;

                // 회원 정보(텔레그램 등) 업데이트 시뮬레이션
                if (typeof allMemberData !== 'undefined') {
                    const mem = allMemberData.find(m => String(m.member_id) === String(id));
                    if (mem) {
                        const telegramUsername = document.getElementById('form-telegram-username');
                        if (telegramUsername) {
                            const enabled = mem.telegram_enabled || '';
                            telegramUsername.textContent = (enabled === 'Y') ? 'Y' : 'N';
                        }
                        const memberTokenDisplay = document.getElementById('form-member-token-display');
                        if (memberTokenDisplay) memberTokenDisplay.textContent = mem.member_token || '-';
                        const telegramChatId = document.getElementById('form-telegram-chat-id');
                        if (telegramChatId) telegramChatId.textContent = mem.telegram_chat_id || '-';
                    }
                }
            }
        }
    }

    function copyItemDetailMemberToken() {
        const el = document.getElementById('item-detail-member-token');
        const token = el ? String(el.value || '').trim() : '';
        if (!token) {
            showStatus('복사할 토큰이 없습니다.', 'error');
            return;
        }
        if (navigator && navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(token).then(() => {
                showStatus('토큰을 복사했습니다.', 'success');
            }).catch(() => {
                try {
                    el.focus();
                    el.select();
                    document.execCommand('copy');
                    showStatus('토큰을 복사했습니다.', 'success');
                } catch (e) {
                    showStatus('복사에 실패했습니다.', 'error');
                }
            });
            return;
        }
        try {
            el.focus();
            el.select();
            document.execCommand('copy');
            showStatus('토큰을 복사했습니다.', 'success');
        } catch (e) {
            showStatus('복사에 실패했습니다.', 'error');
        }
    }

    function switchItemDetailTab(tabName) {
        currentItemDetailTab = tabName;
        var btnDetail = document.getElementById('btnTabDetail');
        var btnInvestigation = document.getElementById('btnTabInvestigation');
        var contentDetail = document.getElementById('itemDetailTabContent');
        var contentInvestigation = document.getElementById('itemInvestigationTabContent');
        var placeholderEl = document.getElementById('investigationPlaceholder');
        var toolbar = document.getElementById('investigationToolbar');
        var detailPane = document.getElementById('detailPane');

        if (!contentDetail || !contentInvestigation) return;

        // 모든 탭 비활성화
        [btnDetail, btnInvestigation].forEach(function (b) { if (b) b.classList.remove('active'); });
        [contentDetail, contentInvestigation].forEach(function (c) { if (c) c.classList.add('content-hidden'); });
        if (toolbar) toolbar.classList.add('content-hidden');

        if (detailPane) {
            detailPane.classList.remove('tab-detail-active', 'tab-investigation-active');
            detailPane.classList.add('tab-' + tabName + '-active');
        }

        if (tabName === 'detail') {
            if (btnDetail) btnDetail.classList.add('active');
            contentDetail.classList.remove('content-hidden');
        } else {
            if (btnInvestigation) btnInvestigation.classList.add('active');
            contentInvestigation.classList.remove('content-hidden');
            if (toolbar) toolbar.classList.remove('content-hidden');
            // 서버 호출 없이 data-images / currentDetailItem.image_ids 로 즉시 렌더링
            var ids = [];
            var idsRaw = '';
            // 우선순위: items 시트의 image_id가 있으면 최우선으로 즉시 렌더링
            if (currentDetailItem && currentDetailItem.image_id) {
                idsRaw = String(currentDetailItem.image_id);
            } else if (typeof activeRow !== 'undefined' && activeRow && activeRow.getAttribute('data-images')) {
                idsRaw = activeRow.getAttribute('data-images') || '';
            } else if (currentDetailItem && currentDetailItem.image_ids) {
                idsRaw = String(currentDetailItem.image_ids);
            }
            if (idsRaw) ids = idsRaw.split(',').map(function (s) { return s.trim(); }).filter(Boolean);

            if (ids.length) {
                // [OPTIMIZE] items 시트의 image_id (또는 리스트 캐시) 1장만 즉시 렌더링
                renderInvestigationImagesFromIds(ids);
            } else {
                // 정보가 아예 없으면 서버 호출 (최근 등록 사진 1장만 가져옴)
                loadInvestigationImages();
            }
            // setupInvestigationDropPaste();
        }

        // [NEW] 옥션원 이동 버튼 가시성 업데이트
        updateAuctionUrlButtonVisibility();
    }

    function loadInvestigationImages() {
        if (!currentDetailItem || !currentDetailItem.id) return;
        var listEl = document.getElementById('investigationImageList');
        var placeholderEl = document.getElementById('investigationPlaceholder');
        var footerEl = document.getElementById('investigationImageIdsFooter');
        if (!listEl || !placeholderEl) return;

        // 항상 기존 이미지를 비우고 시작 (중복 방지)
        listEl.innerHTML = '';
        listEl.classList.add('content-hidden');
        placeholderEl.classList.remove('content-hidden');
        placeholderEl.textContent = '이미지 로딩 중...';
        if (!currentDetailItem || !currentDetailItem.id) {
            placeholderEl.textContent = '매칭된 이미지 없음';
            if (footerEl) footerEl.textContent = '';
            return;
        }
        google.script.run
            .withSuccessHandler(function (rows) {
                if (!rows || rows.length === 0) {
                    placeholderEl.textContent = '매칭된 이미지 없음';
                    if (footerEl) footerEl.textContent = '';
                    return;
                }
                placeholderEl.classList.add('content-hidden');
                listEl.classList.remove('content-hidden');

                // [MODIFY] 최신 이미지만 하나만 보이게 수정
                var r = rows[0];
                if (footerEl) footerEl.textContent = '최근 이미지 ID: ' + r.image_id;

                var wrap = document.createElement('div');
                wrap.className = 'w-full border border-gray-200 rounded-lg overflow-hidden bg-white shadow-sm';
                var img = document.createElement('img');
                img.className = 'investigation-image-max w-full cursor-pointer';
                img.alt = r.file_name || '이미지';
                img.dataset.imageId = r.image_id;
                img.dataset.uploader = r.uploader || '';
                if (r.image_id) {
                    var thumbUrl = 'https://drive.google.com/thumbnail?sz=w1000&id=' + encodeURIComponent(r.image_id);
                    var originalUrl = 'https://drive.google.com/uc?export=view&id=' + encodeURIComponent(r.image_id);
                    img.src = thumbUrl;
                    img.loading = 'lazy';
                    img.style.cursor = 'pointer';
                    img.onclick = (function (url) { return function () { window.open(url, '_blank'); }; })(originalUrl);
                }
                wrap.appendChild(img);

                // 삭제 버튼: 최신 이미지에 표시
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'mt-2 mx-2 mb-2 text-red-600 hover:text-red-800 text-sm font-medium';
                btn.textContent = '삭제(X)';
                btn.onclick = function (ev) {
                    ev.preventDefault();
                    ev.stopPropagation();
                    if (confirm('이 이미지를 삭제하시겠습니까?')) {
                        handleDeleteItemImage(currentDetailItem.id, r.image_id);
                    }
                };
                wrap.appendChild(btn);
                listEl.appendChild(wrap);
            })
            .withFailureHandler(function () {
                placeholderEl.textContent = '이미지를 불러올 수 없습니다.';
                if (footerEl) footerEl.textContent = '';
            })
            .getItemImages(currentDetailItem.id);
    }

    function openInvestigationTab(element, preferInvestigationTab) {
        var id = element.getAttribute('data-id') || element.dataset.id || '';

        var item = (typeof allBiddingData !== 'undefined' && allBiddingData)

        function onLeave(e) { e.preventDefault(); if (zone) zone.classList.remove('border-blue-500', 'bg-blue-50'); }

            if (zone) zone.classList.remove('border-blue-500', 'bg-blue-50');
            var f = (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]) ? e.dataTransfer.files[0] : null;
            if (f && f.type.indexOf('image/') === 0) uploadInvestigationFile(f);
        }
        if (zone) { zone.ondragover = onOver; zone.ondragleave = onLeave; zone.ondrop = onDrop; }
        if (tab) { tab.ondragover = onOver; tab.ondragleave = onLeave; tab.ondrop = onDrop; }

    function investigationPasteKey(e) {
        if (!e.ctrlKey || e.key !== 'v') return;
        var inv = document.getElementById('itemInvestigationTabContent');
        if (!inv || inv.classList.contains('content-hidden')) return;
        setTimeout(function () {
            if (!navigator.clipboard || !navigator.clipboard.read) return;
            navigator.clipboard.read().then(function (items) {
                for (var i = 0; i < items.length; i++) {
                    var t = items[i].types;
                    var mime = t.indexOf('image/png') >= 0 ? 'image/png' : (t.indexOf('image/jpeg') >= 0 ? 'image/jpeg' : (t.indexOf('image/gif') >= 0 ? 'image/gif' : null));
                    if (mime) {
                        items[i].getType(mime).then(function (blob) { uploadInvestigationBlob(blob); });
                        return;
                    }
                }
            }).catch(function () { });
        }, 10);
    }

    function handleInvestigationCopy() {
        var imageId = getFirstInvestigationImageId();

        if (imageId) {
            showStatus('이미지 데이터를 가져오는 중 (CORS 우회)...', 'warning');

            // 클라이언트측 CORS 이슈를 해결하기 위해 서버측(GAS)에서 이미지를 Base64로 가져옴
            google.script.run.withSuccessHandler(function (base64Data) {
                if (!base64Data) {
                    showStatus('이미지 데이터를 가져오지 못했습니다.', 'error');
                    return;
                }

                showStatus('이미지 변환 및 복사 중...', 'warning');
                var img = new Image();
                img.onload = function () {
                    var canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    canvas.toBlob(function (blob) {
                        if (!blob) {
                            showStatus('이미지 변환 실패', 'error');
                            return;
                        }
                        var item = new ClipboardItem({ 'image/png': blob });
                        navigator.clipboard.write([item]).then(function () {
                            showStatus('이미지를 클립보드에 복사했습니다. (PNG)', 'success');
                        }).catch(function (err) {
                            console.error('Clipboard error:', err);
                            showStatus('클립보드 저장 실패', 'error');
                        });
                    }, 'image/png');
                };
                img.onerror = function () {
                    showStatus('이미지 렌더링 실패', 'error');
                };
                img.src = base64Data;
            }).withFailureHandler(function (err) {
                showStatus('서버 오류: ' + err, 'error');
            }).getImageAsBase64(imageId);
            return;
        }

        // 이미지가 없으면 텍스트 복사 등 기존 로직 수행 (필요 시)
        const modal = document.getElementById('itemDetailModal');

        const data = isModalOpen ? currentModalItemData : currentDetailItem;

        var text = (data && data.sakun_no)
            ? (data.sakun_no || '') + ' ' + (data.court || '') + ' ' + (data['in-date'] || '')
            : '매칭된 이미지 없음';

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function () {
                showStatus('요약 정보를 클립보드에 복사했습니다.', 'success');
            }).catch(function () {
                showStatus('복사에 실패했습니다.', 'error');
            });
        } else {
            showStatus('복사 기능을 사용할 수 없습니다.', 'error');
        }
    }

    function copyTemplateText(context = 'modal') {
        const id = context === 'item' ? 'item-template-textarea' : 'template-textarea';

        const textToCopy = textarea.value;

        try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showStatus('내용이 클립보드에 복사되었습니다.', 'success');
                }).catch(err => {
                    console.error('Clipboard API failed:', err);
                    fallbackCopyText(textarea);
                });
            } else {
                fallbackCopyText(textarea);
            }
        } catch (err) {
            fallbackCopyText(textarea);
        }
    }

    function fallbackCopyText(textarea) {
        try {
            textarea.select();
            textarea.setSelectionRange(0, 99999);
            const successful = document.execCommand('copy');
            if (successful) {
                showStatus('내용이 클립보드에 복사되었습니다.', 'success');
            } else {
                showStatus('복사에 실패했습니다.', 'error');

    // ─── 카카오 동적 템플릿 시스템 ────────────────────────────────────────────
    let allKakaoTemplates = [];
    let _kakaoActiveId = {};   // { modal: 'id', item: 'id' }
    let _kakaoAutoEnter = false;
    let _kakaoCtx = null;      // 현재 편집 중인 context

    function _parseKakaoTpl(content, data) {
        if (!content || !data) return content || '';
        let s = content;
        let dateStr = String(data['in-date'] || '').trim();
        if (dateStr.length === 6) dateStr = `20${dateStr.slice(0, 2)}년 ${dateStr.slice(2, 4)}월 ${dateStr.slice(4, 6)}일`;
        let price = (data.bidprice == 0 || data.bidprice === '0') ? '0' : new Intl.NumberFormat('ko-KR').format(data.bidprice);
        s = s.replace(/\{\{이름\}\}/g, data.m_name || '');
        s = s.replace(/\{\{입찰일자\}\}/g, dateStr);
        s = s.replace(/\{\{사건번호\}\}/g, data.sakun_no || '');
        s = s.replace(/\{\{법원\}\}/g, data.court || '');
        s = s.replace(/\{\{입찰가\}\}/g, price);
        return s;
    }

    function renderKakaoTemplateTabs(memberId, ctx) {
        try {
            const containerId = ctx === 'item' ? 'item-kakao-tabs-container'
                : ctx === 'd1member' ? 'd1member-kakao-tabs-container'
                : 'modal-kakao-tabs-container';
            const container = document.getElementById(containerId);
            if (!container) return;

            const matched = allKakaoTemplates.filter(t =>
                t.type === 'public' || (t.type === 'individual' && String(t.member_id) === String(memberId)));

            container.innerHTML = '';
            if (matched.length === 0) {
                container.innerHTML = '<span class="text-xs text-gray-400 py-2 px-1">템플릿 없음 (➕추가)</span>';
                _kakaoActiveId[ctx] = null;
                _updateKakaoTextarea(ctx);
                return;
            }

            matched.forEach(t => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.dataset.id = t.id;
                btn.dataset.type = t.type;   // 색상 구분용
                btn.textContent = t.name;
                btn.className = 'kakao-tab-btn px-3 py-1.5 text-xs font-medium border-b-2 transition rounded-t';
                btn.onclick = () => _switchKakaoTab(t.id, ctx);
                container.appendChild(btn);
            });

            if (!_kakaoActiveId[ctx] || !matched.find(t => t.id === _kakaoActiveId[ctx])) {
                _kakaoActiveId[ctx] = matched[0].id;
            }
            _applyKakaoTabStyle(ctx);
            _updateKakaoTextarea(ctx);
            _renderKakaoNameField(memberId, ctx);
        } catch (e) { console.error('[renderKakaoTemplateTabs]', e); }
    }

    function _switchKakaoTab(id, ctx) {
        _kakaoActiveId[ctx] = id;
        _applyKakaoTabStyle(ctx);
        _updateKakaoTextarea(ctx);
        // 탭 클릭 시 textarea 영역 펼치기
        if (ctx === 'modal') {
            const tc = document.getElementById('template-area-container');
            if (tc) tc.classList.remove('hidden');
        }
    }

    function _applyKakaoTabStyle(ctx) {
        const containerId = ctx === 'item' ? 'item-kakao-tabs-container'
            : ctx === 'd1member' ? 'd1member-kakao-tabs-container'
            : 'modal-kakao-tabs-container';
        const container = document.getElementById(containerId);
        if (!container) return;
        container.querySelectorAll('.kakao-tab-btn').forEach(btn => {
            const isActive = btn.dataset.id === _kakaoActiveId[ctx];
            const isIndividual = btn.dataset.type === 'individual';
            let style;
            if (isIndividual) {
                style = isActive
                    ? 'text-red-700 border-red-600 bg-red-50 font-bold'
                    : 'text-red-400 border-transparent hover:text-red-600 hover:bg-red-50';
            } else {
                style = isActive
                    ? 'text-indigo-700 border-indigo-700 bg-indigo-50 font-bold'
                    : 'text-gray-500 border-transparent hover:text-indigo-600 hover:bg-gray-50';
            }
            btn.className = 'kakao-tab-btn px-3 py-1.5 text-xs font-medium border-b-2 transition rounded-t ' + style;
        });
    }

    function _updateKakaoTextarea(ctx) {
        const taId = ctx === 'item' ? 'item-template-textarea'
            : ctx === 'd1member' ? 'd1member-template-textarea'
            : 'template-textarea';
        const ta = document.getElementById(taId);
        if (!ta) return;
        const tpl = allKakaoTemplates.find(t => t.id === _kakaoActiveId[ctx]);
        let data;
        if (ctx === 'd1member') {
            const mem = getMemberById_(selectedSummaryMemberId_);
            data = mem ? { m_name: mem.member_name || mem.name1 || '', member_id: mem.member_id } : null;
        } else {
            data = ctx === 'item' ? currentDetailItem : currentModalItemData;
        }
        ta.value = tpl && data ? _parseKakaoTpl(tpl.content, data) : '';
    }

    function _renderKakaoNameField(memberId, ctx) {
        const rowId = ctx === 'item' ? 'item-kakao-name-row'
            : ctx === 'd1member' ? 'd1member-kakao-name-row'
            : 'modal-kakao-name-row';
        const row = document.getElementById(rowId);
        if (!row) return;
        const mem = memberId ? getMemberById_(memberId) : null;
        const currentName = mem ? (mem.kakao_name || '') : '';
        row.innerHTML = `
            <div class="flex items-center gap-2">
                <span class="text-xs text-gray-500 whitespace-nowrap">💬 카카오명</span>
                <input type="text" id="${rowId}-input" value="${currentName}"
                    placeholder="${mem ? (mem.member_name || '이름 미설정') : '-'}"
                    class="flex-1 px-2 py-1 border border-yellow-300 rounded text-xs bg-yellow-50 focus:outline-none focus:border-yellow-500">
                <button type="button" onclick="saveKakaoNameFromTemplate('${ctx}')"
                    class="px-2 py-1 text-xs bg-yellow-400 text-yellow-900 font-bold rounded hover:bg-yellow-500 whitespace-nowrap">저장</button>
            </div>`;
    }

    function saveKakaoNameFromTemplate(ctx) {
        const rowId = ctx === 'item' ? 'item-kakao-name-row' : 'modal-kakao-name-row';
        const input = document.getElementById(rowId + '-input');
        if (!input) return;
        const data = ctx === 'item' ? currentDetailItem : currentModalItemData;
        if (!data || !data.member_id) { showStatus('회원 정보가 없습니다.', 'error'); return; }
        const newName = input.value.trim();
        google.script.run
            .withSuccessHandler(res => {
                if (res && res.success) {
                    // 로컬 캐시도 즉시 반영
                    const mem = getMemberById_(data.member_id);
                    if (mem) mem.kakao_name = newName;
                    showStatus('카카오명이 저장되었습니다.', 'success');
                } else {
                    showStatus('저장 실패: ' + (res && res.message || ''), 'error');
                }
            })
            .withFailureHandler(err => showStatus('오류: ' + err, 'error'))
            .updateMemberField(String(data.member_id), 'kakao_name', newName);
    }

    function loadKakaoTemplatesFromServer() {
        if (typeof google === 'undefined') return;
        google.script.run
            .withSuccessHandler(data => {
                allKakaoTemplates = Array.isArray(data) ? data : [];
                // 열려있는 모달/패널이 있으면 탭 갱신
                if (currentModalItemData) renderKakaoTemplateTabs(currentModalItemData.member_id, 'modal');
                if (currentDetailItem) renderKakaoTemplateTabs(currentDetailItem.member_id, 'item');
            })
            .getAllKakaoTemplates();
    }

    // --- 카카오 템플릿 편집 모달 ---
    function openKakaoTemplateModal(ctx, isNew) {
        _kakaoCtx = ctx;
        const data = ctx === 'item' ? currentDetailItem : currentModalItemData;
        if (!data) { showStatus('물건 정보가 없습니다.', 'error'); return; }

        document.getElementById('kakao-template-member-id').value = data.member_id || '';

        if (isNew) {
            document.getElementById('kakaoTemplateModalTitle').textContent = '카카오 템플릿 추가';
            document.getElementById('kakao-template-id').value = '';
            document.getElementById('kakao-template-name').value = '';
            document.getElementById('kakao-template-content').value = '안녕하세요?\n엠제이경매스쿨입니다.\n\n{{이름}}님, {{사건번호}} 안내드립니다.';
            document.querySelector('input[name="kakao-tpl-type"][value="public"]').checked = true;
            toggleKakaoTplTarget('public');
            document.getElementById('kakao-tpl-delete-btn').classList.add('hidden');
        } else {
            const tId = _kakaoActiveId[ctx];
            if (!tId) { showStatus('편집할 템플릿이 없습니다.', 'error'); return; }
            const tpl = allKakaoTemplates.find(t => t.id === tId);
            if (!tpl) { showStatus('템플릿을 찾을 수 없습니다.', 'error'); return; }
            document.getElementById('kakaoTemplateModalTitle').textContent = '카카오 템플릿 편집';
            document.getElementById('kakao-template-id').value = tpl.id;
            document.getElementById('kakao-template-name').value = tpl.name;
            document.getElementById('kakao-template-content').value = tpl.content;
            const rType = tpl.type === 'individual' ? 'individual' : 'public';
            document.querySelector(`input[name="kakao-tpl-type"][value="${rType}"]`).checked = true;
            toggleKakaoTplTarget(rType);
            if (tpl.type === 'individual') document.getElementById('kakao-template-member-id').value = tpl.member_id || data.member_id;
            document.getElementById('kakao-tpl-delete-btn').classList.remove('hidden');
        }
        document.getElementById('kakaoTemplateModal').classList.remove('content-hidden');
    }

    function closeKakaoTemplateModal() {
        document.getElementById('kakaoTemplateModal').classList.add('content-hidden');
    }

    function toggleKakaoTplTarget(val) {
        const wrap = document.getElementById('kakao-tpl-target-wrap');
        if (wrap) wrap.classList.toggle('hidden', val !== 'individual');
    }

    function saveKakaoTemplateData() {
        const id = document.getElementById('kakao-template-id').value;
        const name = document.getElementById('kakao-template-name').value.trim();
        const content = document.getElementById('kakao-template-content').value.trim();
        const type = document.querySelector('input[name="kakao-tpl-type"]:checked').value;
        const memberId = document.getElementById('kakao-template-member-id').value.trim();
        if (!name) { showStatus('탭 이름을 입력해주세요.', 'error'); return; }
        if (!content) { showStatus('내용을 입력해주세요.', 'error'); return; }

        const saveBtn = document.getElementById('kakao-tpl-save-text');
        if (saveBtn) saveBtn.textContent = '저장 중..';
        google.script.run
            .withSuccessHandler(res => {
                if (saveBtn) saveBtn.textContent = '저장';
                if (res && res.success) {
                    showStatus('템플릿이 저장되었습니다.', 'success');
                    closeKakaoTemplateModal();
                    loadKakaoTemplatesFromServer();
                } else {
                    showStatus('저장 실패: ' + (res && res.message || ''), 'error');
                }
            })
            .withFailureHandler(err => {
                if (saveBtn) saveBtn.textContent = '저장';
                showStatus('오류: ' + err, 'error');
            })
            .saveKakaoTemplate({ id, name, content, type, member_id: memberId });
    }

    function deleteKakaoTemplateConfirm() {
        const id = document.getElementById('kakao-template-id').value;
        if (!id || !confirm('이 템플릿을 삭제하시겠습니까?')) return;
        google.script.run
            .withSuccessHandler(res => {
                if (res && res.success) {
                    showStatus('삭제되었습니다.', 'success');
                    closeKakaoTemplateModal();
                    _kakaoActiveId[_kakaoCtx] = null;
                    loadKakaoTemplatesFromServer();
                } else {
                    showStatus('삭제 실패: ' + (res && res.message || ''), 'error');
                }
            })
            .deleteKakaoTemplate(id);
    }

    // --- 카카오톡 로컬 서버 전송 ---
    function sendToKakao(ctx) {
        const taId = ctx === 'item' ? 'item-template-textarea' : 'template-textarea';
        const ta = document.getElementById(taId);
        if (!ta || !ta.value.trim()) { showStatus('전송할 내용이 없습니다.', 'error'); return; }

        const data = ctx === 'item' ? currentDetailItem : currentModalItemData;
        if (!data || !data.member_id) { showStatus('회원 정보가 없습니다.', 'error'); return; }

        const mem = getMemberById_(data.member_id);
        if (!mem) { showStatus('회원 정보를 찾을 수 없습니다.', 'error'); return; }
        const kName = mem.kakao_name || mem.member_name || mem.name1 || '';
        if (!kName) { showStatus('카카오 이름이 없습니다. 회원관리에서 설정해주세요.', 'error'); return; }

        showStatus(`카카오 전송 중: ${kName}...`, 'warning');
        fetch('http://127.0.0.1:8000/send_kakao', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target_name: kName, message: ta.value, auto_enter: _kakaoAutoEnter })
        })
            .then(r => r.json())
            .then(d => {
                if (d.status === 'success') showStatus('카톡 전송 완료!', 'success');
                else showStatus('카톡 전송 실패: ' + d.message, 'error');
            })
            .catch(() => showStatus('로컬 카카오 서버(kakao_server.py)가 실행 중인지 확인하세요.', 'error'));
    }

    // --- 카카오톡 채팅창 바로가기 ---
    function openKakaoChat(ctx) {
        const data = ctx === 'item' ? currentDetailItem : currentModalItemData;
        if (!data || !data.member_id) { showStatus('회원 정보가 없습니다.', 'error'); return; }

        const mem = getMemberById_(data.member_id);
        if (!mem) { showStatus('회원 정보를 찾을 수 없습니다.', 'error'); return; }
        const kName = mem.kakao_name || mem.member_name || mem.name1 || '';
        if (!kName) { showStatus('카카오 이름이 없습니다. 회원관리에서 설정해주세요.', 'error'); return; }

        showStatus(`채팅창 여는 중: ${kName}...`, 'warning');
        fetch('http://127.0.0.1:8000/open_kakao', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target_name: kName })
        })
            .then(r => r.json())
            .then(d => {
                if (d.status === 'success') showStatus(`${kName} 채팅창 열기 완료`, 'success');
                else showStatus('채팅창 열기 실패: ' + d.message, 'error');
            })
            .catch(() => showStatus('로컬 카카오 서버(kakao_server.py)가 실행 중인지 확인하세요.', 'error'));
    }

    function loadKakaoAutoEnterSetting() {
        if (typeof google === 'undefined') return;
        google.script.run
            .withSuccessHandler(val => {
                _kakaoAutoEnter = val;
                const toggle = document.getElementById('pref-kakao-auto-enter');
                if (toggle) toggle.checked = _kakaoAutoEnter;
            })
            .getKakaoAutoEnterSetting();

    function saveKakaoAutoEnterSetting() {
        const toggle = document.getElementById('pref-kakao-auto-enter');
        if (!toggle) return;
        showStatus('저장 중...', 'warning');
        google.script.run
            .withSuccessHandler(res => {
                if (res && res.success) {
                    _kakaoAutoEnter = res.kakaoAutoEnter;
                    showStatus('카카오 설정이 저장되었습니다.', 'success');
                } else {
                    showStatus('저장 실패.', 'error');
                }
            })
            .withFailureHandler(err => showStatus('오류: ' + err, 'error'))
            .setKakaoAutoEnterSetting(toggle.checked);
    }

    function setBidState(state) {
        const bidInput = document.getElementById('modal-form-bidprice');
        const hiddenInput = document.getElementById('modal-form-bid-state');
        const btnNew = document.getElementById('modal-bid-state-new-btn');
        const btnDelivered = document.getElementById('modal-bid-state-delivered-btn');
        const btnConfirmed = document.getElementById('modal-bid-state-confirmed-btn');

        if (hiddenInput) hiddenInput.value = state;

        // 버튼 스타일 초기화
        if (btnNew) {
            btnNew.classList.remove('bg-red-500', 'text-white', 'font-bold');
            btnNew.classList.add('bg-red-100', 'text-red-700');
        }
        if (btnDelivered) {
            btnDelivered.classList.remove('bg-gray-900', 'text-white', 'font-bold');
            btnDelivered.classList.add('bg-gray-100', 'text-gray-700');
        }
        if (btnConfirmed) {
            btnConfirmed.classList.remove('bg-blue-500', 'text-white', 'font-bold');
            btnConfirmed.classList.add('bg-gray-100', 'text-gray-700');
        }

        // 텔레그램 뱃지 초기화 (modal)
        const modalBadge = document.getElementById('modal-telegram-badge');

        // 선택된 버튼 스타일 적용
        if (state === '신규') {
            if (btnNew) {
                btnNew.classList.remove('bg-red-100', 'text-red-700');
                btnNew.classList.add('bg-red-500', 'text-white', 'font-bold');

            if (modalBadge && modalBadge.innerHTML.trim()) {
                modalBadge.innerHTML = '<span class="telegram-badge">T</span>';
            }
        } else if (state === '확인완료') {
            if (btnConfirmed) {
                btnConfirmed.classList.remove('bg-gray-100', 'text-gray-700');
                btnConfirmed.classList.add('bg-blue-500', 'text-white', 'font-bold');

                bidInput.classList.add('text-blue-600');

            // 확인완료: T 뱃지 → 파란 배경 흰 T
            if (modalBadge && modalBadge.innerHTML.trim()) {

    function handleModalUpdate() {
        if (!modalFormId || !modalFormInDate || !modalFormSakunNo || !modalFormCourt) {
            showStatus('필수 입력 항목을 확인해 주세요.', 'error');
            return;
        }

        const inDate = modalFormInDate.value;
        const sakunNo = modalFormSakunNo.value;
        const court = modalFormCourt.value;
        const stuMember = modalFormStuMember ? modalFormStuMember.value : '';
        const mName = getBaseMemberNameForSave_('modal');
        const mName2 = getMemberName2ForSave_('modal');
        const memberId = modalFormMemberId ? modalFormMemberId.value : '';
        const mNameId = modalFormMNameId ? modalFormMNameId.value : '';
        const bidPriceRaw = modalFormBidPrice ? modalFormBidPrice.value.replace(/[^0-9]/g, '') : '0';

        // [회원명 검증]
        // "(MJ) 임준희" 또는 "임준희 (MJ) 한한한" 형식에서 기본 이름 추출
        const cleanMName = String(mName || '').replace(/^\([^)]+\)\s*/, '').split(/[\s(]/)[0].trim();

        // 추천, 입찰만 회원명 필수 / 나머지 상태는 회원명 없어도 허용
        const isRequiredMemberStatus = (stuMember === '추천' || stuMember === '입찰');

        if (isRequiredMemberStatus) {
            const memberList = (typeof allMembersNewData !== 'undefined' && allMembersNewData.length > 0) ? allMembersNewData : (allMemberData || []);
            const isValidMember = memberId
                ? memberList.some(m => String(m.member_id || '').trim() === memberId)
                : memberList && memberList.some(m => {
                    const name = String(m.member_name || m.name || '').trim();
                    const cleanName = name.replace(/^\([^)]+\)\s*/, '').split(/[\s(]/)[0].trim();
                    return cleanName === cleanMName || name === mName;

                showStatus('등록된 회원이 아닙니다.', 'error');
                if (modalFormMName) modalFormMName.focus();
                return;
            }
        }
        const bidPrice = bidPriceRaw === '' ? '0' : bidPriceRaw;
        const bidState = document.getElementById('modal-form-bid-state') ? document.getElementById('modal-form-bid-state').value : '';
        const imageId = modalFormImageId ? modalFormImageId.value : '';
        const auctionId = modalFormAuctionId ? modalFormAuctionId.value : '';

        const note = document.getElementById('modal-sub-item-note') ? document.getElementById('modal-sub-item-note').value : '';
        const chuchenState = modalFormChuchenState ? modalFormChuchenState.value : (document.getElementById('modal-form-chuchen-state') ? document.getElementById('modal-form-chuchen-state').value : '');

        if (!inDate || !sakunNo || !court) {
            showStatus('필수 입력 항목(입찰일자, 사건번호, 법원명)을 확인해 주세요.', 'error');
            return;
        }
        if (inDate.length !== 6 || !/^\d{6}$/.test(inDate)) {
            showStatus('입찰일자는 6자리 (YYMMDD) 형식이어야 합니다.', 'error');

        var courtTrimModal = (court || '').trim();

            showStatus('등록된 법원만 선택할 수 있습니다.', 'error');
            if (modalFormCourt) modalFormCourt.focus();
            return;

        if (checkDuplicate(inDate, sakunNo, court, id)) {
            showStatus('이미 등록된 물건입니다. (입찰일자, 사건번호, 법원명 중복)', 'error');
            return;
        }

        const modalSaveBtn = document.querySelector('#modal-detail button[onclick="handleModalUpdate()"]');
        if (modalSaveBtn) modalSaveBtn.disabled = true;

        // [최적화 Phase 2] 낙관적 UI 업데이트 (Optimistic UI)
        // 서버 응답을 기다리지 않고 로컬 캐시를 먼저 갱신하여 사용자에게 즉각적인 피드백 제공
        const optimisticData = {
            id: id,
            'in-date': inDate,
            sakun_no: sakunNo,
            court: court,
            stu_member: stuMember,
            m_name: mName,
            m_name2: mName2,
            member_id: memberId,
            m_name_id: mNameId,
            bidprice: bidPrice,
            bid_state: bidState,
            image_id: imageId,
            auction_id: auctionId,
            reg_member: regMember,
            note: note,
            chuchen_state: chuchenState
        };

        const idx = allBiddingData.findIndex(it => String(it.id) === String(id));
        if (idx >= 0) {
            allBiddingData[idx] = Object.assign({}, allBiddingData[idx], optimisticData);
            allBiddingData.sort(dataComparator);
            dataCache = { data: allBiddingData, timestamp: Date.now() };

            // 즉시 UI 반영
            closeDetailModal();
            renderCalendar();
            if (typeof renderMemberDashboardSummary === 'function') renderMemberDashboardSummary();
            showStatus('저장 중... (배경 데이터 동기화)', 'warning');
        }

        google.script.run
            .withSuccessHandler(result => {
                if (modalSaveBtn) modalSaveBtn.disabled = false;
                if (result.success) {
                    showStatus('저장이 최종 완료되었습니다.', 'success');

                    // 서버에서 받은 최종 데이터로 한 번 더 정밀 동기화
                    if (result.data) {
                        const finalIdx = allBiddingData.findIndex(it => String(it.id) === String(result.data.id));
                        if (finalIdx >= 0) {
                            allBiddingData[finalIdx] = Object.assign({}, allBiddingData[finalIdx], result.data);
                        }
                    }
                    dataCache = { data: allBiddingData, timestamp: Date.now() };
                    renderCalendar();
                    if (typeof renderMemberDashboardSummary === 'function') renderMemberDashboardSummary();

                    // 전달완료 상태로 "전환"될 때만 텔레그램 자동 전송 (이전 상태가 전달완료가 아닌 경우만)
                    const prevBidState = typeof window._prevModalBidState !== 'undefined' ? window._prevModalBidState : '';
                    window._prevModalBidState = bidState; // 저장 성공 후 갱신
                    if (bidState === '전달완료' && prevBidState !== '전달완료' && memberId && getMemberTelegramEnabled_(memberId) === 'Y') {
                        google.script.run
                            .withSuccessHandler(tgResult => {
                                if (tgResult && tgResult.success) {
                                    showStatus('입찰가 안내를 텔레그램으로 전송했습니다.', 'success');
                                } else {
                                    showStatus('텔레그램 전송 실패: ' + (tgResult ? tgResult.message : ''), 'warning');
                                }
                            })
                            .withFailureHandler(tgErr => {
                                showStatus('텔레그램 전송 오류: ' + tgErr.message, 'warning');
                            })
                            .sendItemToMemberTelegramWithStyle(memberId, id, 'bid_price');
                    }
                } else {
                    showStatus(result.message, 'error');
                }
            })
            .withFailureHandler(error => {
                if (modalSaveBtn) modalSaveBtn.disabled = false;
                showStatus(`수정 오류: ${error.message}`, 'error');
                loadData(true); // Optimistic Update 오염 복구
            })
            // Server updateData signature: (id, inDate, sakunNo, court, stuMember, mName, bidPrice, mNameId, note, memberId, bidState, chuchenState, imageId, regMember, mName2, auctionId)
            .updateData(id, inDate, sakunNo, court, stuMember, mName, bidPrice, mNameId, note, memberId, bidState, chuchenState, imageId, regMember, mName2, auctionId);
    }

            showStatus('삭제할 항목을 먼저 선택해 주세요.', 'error');
            return;
        }
        if (!confirm(`정말로 ID ${id}의 입찰 정보를 삭제하시겠습니까?`)) {
            return;
        }

        // [최적화 Phase 2] 낙관적 삭제 (Optimistic Delete)
        if (allBiddingData) {
            allBiddingData = allBiddingData.filter(it => String(it.id) !== String(id));
            dataCache = { data: allBiddingData, timestamp: Date.now() };
            applyFilters();
            if (typeof renderCalendar === 'function') renderCalendar();
            showStatus('삭제 중... (배경 동기화)', 'warning');
        }

        google.script.run
            .withSuccessHandler((result) => {
                if (result.success) {
                    showStatus('삭제가 최종 완료되었습니다.', 'success');
                    goToCreateMode();
                } else {
                    showStatus(result.message, 'error');
                    // 실패 시에만 데이터를 다시 불러와서 복구하거나 알림
                    loadData(true);
                }
            })
            .withFailureHandler(error => {
                showStatus(`삭제 처리 중 오류: ${error.message}`, 'error');
                loadData(true);
            })
            .deleteData(id);
    }

    function loadData(forceRefresh = false) {
        if (typeof google === 'undefined' || !google.script || !google.script.run) {
            if (dataTableBody) {
                dataTableBody.innerHTML = `<tr><td colspan="10" class="p-4 text-center text-red-500 font-bold">⚠️ 오류: 이 코드는 구글 앱스 스크립트 환경이 아닙니다.</td></tr>`;
            }
            return;
        }

        // 캐시 확인 (회원 전용 링크에서는 캐시 재사용 금지)
        const now = Date.now();
        if (!IS_MEMBER_VIEW && !forceRefresh && dataCache.data && (now - dataCache.timestamp) < CACHE_DURATION) {
            allBiddingData = dataCache.data;
            updateDashboardFilterOptions(); // 입찰가담당 드랍다운 동적 갱신
            applyFilters();
            return;
        }

        toggleLoading(true);
        const runner = google.script.run
            .withSuccessHandler(data => {
                data.sort(dataComparator);
                allBiddingData = data;
                dataCache = { data: allBiddingData, timestamp: Date.now() };
                updateDashboardFilterOptions(); // 입찰가담당 드랍다운 동적 갱신
                applyFilters();
                if (typeof renderMemberDashboardSummary === 'function') renderMemberDashboardSummary();
                toggleLoading(false);
            })
            .withFailureHandler(error => {
                toggleLoading(false);
                showStatus(`데이터 로드 실패: ${error.message}`, 'error');
                if (dataTableBody) {
                    dataTableBody.innerHTML = `<tr><td colspan="10" class="p-4 text-center text-red-500">데이터 로드 중 오류가 발생했습니다.</td></tr>`;
                }
            });

        // 회원 전용 링크에서는 서버에서 토큰 기준으로 본인 데이터만 가져오기
        if (IS_MEMBER_VIEW) {
            runner.readDataWithImageIdsByMemberToken(APP_CTX.token);
        } else {
            runner.readAllDataWithImageIds();
        }
    }

    function loadDataAndRenderCalendar(forceRefresh = false, preserveScroll = false) {

                // 자동 새로고침 시 현재 스크롤 위치 저장
                const _calWV = document.getElementById('calendar-week-view');

                renderCalendar();

        if (IS_MEMBER_VIEW) {

        }, 15000); // ★ 5초 -> 15초로 완화
    }

        if (telegramRequestsPoller_) {
            clearInterval(telegramRequestsPoller_);
            telegramRequestsPoller_ = null;
        }
    }

    // --- [Calendar] 자동 갱신 폴링 (15초, BiddingSchedule 탭 활성 시) ---
