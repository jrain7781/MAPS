    // [NEW] 커스텀 회원명 자동검색(위/아래/탭 선택) 상태
    const MEMBER_AC_STATE = {
        main: { open: false, items: [], activeIndex: 0, container: null, anchor: null, programmatic: false },
        modal: { open: false, items: [], activeIndex: 0, container: null, anchor: null, programmatic: false }
    };

    function getMemberDataSource_() {
        if (typeof allMembersNewData !== 'undefined' && Array.isArray(allMembersNewData) && allMembersNewData.length > 0) return allMembersNewData;
        if (typeof allMembersData !== 'undefined' && Array.isArray(allMembersData) && allMembersData.length > 0) return allMembersData;
        if (typeof allMemberData !== 'undefined' && Array.isArray(allMemberData) && allMemberData.length > 0) return allMemberData;
        return [];
    }

    function getMemberName_(m) {
        return String(m.member_name || m.name || '').trim();
    }

    function getMemberById_(memberId) {
        const id = String(memberId || '').trim();
        if (!id) return null;
        const members = getMemberDataSource_();
        return members.find(m => String(m.member_id || '').trim() === id) || null;
    }

    function ensureMemberAcContainer_(targetType) {
        const st = MEMBER_AC_STATE[targetType];
        if (st.container) return st.container;
        const el = document.createElement('div');
        el.id = `member-ac-${targetType}`;
        el.style.position = 'absolute';
        el.style.zIndex = '99999';
        el.style.display = 'none';
        el.className = 'bg-white border border-gray-200 rounded-lg shadow-lg overflow-auto';
        el.setAttribute('role', 'listbox');
        el.addEventListener('mousedown', (e) => {
            // 클릭 시 input blur 방지
            e.preventDefault();
        });
        document.body.appendChild(el);
        st.container = el;
        return el;
    }

    function positionMemberAc_(targetType) {
        const st = MEMBER_AC_STATE[targetType];
        if (!st.open || !st.container || !st.anchor) return;
        const r = st.anchor.getBoundingClientRect();
        st.container.style.left = `${Math.max(8, r.left + window.scrollX)}px`;
        st.container.style.top = `${r.bottom + window.scrollY + 4}px`;
        st.container.style.width = `${Math.max(240, r.width)}px`;
        st.container.style.maxHeight = '240px';
    }

    function closeMemberAc_(targetType) {
        const st = MEMBER_AC_STATE[targetType];
        st.open = false;
        st.items = [];
        st.activeIndex = 0;
        if (st.container) st.container.style.display = 'none';
    }

    function renderMemberAc_(targetType) {
        const st = MEMBER_AC_STATE[targetType];
        const box = ensureMemberAcContainer_(targetType);
        if (!st.items || st.items.length === 0) {
            closeMemberAc_(targetType);
            return;
        }
        let html = '';
        st.items.forEach((it, idx) => {
            const active = idx === st.activeIndex;
            const baseCls = 'px-3 py-2 text-sm cursor-pointer select-none flex items-center justify-between';
            const activeCls = active ? 'bg-indigo-100 active-item' : 'hover:bg-indigo-50';
            const leftCls = it.kind === 'myungui' ? 'pl-6 text-gray-700' : 'text-gray-900 font-medium';
            const right = it.rightText ? `<span class="ml-3 text-xs text-gray-400">${escapeHtml(it.rightText)}</span>` : '';
            html += `
                <div data-idx="${idx}" class="${baseCls} ${activeCls}">
                    <span class="${leftCls}">${escapeHtml(it.displayText)}</span>
                    ${right}
                </div>
            `;
        });
        box.innerHTML = html;
        box.style.display = 'block';
        positionMemberAc_(targetType);

        // [Fix] 키보드 이동 시 자동 스크롤
        const activeNode = box.querySelector('.active-item');
        if (activeNode) {
            activeNode.scrollIntoView({ block: 'nearest', behavior: 'auto' });
        }

        Array.from(box.querySelectorAll('[data-idx]')).forEach(node => {
            // 마우스 이동 시 activeIndex 업데이트 (키보드와 충돌 방지 위해 약간의 조건 추가 가능하지만 단순화)
            node.addEventListener('mouseenter', () => {
                // 프로그램적 스크롤 중에는 mouseenter 무시 방지 등을 할 수도 있으나,
                // 여기선 사용자가 마우스를 움직이면 그쪽으로 포커스 이동
                const idx = parseInt(node.getAttribute('data-idx'), 10);
                if (!Number.isNaN(idx)) {
                    // 렌더링 루프 방지를 위해 index가 다를 때만 재렌더링
                    if (st.activeIndex !== idx) {
                        st.activeIndex = idx;
                        // 마우스 호버는 재렌더링 없이 클래스만 바꾸는게 성능상 좋지만, 
                        // 기존 구조 유지를 위해 그대로 두되, 스크롤 튐 방지는 scrollIntoView가 처리
                        renderMemberAc_(targetType);
                    }
                }
            });
            node.addEventListener('click', (e) => {
                // 이벤트 버블링 방지
                e.stopPropagation();
                const idx = parseInt(node.getAttribute('data-idx'), 10);
                if (!Number.isNaN(idx)) {
                    st.activeIndex = idx;
                    applyMemberAcSelection_(targetType, { moveFocusNext: true });
                }
            });
        });
    }

    function buildMemberAcItems_(queryRaw) {
        const q = String(queryRaw || '').trim().toLowerCase();
        if (!q) return [];
        const members = getMemberDataSource_();
        if (!members || members.length === 0) return [];

        const matches = members
            .map(m => ({ m, name: getMemberName_(m) }))
            .filter(x => x.name && x.name.toLowerCase().includes(q))
            .slice(0, 20);

        if (matches.length === 0) return [];

        // 정확히 1명만 "이름 완전 일치"하면 → 그 회원의 명의까지 펼쳐서 표시
        const exact = matches.filter(x => x.name.toLowerCase() === q);
        if (exact.length === 1) {
            const m = exact[0].m;
            const baseName = getMemberName_(m);
            const list = [];
            list.push({
                kind: 'base',
                member_id: m.member_id,
                baseName,
                displayText: baseName,
                inputValue: baseName
            });
            const addMy = (gubunKey, nameKey) => {
                const nm = String(m[nameKey] || '').trim();
                if (!nm) return;
                const gb = String(m[gubunKey] || '').trim();
                const display = gb ? `(${gb}) ${nm}` : nm;
                const input = gb ? `${baseName} (${gb}) ${nm}` : `${baseName} ${nm}`;
                list.push({
                    kind: 'myungui',
                    member_id: m.member_id,
                    baseName,
                    displayText: display,
                    inputValue: input
                });
            };
            addMy('name1_gubun', 'name1');
            addMy('name2_gubun', 'name2');
            addMy('name3_gubun', 'name3');
            // 완전일치 외 나머지(이름이 더 긴 후보)도 아래에 추가
            matches.filter(x => x.name.toLowerCase() !== q).forEach(x => {
                list.push({
                    kind: 'base',
                    member_id: x.m.member_id,
                    baseName: x.name,
                    displayText: x.name,
                    inputValue: x.name,
                    rightText: x.m.member_id ? `ID:${x.m.member_id}` : ''
                });
            });
            return list;
        }

        // 여러 명 매칭이면 → 회원명만 나열 (기본 커서는 첫 줄)
        return matches.map(x => ({
            kind: 'base',
            member_id: x.m.member_id,
            baseName: x.name,
            displayText: x.name,
            inputValue: x.name,
            rightText: x.m.member_id ? `ID:${x.m.member_id}` : ''
        }));
    }

    };

    function ensureCourtAcContainer_(targetType) {
        const inputEl = targetType === 'modal' ? document.getElementById('modal-form-court') : document.getElementById('form-court');
        if (!inputEl) return;
        let container = document.getElementById('court-ac-container-' + targetType);
        if (!container) {
            container = document.createElement('ul');
            container.id = 'court-ac-container-' + targetType;
            container.className = 'absolute z-50 bg-white border border-gray-300 rounded-lg shadow-lg max-h-60 overflow-y-auto text-sm hidden';
            document.body.appendChild(container);
            COURT_AC_STATE[targetType].container = container;
        }
    }

    function positionCourtAc_(targetType) {
        const st = COURT_AC_STATE[targetType];
        if (!st.open || !st.container || !st.anchor) return;
        const rect = st.anchor.getBoundingClientRect();
        st.container.style.top = (rect.bottom + window.scrollY) + 'px';
        st.container.style.left = (rect.left + window.scrollX) + 'px';
        st.container.style.width = rect.width + 'px';
        st.container.classList.remove('hidden');
    }

    function closeCourtAc_(targetType) {
        const st = COURT_AC_STATE[targetType];
        st.open = false;
        if (st.container) st.container.classList.add('hidden');
    }

    function renderCourtAc_(targetType) {
        const st = COURT_AC_STATE[targetType];
        if (!st.container) ensureCourtAcContainer_(targetType);
        if (!st.open || st.items.length === 0) {
            closeCourtAc_(targetType);
            return;
        }
        positionCourtAc_(targetType);

        st.container.innerHTML = st.items.map((item, idx) => {
            const activeClass = (idx === st.activeIndex) ? 'bg-indigo-100 text-indigo-900' : 'text-gray-700 hover:bg-gray-100';
            return `<li class="cursor-pointer px-4 py-2 ${activeClass}" data-idx="${idx}">${item}</li>`;
        }).join('');

        // 마우스 이벤트 연결
        Array.from(st.container.children).forEach(li => {
            li.addEventListener('mousedown', (e) => {
                e.preventDefault(); // 블러 방지
                const idx = parseInt(li.getAttribute('data-idx'), 10);
                st.activeIndex = idx;
                applyCourtAcSelection_(targetType);
            });
        });

        // 스크롤 처리
        const activeLi = st.container.children[st.activeIndex];
        if (activeLi) {
            activeLi.scrollIntoView({ block: 'nearest' });
        }
    }

    function buildCourtAcItems_(queryRaw) {
        const query = (queryRaw || '').trim().toLowerCase();
        let list = courtListCache || [];
        // COURT_CODES가 있다면 우선 사용, 없으면 캐시 사용 (현재 courtListCache 사용)

        if (!query) return list; // 전체 목록 (필요하면 제한)
        return list.filter(c => c.toLowerCase().includes(query));
    }

    function applyCourtAcSelection_(targetType, opts = {}) {
        const st = COURT_AC_STATE[targetType];
        const inputEl = targetType === 'modal' ? document.getElementById('modal-form-court') : document.getElementById('form-court');
        if (!inputEl || !st.items || st.items.length === 0) return;

        const val = st.items[Math.max(0, Math.min(st.activeIndex, st.items.length - 1))];
        if (!val) return;

        st.programmatic = true;
        inputEl.value = val;
        st.programmatic = false;

        closeCourtAc_(targetType);
        if (opts.moveFocusNext) focusNextField_(inputEl);
    }

    function bindCourtAutocomplete_(targetType) {
        const inputEl = targetType === 'modal'
            ? document.getElementById('modal-form-court')
            : document.getElementById('form-court');

        if (!inputEl) return;

        inputEl.setAttribute('autocomplete', 'off');
        inputEl.setAttribute('spellcheck', 'false');

        ensureCourtAcContainer_(targetType);
        const st = COURT_AC_STATE[targetType];

        const openWithCurrent = () => {
            st.anchor = inputEl;
            const items = buildCourtAcItems_(inputEl.value);
            st.items = items;
            st.activeIndex = 0;
            st.open = items.length > 0;
            renderCourtAc_(targetType);
        };

        inputEl.addEventListener('input', () => {
            if (st.programmatic) return;
            openWithCurrent();
        });

        inputEl.addEventListener('focus', () => {
            openWithCurrent();
        });

        inputEl.addEventListener('blur', () => {
            setTimeout(() => { closeCourtAc_(targetType); }, 200);
        });

        inputEl.addEventListener('keydown', (e) => {
            const isOpen = st.open && st.items.length > 0;
            if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                if (!isOpen) { openWithCurrent(); return; }
                e.preventDefault();
                if (e.key === 'ArrowDown') st.activeIndex = (st.activeIndex + 1) % st.items.length;
                else st.activeIndex = (st.activeIndex - 1 + st.items.length) % st.items.length;
                st.open = true;
                renderCourtAc_(targetType);
                return;
            }
            if (e.key === 'Enter') {
                if (isOpen) {
                    e.preventDefault();
                    applyCourtAcSelection_(targetType, { moveFocusNext: true });
                }
                return;
            }
            if (e.key === 'Escape') {
                if (isOpen) {
                    e.preventDefault();
                    closeCourtAc_(targetType);
                }
                return;
            }
            if (e.key === 'Tab' && !e.shiftKey) {
                if (isOpen) {
                    e.preventDefault();
                    applyCourtAcSelection_(targetType, { moveFocusNext: true });
                }
            }
        });
    }

    function focusNextField_(inputEl) {
        try {
            const root = inputEl && inputEl.form ? inputEl.form : document;
            const focusables = Array.from(root.querySelectorAll('input, select, textarea, button, [tabindex]'))
                .filter(el => el && !el.disabled && el.tabIndex !== -1 && el.offsetParent !== null);
            const idx = focusables.indexOf(inputEl);
            if (idx >= 0 && idx < focusables.length - 1) {
                focusables[idx + 1].focus();
            }
        } catch (e) { }
    }

    function applyMemberAcSelection_(targetType, opts = {}) {
        const st = MEMBER_AC_STATE[targetType];
        const inputEl = targetType === 'modal'
            ? document.getElementById('modal-form-m-name')
            : document.getElementById('form-m-name');
        const memberIdEl = targetType === 'modal'
            ? document.getElementById('modal-form-member-id')
            : document.getElementById('form-member-id');

        if (!inputEl || !memberIdEl || !st.items || st.items.length === 0) return;

        const it = st.items[Math.max(0, Math.min(st.activeIndex, st.items.length - 1))];
        if (!it) return;

        st.programmatic = true;
        inputEl.value = it.inputValue || '';
        memberIdEl.value = it.member_id || '';

        inputEl.dataset.memberBaseName = it.baseName || '';
        inputEl.dataset.memberDisplay = it.inputValue || '';
        st.programmatic = false;

        closeMemberAc_(targetType);
        // 선택 즉시 member_id 기반으로 우측 정보(토큰/명의/텔레그램) 갱신
        updateMemberTokenInfo(targetType);

        if (opts.moveFocusNext) {
            focusNextField_(inputEl);
        }
    }

    // 회원명 입력 시 회원 정보 자동 설정
    function updateMemberTokenInfo(targetType = 'main') {
        const formMName = targetType === 'modal'

            : document.getElementById('form-m-name');

        // 회원 데이터에서 member_id 우선 검색 (커스텀 자동검색 대응)
        let member = selectedMemberId ? getMemberById_(selectedMemberId) : null;

        // member_id가 없으면 이름(기본명)으로만 "정확 일치"를 시도
        if (!member) {
            const baseName = String(selectedName.split('(')[0] || '').trim();

                member = members.find(m => getMemberName_(m) === baseName) || null;

        if (member) {

                if (member.name2 && String(member.name2).trim()) {

                }
                if (member.name3 && String(member.name3).trim()) {
                    myunguiList.push(`${member.name3_gubun || ''}-${member.name3}`);
                }

                if (myunguiList.length > 0) {
                    displayMemberMyungui.textContent = '명의: ' + myunguiList.join(', ');
                } else {
                    displayMemberMyungui.textContent = '';
                }
            }

            // 물건그랩경보 표시 (회원 텔레그램 정보)
            const telegramEnabled = member.telegram_enabled || '';
            if (targetType === 'main') {
                const telegramUsername = document.getElementById('form-telegram-username');
                const memberTokenDisplay = document.getElementById('form-member-token-display');
                const telegramChatId = document.getElementById('form-telegram-chat-id');

                // telegram_enabled 값 표시 (없으면 N, N=N, Y=Y)
                if (telegramUsername) {
                    telegramUsername.textContent = (telegramEnabled === 'Y') ? 'Y' : 'N';

                if (memberTokenDisplay) memberTokenDisplay.textContent = member.member_token || '-';
                if (telegramChatId) telegramChatId.textContent = member.telegram_chat_id || '-';

                // 상세탭 회원명 옆 T 뱃지

                if (detailBadge) detailBadge.innerHTML = (telegramEnabled === 'Y') ? '<span class="telegram-badge">T</span>' : '';
            } else {
                const telegramUsername = document.getElementById('modal-telegram-username');
                const memberTokenDisplay = document.getElementById('modal-member-token-display');
                const telegramChatId = document.getElementById('modal-telegram-chat-id');

                // telegram_enabled 값 표시 (없으면 N, N=N, Y=Y)
                if (telegramUsername) {
                    telegramUsername.textContent = (telegramEnabled === 'Y') ? 'Y' : 'N';
                }
                if (memberTokenDisplay) memberTokenDisplay.textContent = member.member_token || '-';
                if (telegramChatId) telegramChatId.textContent = member.telegram_chat_id || '-';

                // 모달 회원명 옆 T 뱃지
                const modalBadge = document.getElementById('modal-telegram-badge');
                if (modalBadge) modalBadge.innerHTML = (telegramEnabled === 'Y') ? '<span class="telegram-badge">T</span>' : '';
            }

            // display-member-id 스팬에 회원 부가정보 인라인 표시 (main 탭, modal 공통)
            if (displayMemberId) {
                const parts = [];
                if (member.member_id) parts.push(`ID: ${member.member_id}`);
                if (member.phone) parts.push(member.phone);

                // 수업 정보 (allClassesData에서 class_id로 조회)
                const classId = String(member.class_id || '').trim();
                const classInfo = (typeof allClassesData !== 'undefined' && Array.isArray(allClassesData) && classId)
                    ? (allClassesData.find(c => String(c.class_id) === classId) || {})
                    : {};
                if (classInfo.class_type || classInfo.class_name) {
                    const grade = classInfo.class_grade ? ` [${classInfo.class_grade}]` : '';

                }

                displayMemberId.textContent = parts.length ? `(${parts.join(' | ')})` : '';

    function bindMemberAutocomplete_(targetType) {
        const inputEl = targetType === 'modal'
            ? document.getElementById('modal-form-m-name')
            : document.getElementById('form-m-name');
        const memberIdEl = targetType === 'modal'
            ? document.getElementById('modal-form-member-id')
            : document.getElementById('form-member-id');
        if (!inputEl || !memberIdEl) return;

        // [Fix] 브라우저 기본 자동완성/스펠첵 비활성화
        inputEl.setAttribute('autocomplete', 'off');
        inputEl.setAttribute('spellcheck', 'false');

        ensureMemberAcContainer_(targetType);

        const st = MEMBER_AC_STATE[targetType];

        const openWithCurrent = () => {
            st.anchor = inputEl;
            const items = buildMemberAcItems_(inputEl.value);
            st.items = items;
            // 리스트가 열릴 때 기존에 선택된 항목이 있다면 그 위치를 찾을 수도 있겠지만,
            // 보통은 첫 번째 항목(가장 근접한 검색결과)을 가리키는 것이 자연스러움
            st.activeIndex = 0;
            st.open = items.length > 0;
            renderMemberAc_(targetType);
        };

        inputEl.addEventListener('input', () => {
            if (st.programmatic) return;
            // 사용자가 타이핑하면 기존 member_id는 무조건 해제(스테일 방지)
            memberIdEl.value = '';
            openWithCurrent();
        });

        inputEl.addEventListener('focus', () => {
            // 포커스 시에도 자동완성 열기
            openWithCurrent();
        });

        inputEl.addEventListener('blur', () => {
            // 클릭 선택을 위해 살짝 지연 후 닫기
            // 상호작용(mousedown)이 있으면 blur 처리가 무시되거나(전파방지) 순서가 보장되어야 함
            setTimeout(() => {
                closeMemberAc_(targetType);
            }, 200);
        });

        inputEl.addEventListener('keydown', (e) => {
            const st = MEMBER_AC_STATE[targetType];
            const isOpen = st.open && st.items && st.items.length > 0;

            if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                if (!isOpen) {
                    // 닫혀있으면 열기
                    openWithCurrent();
                    return;
                }
                e.preventDefault(); // 커서 이동 방지

                if (e.key === 'ArrowDown') st.activeIndex = (st.activeIndex + 1) % st.items.length;
                else st.activeIndex = (st.activeIndex - 1 + st.items.length) % st.items.length;

                st.open = true;
                renderMemberAc_(targetType);
                return;
            }

            if (e.key === 'Tab' && !e.shiftKey) {
                if (isOpen) {
                    // 탭 = 선택 + 다음 필드로
                    e.preventDefault();
                    applyMemberAcSelection_(targetType, { moveFocusNext: true });
                }
                return;
            }

            if (e.key === 'Enter') {
                if (isOpen) {
                    e.preventDefault();
                    // 엔터는 폼 제출 방지하고 선택만 수행
                    applyMemberAcSelection_(targetType, { moveFocusNext: true });
                } else {
                    // 리스트가 없을 때 엔터: 그냥 폼 제출로 넘어가지 않도록(필요시) 방어
                    // 여기선 기본 동작 허용(수동 입력)
                }
                return;
            }

            if (e.key === 'Escape') {
                if (isOpen) {
                    e.preventDefault();
                    closeMemberAc_(targetType);
                }
                return;
            }
        });
    }

    /**

     * (ItemManagement, BiddingSchedule 탭 진입 시 호출)
     */
    let _classDataLoading = false;
    let _classDataCallbacks = []; // 로딩 중 들어온 callback 큐
    function ensureClassDataLoaded(callback) {
        const needMembers = allMembersNewData.length === 0;
        const needClasses = classDropdownOptions.class_types.length === 0;

        if (!needMembers && !needClasses) {
            if (callback) callback();
            return;
        }
        // 로딩 중이면 callback만 큐에 넣고 리턴 (중복 로딩 방지)
        if (callback) _classDataCallbacks.push(callback);
        if (_classDataLoading) return;
        _classDataLoading = true;

        let membersOk = !needMembers;
        let classesOk = !needClasses;

        const checkDone = () => {
            if (membersOk && classesOk) {
                _classDataLoading = false;
                updateBidCalClassTypeDropdowns();
                // 큐에 쌓인 callback 전부 실행
                const cbs = _classDataCallbacks.splice(0);
                cbs.forEach(cb => { try { cb(); } catch (e) { } });
            }
        };

        if (needMembers && typeof google !== 'undefined' && google.script) {
            google.script.run
                .withSuccessHandler(d => { allMembersNewData = d || []; membersOk = true; checkDone(); })
                .withFailureHandler(() => { membersOk = true; checkDone(); })
                .readAllMembersNew();
        } else {
            membersOk = true;
        }

        if (needClasses && typeof google !== 'undefined' && google.script) {
            google.script.run
                .withSuccessHandler(opts => {
                    classDropdownOptions = opts || { class_types: [], class_names: [], class_grades: [], class_locs: [] };
                    // all_classes 포함되어 있으므로 readAllClasses 별도 호출 불필요
                    allClassesData = classDropdownOptions.all_classes || allClassesData;
                    classesOk = true;
                    checkDone();
                })
                .withFailureHandler(() => { classesOk = true; checkDone(); })
                .getClassDropdownOptions();
        } else {
            classesOk = true;
        }

        checkDone(); // needMembers/needClasses 둘 다 false면 즉시 완료
    }

    function filterMembersNew() {
        const nameKw = (document.getElementById('mem-search-name')?.value || '').toLowerCase();
        const phoneKw = (document.getElementById('mem-search-phone')?.value || '').replace(/[^0-9]/g, '');
        const gubunKw = document.getElementById('mem-search-gubun')?.value || '';
        const pendingClassType = window._memberMgmtPendingClassType || '';
        if (pendingClassType) window._memberMgmtPendingClassType = '';
        const classTypeKw = pendingClassType || document.getElementById('mem-search-class-type')?.value || '';
        const classNameKw = document.getElementById('mem-search-class-name')?.value || '';
        const classGradeKw = document.getElementById('mem-search-class-grade')?.value || '';
        const classLocKw = document.getElementById('mem-search-class-loc')?.value || '';
        const telegramFilter = window._memberMgmtTelegramFilter || '';
        window._memberMgmtTelegramFilter = ''; // 한 번 사용 후 초기화
        // 물건 모드: member_id 배열 기반 필터 (class_type 필터보다 우선)
        const pendingMemberIds = window._memberMgmtPendingMemberIds || null;
        if (pendingMemberIds) window._memberMgmtPendingMemberIds = null;

        // 수업 정보 매핑
        const classMap = {};
        allClassesData.forEach(c => { classMap[String(c.class_id)] = c; });

        let filtered = allMembersNewData.filter(m => {
            const name = String(m.member_name || '').toLowerCase();
            const name1 = String(m.name1 || '').toLowerCase();
            const name2 = String(m.name2 || '').toLowerCase();
            const name3 = String(m.name3 || '').toLowerCase();
            const phone = String(m.phone || '').replace(/[^0-9]/g, '');
            const gubun = String(m.gubun || '');
            const cls = classMap[String(m.class_id)] || {};

            // 물건 모드 member_id 필터 (설정된 경우 class_type 등 수업 필터 대신 사용)
            if (pendingMemberIds) {
                if (!pendingMemberIds.includes(String(m.member_id || ''))) return false;
            } else {
                if (classTypeKw && (cls.class_type || '') !== classTypeKw) return false;
                if (classNameKw && (cls.class_name || '') !== classNameKw) return false;
                if (classGradeKw && (cls.class_grade || '') !== classGradeKw) return false;
                if (classLocKw && (cls.class_loc || '') !== classLocKw) return false;
            }

            if (nameKw && !name.includes(nameKw) && !name1.includes(nameKw) && !name2.includes(nameKw) && !name3.includes(nameKw)) return false;
            if (phoneKw && !phone.includes(phoneKw)) return false;
            if (gubunKw && gubun !== gubunKw) return false;
            if (telegramFilter === 'Y' && String(m.telegram_enabled || '').toUpperCase() !== 'Y') return false;
            if (telegramFilter === 'C' && !String(m.telegram_chat_id || '').trim()) return false;
            return true;
        });

        // 정렬
        const CLASS_SORT_KEYS = ['class_type', 'class_name', 'class_loc'];
        filtered.sort((a, b) => {
            let va, vb;
            if (CLASS_SORT_KEYS.includes(memberSortKey)) {
                const clsA = classMap[String(a.class_id)] || {};
                const clsB = classMap[String(b.class_id)] || {};
                va = clsA[memberSortKey] || '';
                vb = clsB[memberSortKey] || '';
            } else {
                va = a[memberSortKey] ?? '';
                vb = b[memberSortKey] ?? '';
            }
            if (typeof va === 'number' && typeof vb === 'number') {
                return memberSortAsc ? va - vb : vb - va;
            }
            return memberSortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
        });

        _updateMemberSortArrows();
        renderMemberListNew(filtered, classMap);
    }

    function loadAdminMemberItemHistory() {
        const statusEl = document.getElementById('cancelHistoryStatus');
        const summaryBody = document.getElementById('memberHistorySummaryBody');
        const listBody = document.getElementById('cancelHistoryTableBody');
        if (!listBody) return;

        // 현재 선택된 회원 ID
        const memberId = (document.getElementById('mem-member_id') || {}).value || '';
        if (!memberId) {
            summaryBody.innerHTML = '<tr><td colspan="5" class="p-2 text-center text-gray-400">회원을 선택해 주세요.</td></tr>';
            listBody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-gray-400">회원을 선택하면 조회됩니다.</td></tr>';
            return;
        }

        const periodSelect = document.getElementById('memberHistoryPeriod');
        const months = periodSelect ? periodSelect.value : 12;

        if (statusEl) statusEl.textContent = '조회 중...';
        summaryBody.innerHTML = '<tr><td colspan="5" class="p-2 text-center text-gray-400">요약 중...</td></tr>';
        listBody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-gray-400">불러오는 중...</td></tr>';

        google.script.run
            .withSuccessHandler(function (res) {
                const summary = res.summary || [];
                const list = res.list || [];

                // 1. 요약 데이터 렌더링
                let sumTotals = { 추천: 0, 입찰: 0, 취소: 0, 변경: 0 };
                if (summary.length > 0) {
                    summaryBody.innerHTML = summary.map(function (s) {
                        sumTotals.추천 += s.추천 || 0;
                        sumTotals.입찰 += s.입찰 || 0;
                        sumTotals.취소 += s.취소 || 0;
                        sumTotals.변경 += s.변경 || 0;
                        return `
                            <tr>
                                <td class="border border-gray-200 px-2 py-1 bg-gray-50">${s.month}</td>
                                <td class="border border-gray-200 px-2 py-1">${s.추천 || '-'}</td>
                                <td class="border border-gray-200 px-2 py-1">${s.입찰 || '-'}</td>
                                <td class="border border-gray-200 px-2 py-1 text-red-500">${s.취소 || '-'}</td>
                                <td class="border border-gray-200 px-2 py-1">${s.변경 || '-'}</td>
                            </tr>
                        `;
                    }).join('');
                } else {
                    summaryBody.innerHTML = '<tr><td colspan="5" class="p-2 text-gray-400">이력이 없습니다.</td></tr>';
                }

                // 합계 표시
                const sumChuchen = document.getElementById('sum-chuchen-total');
                const sumBid = document.getElementById('sum-bid-total');
                const sumCancel = document.getElementById('sum-cancel-total');
                const sumChange = document.getElementById('sum-change-total');
                if (sumChuchen) sumChuchen.textContent = sumTotals.추천;
                if (sumBid) sumBid.textContent = sumTotals.입찰;
                if (sumCancel) sumCancel.textContent = sumTotals.취소;
                if (sumChange) sumChange.textContent = sumTotals.변경;

                // 2. 리스트 데이터 렌더링
                if (statusEl) statusEl.textContent = '총 ' + list.length + '건';
                if (list.length > 0) {
                    listBody.innerHTML = list.map(function (r, i) {
                        // 카테고리별 컬러
                        let catClass = 'bg-gray-100 text-gray-600';
                        if (r.category === '추천') catClass = 'bg-blue-100 text-blue-600';
                        else if (r.category === '입찰') catClass = 'bg-green-100 text-green-600';
                        else if (r.category === '취소') catClass = 'bg-red-100 text-red-500';

                        return `
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-2 py-1.5 text-center text-gray-400">${i + 1}</td>
                                <td class="px-2 py-1.5 text-center">
                                    <span class="px-1.5 py-0.5 rounded text-[10px] font-bold ${catClass}">${r.category}</span>
                                </td>
                                <td class="px-2 py-1.5 text-center font-mono text-gray-700">${String(r.date || '').substring(2, 10).replace(/-/g, '')}</td>
                                <td class="px-2 py-1.5 text-center font-mono text-gray-700">${String(r.in_date || '')}</td>
                                <td class="px-2 py-1.5 font-semibold text-gray-800">${escapeHtml(r.sakun_no)}</td>
                                <td class="px-2 py-1.5 text-gray-600">${escapeHtml(r.court)}</td>
                            </tr>
                        `;
                    }).join('');
                } else {
                    listBody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-gray-400">조회된 이력이 없습니다.</td></tr>';
                }
            })
            .withFailureHandler(function (err) {
                if (statusEl) statusEl.textContent = '오류: ' + err.toString();
                if (listBody) listBody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-red-400">로드 중 오류가 발생했습니다.</td></tr>';
            })
            .getMemberItemHistory(memberId, months);
    }

    function filterClasses() {
        const typeKw = document.getElementById('cls-search-type')?.value || '';
        const nameKw = document.getElementById('cls-search-name')?.value || '';
        const gradeKw = document.getElementById('cls-search-grade')?.value || '';
        const locKw = document.getElementById('cls-search-loc')?.value || '';

        let filtered = allClassesData.filter(c => {
            if (typeKw && c.class_type !== typeKw) return false;
            if (nameKw && c.class_name !== nameKw) return false;
            if (gradeKw && c.class_grade !== gradeKw) return false;
            if (locKw && c.class_loc !== locKw) return false;
            return true;
        });

        filtered.sort((a, b) => {
            let va = a[classSortKey] || '';
            let vb = b[classSortKey] || '';
            return classSortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
        });

        renderClassList(filtered);
    }

    let selectedClassEditId = null;
    function renderClassList(classes) {
        const tbody = document.getElementById('classDataTableBody');
        if (!tbody) return;
        if (classes.length === 0) {

            return;

            const rowCls = isSel

            return `<tr class="cursor-pointer ${rowCls} transition-colors" onclick="selectClass('${c.class_id}')">
                <td class="px-2 py-2 text-center text-xs ${isSel ? 'font-semibold text-indigo-800' : ''}">${escapeHtml(c.class_id)}</td>
                <td class="px-2 py-2 text-center text-xs ${isSel ? 'text-indigo-800' : ''}">${escapeHtml(c.class_loop || '-')}</td>

            } else {
                showStatus(result.message, 'error');
            }
        };

        if (isEdit) {
            google.script.run.withSuccessHandler(handler).withFailureHandler(e => showStatus(e.message, 'error')).updateClass(data);
        } else {
            google.script.run.withSuccessHandler(handler).withFailureHandler(e => showStatus(e.message, 'error')).createClass(data);
        }
    }

    function sortClassScheduleList(key) {
        if (csdSortKey === key) { csdSortAsc = !csdSortAsc; }
        else { csdSortKey = key; csdSortAsc = true; }
        // 화살표 UI 업데이트
        document.querySelectorAll('[data-csd-sort]').forEach(th => {
            const arrow = th.querySelector('.csd-sort-arrow');
            if (!arrow) return;
            if (th.dataset.csdSort === key) {
                arrow.textContent = csdSortAsc ? ' ▲' : ' ▼';
            } else {
                arrow.textContent = '';
            }
        });
        filterClassScheduleList();

    function filterClassScheduleList() {
        const gradeKw = document.getElementById('csd-search-grade')?.value || '';
        const locKw = document.getElementById('csd-search-loc')?.value || '';
        const memberKw = (document.getElementById('csd-search-member')?.value || '').trim().toLowerCase();

        const tabTypes = {
            'CLASS': ['CLASS'],
            'PT': ['PT', '프리미엄 PT'],
            '돈클': ['돈클']
        };
        const allowedTypes = tabTypes[currentClassScheduleTab] || [];

        let filtered = allClassesData.filter(c => {
            const ct = (c.class_type || '').trim();
            if (!allowedTypes.includes(ct)) return false;
            if (gradeKw && c.class_grade !== gradeKw) return false;
            if (locKw && c.class_loc !== locKw) return false;
            if (memberKw) {
                const hasMember = (allMembersNewData || []).some(m =>
                    String(m.class_id) === String(c.class_id) &&
                    (m.member_name || '').toLowerCase().includes(memberKw)
                );
                if (!hasMember) return false;
            }
            return true;
        });

        filtered.sort((a, b) => {
            const va = String(a[csdSortKey] || '');
            const vb = String(b[csdSortKey] || '');
            return csdSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        });

        renderClassScheduleList(filtered);
    }

    // 배치 그룹핑: class_d1_id 에서 타임스탬프(중간 파트) 기준으로 묶기
    function buildD1Batches_() {
        const map = {};
        allClassD1Data.forEach(d => {
            const parts = String(d.class_d1_id).split('_');
            const batchKey = parts.length >= 2 ? parts[1] : 'default';
            if (!map[batchKey]) map[batchKey] = [];
            map[batchKey].push(d);
        });
        // 최신 배치가 앞에 오도록 내림차순 정렬
        d1Batches = Object.keys(map).sort((a, b) => b.localeCompare(a)).map(k => ({ batchKey: k, items: map[k] }));
        d1BatchIdx = 0; // 최신 배치 먼저 표시
        updateD1BatchLabel_();
    }

    function updateD1BatchLabel_() { /* 레이블 제거됨 — 수업리스트 그리드로 대체 */ }
    function prevD1Batch() { if (d1BatchIdx < d1Batches.length - 1) { d1BatchIdx++; renderClassD1Grid(); } }
    function nextD1Batch() { if (d1BatchIdx > 0) { d1BatchIdx--; renderClassD1Grid(); } }

    function selectD1Batch(idx) {
        d1BatchIdx = idx;

        const memberPanel = document.getElementById('d1TabPanel-member');

    function renderD1BatchListGrid_() {
        const tbody = document.getElementById('classD1BatchListTableBody');
        if (!tbody) return;
        if (d1Batches.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500 text-xs">수업이 없습니다.</td></tr>';
            return;
        }
        let html = '';
        for (let i = 0; i < d1Batches.length; i++) {
            const b = d1Batches[i];
            const items = b.items || b;

            const rowCls = isSelected ? 'bg-indigo-50 border-l-4 border-indigo-400' : 'hover:bg-gray-50 border-l-4 border-transparent';

            function fmtYYMMDD(d) {
                const s = String(d || '').replace(/-/g, '');
                return s.length >= 8 ? s.substring(2,4)+'/'+s.substring(4,6)+'/'+s.substring(6,8) : (d || '-');
            }
            const firstDate = fmtYYMMDD(items[0].class_date);
            const lastDate = fmtYYMMDD(items[items.length - 1].class_date);
            const periodHtml = firstDate === lastDate
                ? firstDate
                : `${firstDate}~<br>${lastDate}`;
            const teacherId = items[0].teacher_id || '';
            const teacherMember = teacherId ? (allMembersNewData || []).find(m => String(m.member_id) === String(teacherId)) : null;
            const teacherName = teacherMember ? teacherMember.member_name : (teacherId || '-');
            const batchMember = (i === d1BatchIdx && summaryMemberData_.length > 0)
                ? escapeHtml(summaryMemberData_[0].member_name || '-') : '-';
            html += `<tr class="${rowCls} cursor-pointer" onclick="selectD1Batch(${i})">
                <td class="px-2 py-2 text-center text-sm ${txtCls}">${i + 1}</td>
                <td class="px-2 py-2 text-center text-sm ${txtCls}">${items.length}회</td>
                <td class="px-2 py-2 text-center text-sm ${txtCls} leading-tight">${periodHtml}</td>
                <td class="px-2 py-2 text-center text-sm ${txtCls}">${escapeHtml(teacherName)}</td>
                <td class="px-2 py-2 text-center text-sm ${txtCls} text-indigo-600" id="batchMemberCell_${i}">${batchMember}</td>
            </tr>`;
        }
        tbody.innerHTML = html;
        setTimeout(function() { initTableColResize_(document.querySelector('#d1BatchListGrid table')); }, 0);
    }

    function renderClassD1Grid() {
        renderD1BatchListGrid_();
        const grid = document.getElementById('classD1Grid');
        if (!grid) return;

        if (allClassD1Data.length === 0) {
            grid.innerHTML = '<div class="text-gray-400 py-2 text-xs text-center">회차가 없습니다. 수업생성 버튼을 눌러주세요.</div>';
            return;
        }

        const batch = d1Batches[d1BatchIdx];
        if (!batch) {
            grid.innerHTML = '<div class="text-gray-400 py-2 text-xs text-center">배치를 선택해 주세요.</div>';
            return;
        }
        const items = batch.items;

        // 오늘 기준 배치별 가장 가까운 미래 회차 찾기 (배치마다 독립 하이라이트)
        const todayStr = (() => {
            const t = new Date();
            return String(t.getFullYear()) + String(t.getMonth() + 1).padStart(2, '0') + String(t.getDate()).padStart(2, '0');
        })();
        const todayNum = parseInt(todayStr, 10);
        // 배치별 nearestD1Id 맵
        const nearestD1IdByBatch = {};
        d1Batches.forEach(batch => {
            let bNearestId = null, bNearestDiff = Infinity;
            (batch.items || []).forEach(d => {
                const dateNum = parseInt(String(d.class_date || '').replace(/-/g, ''), 10);
                if (!isNaN(dateNum) && dateNum >= todayNum) {
                    const diff = dateNum - todayNum;
                    if (diff < bNearestDiff) { bNearestDiff = diff; bNearestId = d.class_d1_id; }
                }
            });
            if (bNearestId) nearestD1IdByBatch[String(bNearestId)] = true;
        });

        // 날짜+시간 포맷 (yy/mm/dd HH시)
        function fmtDt_(v) {
            if (!v) return '-';
            const dt = new Date(String(v).replace('T', ' '));
            if (isNaN(dt.getTime())) return String(v);
            const yy = String(dt.getFullYear()).substring(2);
            const mm = String(dt.getMonth() + 1).padStart(2, '0');
            const dd = String(dt.getDate()).padStart(2, '0');
            const hh = String(dt.getHours()).padStart(2, '0');
            return `${yy}/${mm}/${dd} ${hh}시`;
        }
        // 카드 공통 렌더 함수
        function d1Card_(cls, titleCls, textCls, badgeHtml, titleHtml, bodyHtml, clickHandler, tooltipHtml) {
            const tooltip = tooltipHtml
                ? `<div class="absolute z-50 top-full left-0 mt-1 w-48 bg-gray-800 text-white text-[10px] rounded-lg p-2 shadow-xl pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity" style="white-space:pre-line;z-index:9999">${tooltipHtml}</div>`
                : '';
            return `<div class="relative flex-none rounded-xl px-2.5 py-2 cursor-pointer border-2 ${cls} transition-all group" style="width:88px" onclick="${clickHandler}">
                ${badgeHtml}
                <div class="text-center text-sm font-bold ${titleCls} mb-1">${titleHtml}</div>
                <ul class="text-xs ${textCls} space-y-0.5">${bodyHtml}</ul>
                ${tooltip}
            </div>`;
        }

        // 전체요약 카드 제거 (탭 시스템으로 이관됨)

        const addCardHtml = `<div class="flex-none rounded-xl px-2.5 py-2 cursor-pointer border-2 border-dashed border-gray-300 bg-gray-50 hover:border-indigo-400 hover:bg-indigo-50 transition-all flex flex-col items-center justify-center" style="width:88px" onclick="showGenerateD1Modal('add')" title="회차 추가">
            <div class="text-2xl text-gray-400 leading-none">+</div>
            <div class="text-[10px] text-gray-400 mt-1">회차 추가</div>
        </div>`;

        grid.innerHTML = `<div class="flex flex-wrap gap-2">` +
            // sumCard 제거됨
            items.map(d => {
                const isSelected = selectedClassD1Id === d.class_d1_id;
                const isNearest = !!nearestD1IdByBatch[String(d.class_d1_id)];
                const isCompleted = d.completed === 'Y';
                const rawDate = String(d.class_date || '').replace(/-/g, '');
                const isPast = rawDate && rawDate < todayStr;
                const dateStr = rawDate.length >= 8
                    ? rawDate.substring(4, 6) + '/' + rawDate.substring(6, 8)
                    : (d.class_date ? String(d.class_date).substring(5) : '-');
                const weekStr = d.class_week || '';
                const itemCount = d.item_count || 0;
                const memberCount = d.member_count || 0;
                const completedMark = isCompleted ? ' ✓' : '';

                let cls, titleCls, textCls, badge;
                if (isSelected) {
                    cls = 'border-blue-500 bg-blue-100 shadow-lg';
                    titleCls = 'text-blue-900'; textCls = 'text-blue-700';
                    badge = '';
                } else if (isNearest) {
                    cls = 'border-red-400 bg-white shadow-md';
                    titleCls = 'text-red-700'; textCls = 'text-red-600';
                    badge = '';
                } else if (isPast || isCompleted) {
                    cls = 'border-green-300 bg-green-50 hover:border-green-500 hover:shadow-sm';
                    titleCls = 'text-green-800'; textCls = 'text-green-600';
                    badge = '';
                } else {
                    cls = 'border-gray-200 bg-white hover:border-indigo-300 hover:shadow-sm';
                    titleCls = 'text-gray-800'; textCls = 'text-gray-500';
                    badge = '';
                }

                // 요일 계산 (class_date 기반)
                const DAY_NAMES_ = ['일', '월', '화', '수', '목', '금', '토'];
                let weekDisplayStr = weekStr;
                if (!weekDisplayStr && rawDate.length >= 8) {
                    const dtForDay = new Date(
                        parseInt(rawDate.substring(0, 4)),
                        parseInt(rawDate.substring(4, 6)) - 1,
                        parseInt(rawDate.substring(6, 8))
                    );
                    weekDisplayStr = DAY_NAMES_[dtForDay.getDay()];
                }

                const body = `<li>• <span class="text-blue-600 font-bold">${dateStr}${weekDisplayStr ? ' <span class="text-blue-600">(' + weekDisplayStr + ')</span>' : ''}</span></li>` +
                    `<li>• 물건: ${itemCount}</li>` +
                    `<li>• 회원: ${memberCount}</li>`;

                // 마우스오버 툴팁 (시간만 표시, 날짜는 카드에 이미 있음)
                function fmtClassTime_(v) {
                    if (!v) return '-';
                    const s = String(v);
                    const h = s.includes(':') ? parseInt(s.split(':')[0]) : parseInt(s);
                    return isNaN(h) ? '-' : h + '시';
                }
                const tfrom = fmtClassTime_(d.class_time_from);
                const tto = fmtClassTime_(d.class_time_to);
                function fmtBidDt_(v) {
                    if (!v) return '-';
                    const dt = new Date(String(v));
                    if (isNaN(dt.getTime())) return '-';
                    const yy = String(dt.getFullYear()).substring(2);
                    const mm = String(dt.getMonth() + 1).padStart(2, '0');
                    const dd = String(dt.getDate()).padStart(2, '0');
                    const hh = String(dt.getHours()).padStart(2, '0');
                    const dow = DAY_NAMES_[dt.getDay()];
                    return `${yy}/${mm}/${dd} (${dow}) ${hh}시`;
                }
                const tooltipHtml = `수업: ${tfrom}~${tto}&#10;등록: ${fmtBidDt_(d.bid_starttime)}&#10;1차: ${fmtBidDt_(d.bid_datetime_1)}&#10;2차: ${fmtBidDt_(d.bid_datetime_2)}`;

                return d1Card_(cls, titleCls, textCls, badge,
                    `${d.class_loop}회${completedMark}`, body,
                    `selectClassD1('${d.class_d1_id}')`, tooltipHtml);
            }).join('') + addCardHtml + `</div>`;
    }

    function restoreD1MemberTableHead_() {
        const thead = document.getElementById('classD1MemberTableHead');
        if (!thead) return;

            <th class="px-2 py-2 text-left text-xs font-bold text-gray-700">회원 리스트</th>

        </tr>`;
    }

    // ─── 전체회차 요약 그리드 (신규 구조) ────────────────────────────────────
    let summaryMemberData_ = [];
    let selectedSummaryMemberId_ = null;
    let summarySortKey_ = 'name';
    let summarySortAsc_ = true;
    let d1SummaryStatusFilter_ = null;

    // 상태값 목록 (localStorage 저장)
    const D1_STATUS_LS_KEY = 'd1StatusList_v1';
    const D1_STATUS_DEFAULTS = ['진행중', '종료', '홀딩'];
    function getD1StatusList_() {
        try {
            const raw = localStorage.getItem(D1_STATUS_LS_KEY);
            if (raw) { const arr = JSON.parse(raw); if (Array.isArray(arr) && arr.length) return arr; }
        } catch(e) {}
        return D1_STATUS_DEFAULTS.slice();
    }
    function saveD1StatusList_(list) {
        try { localStorage.setItem(D1_STATUS_LS_KEY, JSON.stringify(list)); } catch(e) {}
    }

    // 출석 드롭다운 상태
    var _attendDropCtx = null; // { memberId, loopNo, d1Id, batchKey }

    // 출석 변경 모드
    let d1AttendEditMode_ = false;
    let d1AttendPending_ = {}; // key: "memberId|loopNo" → newVal ('O' or 'X')

    // class_d1_id에서 배치키 추출 (GAS extractD1BatchKey_ 동일 로직)
    function getD1BatchKey_(classD1Id) {
        var s = String(classD1Id || '');
        var last = s.lastIndexOf('_');
        if (last > 0 && /^\d{1,4}$/.test(s.substring(last + 1))) return s.substring(0, last);
        return s;
    }

    // 현재 선택된 배치의 전체 배치키 반환 (member_class_details.class_d1_id 형식)
    function getCurrentBatchKey_() {
        const batch = d1Batches[d1BatchIdx];
        if (!batch || !batch.items || batch.items.length === 0) return null;
        return getD1BatchKey_(String(batch.items[0].class_d1_id));
    }

    function loadD1SummaryGrid() {
        const batchKey = getCurrentBatchKey_();
        const thead = document.getElementById('d1SummaryThead');
        const tbody = document.getElementById('d1SummaryTbody');
        const detail = document.getElementById('d1SummaryDetail');
        if (thead) thead.innerHTML = '';
        if (tbody) {
            if (!batchKey) {
                tbody.innerHTML = '<tr><td colspan="99" class="p-4 text-center text-gray-400 text-xs">배치를 선택하세요</td></tr>';
                return;
            }
            tbody.innerHTML = '<tr><td colspan="99" class="p-4 text-center text-gray-400 text-xs">불러오는 중...</td></tr>';
        }
        if (detail) detail.innerHTML = '<div class="text-gray-400 text-xs text-center py-4">회원을 선택하세요</div>';
        selectedSummaryMemberId_ = null;
        google.script.run
            .withSuccessHandler(function (data) {
                summaryMemberData_ = data || [];
                renderD1SummaryGrid(summaryMemberData_);
                renderD1BatchListGrid_();
            })
            .withFailureHandler(function () {
                if (tbody) tbody.innerHTML = '<tr><td colspan="99" class="p-4 text-center text-red-500 text-xs">로드 실패</td></tr>';
            })
            .readMemberClassDetailsByBatchKey(batchKey);
    }

    function renderD1SummaryGrid(members) {
        const thead = document.getElementById('d1SummaryThead');
        const tbody = document.getElementById('d1SummaryTbody');
        if (!thead || !tbody) return;

        const todayStr = (function() {
            const n = new Date();
            return String(n.getFullYear()) + String(n.getMonth()+1).padStart(2,'0') + String(n.getDate()).padStart(2,'0');
        })();

        // 현재 배치의 세션만 표시 (member_class_details.class_d1_id 기준)
        const currentBatchKey = getCurrentBatchKey_();
        const d1List = (allClassD1Data || [])
            .filter(function (d) { return currentBatchKey ? getD1BatchKey_(String(d.class_d1_id)) === currentBatchKey : String(d.class_id) === String(selectedClassId); })
            .slice().sort(function (a, b) { return Number(a.class_loop) - Number(b.class_loop); });
        const N = d1List.length;

        // 총 차수: 현재 배치 세션 수 (no_N 인덱스와 1:1 대응)
        const totalLoop = N;

        // 다가오는 수업(오늘 이후 가장 빠른) 인덱스
        let upcomingIdx = -1;
        for (let i = 0; i < d1List.length; i++) {
            const raw = String(d1List[i].class_date || '').replace(/-/g, '');
            if (raw >= todayStr) { upcomingIdx = i; break; }
        }

        const statusList = getD1StatusList_();

        // 상태 필터링
        const filtered = d1SummaryStatusFilter_
            ? members.filter(function(m){ return m.member_status === d1SummaryStatusFilter_; })
            : members;

        // 전체회원 현황 요약 바 렌더링
        renderD1MemberSummaryBar_(members, statusList);

        const dayNames_ = ['일', '월', '화', '수', '목', '금', '토'];

        // 연도 그룹 헤더
        const yearGroups = [];
        for (let i = 0; i < d1List.length; i++) {
            const raw = String(d1List[i].class_date || '').replace(/-/g, '');
            const yr = raw.length >= 4 ? raw.substring(0, 4) : '?';
            if (yearGroups.length === 0 || yearGroups[yearGroups.length - 1].year !== yr) {
                yearGroups.push({ year: yr, count: 1 });
            } else {
                yearGroups[yearGroups.length - 1].count++;
            }
        }
        const yearColors = ['text-blue-600', 'text-purple-600', 'text-teal-600', 'text-rose-600'];
        let yearColHeaders = '';
        for (let i = 0; i < yearGroups.length; i++) {
            const g = yearGroups[i];
            yearColHeaders += `<th colspan="${g.count}" class="px-1 py-0.5 text-center text-[9px] font-bold bg-gray-100 ${yearColors[i % yearColors.length]} border-l border-gray-200">${g.year}년</th>`;
        }

        // 회차 컬럼 헤더
        let sessionColHeaders = '';
        for (let i = 0; i < d1List.length; i++) {
            const d = d1List[i];
            const raw = String(d.class_date || '').replace(/-/g, '');
            let dateDisp = '', dayDisp = '';
            if (raw.length >= 8) {
                dateDisp = raw.substring(4, 6) + '/' + raw.substring(6, 8);
                const dt = new Date(raw.substring(0, 4) + '-' + raw.substring(4, 6) + '-' + raw.substring(6, 8));
                if (!isNaN(dt)) dayDisp = '(' + dayNames_[dt.getDay()] + ')';
            }
            const isActive = summarySortKey_ === 'no_' + d.class_loop;
            const isUpcoming = i === upcomingIdx;
            const upcomingThClass = isUpcoming
                ? 'border-l-2 border-r-2 border-t-2 border-red-400'
                : (isActive ? 'border-l border-gray-200 bg-blue-200' : 'border-l border-gray-200 hover:bg-blue-100');
            sessionColHeaders += `<th class="px-1 py-1 text-center cursor-pointer ${upcomingThClass}" style="min-width:48px" onclick="sortSummaryBySession_(${d.class_loop})">
                <div class="text-[11px] font-bold ${isUpcoming ? 'text-red-600' : 'text-blue-600'}">${d.class_loop}회</div>
                <div class="text-[9px] font-semibold ${isUpcoming ? 'text-red-400' : 'text-blue-500'} whitespace-nowrap">${dateDisp} ${dayDisp}</div>
            </th>`;
        }

        // 총 컬럼 수 (checkbox + 이름 + 전화 + 상태 + 잔여 + 회차들)
        const totalCols = 5 + N;

        const sortArrow = function(key) { return summarySortKey_ === key ? (summarySortAsc_ ? ' ↑' : ' ↓') : ' ↕'; };
        thead.innerHTML = `
            <tr>
                <th colspan="5" class="bg-white"></th>
                ${yearColHeaders}
            </tr>
            <tr class="bg-blue-50">
                <th class="px-1 py-2 text-center relative" style="min-width:24px">
                    <input type="checkbox" id="d1SummaryCheckAll" onchange="toggleAllSummaryCheck(this.checked)" class="cursor-pointer">
                </th>
                <th class="px-2 py-2 text-left text-xs font-bold text-blue-700 cursor-pointer hover:text-blue-900 select-none relative" style="min-width:70px" onclick="sortSummaryByName_()">이름${sortArrow('name')}</th>
                <th class="px-2 py-2 text-left text-xs font-bold text-gray-600 cursor-pointer hover:text-gray-900 select-none relative" style="min-width:90px" onclick="sortSummaryByField_('phone')">전화번호${sortArrow('phone')}</th>
                <th class="px-2 py-2 text-center text-xs font-bold text-gray-600 cursor-pointer hover:text-gray-900 select-none relative" style="min-width:68px" onclick="sortSummaryByField_('status')">상태${sortArrow('status')}</th>
                <th class="px-2 py-2 text-center text-xs font-bold text-purple-600 cursor-pointer hover:text-purple-800 select-none relative" style="min-width:36px" onclick="sortSummaryByField_('remaining')">잔여${sortArrow('remaining')}</th>
                ${sessionColHeaders}
            </tr>`;

        // 잔여 차수 사전 계산 (정렬 및 행 표시에 공용)
        const memberRemainingMap_ = {};
        filtered.forEach(function(m) {
            let rem = 0;
            for (let i = 0; i < d1List.length; i++) {
                const val = String(m['no_' + d1List[i].class_loop] || '').trim().toUpperCase();
                const raw = String(d1List[i].class_date || '').replace(/-/g, '');
                if (raw >= todayStr && val !== 'X') rem++;
            }
            memberRemainingMap_[String(m.member_id)] = rem;
        });

        // 수업 정보 툴팁 (수업구분 - 수업명 [등급] (지역))
        const clsInfo_ = (allClassesData || []).find(function(c) { return String(c.class_id) === String(selectedClassId); }) || {};
        const clsLoc_ = clsInfo_.class_region ? ` (${clsInfo_.class_region})` : '';
        const clsGrade_ = clsInfo_.class_grade ? ` [${clsInfo_.class_grade}]` : '';
        const classTooltip_ = `${clsInfo_.class_type || ''}${clsInfo_.class_type && clsInfo_.class_name ? ' - ' : ''}${clsInfo_.class_name || ''}${clsGrade_}${clsLoc_}`;

        let sorted = filtered.slice();
        if (summarySortKey_ === 'name') {
            sorted.sort(function (a, b) { return (a.member_name || '').localeCompare(b.member_name || ''); });
            if (!summarySortAsc_) sorted.reverse();
        } else if (summarySortKey_.startsWith('no_')) {
            sorted.sort(function (a, b) {
                const aV = String(a[summarySortKey_] || '').trim().toUpperCase();
                const bV = String(b[summarySortKey_] || '').trim().toUpperCase();
                const aRank = aV === 'O' ? 0 : aV === 'X' ? 2 : 1;
                const bRank = bV === 'O' ? 0 : bV === 'X' ? 2 : 1;
                if (aRank !== bRank) return summarySortAsc_ ? aRank - bRank : bRank - aRank;
                return (a.member_name || '').localeCompare(b.member_name || '');
            });
        } else if (summarySortKey_ === 'phone') {
            sorted.sort(function(a, b) { const r = (a.phone||'').localeCompare(b.phone||''); return summarySortAsc_ ? r : -r; });
        } else if (summarySortKey_ === 'status') {
            sorted.sort(function(a, b) { const r = (a.member_status||'').localeCompare(b.member_status||''); return summarySortAsc_ ? r : -r; });
        } else if (summarySortKey_ === 'remaining') {
            sorted.sort(function(a, b) {
                const aR = memberRemainingMap_[String(a.member_id)] || 0;
                const bR = memberRemainingMap_[String(b.member_id)] || 0;
                return summarySortAsc_ ? aR - bR : bR - aR;
            });
        }

        if (sorted.length === 0) {
            tbody.innerHTML = `<tr><td colspan="${totalCols}" class="p-4 text-center text-gray-500 text-xs">등록된 회원이 없습니다.</td></tr>`;
            return;
        }

        let bodyHtml = '';
        for (let j = 0; j < sorted.length; j++) {
            const m = sorted[j];
            const isSelected = String(m.member_id) === String(selectedSummaryMemberId_);
            const isLastRow  = j === sorted.length - 1;

            const remaining = memberRemainingMap_[String(m.member_id)] || 0;
            const remColor = remaining <= 2 ? 'text-red-600 font-bold' : remaining <= 5 ? 'text-amber-600 font-semibold' : 'text-gray-700';

            // 텔레그램 아이콘 (telegram-badge 스타일 - 동그라미 T)
            const mInfo = allMembersNewData ? allMembersNewData.find(x => String(x.member_id) === String(m.member_id)) : null;
            const tgIcon = (mInfo && mInfo.telegram_enabled === 'Y') ? '<span class="telegram-badge ml-0.5" style="width:14px;height:14px;font-size:9px" title="텔레그램 사용">T</span>' : '';
            let memberTitle;
            if (mInfo) {
                const nameMismatch = (mInfo.member_name || '') !== (m.member_name || '') ? ` ⚠이름불일치(DB:${mInfo.member_name})` : '';
                const phoneMismatch = (mInfo.phone || '') !== (m.phone || '') ? ` ⚠전화불일치(DB:${mInfo.phone || '-'})` : '';
                memberTitle = `[회원DB] ${mInfo.member_name || '-'} | ${mInfo.phone || '-'}${mInfo.telegram_enabled === 'Y' ? ' | TG:Y' : ''}${nameMismatch}${phoneMismatch}`;
            } else {
                memberTitle = `⚠ 회원DB 미등록 (ID:${m.member_id})`;
            }

            // 상태 드롭다운
            const statusOpts = statusList.map(function(s) {
                return `<option value="${escapeHtml(s)}" ${m.member_status === s ? 'selected' : ''}>${escapeHtml(s)}</option>`;
            }).join('');
            const statusSel = `<select class="text-xs border border-gray-200 rounded px-1 py-0.5 ${statusColor_(m.member_status)} cursor-pointer focus:outline-none bg-white"
                onclick="event.stopPropagation()"
                onchange="saveSummaryStatus_('${escapeHtml(String(m.member_id))}','${escapeHtml(String(m.class_d1_id||''))}',this.value)">
                <option value="">-</option>
                ${statusOpts}
            </select>`;

            // 회차 셀
            let sessionCells = '';
            for (let i = 0; i < d1List.length; i++) {
                const loopNo = Number(d1List[i].class_loop);
                const pendingKey = String(m.member_id) + '|' + loopNo;
                const hasPending = d1AttendEditMode_ && d1AttendPending_[pendingKey] !== undefined;
                const rawVal = String(m['no_' + loopNo] || '').trim().toUpperCase();
                const val = hasPending ? String(d1AttendPending_[pendingKey]).toUpperCase() : rawVal;
                const raw = String(d1List[i].class_date || '').replace(/-/g, '');
                // 오늘 포함 이전은 과거 취급 (버그 수정: < → <=)
                const isPast = raw !== '' && raw <= todayStr;
                const isUpcoming = i === upcomingIdx;
                const isFutureNonX = !d1AttendEditMode_ && !isPast && val !== 'X';

                // 표시: X=취소, 과거=● 녹색(출석), 미래=● 회색(예정)
                let display, colorClass, cellBg;
                if (val === 'X' && isPast) {
                    display = '✕'; colorClass = 'text-red-500 font-semibold'; cellBg = 'bg-red-50';
                } else if (val === 'X') {
                    display = '✕'; colorClass = 'text-gray-400 font-semibold'; cellBg = '';
                } else if (isPast) {
                    display = '●'; colorClass = 'text-green-500 text-[15px]'; cellBg = '';
                } else {
                    display = '●'; colorClass = 'text-gray-300 text-[15px]'; cellBg = '';
                }

                // 마지막 행: 하단 테두리 (upcoming=붉은색, 일반=회색)
                const lastBorderCls = isLastRow ? (isUpcoming ? 'border-b-2 border-red-400' : 'border-b-2 border-gray-300') : '';
                const upcomingTdClass = isUpcoming
                    ? `border-l-2 border-r-2 border-red-400 ${lastBorderCls}`
                    : `border-l border-gray-300 ${lastBorderCls}`;
                const d1IdEsc = escapeHtml(String(d1List[i].class_d1_id));
                const batchKeyEsc = escapeHtml(getD1BatchKey_(String(d1List[i].class_d1_id)));
                let tdBg, tdInteract, tdOnclick;
                if (d1AttendEditMode_) {
                    tdBg = hasPending ? 'bg-yellow-100' : (isSelected ? 'bg-indigo-100' : cellBg);
                    tdInteract = 'cursor-pointer';
                    tdOnclick = `onclick="event.stopPropagation(); markAttendPending_('${escapeHtml(String(m.member_id))}',${loopNo})"`;
                } else {
                    tdBg = isSelected ? 'bg-indigo-100' : cellBg;
                    tdInteract = 'cursor-pointer';
                    tdOnclick = `onclick="event.stopPropagation(); toggleAndSaveAttend_('${escapeHtml(String(m.member_id))}',${loopNo},'${batchKeyEsc}')"`;
                }
                sessionCells += `<td data-attend-cell="${escapeHtml(String(m.member_id))}|${loopNo}" class="px-1 py-2 text-center text-xs ${upcomingTdClass} ${tdBg} ${tdInteract} group-hover:bg-indigo-100 select-none" ${tdOnclick}><span class="${colorClass}">${display}</span></td>`;
            }

            const memIdEsc = escapeHtml(String(m.member_id));
            const selCls  = isSelected ? 'bg-indigo-100' : '';
            const lastTdCls = isLastRow ? 'border-b-2 border-gray-300' : '';
            const selBorderCls = isSelected ? 'border-l-4 border-indigo-500' : '';
            bodyHtml += `<tr class="group ${selCls} transition-colors cursor-pointer" data-summary-row="${memIdEsc}" onclick="selectSummaryMember('${memIdEsc}')">
                <td class="px-1 py-2 text-center group-hover:bg-indigo-100 ${selBorderCls} ${lastTdCls}" onclick="event.stopPropagation()">
                    <input type="checkbox" class="d1-summary-check cursor-pointer" data-member-id="${memIdEsc}" data-detail-id="${escapeHtml(String(m.detail_id||''))}">
                </td>
                <td class="px-2 py-2 font-semibold text-sm group-hover:bg-indigo-100 ${lastTdCls}">
                    <span class="text-gray-800 hover:text-indigo-600 hover:underline" title="${memberTitle}" onclick="event.stopPropagation(); navigateToMemberFromD1_('${memIdEsc}')">${escapeHtml(m.member_name || '-')}</span>${tgIcon}
                </td>
                <td class="px-2 py-2 text-gray-500 text-sm group-hover:bg-indigo-100 ${lastTdCls}">${escapeHtml(m.phone || '-')}</td>
                <td class="px-1 py-2 text-center group-hover:bg-indigo-100 ${lastTdCls}" onclick="event.stopPropagation()">${statusSel}</td>
                <td class="px-1 py-2 text-center text-sm font-bold ${remColor} group-hover:bg-indigo-100 ${lastTdCls}">${remaining}</td>
                ${sessionCells}
            </tr>`;
        }
        tbody.innerHTML = bodyHtml;
        setTimeout(function() { initTableColResize_(document.getElementById('d1SummaryTable')); }, 0);
    }

    function renderD1MemberSummaryBar_(members, statusList) {
        const bar = document.getElementById('d1MemberSummaryBar');
        if (!bar) return;
        if (!members || members.length === 0) { bar.classList.add('content-hidden'); return; }

        const counts = {};
        members.forEach(function(m) {
            const s = m.member_status || '(없음)';
            counts[s] = (counts[s] || 0) + 1;
        });

        const isAct = function(k) { return d1SummaryStatusFilter_ === k ? 'font-bold underline' : ''; };
        const btn = 'cursor-pointer hover:opacity-70 transition';

        let html = `<span class="${btn} text-gray-600 ${isAct(null)}" onclick="setD1SummaryFilter_(null)">전체 ${members.length}명</span>`;
        statusList.forEach(function(s) {
            const cnt = counts[s] || 0;
            if (!cnt) return;
            const col = statusColor_(s).split(' ')[1] || 'text-gray-600';
            html += `<span class="text-gray-300">|</span><span class="${btn} ${col} ${isAct(s)}" onclick="setD1SummaryFilter_('${escapeHtml(s)}')">${escapeHtml(s)} ${cnt}명</span>`;
        });
        // 기타 상태
        Object.keys(counts).forEach(function(s) {
            if (statusList.indexOf(s) === -1 && counts[s]) {
                html += `<span class="text-gray-300">|</span><span class="${btn} text-gray-500 ${isAct(s)}" onclick="setD1SummaryFilter_('${escapeHtml(s)}')">${escapeHtml(s)} ${counts[s]}명</span>`;
            }
        });

        // 일괄 상태변경 컨트롤
        const bulkStatusOpts = ['', ...getD1StatusList_()].map(s =>
            `<option value="${escapeHtml(s)}">${s || '-- 상태 선택 --'}</option>`
        ).join('');
        // 상태값 일괄변경
        html += `<span class="text-gray-200 mx-1">|</span>
            <select id="d1BulkStatusSel" class="text-xs border border-gray-300 rounded px-1.5 py-0.5 focus:outline-none bg-white">
                <option value="">상태값</option>${bulkStatusOpts}
            </select>
            <button onclick="bulkUpdateSummaryStatus_()" class="px-2.5 py-0.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs rounded font-semibold">일괄변경</button>`;

        // 출석 변경 모드 버튼 그룹
        const editActive = d1AttendEditMode_;
        const pendingCount = Object.keys(d1AttendPending_).length;
        html += `<span class="text-gray-200 mx-1">|</span>
            <span class="inline-flex items-center gap-1 border ${editActive ? 'border-orange-400 bg-orange-50' : 'border-gray-300 bg-white'} rounded px-1.5 py-0.5">
                <button onclick="toggleD1AttendEditMode_()" class="text-xs font-semibold ${editActive ? 'text-orange-600' : 'text-gray-600 hover:text-orange-500'} whitespace-nowrap">
                    ${editActive ? '✎ 편집 중' : '✎ 출석 변경 모드'}
                </button>
                ${editActive ? `<span class="text-gray-300">|</span>
                <button onclick="applyD1AttendChanges_()" class="text-xs font-semibold text-green-700 hover:text-green-900 whitespace-nowrap">
                    적용${pendingCount > 0 ? ` (${pendingCount})` : ''}
                </button>` : ''}
            </span>`;

        bar.innerHTML = html;
        bar.classList.remove('content-hidden');
    }

    function bulkUpdateSummaryStatus_() {
        const sel = document.getElementById('d1BulkStatusSel');
        const status = sel ? sel.value : '';
        if (!status) { showStatus('변경할 상태를 선택하세요.', 'error'); return; }
        const checked = Array.from(document.querySelectorAll('.d1-summary-check:checked'));
        if (checked.length === 0) { showStatus('변경할 회원을 선택하세요.', 'error'); return; }
        const memberIds = checked.map(cb => String(cb.dataset.memberId));
        const batchKey = getCurrentBatchKey_();
        if (!batchKey) { showStatus('배치를 선택하세요.', 'error'); return; }
        showStatus('상태 변경 중...', 'info');
        google.script.run
            .withSuccessHandler(function(r) {
                showStatus(r.message || '완료', r.success ? 'success' : 'error');
                if (r.success) {
                    memberIds.forEach(id => {
                        const m = summaryMemberData_.find(x => String(x.member_id) === id);
                        if (m) m.member_status = status;
                    });
                    renderD1SummaryGrid(summaryMemberData_);
                }
            })
            .withFailureHandler(function(e) { showStatus(e.message || '오류', 'error'); })
            .bulkUpdateMemberStatus(batchKey, memberIds, status);
    }

    function setD1SummaryFilter_(status) {
        d1SummaryStatusFilter_ = (d1SummaryStatusFilter_ === status) ? null : status;
        renderD1SummaryGrid(summaryMemberData_);
    }

    function sortSummaryByName_() {
        if (summarySortKey_ === 'name') summarySortAsc_ = !summarySortAsc_;
        else { summarySortKey_ = 'name'; summarySortAsc_ = true; }
        renderD1SummaryGrid(summaryMemberData_);
    }

    function sortSummaryBySession_(loopNo) {
        const key = 'no_' + loopNo;
        if (summarySortKey_ === key) summarySortAsc_ = !summarySortAsc_;
        else { summarySortKey_ = key; summarySortAsc_ = true; }
        renderD1SummaryGrid(summaryMemberData_);
    }

    function sortSummaryByField_(field) {
        if (summarySortKey_ === field) summarySortAsc_ = !summarySortAsc_;
        else { summarySortKey_ = field; summarySortAsc_ = true; }
        renderD1SummaryGrid(summaryMemberData_);
    }

    // ─── 출석 변경 모드 ────────────────────────────────────────────────────────
    function toggleD1AttendEditMode_() {
        d1AttendEditMode_ = !d1AttendEditMode_;
        if (!d1AttendEditMode_) d1AttendPending_ = {}; // 취소 시 초기화
        renderD1MemberSummaryBar_(summaryMemberData_, getD1StatusList_());
        renderD1SummaryGrid(summaryMemberData_);
    }

    function markAttendPending_(memberId, loopNo) {
        const key = String(memberId) + '|' + loopNo;
        const fieldKey = 'no_' + loopNo;
        const m = summaryMemberData_.find(function(x) { return String(x.member_id) === String(memberId); });
        if (!m) return;
        // 현재 표시값 (이미 pending 변경이 있으면 그걸 기준으로)
        const curVal = d1AttendPending_[key] !== undefined ? String(d1AttendPending_[key]).toUpperCase() : String(m[fieldKey] || '').toUpperCase();
        // X→O, 그 외(O, '')→X 토글 (1클릭으로 X 전환)
        const newVal = curVal === 'X' ? 'O' : 'X';
        d1AttendPending_[key] = newVal;
        renderD1MemberSummaryBar_(summaryMemberData_, getD1StatusList_());
        renderD1SummaryGrid(summaryMemberData_);
    }

    function applyD1AttendChanges_() {
        const entries = Object.entries(d1AttendPending_);
        if (entries.length === 0) { showStatus('변경된 출석이 없습니다.', 'info'); return; }
        const batchKey = getCurrentBatchKey_();
        if (!batchKey) { showStatus('배치를 선택하세요.', 'error'); return; }
        // 회원별 필드 묶기
        const byMember = {};
        entries.forEach(function([key, val]) {
            const parts = key.split('|');
            const memberId = parts[0]; const loopNo = parts[1];
            if (!byMember[memberId]) byMember[memberId] = {};
            byMember[memberId]['no_' + loopNo] = val;
        });
        const changes = Object.entries(byMember).map(function([memberId, fields]) {
            return { batchKey: batchKey, memberId: memberId, fields: fields };
        });
        showStatus('출석 저장 중...', 'info');
        google.script.run
            .withSuccessHandler(function(r) {
                showStatus(r.message || '완료', r.success ? 'success' : 'error');
                if (r.success) {
                    // 로컬 데이터 업데이트
                    entries.forEach(function([key, val]) {
                        const parts = key.split('|');
                        const memberId = parts[0]; const loopNo = parts[1];
                        const m = summaryMemberData_.find(function(x) { return String(x.member_id) === String(memberId); });
                        if (m) m['no_' + loopNo] = val;
                    });
                    d1AttendPending_ = {};
                    d1AttendEditMode_ = false;
                    renderD1MemberSummaryBar_(summaryMemberData_, getD1StatusList_());
                    renderD1SummaryGrid(summaryMemberData_);
                }
            })
            .withFailureHandler(function(e) { showStatus(e.message || '오류', 'error'); })
            .bulkSaveAttendance(changes);
    }

    // 컬럼 너비 드래그 조절
    function initTableColResize_(tableEl) {
        if (!tableEl) return;
        const ths = Array.from(tableEl.querySelectorAll('thead tr:last-child th'));
        ths.forEach(function(th) {
            const existing = th.querySelector('.col-resize-handle');
            if (existing) existing.remove();
            th.style.position = 'relative';
            const handle = document.createElement('div');
            handle.className = 'col-resize-handle';
            handle.style.cssText = 'position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:2;background:transparent;';
            handle.title = '드래그로 열 너비 조절';
            let startX, startW;
            handle.addEventListener('mousedown', function(e) {
                e.preventDefault(); e.stopPropagation();
                startX = e.pageX; startW = th.getBoundingClientRect().width;
                const onMove = function(e) {
                    const w = Math.max(30, startW + e.pageX - startX);
                    th.style.minWidth = w + 'px'; th.style.maxWidth = w + 'px'; th.style.width = w + 'px';
                };
                const onUp = function() {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
            th.appendChild(handle);
        });
    }

        renderD1SummaryGrid(summaryMemberData_);

        showStatus(`카카오 전송 중: ${kName}...`, 'warning');
        fetch('http://127.0.0.1:8000/send_kakao', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },

        .then(r => r.json())
