    // 기기 고유 ID (UUID) 생성 및 관리 로직
    function getOrCreateDeviceId() {
        const STORAGE_KEY = 'mj_auction_device_uuid';
        let deviceId = localStorage.getItem(STORAGE_KEY);

        if (!deviceId) {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                deviceId = crypto.randomUUID();
            } else {
                deviceId = 'user-' + new Date().getTime() + '-' + Math.floor(Math.random() * 100000);
            }
            localStorage.setItem(STORAGE_KEY, deviceId);
        }
        return deviceId;
    }

        if (!memberId || typeof allMembersNewData === 'undefined' || !allMembersNewData.length) return '';
        const mem = allMembersNewData.find(m => String(m.member_id) === String(memberId));
        return (mem && mem.telegram_enabled === 'Y') ? 'Y' : '';
    }

    // [Utility] HTML 이스케이프 함수 (XSS 방지)
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    // =============================================================================

    function getQueryParams_() {
        // URLSearchParams가 없는 환경/예외까지 대비한 파서
        try {
            const search = String(window.location && window.location.search ? window.location.search : '');
            const raw = search.startsWith('?') ? search.slice(1) : search;
            const out = { view: '', token: '', itemId: '' };

            // 1) 표준 파서 우선
            if (typeof URLSearchParams !== 'undefined') {
                const p = new URLSearchParams(search || '');
                out.view = String(p.get('view') || '').trim();
                // token 파라미터 키는 t(현재), token(예비) 둘 다 허용
                out.token = String(p.get('t') || p.get('token') || '').trim();
                out.itemId = String(p.get('item') || '').trim();
                // Apps Script doGet에서 주입된 파라미터도 병합 (텔레그램/리다이렉트 환경에서 URL 파라미터가 비는 경우 방어)
                try {
                    const injected = (window && window.__MJ_GAS_PARAMS__) ? window.__MJ_GAS_PARAMS__ : null;
                    if (injected && typeof injected === 'object') {
                        if (!out.view) out.view = String(injected.view || '').trim();
                        if (!out.token) out.token = String(injected.t || injected.token || '').trim();
                        if (!out.itemId) out.itemId = String(injected.item || '').trim();
                    }
                } catch (e) { }
                return out;
            }

            // 2) fallback: 수동 파싱
            if (!raw) return out;
            raw.split('&').forEach(pair => {
                const idx = pair.indexOf('=');
                const k = decodeURIComponent((idx >= 0 ? pair.slice(0, idx) : pair) || '').trim();
                const v = decodeURIComponent((idx >= 0 ? pair.slice(idx + 1) : '') || '').trim();
                if (k === 'view') out.view = v;
                if (k === 't' || k === 'token') out.token = v;
                if (k === 'item') out.itemId = v;
            });
            // 주입 파라미터 병합
            try {
                const injected = (window && window.__MJ_GAS_PARAMS__) ? window.__MJ_GAS_PARAMS__ : null;
                if (injected && typeof injected === 'object') {
                    if (!out.view) out.view = String(injected.view || '').trim();
                    if (!out.token) out.token = String(injected.t || injected.token || '').trim();
                    if (!out.itemId) out.itemId = String(injected.item || '').trim();
                }
            } catch (e) { }
            return out;
        } catch (e) {
            return { view: '', token: '', itemId: '' };
        }
    }

        const month = String(date.getMonth() + 1).padStart(2, '0');

    // 데이터 정렬 함수
    function _sakunNum(sakun) {
        const m = String(sakun || '').match(/\d+/);
        return m ? parseInt(m[0], 10) : 0;
    }

    function dataComparator(a, b) {
        if (a['in-date'] < b['in-date']) return -1;
        if (a['in-date'] > b['in-date']) return 1;
        const na = _sakunNum(a.sakun_no), nb = _sakunNum(b.sakun_no);
        if (na !== nb) return na - nb;
        if (a.m_name < b.m_name) return -1;
        if (a.m_name > b.m_name) return 1;
        return 0;
    }

    let statusHideTimer_ = null;

    function setStatusStyle_(type) {
        if (!statusMessage) return;
        statusMessage.classList.remove('content-hidden', 'bg-green-100', 'bg-red-100', 'text-green-800', 'text-red-800', 'bg-yellow-100', 'text-yellow-800', 'bg-gray-100', 'text-gray-800');
        if (type === 'success') {
            statusMessage.classList.add('bg-green-100', 'text-green-800');
        } else if (type === 'error') {
            statusMessage.classList.add('bg-red-100', 'text-red-800');
        } else if (type === 'warning') {
            statusMessage.classList.add('bg-yellow-100', 'text-yellow-800');
        } else {
            statusMessage.classList.add('bg-gray-100', 'text-gray-800');
        }
    }

    // 알림 메시지 표시
    function showStatus(message, type = 'success') {
        if (!statusMessage) return;
        if (statusHideTimer_) clearTimeout(statusHideTimer_);
        setStatusStyle_(type);
        statusMessage.textContent = message;
        statusHideTimer_ = setTimeout(() => {
            statusMessage.classList.add('content-hidden');
        }, 5000);
    }

    function hideStatusNow_() {
        if (!statusMessage) return;
        if (statusHideTimer_) clearTimeout(statusHideTimer_);
        statusMessage.classList.add('content-hidden');
    }

    // [추천 전달] chuchen_date 포맷 함수: "26-02-03 14:00 59" 형식
    function formatChuchenDate(dateStr) {
        if (!dateStr) return '';
        try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            const yy = String(d.getFullYear()).slice(2);
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const mi = String(d.getMinutes()).padStart(2, '0');
            const ss = String(d.getSeconds()).padStart(2, '0');
            return `${yy}-${mm}-${dd} ${hh}:${mi} ${ss}`;
        } catch (e) { return ''; }
    }

    // [추천 전달] 48시간 타이머 바: 왼쪽=빨강(경과), 오른쪽=초록(남음), 경계에 시간 뱃지
    function createChuchenTimerBar(chuchenDate, item) {
        if (!chuchenDate) return '';
        try {
            const now = Date.now();

            // class_d1_id 있는 물건: bid_datetime_1/2 기준
            const d1Id = item && String(item.class_d1_id || '').trim();
            if (d1Id && allD1DatetimeMap[d1Id]) {
                const dtInfo = allD1DatetimeMap[d1Id];
                const dt1 = dtInfo.bid_datetime_1 ? new Date(dtInfo.bid_datetime_1).getTime() : 0;
                const dt2 = dtInfo.bid_datetime_2 ? new Date(dtInfo.bid_datetime_2).getTime() : 0;
                const startAt = new Date(chuchenDate).getTime();
                const endAt = dt2 || dt1;
                if (!endAt || isNaN(startAt) || isNaN(endAt) || endAt <= startAt) {
                    // datetime 정보 부족 → 기존 48h 로직 폴백
                } else {
                    const totalMs = endAt - startAt;
                    const elapsedMs = now - startAt;
                    if (elapsedMs >= totalMs) {
                        return `<div class="chuchen-timer-bar" style="background:#ef4444"><div class="chuchen-timer-badge" style="left:94%">만료</div></div>`;
                    }
                    const elapsedPct = Math.min(100, (elapsedMs / totalMs) * 100).toFixed(2);
                    const remainHours = Math.max(0, Math.floor((endAt - now) / (1000 * 3600)));
                    const badgePct = Math.min(94, Math.max(6, parseFloat(elapsedPct)));
                    const bg = `linear-gradient(to right, #ef4444 ${elapsedPct}%, #22c55e ${elapsedPct}%)`;

                    // 1차만료 경계 표시
                    let firstExpireMarker = '';
                    if (dt1 && dt2 && dt1 < dt2 && dt1 > startAt) {
                        const dt1Pct = Math.min(99, Math.max(1, ((dt1 - startAt) / totalMs * 100))).toFixed(2);
                        firstExpireMarker = `<div class="chuchen-timer-badge" style="left:${dt1Pct}%;background:#f59e0b;color:#fff">1차</div>`;
                    }
                    return `<div class="chuchen-timer-bar" style="background:${bg};position:relative">${firstExpireMarker}<div class="chuchen-timer-badge" style="left:${badgePct}%">${remainHours}h</div></div>`;
                }
            }

            // 기존 로직 (class_d1_id 없는 물건: chuchen_date 기준 48h)
            const sentAt = new Date(chuchenDate).getTime();
            if (isNaN(sentAt)) return '';
            const elapsedHours = (now - sentAt) / (1000 * 3600);
            const MAX_HOURS = 48;
            if (elapsedHours >= MAX_HOURS) return `<div class="chuchen-timer-bar" style="background:#ef4444"><div class="chuchen-timer-badge" style="left:94%">만료</div></div>`;
            const elapsedPct = Math.min(100, (elapsedHours / MAX_HOURS) * 100).toFixed(2);
            const remainHours = Math.max(0, MAX_HOURS - Math.floor(elapsedHours));
            const badgePct = Math.min(94, Math.max(6, parseFloat(elapsedPct)));
            const bg = `linear-gradient(to right, #ef4444 ${elapsedPct}%, #22c55e ${elapsedPct}%)`;
            return `<div class="chuchen-timer-bar" style="background:${bg}"><div class="chuchen-timer-badge" style="left:${badgePct}%">${remainHours}h</div></div>`;
        } catch (e) { return ''; }
    }

    // 오늘 이후 모든 데이터 날짜 추출
    function getWorkingDaysFromToday() {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const todayYYMMDD = String(today.getFullYear()).slice(-2) +
            String(today.getMonth() + 1).padStart(2, '0') +
            String(today.getDate()).padStart(2, '0');

        // 전체 데이터에서今日이후의 유니크한 날짜 추출
        const dateSet = new Set();
        allBiddingData.forEach(item => {
            const itemDate = String(item['in-date']);
            if (itemDate >= todayYYMMDD) {
                dateSet.add(itemDate);
            }
        });

        // 오늘 날짜가 데이터에 없더라도 기본으로 포함 (선택사항이나, 대시보드 유지보수 위해 추가)
        dateSet.add(todayYYMMDD);

        // 정렬된 날짜 배열 생성
        const sortedDates = Array.from(dateSet).sort();

        // YYMMDD 형식을 Date 객체로 변환하여 반환
        return sortedDates.map(yymmdd => {
            const year = 2000 + parseInt(yymmdd.slice(0, 2));
            const month = parseInt(yymmdd.slice(2, 4)) - 1;
            const day = parseInt(yymmdd.slice(4, 6));
            return new Date(year, month, day);
        });
    }

    // --- [3] 캘린더 렌더링 ---
    // 주의 시작일(월요일)을 반환하는 함수
    function getWeekStart(date) {
        const d = new Date(date);
        const day = d.getDay();
        // 월요일(1)이면 0, 화요일(2)이면 -1, ..., 일요일(0)이면 -6
        const diff = day === 0 ? -6 : 1 - day;
        const weekStart = new Date(d);
        weekStart.setDate(d.getDate() + diff);
        return weekStart;
    }

    // 다음 주로 이동
    function changeCalendarWeek(offset) {
        const weekStart = getWeekStart(currentCalendarDate);
        weekStart.setDate(weekStart.getDate() + (offset * 7));
        currentCalendarDate = new Date(weekStart);
        renderCalendar();
    }

    // 주의 주차 계산 (해당 월의 몇 번째 주인지)
    function getWeekOfMonth(date) {
        const d = new Date(date);
        const firstDay = new Date(d.getFullYear(), d.getMonth(), 1);
        const firstWeekStart = getWeekStart(firstDay);
        const weekStart = getWeekStart(d);
        const diff = Math.floor((weekStart - firstWeekStart) / (7 * 24 * 60 * 60 * 1000));
        return diff + 1;
    }

    function updateCalendarTitle(date) {
        if (!calendarTitle) return;
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        calendarTitle.textContent = `${year}년 ${month}월`;
    }

        });
        [weekView, monthView, monthSummaryView].forEach(view => {

            if (weekTab) weekTab.classList.add('active');
            if (weekBtn) weekBtn.classList.add('active');
            if (weekView) {
                weekView.classList.remove('content-hidden');

            // 주별 탭으로 전환 시 오늘 주로 이동 및 이전 주 개수 초기화
            currentCalendarDate = getWeekStart(new Date());

            isLoadingPreviousWeeks = false;

            if (monthBtn) monthBtn.classList.add('active');

                monthView.classList.remove('content-hidden');

        // 다음월의 1일로 이동

    // 날짜별 데이터 집계
    function aggregateBidsByDay(year, month) {
        const yearStr = String(year).slice(-2);
        const monthStr = String(month + 1).padStart(2, '0');
        const bidsByDay = {};

        let dataToAggregate = allBiddingData;

        const fSakunno = calSearchSakunno ? calSearchSakunno.value.toLowerCase().trim() : '';
        const fCourt = calSearchCourt ? calSearchCourt.value.toLowerCase().trim() : '';
        const fStatuses = getSelectedCalendarStatusValues();
        const allCalStatusCb = document.getElementById('cal-search-status-all');
        const isAllCalStatus = (allCalStatusCb && allCalStatusCb.checked);
        const fMember = calSearchMember ? calSearchMember.value.toLowerCase().trim() : '';
        // fManager: matchesCalManager(item) 사용으로 대체됨
        // 수업 필터 (입찰일정)
        const fCalClassType = document.getElementById('cal-class-type')?.value || '';
        const fCalClassName = document.getElementById('cal-class-name')?.value || '';
        const fCalClassGrade = document.getElementById('cal-class-grade')?.value || '';

        // 수업 필터 사용 중인데 데이터 미로드 → 로드 후 재렌더
        if ((fCalClassType || fCalClassName || fCalClassGrade) &&
            (allMembersNewData.length === 0 || allClassesData.length === 0)) {
            ensureClassDataLoaded(() => renderCalendar());
            return {};  // 로딩 중이면 빈 결과 반환 (재렌더 시 채워짐)
        }

        // 나머지 검색 조건 필터링
        dataToAggregate = dataToAggregate.filter(item => {
            let pass = true;
            if (fSakunno && !String(item.sakun_no || '').toLowerCase().includes(fSakunno)) pass = false;
            if (fCourt) {
                const itemCourt = String(item.court || '').toLowerCase().trim();
                const searchCourt = fCourt.toLowerCase().trim();
                // 정확한 매칭: 입력값과 정확히 일치하는 경우만 통과
                if (itemCourt !== searchCourt) pass = false;
            }
            // 상태 필터링: "전체" 체크 시 통과, 아무것도 선택 안 하면 조회 안 됨
            const matchesStatus = isAllCalStatus ? true : (fStatuses.length > 0 && fStatuses.includes(String(item.stu_member || '').trim()));
            if (!matchesStatus) pass = false;
            if (fMember) {
                const memberDisp = `${String(item.m_name || '')}`.toLowerCase();
                if (!memberDisp.includes(fMember)) pass = false;
            }
            if (!matchesCalManager(item)) pass = false;
            // 수업 필터: member_id → allMembersNewData → class_id → allClassesData
            if (fCalClassType || fCalClassName || fCalClassGrade) {
                const mem = allMembersNewData.find(m => String(m.member_id) === String(item.member_id));
                const cls = mem ? allClassesData.find(c => String(c.class_id) === String(mem.class_id)) : null;
                if (fCalClassType && (cls?.class_type || '') !== fCalClassType) pass = false;
                if (fCalClassName && (cls?.class_name || '') !== fCalClassName) pass = false;
                if (fCalClassGrade && (cls?.class_grade || '') !== fCalClassGrade) pass = false;
            }
            return pass;
        });

        // 캘린더 점프 필터링
        if (calendarFilter.active) {
            if (calendarFilter.member) {
                dataToAggregate = dataToAggregate.filter(item => isMemberMatch(item, calendarFilter.member));
            }
            if (calendarFilter.status) {
                dataToAggregate = dataToAggregate.filter(item => item.stu_member === calendarFilter.status);
            }
        }

        // 날짜별로 집계 (입찰일자 기준)
        dataToAggregate.forEach(item => {
            const itemDate = String(item['in-date'] || '');
            if (!itemDate || itemDate.length < 6) return; // 입찰일자가 없으면 제외

            const itemMonthStr = itemDate.substring(2, 4);
            const itemYearStr = itemDate.substring(0, 2);
            if (itemMonthStr === monthStr && itemYearStr === yearStr) {
                const day = itemDate.substring(4, 6);
                const key = parseInt(day, 10);
                if (!bidsByDay[key]) {
                    bidsByDay[key] = [];
                }
                bidsByDay[key].push(item);
            }
        });
        return bidsByDay;
    }

    // 캘린더 그리기 메인 함수
    function scrollToTodayOrEarliestAuction(viewId, containerId) {
        const view = document.getElementById(viewId);
        const container = document.getElementById(containerId);
        if (!view || !container) return;

        const dayEls = container.querySelectorAll('.calendar-day[data-date]');
        if (dayEls.length === 0) return;

        const today = new Date();
        const y = String(today.getFullYear()).slice(-2);
        const m = String(today.getMonth() + 1).padStart(2, '0');
        const d = String(today.getDate()).padStart(2, '0');
        const todayStr = y + m + d;

        let targetEl = null;

        // 1. 오늘 날짜 찾기
        for (let el of dayEls) {
            if (el.dataset.date === todayStr) {
                targetEl = el;
                break;
            }
        }

        // 2. 오늘이 없거나 오늘 상품이 없다면, 오늘 이후 가장 빠른 상품 있는 날짜 찾기
        if (!targetEl || targetEl.dataset.hasBids !== 'true') {
            for (let el of dayEls) {
                if (el.dataset.date >= todayStr && el.dataset.hasBids === 'true') {
                    if (!targetEl || el.dataset.date < targetEl.dataset.date || targetEl.dataset.hasBids !== 'true') {
                        targetEl = el;
                    }
                }
            }
        }

        // 3. 그래도 없으면 그냥 오늘 이후 첫날
        if (!targetEl) {
            for (let el of dayEls) {
                if (el.dataset.date >= todayStr) {
                    targetEl = el;
                    break;
                }
            }
        }

        if (targetEl) {
            const rect = targetEl.getBoundingClientRect();
            const viewRect = view.getBoundingClientRect();
            const relativeTop = rect.top - viewRect.top + view.scrollTop;
            view.scrollTo({ top: relativeTop - 10, behavior: 'smooth' }); // 약간의 여백
        }
    }

    // --- [회원 전용 고도화 로직] ---

    /**
     * 회원용 특화 아이템 카드 HTML 생성
     */
    function createMemberItemCard(item) {
        if (!item) return '';
        const sakun = escapeHtml(String(item.sakun_no || ''));
        const court = escapeHtml(String(item.court || ''));
        const rawStatus = String(item.stu_member || item.status || '미정').trim();
        const bidState = String(item.bid_state || '').trim();
        const status = escapeHtml(rawStatus);

        const rawBidprice = String(item.bidprice || item['bid-price'] || '').replace(/[^0-9]/g, '');
        const itemId = item.id;

        // 입찰가 공개 로직 (마스킹 방식, 블러 없음)
        // 물건상태가 '입찰'인 경우에만 입찰가 표시 (그 외는 무조건 미정)
        let bidPriceHtml = '';
        let statusSpanHtml = `<span class="member-court-status">${court} / ${status}</span>`;

        if (rawStatus !== '입찰') {
            // 입찰 상태 아님 → 입찰가 등록 여부에 관계없이 항상 미정
            bidPriceHtml = `<div class="member-bid-price text-gray-400 font-normal text-sm">미정</div>`;
        } else if (bidState === '전달완료') {
            let maskedStr = '미정';
            if (rawBidprice && rawBidprice.length > 0) {
                maskedStr = rawBidprice[0] + '*'.repeat(Math.max(rawBidprice.length - 1, 3)) + '원';
            }
            bidPriceHtml = `<div class="member-bid-price text-gray-500 font-semibold text-sm cursor-pointer" onclick="event.stopPropagation(); handleBidPriceClick('${itemId}')" title="터치하여 입찰가 확인">${maskedStr} 👆</div>`;
        } else if (bidState === '확인완료' || bidState.includes('확인완료')) {
            const fullPrice = rawBidprice ? (Number(rawBidprice).toLocaleString('ko-KR') + '원') : '미입력';
            bidPriceHtml = `<div class="member-bid-price text-blue-600 font-bold text-sm">${fullPrice}</div>`;
            statusSpanHtml = `<span class="member-court-status">${court} / <span class="bid-state-confirmed">확인완료</span></span>`;
        } else {
            // 기본 상태 (신규/미전달): 미정 표시
            bidPriceHtml = `<div class="member-bid-price text-gray-400 font-normal text-sm">미정</div>`;
        }

        // 상태에 따라 버튼 구성
        // 추천: 입찰확정 + 입찰취소 버튼
        // 입찰: 취소 버튼 (취소하시겠습니까? 확인 후 REQUEST_CANCEL)
        // 그 외: 버튼 없음
        let buttonsHtml = '';
        if (rawStatus === '추천') {
            buttonsHtml = `
                <button class="member-action-btn btn-bid-confirm" onclick="handleMemberBidConfirm('${itemId}', '${sakun}')">입찰확정</button>
                <button class="member-action-btn btn-bid-cancel-req" onclick="handleMemberBidCancelReq('${itemId}', '${sakun}')">입찰취소</button>
            `;
        } else if (rawStatus === '입찰') {
            buttonsHtml = `
                <button class="member-action-btn btn-bid-cancel-req" onclick="handleMemberBidCancelReq('${itemId}', '${sakun}')">취소</button>
            `;
        }

        const timerBarHtml = (rawStatus === '추천' && item.chuchen_date) ? createChuchenTimerBar(item.chuchen_date, item) : '';

        return `
            <div class="member-item-card" onmouseenter="preloadItemImage('${item.image_id}')" onclick="handleMemberCardClick('${itemId}')">
                <div class="member-card-row">
                    <div class="member-card-left">
                        <div class="member-sakun-info">
                            <span class="member-sakun-no">${sakun}</span>
                            ${statusSpanHtml}
                        </div>
                        ${bidPriceHtml}
                    </div>
                    <div class="member-card-right" onclick="event.stopPropagation()">${buttonsHtml}</div>
                </div>
                ${timerBarHtml}
            </div>
        `;
    }

    /**
     * 입찰가 터치 시: 텔레그램으로 가격 전송 + MAPS 확인완료 처리 + 앱 새로고침
     */
    function handleBidPriceClick(itemId) {
        const mToken = APP_CTX && APP_CTX.token;
        if (!mToken) return;

        // 중복 클릭 방지: 처리 중인 itemId 기록
        if (window._bidPriceConfirmingSet && window._bidPriceConfirmingSet.has(String(itemId))) return;
        if (!window._bidPriceConfirmingSet) window._bidPriceConfirmingSet = new Set();
        window._bidPriceConfirmingSet.add(String(itemId));

        // ★ 해당 카드의 가격 div를 즉시 로딩 표시로 변경
        const card = document.querySelector('[data-id="' + itemId + '"]');
        const priceDiv = card ? card.querySelector('.ic-price') : null;
        if (priceDiv) {
            priceDiv.className = 'ic-price ic-price-loading';
            priceDiv.onclick = null;
            priceDiv.innerHTML = '<span class="ic-spin"></span> 잠시만 기다려 주세요...';
        }

        google.script.run
            .withSuccessHandler(res => {
                window._bidPriceConfirmingSet.delete(String(itemId));
                if (res && res.success) {
                    // 로컬 데이터 갱신
                    const item = allBiddingData.find(it => String(it.id) === String(itemId));
                    if (item) item.bid_state = '확인완료';
                    // ★ 해당 카드 가격 div만 즉시 DOM 업데이트 (전체 재렌더 없이)
                    if (priceDiv) {
                        const pr = (item && item.bidprice) ? (typeof fmtP === 'function' ? fmtP(item.bidprice) : String(item.bidprice)) : '0';
                        const fullPrice = (pr && pr !== '0') ? pr + ' 원' : '미입력';
                        priceDiv.className = 'ic-price ic-price-confirmed';
                        priceDiv.onclick = null;
                        priceDiv.innerHTML = fullPrice;
                    }
                } else {
                    // 실패 시 원래 상태로 복원
                    if (priceDiv) {
                        priceDiv.className = 'ic-price ic-price-pending';
                        priceDiv.onclick = function (e) { e.stopPropagation(); handleBidPriceClick(itemId); };
                        priceDiv.innerHTML = '입찰가 도착! 터치하세요 👆';
                    }
                    console.warn('입찰가 확인 실패: ' + (res ? res.message : '응답 없음'));
                }
            })
            .withFailureHandler(err => {
                window._bidPriceConfirmingSet.delete(String(itemId));
                // 오류 시 원래 상태로 복원
                if (priceDiv) {
                    priceDiv.className = 'ic-price ic-price-pending';
                    priceDiv.onclick = function (e) { e.stopPropagation(); handleBidPriceClick(itemId); };
                    priceDiv.innerHTML = '입찰가 도착! 터치하세요 👆';
                }
                console.warn('입찰가 확인 오류: ' + err.message);
            })
            .confirmBidPriceWithTelegramReply(mToken, itemId);
    }

    /**
     * 카드 클릭 시 이미지 즉시 보기
     */
    function handleMemberCardClick(itemId) {
        if (!itemId) return;
        const item = allBiddingData.find(it => String(it.id) === String(itemId));
        if (item) {
            viewItemDetail(item, 'investigation');
        }

    /**
     * [추천] 입찰확정 버튼: 텔레그램과 동일한 REQUEST_BID 전송
     * 추천 → 입찰 업데이트 요청
     */
    function handleMemberBidConfirm(itemId, sakun) {
        if (!confirm(`[${sakun}]\n입찰확정 하시겠습니까?`)) return;
        if (!APP_CTX.token) { showStatus('회원 토큰이 없습니다. 링크를 다시 확인해주세요.', 'error'); return; }

        google.script.run
            .withSuccessHandler(res => {
                if (res && res.success) {
                    showStatus(res.message || '입찰확정 요청이 접수되었습니다.', 'success');
                } else {
                    showStatus((res && res.message) || '요청 처리에 실패했습니다.', 'error');
                }
                setTimeout(() => loadDataAndRenderCalendar(true), 500);
            })
            .withFailureHandler(err => showStatus('오류: ' + (err.message || err), 'error'))
            .processMemberDashboardAction(APP_CTX.token, itemId, 'bid');
    }

    /**
     * [추천] 입찰취소 버튼 / [입찰] 취소 버튼: 텔레그램과 동일한 REQUEST_CANCEL 전송
     * 추천 → 미정, 또는 입찰 → 취소 요청

        google.script.run
            .withSuccessHandler(res => {
                if (res && res.success) {
                    showStatus(res.message || '취소 요청이 접수되었습니다.', 'success');
                } else {
                    showStatus((res && res.message) || '요청 처리에 실패했습니다.', 'error');

    /**
     * 모바일용 연속 리스트 렌더링
     */
    function renderMemberMobileList() {
        const container = document.getElementById('BiddingSchedule');
        if (!container) return;

        // 기존 캘린더 구조 대신 리스트 영역으로 교체
        container.innerHTML = `
            <div class="mobile-item-list" id="memberMobileList">
                <div class="text-center p-8 text-gray-500">데이터를 불러오는 중...</div>
            </div>
        `;

        const listArea = document.getElementById('memberMobileList');
        if (!allBiddingData || allBiddingData.length === 0) {
            listArea.innerHTML = '<div class="text-center p-8 text-gray-500">조회된 입찰 물건이 없습니다.</div>';
            return;
        }

        let html = '';
        let lastDate = '';

        allBiddingData.forEach(item => {
            const rawDate = String(item['in-date'] || '');
            if (rawDate && rawDate.length >= 6) {
                const dateLabel = `20${rawDate.slice(0, 2)}년 ${rawDate.slice(2, 4)}월 ${rawDate.slice(4, 6)}일`;
                if (dateLabel !== lastDate) {
                    html += `<div class="date-divider">${dateLabel}</div>`;
                    lastDate = dateLabel;
                }
            }
            html += createMemberItemCard(item);
        });

        listArea.innerHTML = html;
        toggleCalendarLoading(false);
    }

    function renderCalendar() {
        // [추가] 회원 모드이면서 모바일인 경우 연속 리스트 뷰로 대체
        if (IS_MEMBER_VIEW && window.__MJ_IS_MOBILE__) {
            renderMemberMobileList();
            return;
        }

        // 입력값 유무에 따라 실시간 강조 스타일 적용 (입찰일정)
        try {
            const fSakunno = calSearchSakunno ? String(calSearchSakunno.value || '').trim() : '';
            const fCourt = calSearchCourt ? String(calSearchCourt.value || '').trim() : '';
            const fMember = calSearchMember ? String(calSearchMember.value || '').trim() : '';
            // fManager: matchesCalManager(item) 사용으로 대체됨
            const selected = getSelectedCalendarStatusValues();
            const allCalStatusCb = document.getElementById('cal-search-status-all');
            const isAllCalStatus = (allCalStatusCb && allCalStatusCb.checked);
            const sBtn = document.getElementById('cal-search-status-btn');

            if (calSearchSakunno) calSearchSakunno.classList.toggle('filter-active-input', !!fSakunno);
            if (calSearchCourt) calSearchCourt.classList.toggle('filter-active-input', !!fCourt);
            if (calSearchMember) calSearchMember.classList.toggle('filter-active-input', !!fMember);
            const calMgrBtn = document.getElementById('cal-search-manager-btn');
            if (calMgrBtn) { const allCalMgrCb = document.getElementById('cal-search-manager-all'); calMgrBtn.classList.toggle('filter-active-input', !(allCalMgrCb && allCalMgrCb.checked)); }
            // 수업 필터 강조
            const calClassTypeSel = document.getElementById('cal-class-type');
            const calClassNameSel = document.getElementById('cal-class-name');
            const calClassGradeSel = document.getElementById('cal-class-grade');
            if (calClassTypeSel) calClassTypeSel.classList.toggle('filter-active-input', !!calClassTypeSel.value);
            if (calClassNameSel) calClassNameSel.classList.toggle('filter-active-input', !!calClassNameSel.value);
            if (calClassGradeSel) calClassGradeSel.classList.toggle('filter-active-input', !!calClassGradeSel.value);
            // 전체가 아니면 강조 (미선택 포함)
            if (sBtn) sBtn.classList.toggle('filter-active-input', !isAllCalStatus);
        } catch (e) {
            // highlight만 실패해도 캘린더 렌더링은 계속
        }

        if (currentCalendarView === 'week') {
            renderCalendarWeek();
        } else if (currentCalendarView === 'month') {
            renderCalendarMonth();
        } else if (currentCalendarView === 'month-summary') {
            renderCalendarMonthSummary();
        }
    }

    // 주별 캘린더 렌더링
    function renderCalendarWeek() {
        if (!calendarDaysContainerWeek) return;

        // 사건번호 조회 시 해당 데이터가 있는 주로 이동 (오늘 이후만)
        const fSakunno = calSearchSakunno ? calSearchSakunno.value.toLowerCase().trim() : '';
        if (fSakunno) {
            const today = new Date();
            const todayYear = String(today.getFullYear()).slice(-2);
            const todayMonth = String(today.getMonth() + 1).padStart(2, '0');
            const todayDay = String(today.getDate()).padStart(2, '0');
            const todayYYMMDD = `${todayYear}${todayMonth}${todayDay}`;

            // 사건번호로 필터링된 물건들 중 오늘 이후의 가장 빠른 입찰일자의 주를 찾기
            const filteredItems = allBiddingData.filter(item => {
                const sakunNo = String(item.sakun_no || '').toLowerCase();
                if (!sakunNo.includes(fSakunno)) return false;

                // 오늘 이후만 필터링
                const inDate = String(item['in-date'] || '');
                if (!inDate || inDate.length < 6) return false;
                const inDateStr = inDate.substring(0, 6); // YYMMDD
                return inDateStr >= todayYYMMDD;
            });

            // 가장 빠른 입찰일자 찾기
            let earliestInDate = null;
            filteredItems.forEach(item => {
                const inDate = String(item['in-date'] || '');
                if (inDate && inDate.length >= 6) {
                    const inDateStr = inDate.substring(0, 6); // YYMMDD
                    if (!earliestInDate || inDateStr < earliestInDate) {
                        earliestInDate = inDateStr;
                    }
                }
            });

            if (earliestInDate) {
                // YYMMDD를 Date 객체로 변환
                const year = 2000 + parseInt(earliestInDate.substring(0, 2));
                const month = parseInt(earliestInDate.substring(2, 4)) - 1;
                const day = parseInt(earliestInDate.substring(4, 6));
                const searchDate = new Date(year, month, day);

                if (!isNaN(searchDate.getTime())) {
                    const searchWeekStart = getWeekStart(searchDate);
                    currentCalendarDate = new Date(searchWeekStart);
                    // 이전 주도 필요하면 로드
                    const todayWeekStart = getWeekStart(today);
                    const weeksDiff = Math.floor((searchWeekStart - todayWeekStart) / (7 * 24 * 60 * 60 * 1000));
                    if (weeksDiff < 0) {
                        // 과거 주이므로 이전 주 로드 필요
                        numWeeksBefore = Math.min(Math.abs(weeksDiff) + 2, 12);
                    } else {
                        // 미래 주이므로 첫 줄에 표시되도록
                        numWeeksBefore = 0;
                    }
                }
            }
        } else {
            // 입찰일정 탭이 활성화되어 있고 주별 탭일 때, 오늘 주로 초기화
            if (currentCalendarView === 'week') {
                const today = new Date();
                const todayWeekStart = getWeekStart(today);
                // currentCalendarDate가 설정되지 않았거나 오늘 주가 아닌 경우 오늘 주로 설정
                const currentWeekStart = getWeekStart(currentCalendarDate);
                if (currentWeekStart.getTime() !== todayWeekStart.getTime()) {
                    currentCalendarDate = new Date(todayWeekStart);
                }
            }
        }

        if (allBiddingData.length === 0) {
            toggleCalendarLoading(false);
            calendarDaysContainerWeek.innerHTML = `<div style="grid-column: 1 / span 6;" class="text-center p-8 text-gray-500">데이터가 없습니다.</div>`;
            return;
        }

        // 필터 배너 처리
        if (calendarFilterBanner && calendarFilterText) {
            if (calendarFilter.active) {
                calendarFilterBanner.classList.remove('content-hidden');
                let bannerText = "필터 적용 중";
                if (calendarFilter.member && calendarFilter.status) {
                    bannerText = `[${calendarFilter.member}]님 - [${calendarFilter.status}] 물건 조회`;
                } else if (calendarFilter.member) {
                    bannerText = `[${calendarFilter.member}]님 물건 조회`;
                } else if (calendarFilter.status) {
                    bannerText = `전체 [${calendarFilter.status}] 물건 조회`;
                }
                calendarFilterText.textContent = bannerText;
            } else {
                calendarFilterBanner.classList.add('content-hidden');
            }
        }

        toggleCalendarLoading(false);
        calendarDaysContainerWeek.innerHTML = '';

        // 수업 필터 값 (루프 외부에서 1회 읽기)
        const fCalClassType = document.getElementById('cal-class-type')?.value || '';
        const fCalClassName = document.getElementById('cal-class-name')?.value || '';
        const fCalClassGrade = document.getElementById('cal-class-grade')?.value || '';
        // 수업 필터 async 가드
        if ((fCalClassType || fCalClassName || fCalClassGrade) &&
            (allMembersNewData.length === 0 || allClassesData.length === 0)) {
            ensureClassDataLoaded(() => renderCalendar());
            return;
        }

        const startWeek = getWeekStart(currentCalendarDate);
        const today = new Date();
        const dayNames = ['월', '화', '수', '목', '금'];

        // 여러 주 렌더링 (초기에는 이전 주 없이 오늘 주부터 이후만)
        // numWeeksBefore는 전역 변수로 관리 (동적으로 변경됨)
        const numWeeksAfter = 12;
        const totalWeeks = numWeeksBefore + numWeeksAfter + 1;
        let lastMonth = -1;

        for (let weekOffset = -numWeeksBefore; weekOffset <= numWeeksAfter; weekOffset++) {
            const weekStart = new Date(startWeek);
            weekStart.setDate(startWeek.getDate() + (weekOffset * 7));

            // 주의 5일(월~금) 렌더링
            for (let i = 0; i < 5; i++) {
                const currentDate = new Date(weekStart);
                currentDate.setDate(weekStart.getDate() + i);

                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const day = currentDate.getDate();

                const isToday = (currentDate.toDateString() === today.toDateString());
                const isMonthChange = (i === 0 && month !== lastMonth);
                lastMonth = month;

                const dayClass = `calendar-day current-month ${isToday ? 'today' : ''} ${isMonthChange ? 'month-change' : ''}`;
                const dayDate = `${month + 1}월 ${day}일 (${dayNames[i]})`;
                const monthLabel = isMonthChange ? `${String(year).slice(-2)}년 ${month + 1}월` : '';

                let contentHtml = '';

                // 해당 날짜의 입찰 데이터 가져오기
                const yearStr = String(year).slice(-2);
                const monthStr = String(month + 1).padStart(2, '0');
                const dayStr = String(day).padStart(2, '0');
                const targetDate = `${yearStr}${monthStr}${dayStr}`;

                // 입찰일자 기준 필터링 (기본)
                const filteredData = allBiddingData.filter(item => {
                    const itemDate = String(item['in-date']);
                    return itemDate === targetDate;
                });

                // 나머지 필터 적용
                const fSakunno = calSearchSakunno ? calSearchSakunno.value.toLowerCase().trim() : '';
                const fCourt = calSearchCourt ? calSearchCourt.value.trim() : '';
                const fStatuses = getSelectedCalendarStatusValues();
                const allCalStatusCb = document.getElementById('cal-search-status-all');
                const isAllCalStatus = (allCalStatusCb && allCalStatusCb.checked);
                const fMember = calSearchMember ? calSearchMember.value.toLowerCase().trim() : '';
                // fManager: matchesCalManager(item) 사용으로 대체됨

                const bids = filteredData.filter(item => {
                    if (fSakunno && !String(item.sakun_no || '').toLowerCase().includes(fSakunno)) return false;
                    if (fCourt) {
                        const itemCourt = String(item.court || '').trim();
                        const searchCourt = fCourt.trim();
                        if (itemCourt !== searchCourt) return false;
                    }
                    // 상태 필터링: "전체" 체크 시 통과, 아무것도 선택 안 하면 조회 안 됨
                    const matchesStatus = isAllCalStatus ? true : (fStatuses.length > 0 && fStatuses.includes(item.stu_member || '미정'));
                    if (!matchesStatus) return false;
                    if (fMember) {
                        const memberDisp = `${String(item.m_name || '')}`.toLowerCase();
                        if (!memberDisp.includes(fMember)) return false;
                    }
                    if (!matchesCalManager(item)) return false;
                    // 수업 필터
                    if (fCalClassType || fCalClassName || fCalClassGrade) {
                        const mem = allMembersNewData.find(m => String(m.member_id) === String(item.member_id));

                    // numWeeksBefore 내에 있으면 스크롤 위치 계산

    // 월별 캘린더 렌더링 (기존 로직)
    function renderCalendarMonth() {
        if (!calendarDaysContainerMonth) return;

        // 사건번호 조회 시 해당 데이터가 있는 월로 이동 (오늘 이후만)
        const fSakunno = calSearchSakunno ? calSearchSakunno.value.toLowerCase().trim() : '';
        if (fSakunno) {
            const today = new Date();
            const todayYear = String(today.getFullYear()).slice(-2);
            const todayMonth = String(today.getMonth() + 1).padStart(2, '0');
            const todayDay = String(today.getDate()).padStart(2, '0');
            const todayYYMMDD = `${todayYear}${todayMonth}${todayDay}`;

            // 사건번호로 필터링된 물건들 중 오늘 이후의 가장 빠른 입찰일자의 월을 찾기
            const filteredItems = allBiddingData.filter(item => {
                const sakunNo = String(item.sakun_no || '').toLowerCase();
                if (!sakunNo.includes(fSakunno)) return false;

                // 오늘 이후만 필터링
                const inDate = String(item['in-date'] || '');
                if (!inDate || inDate.length < 6) return false;
                const inDateStr = inDate.substring(0, 6); // YYMMDD
                return inDateStr >= todayYYMMDD;
            });

            // 가장 빠른 입찰일자 찾기
            let earliestInDate = null;
            filteredItems.forEach(item => {
                const inDate = String(item['in-date'] || '');
                if (inDate && inDate.length >= 6) {
                    const inDateStr = inDate.substring(0, 6); // YYMMDD
                    if (!earliestInDate || inDateStr < earliestInDate) {
                        earliestInDate = inDateStr;
                    }
                }
            });

            if (earliestInDate) {
                // YYMMDD를 Date 객체로 변환하여 해당 월로 이동
                const year = 2000 + parseInt(earliestInDate.substring(0, 2));
                const month = parseInt(earliestInDate.substring(2, 4)) - 1;
                const day = parseInt(earliestInDate.substring(4, 6));
                const searchDate = new Date(year, month, day);

                if (!isNaN(searchDate.getTime())) {
                    currentCalendarDate = new Date(year, month, 1); // 해당 월의 1일로 설정
                }
            }
        }

        if (allBiddingData.length === 0) {
            toggleCalendarLoading(false);
            calendarDaysContainerMonth.innerHTML = `<div style="grid-column: 1 / span 5;" class="text-center p-8 text-gray-500">데이터가 없습니다.</div>`;
            return;
        }

        // 필터 배너 처리

    // 법원별 입찰 건수 집계 함수
    function aggregateBidsByCourtAndDay(year, month) {
        const yearStr = String(year).slice(-2);
        const monthStr = String(month + 1).padStart(2, '0');
        const bidsByDay = {};

        let dataToAggregate = allBiddingData;

        const fSakunno = calSearchSakunno ? calSearchSakunno.value.toLowerCase().trim() : '';
        const fCourt = calSearchCourt ? calSearchCourt.value.toLowerCase().trim() : '';
        const fStatuses = getSelectedCalendarStatusValues();
        const allCalStatusCb = document.getElementById('cal-search-status-all');
        const isAllCalStatus = (allCalStatusCb && allCalStatusCb.checked);
        const fMember = calSearchMember ? calSearchMember.value.toLowerCase().trim() : '';
        // fManager: matchesCalManager(item) 사용으로 대체됨
        // 수업 필터 (입찰일정)
        const fCalClassType = document.getElementById('cal-class-type')?.value || '';
        const fCalClassName = document.getElementById('cal-class-name')?.value || '';
        const fCalClassGrade = document.getElementById('cal-class-grade')?.value || '';

        // 수업 필터 사용 중인데 데이터 미로드 → 로드 후 재렌더
        if ((fCalClassType || fCalClassName || fCalClassGrade) &&
            (allMembersNewData.length === 0 || allClassesData.length === 0)) {
            ensureClassDataLoaded(() => renderCalendar());
            return {};  // 로딩 중이면 빈 결과 반환 (재렌더 시 채워짐)
        }

        // 나머지 검색 조건 필터링
        dataToAggregate = dataToAggregate.filter(item => {
            let pass = true;
            if (fSakunno && !String(item.sakun_no || '').toLowerCase().includes(fSakunno)) pass = false;
            if (fCourt) {
                const itemCourt = String(item.court || '').toLowerCase().trim();
                const searchCourt = fCourt.toLowerCase().trim();
                if (itemCourt !== searchCourt) pass = false;
            }
            // 상태 필터링: "전체" 체크 시 통과, 아무것도 선택 안 하면 조회 안 됨
            const matchesStatus = isAllCalStatus ? true : (fStatuses.length > 0 && fStatuses.includes(String(item.stu_member || '').trim()));
            if (!matchesStatus) pass = false;
            if (fMember) {
                const memberDisp = `${String(item.m_name || '')}`.toLowerCase();
                if (!memberDisp.includes(fMember)) pass = false;
            }
            if (!matchesCalManager(item)) pass = false;
            // 수업 필터: member_id → allMembersNewData → class_id → allClassesData
            if (fCalClassType || fCalClassName || fCalClassGrade) {
                const mem = allMembersNewData.find(m => String(m.member_id) === String(item.member_id));
                const cls = mem ? allClassesData.find(c => String(c.class_id) === String(mem.class_id)) : null;
                if (fCalClassType && (cls?.class_type || '') !== fCalClassType) pass = false;
                if (fCalClassName && (cls?.class_name || '') !== fCalClassName) pass = false;
                if (fCalClassGrade && (cls?.class_grade || '') !== fCalClassGrade) pass = false;
            }
            return pass;
        });

        // 캘린더 점프 필터링
        if (calendarFilter.active) {
            if (calendarFilter.member) {
                dataToAggregate = dataToAggregate.filter(item => isMemberMatch(item, calendarFilter.member));
            }
            if (calendarFilter.status) {
                dataToAggregate = dataToAggregate.filter(item => item.stu_member === calendarFilter.status);
            }
        }

        // 날짜별, 법원별로 집계 (입찰일자 기준)
        dataToAggregate.forEach(item => {
            const itemDate = String(item['in-date'] || '');
            if (!itemDate || itemDate.length < 6) return; // 입찰일자가 없으면 제외

            const itemMonthStr = itemDate.substring(2, 4);
            const itemYearStr = itemDate.substring(0, 2);
            if (itemMonthStr === monthStr && itemYearStr === yearStr) {
                const day = itemDate.substring(4, 6);
                const key = parseInt(day, 10);
                if (!bidsByDay[key]) {
                    bidsByDay[key] = {};
                }
                const court = item.court || '미상';
                if (!bidsByDay[key][court]) {
                    bidsByDay[key][court] = [];
                }
                bidsByDay[key][court].push(item);
            }
        });

        return bidsByDay;
    }

    // 월별(요약) 캘린더 렌더링
    function renderCalendarMonthSummary() {
        if (!calendarDaysContainerMonthSummary) return;

        // 사건번호 조회 시 해당 데이터가 있는 월로 이동 (오늘 이후만)
        const fSakunno = calSearchSakunno ? calSearchSakunno.value.toLowerCase().trim() : '';
        if (fSakunno) {
            const today = new Date();
            const todayYear = String(today.getFullYear()).slice(-2);
            const todayMonth = String(today.getMonth() + 1).padStart(2, '0');
            const todayDay = String(today.getDate()).padStart(2, '0');
            const todayYYMMDD = `${todayYear}${todayMonth}${todayDay}`;

            // 사건번호로 필터링된 물건들 중 오늘 이후의 가장 빠른 입찰일자의 월을 찾기
            const filteredItems = allBiddingData.filter(item => {
                const sakunNo = String(item.sakun_no || '').toLowerCase();
                if (!sakunNo.includes(fSakunno)) return false;

                // 오늘 이후만 필터링
                const inDate = String(item['in-date'] || '');
                if (!inDate || inDate.length < 6) return false;
                const inDateStr = inDate.substring(0, 6); // YYMMDD
                return inDateStr >= todayYYMMDD;
            });

            // 가장 빠른 입찰일자 찾기
            let earliestInDate = null;
            filteredItems.forEach(item => {
                const inDate = String(item['in-date'] || '');
                if (inDate && inDate.length >= 6) {
                    const inDateStr = inDate.substring(0, 6); // YYMMDD
                    if (!earliestInDate || inDateStr < earliestInDate) {
                        earliestInDate = inDateStr;
                    }
                }
            });

            if (earliestInDate) {
                // YYMMDD를 Date 객체로 변환하여 해당 월로 이동
                const year = 2000 + parseInt(earliestInDate.substring(0, 2));
                const month = parseInt(earliestInDate.substring(2, 4)) - 1;
                const day = parseInt(earliestInDate.substring(4, 6));
                const searchDate = new Date(year, month, day);

                if (!isNaN(searchDate.getTime())) {
                    currentCalendarDate = new Date(year, month, 1); // 해당 월의 1일로 설정
                }
            }
        }

        if (allBiddingData.length === 0) {
            toggleCalendarLoading(false);
            calendarDaysContainerMonthSummary.innerHTML = `<div style="grid-column: 1 / span 5;" class="text-center p-8 text-gray-500">데이터가 없습니다.</div>`;
            return;
        }

        // 필터 배너 처리
        if (calendarFilterBanner && calendarFilterText) {
            if (calendarFilter.active) {
                calendarFilterBanner.classList.remove('content-hidden');
                let bannerText = "필터 적용 중";
                if (calendarFilter.member && calendarFilter.status) {
                    bannerText = `[${calendarFilter.member}]님 - [${calendarFilter.status}] 물건 조회`;
                } else if (calendarFilter.member) {
                    bannerText = `[${calendarFilter.member}]님 물건 조회`;
                } else if (calendarFilter.status) {
                    bannerText = `전체 [${calendarFilter.status}] 물건 조회`;
                }
                calendarFilterText.textContent = bannerText;
            } else {
                calendarFilterBanner.classList.add('content-hidden');
            }
        }

        toggleCalendarLoading(false);
        calendarDaysContainerMonthSummary.innerHTML = '';

        const date = currentCalendarDate;
        updateCalendarTitle(date);
        updateCalendarTitleVisibility();
        const year = date.getFullYear();
        const month = date.getMonth();
        const today = new Date();

        const firstDayOfMonth = new Date(year, month, 1);
        const lastDateOfMonth = new Date(year, month + 1, 0).getDate();

        let startDay = firstDayOfMonth.getDay();
        if (startDay === 0) startDay = 7;
        startDay = startDay - 1;
        const bidsByDay = aggregateBidsByCourtAndDay(year, month);

        const dayNames = ['월', '화', '수', '목', '금', '토', '일'];

        // 빈 날짜 채우기 (전월)
        for (let i = 0; i < startDay; i++) {
            if (dayNames[i] === '토' || dayNames[i] === '일') continue;
            calendarDaysContainerMonthSummary.insertAdjacentHTML('beforeend', `<div class="calendar-day other-month"></div>`);
        }

        // 날짜 채우기
        for (let i = 1; i <= lastDateOfMonth; i++) {
            const currentDate = new Date(year, month, i);
            const yearStr = String(currentDate.getFullYear()).slice(-2);
            const monthStr = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dayStr = String(currentDate.getDate()).padStart(2, '0');
            const targetDate = `${yearStr}${monthStr}${dayStr}`;
            const bids = bidsByDay[i] || [];
            const dayOfWeek = currentDate.getDay();

            if (dayOfWeek === 6 || dayOfWeek === 0) continue; // 주말 제외

            const isToday = (currentDate.toDateString() === today.toDateString());
            const dayClass = `calendar-day current-month ${isToday ? 'today' : ''}`;
            const dayName = dayNames[dayOfWeek === 0 ? 6 : dayOfWeek - 1];
            const dayDate = `${month + 1}월 ${i}일 (${dayName})`;

            let contentHtml = '';
            const dayBids = bidsByDay[i] || {};

            // 법원별 건수 계산 및 정렬
            const courtCounts = [];
            let totalCount = 0;
            for (const court in dayBids) {
                const count = dayBids[court].length;
                courtCounts.push({ court, count });
                totalCount += count;
            }
            // 건수 순으로 정렬 (많은 순)
            courtCounts.sort((a, b) => b.count - a.count);

            if (totalCount > 0) {
                // 일별 카드 하나만 생성 (법원별 건수 요약)
                let courtListHtml = '';
                courtCounts.forEach(({ court, count }) => {
                    courtListHtml += `
                      <div class="flex items-center justify-between py-1 px-2 hover:bg-gray-50 rounded">
                          <span class="text-xs font-medium text-gray-700">${court}</span>
                          <span class="text-xs font-bold text-indigo-600">${count}건</span>
                      </div>
                  `;
                });

                const summaryCardHtml = `
                  <div class="border-2 border-indigo-300 rounded-lg p-3 bg-indigo-50 shadow-sm">
                      <div class="flex items-center justify-between mb-2 pb-2 border-b border-indigo-200">
                          <span class="text-sm font-bold text-indigo-800">총 ${totalCount}건</span>
                      </div>
                      <div class="space-y-1 max-h-[400px] overflow-y-auto">
                          ${courtListHtml}
                      </div>
                  </div>
              `;
                contentHtml = summaryCardHtml;
            }

            const dayHtml = `
              <div class="${dayClass}" data-date="${targetDate}" data-has-bids="${totalCount > 0}">
                  <div class="calendar-day-date">${dayDate}</div>
                  ${contentHtml}
              </div>
          `;
            calendarDaysContainerMonthSummary.insertAdjacentHTML('beforeend', dayHtml);
        }

        const totalRenderedDays = calendarDaysContainerMonthSummary.children.length;
        const remainingSlots = 5 - (totalRenderedDays % 5);
        if (remainingSlots > 0 && remainingSlots < 5) {
            for (let i = 0; i < remainingSlots; i++) {
                calendarDaysContainerMonthSummary.insertAdjacentHTML('beforeend', `<div class="calendar-day other-month"></div>`);
            }
        }
    }

    // 이전 주 추가 로딩 함수
    function loadPreviousWeeks(weeksToAdd = 4) {
        if (isLoadingPreviousWeeks) return;
        if (numWeeksBefore >= 12) return; // 최대 12주까지만

        isLoadingPreviousWeeks = true;

        const calendarWeekView = document.getElementById('calendar-week-view');
        const calendarDaysContainerWeek = document.getElementById('calendar-days-container-week');

        if (!calendarWeekView || !calendarDaysContainerWeek) {
            isLoadingPreviousWeeks = false;
            return;
        }

        // 현재 첫 번째 주의 높이 저장 (스크롤 위치 유지용)
        const firstWeekElement = calendarDaysContainerWeek.firstElementChild;
        if (!firstWeekElement) {
            isLoadingPreviousWeeks = false;
            return;
        }

        const firstWeekHeight = firstWeekElement.offsetHeight || 600; // 기본값 600px

        // 추가할 주 범위 계산
        const startWeek = getWeekStart(currentCalendarDate);
        const newWeeksBefore = Math.min(numWeeksBefore + weeksToAdd, 12);
        const weeksToRender = newWeeksBefore - numWeeksBefore;

        const today = new Date();
        const dayNames = ['월', '화', '수', '목', '금'];
        let lastMonth = -1;


        // 이전 주들을 DOM 앞에 추가 (역순으로 추가하여 순서 유지)
        let allWeekHtml = '';

        for (let i = weeksToRender - 1; i >= 0; i--) {
            const weekOffset = -(newWeeksBefore - i);
            const weekStart = new Date(startWeek);
            weekStart.setDate(startWeek.getDate() + (weekOffset * 7));

            // 주의 5일(월~금) 렌더링
            for (let j = 0; j < 5; j++) {
                const currentDate = new Date(weekStart);
                currentDate.setDate(weekStart.getDate() + j);

                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const day = currentDate.getDate();

                const isToday = (currentDate.toDateString() === today.toDateString());
                const isMonthChange = (j === 0 && month !== lastMonth);
                lastMonth = month;

                const dayClass = `calendar-day current-month ${isToday ? 'today' : ''} ${isMonthChange ? 'month-change' : ''}`;
                const dayDate = `${month + 1}월 ${day}일 (${dayNames[j]})`;

                let contentHtml = '';

                // 해당 날짜의 입찰 데이터 가져오기
                const yearStr = String(year).slice(-2);
                const monthStr = String(month + 1).padStart(2, '0');
                const dayStr = String(day).padStart(2, '0');
                const targetDate = `${yearStr}${monthStr}${dayStr}`;

                // 입찰일자 기준 필터링 (기본)
                const filteredData = allBiddingData.filter(item => {
                    const itemDate = String(item['in-date']);
                    return itemDate === targetDate;
                });

                // 나머지 필터 적용
                const fSakunno = calSearchSakunno ? calSearchSakunno.value.toLowerCase().trim() : '';
                const fCourt = calSearchCourt ? calSearchCourt.value.trim() : '';
                const fStatuses = getSelectedCalendarStatusValues();
                const allCalStatusCb = document.getElementById('cal-search-status-all');
                const isAllCalStatus = (allCalStatusCb && allCalStatusCb.checked);
                const fMember = calSearchMember ? calSearchMember.value.toLowerCase().trim() : '';
                // fManager: matchesCalManager(item) 사용으로 대체됨

                const bids = filteredData.filter(item => {
                    if (fSakunno && !String(item.sakun_no || '').toLowerCase().includes(fSakunno)) return false;
                    if (fCourt) {
                        const itemCourt = String(item.court || '').trim();
                        const searchCourt = fCourt.trim();
                        if (itemCourt !== searchCourt) return false;
                    }
                    // 상태 필터링: "전체" 체크 시 통과, 아무것도 선택 안 하면 조회 안 됨
                    const matchesStatus = isAllCalStatus ? true : (fStatuses.length > 0 && fStatuses.includes(item.stu_member || '미정'));
                    if (!matchesStatus) return false;
                    if (fMember) {
                        const memberDisp = `${String(item.m_name || '')}`.toLowerCase();
                        if (!memberDisp.includes(fMember)) return false;
                    }
                    if (!matchesCalManager(item)) return false;
                    // 수업 필터
                    if (fCalClassType || fCalClassName || fCalClassGrade) {
                        const mem = allMembersNewData.find(m => String(m.member_id) === String(item.member_id));
                        const cls = mem ? allClassesData.find(c => String(c.class_id) === String(mem.class_id)) : null;
                        if (fCalClassType && (cls?.class_type || '') !== fCalClassType) return false;
                        if (fCalClassName && (cls?.class_name || '') !== fCalClassName) return false;
                        if (fCalClassGrade && (cls?.class_grade || '') !== fCalClassGrade) return false;
                    }
                    return true;
                });

                if (bids.length > 0) {
                    bids.forEach(bid => {
                        const bidprice = bid.bidprice || 0;
                        const bidpriceFormatted = (bidprice > 0) ? new Intl.NumberFormat('ko-KR').format(bidprice) + '원' : '';
                        const mNameIdClass = (bid.m_name_id !== '대표님' && bid.m_name_id !== null && bid.m_name_id !== undefined && bid.m_name_id !== '') ? 'm-name-id-red' : '';
                        const mNameValue = bid.m_name || '';
                        const tBadgeClass = (String(bid.bid_state || '').includes('확인완료')) ? 'telegram-badge-confirmed' : 'telegram-badge';
                        const tBadgeHtml = getMemberTelegramEnabled_(bid.member_id) === 'Y' ? `<span class="${tBadgeClass}">T</span>` : '';
                        const hBadgeHtml = (bid.class_d1_id && bid.stu_member !== '미정') ? `<span style="font-size:9px;background:#fef08a;color:#dc2626;font-weight:bold;padding:0 3px;border-radius:3px;margin-right:2px;vertical-align:middle">H</span>` : '';
                        const statusClass = getStatusTagClass(bid.stu_member);
                        const courtButtonClass = 'button-like-content';

                        const isNewBid = (bid.bid_state === '신규' || !bid.bid_state);
                        const bidPriceMobileClass = isNewBid ? 'text-red-600 font-bold' : 'text-gray-700 font-bold';
                        const bidPricePcClass = isNewBid ? 'bidprice-cell text-red-600' : 'bidprice-cell';

                        const isNoPrice = (!bid.bidprice || bid.bidprice === 0 || bid.bidprice === '0');
                        const mobileBorder = isNoPrice ? 'border-2 border-red-600' : 'border-2 border-slate-400';
                        const desktopBorder = isNoPrice ? 'border-[2px] border-red-600' : 'border-[1px] border-slate-500';

                        // 이미지 존재 여부 확인 (has_images 플래그 사용)
                        const hasImages = !!bid.has_images;
                        const imgButtonHtml = `<span class="inline-block w-5 text-center flex-shrink-0">${hasImages ? `<span class="inline-block w-3.5 h-3.5 rounded-full bg-green-500 cursor-pointer" onclick="event.stopPropagation(); openDetailModalWithTab('${bid.id}', true)" title="이미지 있음"></span>` : ''}</span>`;

                        // [추천 전달] 사건번호 아래 전달 일시 + 48시간 타이머 바
                        const chuchenDateStr2 = (bid.stu_member === '추천' && bid.chuchen_date) ? formatChuchenDate(bid.chuchen_date) : '';
                        const chuchenDateHtml2 = chuchenDateStr2 ? `<div class="text-[9px] text-indigo-400 mt-0.5 leading-tight">${chuchenDateStr2}</div>` : '';
                        const timerBarHtml2 = (bid.stu_member === '추천' && bid.chuchen_date) ? createChuchenTimerBar(bid.chuchen_date, bid) : '';

                        const mobileHtml = `
                          <div class="md:hidden mb-2 rounded-xl overflow-hidden border-2 border-green-300 shadow-sm">
                            <div class="px-3 pt-2 pb-1 bg-stone-50 flex items-center cursor-pointer" onclick="openDetailModalById('${bid.id}')">
                              <span class="${statusClass} text-[10px] px-1.5 py-0.5 rounded whitespace-nowrap" onclick="event.stopPropagation(); confirmAndSendTelegramForItem_('${bid.member_id || ''}','${bid.id || ''}')">${bid.stu_member || '미정'}</span>
                              <span style="margin-left:6px;">${tBadgeHtml}</span><span class="text-xs font-bold text-gray-800 ml-1">${mNameValue}</span>
                            </div>
                            <div class="bg-stone-50 border-t border-gray-200 flex cursor-pointer" onclick="openDetailModalById('${bid.id}')">
                              <div class="text-indigo-600 font-bold text-xs flex-1 min-w-0 break-all py-2 px-3 flex items-start">${imgButtonHtml}<div class="min-w-0 flex-1"><div>${dupSakunHtml(bid)}</div>${chuchenDateHtml2}</div></div>
                              <div class="border-l border-gray-200 flex flex-col" style="min-width:42%">
                                <div class="px-2 py-1 text-[10px] text-gray-700 border-b border-gray-200 whitespace-nowrap"><span class="${courtButtonClass}">${bid.court || '미상'}</span><span class="mx-1 text-gray-400">/</span><span class="font-bold ${mNameIdClass}">${bid.m_name_id || '대표님'}</span></div>
                                <div class="px-2 py-1 text-xs font-bold ${bidPriceMobileClass} whitespace-nowrap">${bidpriceFormatted}</div>
                              </div>
                            </div>
                            ${timerBarHtml2}
                          </div>
                      `;

                        const desktopHtml = `
                          <div class="hidden md:block mb-0.5">
                          <div class="bid-item-card ${desktopBorder} cursor-pointer" onclick="openDetailModalById('${bid.id}')">
                            <div class="bid-row-top">
                              <div class="bid-top-left">${imgButtonHtml}</div>
                              <div class="bid-bid-col-resizer" data-bid-section="top" onclick="event.stopPropagation()"></div>
                              <div class="bid-top-right"><span class="${statusClass}" onclick="event.stopPropagation(); confirmAndSendTelegramForItem_('${bid.member_id || ''}','${bid.id || ''}')">${bid.stu_member || '미정'}</span>${hBadgeHtml}<span style="margin-left:6px;">${tBadgeHtml}</span><span style="font-weight:bold;margin-left:4px;">${mNameValue}</span></div>
                            </div>
                            <div class="bid-card-bottom">
                              <div class="bid-bot-left"><div>${dupSakunHtml(bid)}</div>${chuchenDateHtml2}</div>
                              <div class="bid-bid-col-resizer" data-bid-section="bot" onclick="event.stopPropagation()"></div>
                              <div class="bid-court-cell"><span class="${courtButtonClass}">${bid.court || '미상'}</span> / <span class="${mNameIdClass}">${bid.m_name_id || '대표님'}</span></div>
                              <div class="bid-price-cell ${bidPricePcClass}">${bidpriceFormatted}</div>
                            </div>
                            ${timerBarHtml2 ? `<div style="padding:0">${timerBarHtml2}</div>` : ''}
                          </div>
                          </div>
                      `;
                        contentHtml += mobileHtml + desktopHtml;
                    });
                }

                const dayHtml = `
                  <div class="${dayClass}">
                      <div class="calendar-day-date">${dayDate}</div>
                      ${contentHtml}
                  </div>
              `;
                allWeekHtml = dayHtml + allWeekHtml;
            }
        }

        // DOM 앞에 추가
        calendarDaysContainerWeek.insertAdjacentHTML('afterbegin', allWeekHtml);

        // 스크롤 위치 유지 (추가된 높이만큼 스크롤 위치 조정)
        requestAnimationFrame(() => {
            const addedHeight = firstWeekHeight * weeksToRender;
            calendarWeekView.scrollTop = calendarWeekView.scrollTop + addedHeight;

            // 상태 업데이트
            numWeeksBefore = newWeeksBefore;
            isLoadingPreviousWeeks = false;
        });
    }

    function updateDashboardFilterOptions() {
        const filters = ['missingBidFilterMember', 'statusFilterMember'];
        const members = new Set();
        allBiddingData.forEach(item => {
            if (item.m_name_id && item.m_name_id.trim() !== '') {
                members.add(item.m_name_id);
            }
        });
        members.delete('개인'); // '개인'은 드롭다운에서 제외
        let optionsHtml = `<option value="">전체</option>`;
        if (members.has('대표님')) members.delete('대표님');
        optionsHtml += `<option value="대표님">대표님</option>`;
        [...members].sort().forEach(member => {
            optionsHtml += `<option value="${member}">${member}</option>`;
        });
        filters.forEach(id => {
            const select = document.getElementById(id);
            if (select) {
                const currentVal = select.value;
                select.innerHTML = optionsHtml;
                select.value = currentVal;
                if (select.value !== currentVal) select.value = '';
            }
        });

        // 입찰일정 메뉴의 입찰가 담당 → 체크박스 드롭다운으로 채우기
        const calManagerDropdown = document.getElementById('cal-search-manager-dropdown');
        if (calManagerDropdown) {
            const calCurSel = getSelectedCalManagerValues();
            const calAllChecked = calCurSel.length === 0;
            let calCbHtml = `<label class="flex items-center gap-2 py-1 cursor-pointer hover:bg-gray-50 rounded px-1"><input type="checkbox" id="cal-search-manager-all" value="All" ${calAllChecked ? 'checked' : ''} onchange="handleCalManagerAll(this); renderCalendar()" class="rounded"> 전체</label>`;
            calCbHtml += `<label class="flex items-center gap-2 py-1 cursor-pointer hover:bg-gray-50 rounded px-1"><input type="checkbox" name="cal-search-manager-cb" value="대표님" ${calCurSel.includes('대표님') ? 'checked' : ''} onchange="handleCalManagerOther(this); updateCalManagerLabel(); renderCalendar()" class="rounded"> 대표님</label>`;
            [...members].sort().filter(m => m !== '대표님').forEach(function (member) {
                calCbHtml += `<label class="flex items-center gap-2 py-1 cursor-pointer hover:bg-gray-50 rounded px-1"><input type="checkbox" name="cal-search-manager-cb" value="${member}" ${calCurSel.includes(member) ? 'checked' : ''} onchange="handleCalManagerOther(this); updateCalManagerLabel(); renderCalendar()" class="rounded"> ${member}</label>`;
            });
            calManagerDropdown.innerHTML = calCbHtml;
            updateCalManagerLabel();
        }
        // 입찰물건관리 메뉴의 입찰가 담당 → 체크박스 드롭다운으로 채우기
        const searchManagerDropdown = document.getElementById('search-manager-dropdown');

            cbHtml += `<label class="flex items-center gap-2 py-1 cursor-pointer hover:bg-gray-50 rounded px-1"><input type="checkbox" name="search-manager-cb" value="대표님" ${currentSelected.includes('대표님') ? 'checked' : ''} onchange="handleManagerOther(this); updateManagerLabel(); applyFilters()" class="rounded"> 대표님</label>`;

            });

            updateManagerLabel();
        }

    function renderMissingBidDashboard() {
        if (!missingBidTableBody) return;
        missingBidTableBody.innerHTML = '';
        const missingBidTableFoot = document.getElementById('missingBidTableFoot');
        if (missingBidTableFoot) missingBidTableFoot.innerHTML = '';
        const selectAll = document.getElementById('missingBidSelectAll');
        if (selectAll) selectAll.checked = false;
        updateMissingBidMoveBtn();

        const targetDates = getWorkingDaysFromToday();
        const filterMember = document.getElementById('missingBidFilterMember') ? document.getElementById('missingBidFilterMember').value : '';
        let totalMissing = 0;

        targetDates.forEach((dateObj, index) => {
            const year = String(dateObj.getFullYear()).slice(-2);
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            const targetYYMMDD = `${year}${month}${day}`;

            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            const dDay = index === 0 ? "오늘" : `D-${index}`;
            const dDayColor = index === 0 ? "text-gray-800" : "text-red-500";
            const dateStr = `${month}/${day} (${dayNames[dateObj.getDay()]})`;

            const missingCount = allBiddingData.filter(item => {
                const itemDate = String(item['in-date']);
                const price = parseInt(String(item.bidprice || 0));
                const filterMemberVal = filterMember;
                const itemMember = item.m_name_id || '';
                const isTargetMember = (filterMemberVal === 'All' || filterMemberVal === '') || (itemMember === filterMemberVal);
                return itemDate === targetYYMMDD && (isNaN(price) || price === 0) && item.stu_member === '입찰' && isTargetMember;
            }).length;

            totalMissing += missingCount;
            const displayCount = missingCount === 0 ? "없음" : `${missingCount}건`;
            const textColorClass = missingCount > 0 ? "text-red-600 font-bold" : "text-gray-400";
            const cursorClass = missingCount > 0 ? "cursor-pointer hover:bg-gray-100" : "";

            const row = document.createElement('tr');
            row.className = `border-b border-gray-100 transition ${cursorClass}`;
            row.innerHTML = `
              <td class="py-2 px-2 text-center w-8" onclick="event.stopPropagation()">

              </td>
              <td class="py-2 px-3 text-center text-sm">
                  <span class="${textColorClass}">${displayCount}</span>
              </td>
          `;
            if (missingCount > 0) {
                row.onclick = () => filterFromDashboard(targetYYMMDD, 'missing', null, filterMember);
            }
            missingBidTableBody.appendChild(row);
        });

        // tfoot에 요약 추가 (sticky 부여되어 있어 항상 하단 고정)
        if (missingBidTableFoot) {
            missingBidTableFoot.innerHTML = '';
            const totalRow = document.createElement('tr');
            totalRow.className = `bg-blue-50 font-bold transition ${totalMissing > 0 ? 'cursor-pointer hover:bg-blue-100' : ''}`;

            const countColor = totalMissing > 0 ? "text-red-600" : "text-blue-800";

            totalRow.innerHTML = `

                <td class="py-2 px-3 text-left whitespace-nowrap">
                    <span class="text-blue-800 text-sm">전체 (오늘~)</span>
                </td>
                <td class="py-2 px-3 text-center text-sm">
                    <span class="${countColor}">${totalMissing}건</span>
                </td>
            `;

            if (totalMissing > 0) {
                totalRow.onclick = () => filterFromDashboard(todayYYMMDD, 'total_missing', null, filterMember);
            }
            missingBidTableFoot.appendChild(totalRow);
        }
