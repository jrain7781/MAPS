    function renderSummaryMemberDetail(m) {
        // 현재 배치 세션만 표시
        const cbk = getCurrentBatchKey_();
        const d1List = (allClassD1Data || [])
            .filter(function (d) { return cbk ? getD1BatchKey_(String(d.class_d1_id)) === cbk : String(d.class_id) === String(selectedClassId); })
            .slice().sort(function (a, b) { return Number(a.class_loop) - Number(b.class_loop); });
        const N = d1List.length;
        const detail = document.getElementById('d1SummaryDetail');
        if (!detail) return;

        const todayStr = (function() {
            const n = new Date();
            return String(n.getFullYear()) + String(n.getMonth()+1).padStart(2,'0') + String(n.getDate()).padStart(2,'0');
        })();

        // 총 차수 = 현재 배치 세션 수
        const totalLoop = N;

        let attended = 0;
        for (let i = 0; i < d1List.length; i++) {
            const val = String(m['no_' + d1List[i].class_loop] || '').trim().toUpperCase();
            const raw = String(d1List[i].class_date || '').replace(/-/g, '');
            const isPast = raw < todayStr;
            if (val === 'O' || (isPast && val !== 'X' && val !== 'O')) attended++;
        }
        const remaining = Math.max(0, totalLoop - attended);
        let remBg = 'bg-green-100 text-green-700';
        if (remaining <= 2) remBg = 'bg-red-100 text-red-700';
        else if (remaining <= 5) remBg = 'bg-amber-100 text-amber-700';

        const nameRows = ['name1', 'name2', 'name3'].map(function (k) {
            const n = m[k], g = m[k + '_gubun'];
            return n ? `<div class="flex gap-1"><span class="text-gray-400">명의:</span><span class="px-1 bg-gray-100 rounded text-[10px]">${escapeHtml(g || '')}</span><span class="font-medium">${escapeHtml(n)}</span></div>` : '';
        }).filter(Boolean).join('');

        const batchKey = escapeHtml(String(m.class_d1_id || ''));
        const memId = escapeHtml(String(m.member_id || ''));

        detail.innerHTML = `
            <div class="mb-3 pb-2 border-b border-gray-100">
                <div class="flex items-center gap-2 mb-1 flex-wrap">
                    <span class="font-bold text-sm text-gray-800">${escapeHtml(m.member_name || '-')}</span>
                    <span class="px-1.5 py-0.5 rounded text-[10px] font-bold ${remBg}">잔여: ${remaining}회 (${attended} / ${totalLoop})</span>
                </div>
                <div class="text-[11px] text-gray-500 space-y-0.5 mt-1">
                    <div class="flex gap-1"><span class="text-gray-400">전화:</span><span>${escapeHtml(m.phone || '-')}</span></div>
                    <div class="flex gap-1"><span class="text-gray-400">구분:</span><span>${escapeHtml(m.gubun || '-')}</span></div>
                    <div class="flex gap-1"><span class="text-gray-400">상태:</span><span class="font-semibold ${statusColor_(m.member_status)} px-1 rounded text-[10px]">${escapeHtml(m.member_status || '-')}</span></div>
                    ${nameRows}
                </div>
            </div>
            <div>
                <div class="text-[10px] font-bold text-gray-500 mb-1">비고 <span class="font-normal text-gray-400">(remark1)</span></div>
                <textarea id="summaryRemarkInput" class="w-full border border-gray-200 rounded px-2 py-1 text-xs resize-none focus:outline-none focus:border-blue-400" rows="9" placeholder="비고를 입력하세요">${escapeHtml(m.remark1 || '')}</textarea>
                <button onclick="saveSummaryRemark_('${memId}','${batchKey}')" class="mt-1 w-full py-1 bg-indigo-600 hover:bg-indigo-700 text-white text-xs rounded font-semibold">저장</button>
            </div>
            <div class="mt-3 pt-2 border-t border-gray-200 hidden">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] font-bold text-gray-500">💬 카카오 메시지</span>
                    <button onclick="sendD1MemberKakao_()" class="px-2 py-1 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 text-xs font-bold rounded">💬카톡</button>
                </div>
                <div class="flex flex-wrap gap-0.5 border-b border-gray-200 mb-1" id="d1member-kakao-tabs-container"></div>
                <div id="d1member-kakao-name-row" class="py-1"></div>
                <textarea id="d1member-template-textarea" rows="5" readonly class="w-full px-2 py-1 border border-blue-200 rounded text-xs font-mono bg-blue-50 focus:outline-none"></textarea>
            </div>`;
    }

    // 시간 드롭다운 헬퍼
    function getDropdownTime_(prefix) {
        const ampm = document.getElementById(prefix + '-ampm')?.value || 'AM';
        const h = parseInt(document.getElementById(prefix + '-h')?.value) || 12;
        const m = document.getElementById(prefix + '-m')?.value || '00';
        let hour24 = h;
        if (ampm === 'AM') { hour24 = (h === 12) ? 0 : h; }
        else { hour24 = (h === 12) ? 12 : h + 12; }
        return String(hour24).padStart(2, '0') + ':' + m;
    }
    function setDropdownTime_(prefix, timeStr) {
        if (!timeStr) return;
        const parts = String(timeStr).split(':');
        const hour24 = parseInt(parts[0]) || 0;
        const min = parts[1] ? parts[1].substring(0, 2) : '00';
        const minNum = parseInt(min) || 0;
        const minRounded = String(Math.floor(minNum / 10) * 10).padStart(2, '0');
        const ampm = hour24 < 12 ? 'AM' : 'PM';
        let h12 = hour24 % 12;
        if (h12 === 0) h12 = 12;
        const ampmEl = document.getElementById(prefix + '-ampm');
        const hEl = document.getElementById(prefix + '-h');
        const mEl = document.getElementById(prefix + '-m');
        if (ampmEl) ampmEl.value = ampm;
        if (hEl) hEl.value = String(h12);
        if (mEl) mEl.value = minRounded;
    }

        const rightMemberCount = document.getElementById('genD1-memberCount');

        document.getElementById('genD1-startDate').value = '';
        ['prev-genD1-startLoop', 'prev-genD1-endLoop', 'prev-genD1-addCount'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
        document.getElementById('prev-genD1-startDate').value = '';
        document.getElementById('prev-genD1-loopUnit').value = '1';
        ['prev-genD1-timeFrom-ampm', 'prev-genD1-timeTo-ampm'].forEach(id => { const el = document.getElementById(id); if (el) el.value = 'AM'; });
        ['prev-genD1-timeFrom-h', 'prev-genD1-timeTo-h'].forEach(id => { const el = document.getElementById(id); if (el) el.value = '1'; });
        ['prev-genD1-timeFrom-m', 'prev-genD1-timeTo-m'].forEach(id => { const el = document.getElementById(id); if (el) el.value = '00'; });
        ['prev-genD1-bidStarttime-day', 'prev-genD1-bidDatetime1-day', 'prev-genD1-bidDatetime2-day'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
        ['prev-genD1-bid1Count', 'prev-genD1-bid2Count'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });

        // 이전 배치 드롭다운 채우기
        const batchSel = document.getElementById('genD1-prevBatch');
        batchSel.innerHTML = '<option value="">-- 배치 선택 --</option>';
        d1Batches.forEach((b, i) => {
            const items = b.items || [];
            const sorted = items.slice().sort((a, c) => String(a.class_date).localeCompare(String(c.class_date)));
            function fd(d) { const s = String(d || '').replace(/-/g, ''); return s.length >= 8 ? s.substring(4, 6) + '/' + s.substring(6, 8) : s; }
            const label = items.length > 0
                ? (fd(sorted[0]?.class_date) + ' ~ ' + fd(sorted[sorted.length - 1]?.class_date) + ' (' + items.length + '회)')
                : ('배치 ' + (i + 1));
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = label;
            batchSel.appendChild(opt);
        });
        // 현재 선택된 배치를 기본값으로 설정

        const prevTeacherEl = document.getElementById('prev-genD1-teacherId');
        if (prevTeacherEl) prevTeacherEl.value = '';
    }

    function handleEditD1Batch() {
        const teacherId = document.getElementById('editD1-teacherId')?.value || '';
        if (!teacherId) { showStatus('강사를 선택하세요.', 'error'); document.getElementById('editD1-teacherId').focus(); return; }
        const batch = d1Batches[d1BatchIdx];
        if (!batch) { showStatus('배치를 선택하세요.', 'error'); return; }
        const classD1Ids = (batch.items || []).map(d => d.class_d1_id);
        const timeFrom = getDropdownTime_('editD1-timeFrom');
        const timeTo = getDropdownTime_('editD1-timeTo');
        const bidStarttimeDay = document.getElementById('editD1-bidStarttime-day')?.value ?? '';
        const bidDatetime1Day = document.getElementById('editD1-bidDatetime1-day')?.value ?? '';
        const bidDatetime2Day = document.getElementById('editD1-bidDatetime2-day')?.value ?? '';
        const bid1Count = document.getElementById('editD1-bid1Count')?.value || '';
        const bid2Count = document.getElementById('editD1-bid2Count')?.value || '';

        const updateData = { teacher_id: teacherId };
        if (timeFrom && timeFrom !== '00:00') updateData.class_time_from = timeFrom;
        if (timeTo && timeTo !== '00:00') updateData.class_time_to = timeTo;
        if (bid1Count) updateData['1cha_bid'] = parseInt(bid1Count);
        if (bid2Count) updateData['2cha_bid'] = parseInt(bid2Count);

        // 입찰시간: day값이 있으면 각 회차의 class_date 기준으로 계산은 백엔드에서
        // 여기서는 updateData에 day/time 정보를 담아 전달
        if (bidStarttimeDay !== '') {
            updateData.bidStarttimeDay = bidStarttimeDay;
            updateData.bidStarttimeTime = getDropdownTime_('editD1-bidStarttime') || '00:00';
        }
        if (bidDatetime1Day !== '') {
            updateData.bidDatetime1Day = bidDatetime1Day;
            updateData.bidDatetime1Time = getDropdownTime_('editD1-bidDatetime1') || '00:00';
        }
        if (bidDatetime2Day !== '') {
            updateData.bidDatetime2Day = bidDatetime2Day;
            updateData.bidDatetime2Time = getDropdownTime_('editD1-bidDatetime2') || '00:00';
        }

        closeEditD1BatchModal();
        google.script.run
            .withSuccessHandler(r => {
                if (r.success) { showStatus(r.message, 'success'); loadClassD1Grid(selectedClassId); }
                else showStatus(r.message, 'error');
            })
            .withFailureHandler(e => showStatus(e.message, 'error'))
            .updateClassD1Batch(classD1Ids, updateData);
    }

        const classD1Ids = batch.items.map(d => d.class_d1_id);
        google.script.run
            .withSuccessHandler(r => {
                if (r.success) { showStatus(r.message, 'success'); loadClassD1Grid(selectedClassId); }
                else showStatus(r.message, 'error');
            })
            .withFailureHandler(e => showStatus(e.message, 'error'))
            .deleteClassD1Batch(classD1Ids);

    // 이전 배치 가져오기 → 미리보기 영역에 데이터 채우기
    function applyPrevBatch() {
        const batchSel = document.getElementById('genD1-prevBatch');
        const idx = parseInt(batchSel.value);
        if (isNaN(idx) || !d1Batches[idx]) { showStatus('배치를 선택하세요.', 'error'); return; }
        const batch = d1Batches[idx];
        const items = (batch.items || []).slice().sort((a, b) => String(a.class_date).localeCompare(String(b.class_date)));
        if (items.length === 0) { showStatus('배치에 회차 데이터가 없습니다.', 'error'); return; }

        const mode_ = document.getElementById('generateD1Modal')?.dataset?.mode || 'create';

        // 미리보기 영역 + 구분선 표시
        const previewSection = document.getElementById('genD1-previewSection');
        previewSection.classList.remove('hidden');
        const divider = document.getElementById('genD1-previewDivider');
        if (divider) divider.classList.remove('hidden');
        // 오른쪽 패널 왼쪽 패딩 추가
        const rightPanel = previewSection.parentElement?.querySelector('.flex-1.pl-4');
        if (rightPanel) rightPanel.classList.add('pl-4');
        document.getElementById('prev-genD1-loopRange-section').classList.toggle('hidden', mode_ === 'add');
        document.getElementById('prev-genD1-addCount-section').classList.toggle('hidden', mode_ !== 'add');

        // 회차범위
        if (mode_ === 'create') {
            document.getElementById('prev-genD1-startLoop').value = Number(items[0].class_loop) || 1;
            document.getElementById('prev-genD1-endLoop').value = Number(items[items.length - 1].class_loop) || 10;
        } else {
            document.getElementById('prev-genD1-addCount').value = '1';
        }

        // 수업시간
        const normTime_ = v => {
            const s = String(v);
            if (s.includes(':')) return s;
            const h = parseInt(s);
            return isNaN(h) ? '' : String(h).padStart(2, '0') + ':00';
        };
        const tf = items[0].class_time_from || '';
        const tt = items[0].class_time_to || '';
        if (tf) setDropdownTime_('prev-genD1-timeFrom', normTime_(tf));
        if (tt) setDropdownTime_('prev-genD1-timeTo', normTime_(tt));

        // 입찰시간 역산
        function extractBidOffset(classDateRaw, bidDatetimeStr) {
            if (!bidDatetimeStr || !classDateRaw) return { day: '', time: '' };
            const baseDate = new Date(classDateRaw.substring(0, 4) + '-' + classDateRaw.substring(4, 6) + '-' + classDateRaw.substring(6, 8));
            const bidDate = new Date(String(bidDatetimeStr).replace('T', ' '));
            if (isNaN(baseDate) || isNaN(bidDate)) return { day: '', time: '' };
            const dayOffset = Math.round((bidDate - baseDate) / 86400000);
            const hh = String(bidDate.getHours()).padStart(2, '0');
            const mm = String(bidDate.getMinutes()).padStart(2, '0');
            return { day: String(dayOffset), time: hh + ':' + mm };
        }
        const firstItem = items[0];
        const classDateRaw = String(firstItem.class_date || '').replace(/-/g, '');
        const bs = extractBidOffset(classDateRaw, firstItem.bid_starttime);
        document.getElementById('prev-genD1-bidStarttime-day').value = bs.day;
        if (bs.time) setDropdownTime_('prev-genD1-bidStarttime', bs.time);

        const b1 = extractBidOffset(classDateRaw, firstItem.bid_datetime_1);
        document.getElementById('prev-genD1-bidDatetime1-day').value = b1.day;
        if (b1.time) setDropdownTime_('prev-genD1-bidDatetime1', b1.time);

        const b2 = extractBidOffset(classDateRaw, firstItem.bid_datetime_2);
        document.getElementById('prev-genD1-bidDatetime2-day').value = b2.day;
        if (b2.time) setDropdownTime_('prev-genD1-bidDatetime2', b2.time);

        // 선택개수 (1cha_bid, 2cha_bid)
        document.getElementById('prev-genD1-bid1Count').value = firstItem['1cha_bid'] || '';
        document.getElementById('prev-genD1-bid2Count').value = firstItem['2cha_bid'] || '';

        // 마지막 수업일: 이전 배치의 실제 마지막 날짜 그대로 표시
        const lastItem = items[items.length - 1];
        const lastDateRaw = String(lastItem.class_date || '').replace(/-/g, '');
        if (lastDateRaw.length >= 8) {
            const yyyy = lastDateRaw.substring(0, 4);
            const mm = lastDateRaw.substring(4, 6);
            const dd = lastDateRaw.substring(6, 8);
            document.getElementById('prev-genD1-startDate').value = `${yyyy}-${mm}-${dd}`;
        }
        document.getElementById('prev-genD1-loopUnit').value = document.getElementById('genD1-loopUnit')?.value || '1';

        // 강사 - 왼쪽 패널에 이전 배치 강사 세팅
        const prevTeacherSel = document.getElementById('prev-genD1-teacherId');
        if (prevTeacherSel && firstItem.teacher_id) prevTeacherSel.value = String(firstItem.teacher_id);

        // 마지막 회차 회원 로드 (세션 날짜 포함 전달 → 날짜 기반 잔여 계산용)
        loadPreviewMembers_(String(lastItem.class_d1_id), items);
        showStatus('가져오기 완료', 'success');
    }

    // 왼쪽 필드만 오른쪽으로 동기화 (회원 제외 - 가져오기 시 자동 호출)
    function syncGenD1Fields_() {
        const mode = document.getElementById('generateD1Modal')?.dataset?.mode || 'create';
        if (mode === 'create') {
            const sl = document.getElementById('prev-genD1-startLoop'); if (sl) document.getElementById('genD1-startLoop').value = sl.value;
            const el = document.getElementById('prev-genD1-endLoop'); if (el) document.getElementById('genD1-endLoop').value = el.value;
        } else {
            const ac = document.getElementById('prev-genD1-addCount'); if (ac) document.getElementById('genD1-addCount').value = ac.value;

        const lu = document.getElementById('prev-genD1-loopUnit'); if (lu) document.getElementById('genD1-loopUnit').value = lu.value;
        ['ampm', 'h', 'm'].forEach(k => {
            const f = document.getElementById(`prev-genD1-timeFrom-${k}`); const rf = document.getElementById(`genD1-timeFrom-${k}`); if (f && rf) rf.value = f.value;
            const t = document.getElementById(`prev-genD1-timeTo-${k}`); const rt = document.getElementById(`genD1-timeTo-${k}`); if (t && rt) rt.value = t.value;
        });
        ['day', 'ampm', 'h', 'm'].forEach(k => {
            ['bidStarttime', 'bidDatetime1', 'bidDatetime2'].forEach(bid => {
                const p = document.getElementById(`prev-genD1-${bid}-${k}`); const r = document.getElementById(`genD1-${bid}-${k}`); if (p && r) r.value = p.value;
            });
        });
        const b1 = document.getElementById('prev-genD1-bid1Count'); if (b1) document.getElementById('genD1-bid1Count').value = b1.value;
        const b2 = document.getElementById('prev-genD1-bid2Count'); if (b2) document.getElementById('genD1-bid2Count').value = b2.value;

    // 회원 목록 공통 렌더 (prev/right 양쪽 사용)
    // prevBatchItems: 이전 배치 세션 배열 [{class_date, class_loop, ...}]
    //   → renderD1SummaryGrid와 동일한 날짜 기반 잔여 계산
    function renderMemberGrid_(members, listEl, cbClass, rowClass, selectAllId, prevBatchItems) {
        if (!members || members.length === 0) {
            listEl.innerHTML = '<div class="p-2 text-xs text-gray-400 text-center">등록된 회원 없음</div>';
            return;
        }

        // 날짜 기반 잔여 계산 준비 (renderD1SummaryGrid와 동일 로직)
        const batchSessions = Array.isArray(prevBatchItems) && prevBatchItems.length > 0
            ? prevBatchItems.slice().sort((a, b) => Number(a.class_loop) - Number(b.class_loop))
            : [];
        const todayStr = (function() {
            const n = new Date();
            return String(n.getFullYear()) + String(n.getMonth()+1).padStart(2,'0') + String(n.getDate()).padStart(2,'0');
        })();
        const totalLoop = batchSessions.length;

        listEl.innerHTML = members.map(m => {
            const status = m.member_status || '';
            let remaining;
            if (totalLoop > 0) {
                // 이월 잔여 = 배치 총 회차 - 이번 배치에서 참석한/예정인 회차(X 아닌 것)
                // 예) 8회차 합류(1~7=X, 8~10=O): 10 - 3 = 7 → 다음 배치에 7회 이월
                let nonX = 0;
                for (let i = 0; i < batchSessions.length; i++) {
                    const val = String(m['no_' + batchSessions[i].class_loop] || '').trim().toUpperCase();
                    if (val !== 'X') nonX++;
                }
                remaining = Math.max(0, totalLoop - nonX);
            } else {
                // 날짜 정보 없을 때 fallback
                remaining = 0;
            }
            const statusDisp = status || '-';
            return `<label class="grid items-center gap-1 px-2 py-1 text-[10px] cursor-pointer hover:bg-indigo-50 ${rowClass}" style="grid-template-columns:20px 1fr 1fr 1fr 1fr">
                <input type="checkbox" class="${cbClass} rounded" value="${m.member_id}"
                    data-status="${escapeHtml(status)}" data-remaining="${remaining}" checked>
                <span class="font-medium truncate">${escapeHtml(m.member_name || '-')}</span>
                <span class="text-gray-500 truncate">${m.phone || '-'}</span>
                <span class="text-indigo-600 text-[10px]">${escapeHtml(statusDisp)}</span>
                <span class="text-gray-500">${remaining}</span>
            </label>`;
        }).join('');
        const allChk = document.getElementById(selectAllId);
        if (allChk) allChk.checked = true;
    }

    // 마지막 회차 회원을 미리보기 영역에 로드
    // prevBatchItems: 이전 배치 세션 배열 (날짜 기반 잔여 계산용)
    function loadPreviewMembers_(lastD1Id, prevBatchItems) {
        const memberList = document.getElementById('prev-genD1-memberList');
        const memberSection = document.getElementById('prev-genD1-memberSection');
        if (memberSection) memberSection.classList.remove('hidden');

        const batchItems = Array.isArray(prevBatchItems) ? prevBatchItems : [];

        // summaryMemberData_에 이미 데이터가 있으면 재사용 (GAS 호출 없음)
        if (summaryMemberData_ && summaryMemberData_.length > 0) {
            renderMemberGrid_(summaryMemberData_, memberList, 'prev-genD1-member-cb', 'prev-genD1-member-row', 'prev-genD1-memberSelectAll', batchItems);
            return;
        }

        // 없으면 GAS에서 로드
        const batchKey = getD1BatchKey_(String(lastD1Id));
        memberList.innerHTML = '<div class="p-2 text-xs text-gray-400 text-center">불러오는 중...</div>';
        google.script.run
            .withSuccessHandler(function (members) {
                renderMemberGrid_(members, memberList, 'prev-genD1-member-cb', 'prev-genD1-member-row', 'prev-genD1-memberSelectAll', batchItems);
            })
            .withFailureHandler(function () {
                memberList.innerHTML = '<div class="p-2 text-xs text-red-400 text-center">로드 실패</div>';
            })
            .readMemberClassDetailsByBatchKey(batchKey);
    }

    function loadGenD1Members_(d1Ids) {
        const memberSection = document.getElementById('genD1-memberSection');
        const memberList = document.getElementById('genD1-memberList');
        memberList.innerHTML = '<div class="p-2 text-xs text-gray-400 text-center">불러오는 중...</div>';
        memberSection.classList.remove('hidden');

        function renderMembers(members) {
            if (!members || members.length === 0) {
                memberList.innerHTML = '<div class="p-2 text-xs text-gray-400 text-center">회원 없음</div>';
                return;
            }
            // 선택된 배치 회차에 등록('Y')된 회원만 필터
            const filtered = members.filter(m =>
                d1Ids.some(id => m.attendance && m.attendance[id] === 'Y')
            );
            if (filtered.length === 0) {
                memberList.innerHTML = '<div class="p-2 text-xs text-gray-400 text-center">등록된 회원 없음</div>';
                return;
            }
            // 현재 선택된 수업 정보
            const cls = allClassesData.find(c => String(c.class_id) === String(selectedClassId)) || {};
            const clsInfo = [cls.class_name, cls.class_grade ? `[${cls.class_grade}]` : '', cls.class_loc ? `(${cls.class_loc})` : ''].filter(Boolean).join(' ');
            // d1List를 d1Id→{class_loop, class_date} 맵으로 변환
            const d1Map = {};
            (allClassD1SummaryData.d1List || []).forEach(d => { d1Map[String(d.class_d1_id)] = d; });

            memberList.innerHTML = filtered.map(m => {
                // 해당 배치 d1Ids 중 attendance='Y'인 것만
                const attIds = d1Ids.filter(id => m.attendance && m.attendance[id] === 'Y');
                // 회차정보: loop번호들 쉼표 구분
                const loopNos = attIds.map(id => d1Map[id]?.class_loop).filter(Boolean).sort((a, b) => Number(a) - Number(b));
                const loopStr = loopNos.length ? loopNos.map(n => n + '회').join(', ') : '-';
                // 마지막 수업날짜
                const lastDate = attIds.map(id => String(d1Map[id]?.class_date || '').replace(/-/g, '')).filter(Boolean).sort().pop() || '';
                const lastDateDisp = lastDate.length >= 8 ? lastDate.substring(2, 4) + '/' + lastDate.substring(4, 6) + '/' + lastDate.substring(6, 8) : '-';
                // 수업정보 포맷
                const stuInfo = `ID:${m.member_id} | ${m.phone || ''} | ${escapeHtml(m.name1 || m.member_name || '')} - ${escapeHtml(clsInfo)}`;
                return `<label class="grid items-center gap-1 px-2 py-1 text-[10px] cursor-pointer hover:bg-indigo-50 genD1-member-row" style="grid-template-columns:20px 1fr 2fr 1fr 1fr">
                    <input type="checkbox" class="genD1-member-cb rounded" value="${m.member_id}" checked>
                    <span class="font-medium truncate" title="${escapeHtml(m.member_name || '-')}">${escapeHtml(m.member_name || '-')}</span>
                    <span class="text-gray-500 truncate" title="${stuInfo}">${stuInfo}</span>
                    <span class="text-indigo-600 truncate">${loopStr}</span>
                    <span class="text-gray-500">${lastDateDisp}</span>
                </label>`;
            }).join('');
            document.getElementById('genD1-memberSelectAll').checked = true;
        }

        // 캐시 무시하고 항상 서버에서 최신 데이터 로드 (d1Ids 기준 필터가 핵심)
        google.script.run
            .withSuccessHandler(data => {
                allClassD1SummaryData = data;
                renderMembers(data.members || []);
            })
            .withFailureHandler(() => {
                memberList.innerHTML = '<div class="p-2 text-xs text-red-400 text-center">로드 실패</div>';
            })
            .readAllMembersByClassId(selectedClassId);
    }

    // ================================================================

    function _populateMemregDropdowns() {
        const opts = classDropdownOptions || {};
        const populate = (id, arr, placeholder) => {
            const sel = document.getElementById(id);
            if (!sel) return;
            const cur = sel.value;
            sel.innerHTML = '<option value="">' + placeholder + '</option>';
            (arr || []).forEach(v => {
                const o = document.createElement('option');
                o.value = v; o.textContent = v;
                sel.appendChild(o);
            });
            if (cur) sel.value = cur;
        };
        populate('memreg-search-class-type', opts.class_types, '수업구분');
        populate('memreg-search-class-name', opts.class_names, '수업이름');
        populate('memreg-search-class-grade', opts.class_grades, '수업등급');
        populate('memreg-search-class-loc', opts.class_locs, '지역');
    }

    function resetMemberRegisterSearch() {
        ['memreg-search-name', 'memreg-search-phone'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        ['memreg-search-class-type', 'memreg-search-class-name', 'memreg-search-class-grade', 'memreg-search-class-loc', 'memreg-search-gubun'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        filterMembersRegister();
    }

    function filterMembersRegister() {
        const nameKw = (document.getElementById('memreg-search-name')?.value || '').toLowerCase();
        const phoneKw = (document.getElementById('memreg-search-phone')?.value || '').replace(/[^0-9]/g, '');
        const gubunKw = document.getElementById('memreg-search-gubun')?.value || '';
        const classTypeKw = document.getElementById('memreg-search-class-type')?.value || '';
        const classNameKw = document.getElementById('memreg-search-class-name')?.value || '';
        const classGradeKw = document.getElementById('memreg-search-class-grade')?.value || '';
        const classLocKw = document.getElementById('memreg-search-class-loc')?.value || '';

        const classMap = {};
        allClassesData.forEach(c => { classMap[String(c.class_id)] = c; });

        _memregFilteredData = allMembersNewData.filter(m => {
            const cls = classMap[String(m.class_id)] || {};
            const name = String(m.member_name || '').toLowerCase();
            const phone = String(m.phone || '').replace(/[^0-9]/g, '');
            if (classTypeKw && (cls.class_type || '') !== classTypeKw) return false;
            if (classNameKw && (cls.class_name || '') !== classNameKw) return false;
            if (classGradeKw && (cls.class_grade || '') !== classGradeKw) return false;
            if (classLocKw && (cls.class_loc || '') !== classLocKw) return false;
            if (nameKw && !name.includes(nameKw)) return false;
            if (phoneKw && !phone.includes(phoneKw)) return false;
            if (gubunKw && (m.gubun || '') !== gubunKw) return false;
            return true;
        });

        renderMembersRegisterList(_memregFilteredData, classMap);
    }

            const memberData = memberIds.map(id => ({ id, status: '', remaining: -1 }));
            closeMemberRegisterModal();

            google.script.run

                    if (r.success) loadD1SummaryGrid();

        }

        // 이미 등록된 member_id 수집

        const memberSection = document.getElementById('genD1-memberSection');

        let addedCount = 0;

    function handleGenerateD1() {
        const startDate = document.getElementById('genD1-startDate')?.value?.replace(/-/g, '') || '';
        const loopUnit = document.getElementById('genD1-loopUnit')?.value || '1';
        const startLoop = parseInt(document.getElementById('genD1-startLoop')?.value) || 1;
        const endLoop = parseInt(document.getElementById('genD1-endLoop')?.value) || 10;
        const addCount = parseInt(document.getElementById('genD1-addCount')?.value) || 1;
        const timeFrom = getDropdownTime_('genD1-timeFrom');
        const timeTo = getDropdownTime_('genD1-timeTo');
        const bidStarttimeDay = document.getElementById('genD1-bidStarttime-day')?.value ?? '';
        const bidStarttimeTime = bidStarttimeDay !== '' ? getDropdownTime_('genD1-bidStarttime') : '00:00';
        const bidDatetime1Day = document.getElementById('genD1-bidDatetime1-day')?.value ?? '';
        const bidDatetime1Time = bidDatetime1Day !== '' ? getDropdownTime_('genD1-bidDatetime1') : '00:00';
        const bidDatetime2Day = document.getElementById('genD1-bidDatetime2-day')?.value ?? '';
        const bidDatetime2Time = bidDatetime2Day !== '' ? getDropdownTime_('genD1-bidDatetime2') : '00:00';
        const mode = document.getElementById('generateD1Modal')?.dataset?.mode || 'create';
        const batchTimestamp = document.getElementById('generateD1Modal')?.dataset?.batchKey || '';

        // 필수항목 유효성 검사
        if (mode === 'create') {
            if (!document.getElementById('genD1-startLoop')?.value) { showStatus('시작 회차를 입력하세요.', 'error'); document.getElementById('genD1-startLoop').focus(); return; }
            if (!document.getElementById('genD1-endLoop')?.value) { showStatus('최종 회차를 입력하세요.', 'error'); document.getElementById('genD1-endLoop').focus(); return; }
        } else {
            if (!document.getElementById('genD1-addCount')?.value) { showStatus('추가 생성 회차 수를 입력하세요.', 'error'); document.getElementById('genD1-addCount').focus(); return; }
        }
        if (!startDate) { showStatus('시작일을 입력하세요.', 'error'); document.getElementById('genD1-startDate').focus(); return; }
        const teacherId = document.getElementById('genD1-teacherId')?.value || '';
        if (!teacherId) { showStatus('강사를 선택하세요.', 'error'); document.getElementById('genD1-teacherId').focus(); return; }
        if (!getDropdownTime_('genD1-timeFrom') || getDropdownTime_('genD1-timeFrom') === '00:00') { showStatus('수업 시작 시간을 선택하세요.', 'error'); return; }
        if (mode === 'create' && startLoop > endLoop) { showStatus('시작회차가 최종회차보다 큽니다.', 'error'); return; }

        // 선택된 회원 데이터 (ID + 이전 배치 상태/잔여)
        const memberIds = [];
        const memberData = [];
        document.querySelectorAll('.genD1-member-cb:checked').forEach(cb => {
            memberIds.push(cb.value);
            memberData.push({
                id: String(cb.value),
                status: cb.dataset.status || '',      // '' = 직접등록(신규) → 전체 O
                remaining: parseInt(cb.dataset.remaining) ?? -1  // -1 = 신규
            });
        });
        const totalSessions = mode === 'add' ? addCount : (endLoop - startLoop + 1);
        const bid1Count = parseInt(document.getElementById('genD1-bid1Count')?.value) || null;
        const bid2Count = parseInt(document.getElementById('genD1-bid2Count')?.value) || null;
        const bidOpts = { bidStarttimeDay, bidStarttimeTime, bidDatetime1Day, bidDatetime1Time, bidDatetime2Day, bidDatetime2Time, bid1Count, bid2Count };
        const options = mode === 'add'
            ? { addCount, timeFrom, timeTo, ...bidOpts, batchTimestamp, memberIds, memberData, totalSessions, teacherId }
            : { startLoop, endLoop, timeFrom, timeTo, ...bidOpts, memberIds, memberData, totalSessions, teacherId };

        // 생성 중 팝업 표시
        closeGenerateD1Modal();
        const loadingModal = document.getElementById('d1LoadingModal');
        if (loadingModal) loadingModal.classList.remove('content-hidden');

        google.script.run
            .withSuccessHandler(result => {
                if (loadingModal) loadingModal.classList.add('content-hidden');
                if (result.success) {
                    showStatus(result.message, 'success');
                    loadClassD1Grid(selectedClassId);
                } else {
                    showStatus(result.message, 'error');
                }
            })
            .withFailureHandler(e => {
                if (loadingModal) loadingModal.classList.add('content-hidden');
                showStatus(e.message, 'error');
            })
            .generateClassD1(selectedClassId, startDate, loopUnit, options);
    }

    // ── 물건/회원 카드 ──────────────────────────────────────────────
    var d1PendingItems = []; // 물건 임시 목록 [{id, sakun_no, court, stu_member}]
    var d1ItemsData = [];    // 등록된 물건 조회 결과

    // ─── 물건 선택 모달 ──────────────────────────────────────────────
    // ─── 물건 선택 모달 (클릭→카트 방식) ─────────────────────────────
    let d1PickerCart = []; // { id, sakun_no, court, stu_member, m_name, in-date, m_name_id }
    let d1PickerSortKey_ = 'in-date', d1PickerSortAsc_ = true;

    function showD1ItemPickerModal() {
        if (!selectedClassD1Id || selectedClassD1Id === '__summary__') {

        ['d1picker-date','d1picker-sakun','d1picker-court','d1picker-member','d1picker-regdate'].forEach(id => {

    function closeD1ItemPickerModal(e) {
        if (e && e.target !== e.currentTarget) return;
        document.getElementById('d1ItemPickerModal')?.classList.add('content-hidden');
    }

    function renderD1ItemPickerList() {
        const tbody = document.getElementById('d1ItemPickerTbody');
        if (!tbody) return;
        const fDate   = (document.getElementById('d1picker-date')?.value    || '').replace(/-/g,'').trim();
        const fSakun  = (document.getElementById('d1picker-sakun')?.value   || '').toLowerCase().trim();
        const fCourt  = (document.getElementById('d1picker-court')?.value   || '').toLowerCase().trim();
        const fStatus = (document.getElementById('d1picker-status')?.value  || '').trim();
        const fMember = (document.getElementById('d1picker-member')?.value  || '').toLowerCase().trim();
        const fRegdate= (document.getElementById('d1picker-regdate')?.value || '').replace(/-/g,'').trim();
        const fMgr    = (document.getElementById('d1picker-manager')?.value || '').trim();
        const fCtype  = (document.getElementById('d1picker-class-type')?.value || '').trim();

        const _td = new Date(); const todayStr = String(_td.getFullYear()).substring(2) + String(_td.getMonth()+1).padStart(2,'0') + String(_td.getDate()).padStart(2,'0');
        const filtered = (allBiddingData || []).filter(it => {
            const rawDate = String(it['in-date']||'').replace(/-/g,'');
            if (!rawDate || rawDate < todayStr) return false;                                 // 오늘 이후만 (yyMMdd 비교)
            if (fDate   && !rawDate.includes(fDate))                                          return false;
            if (fSakun  && !String(it.sakun_no||'').toLowerCase().includes(fSakun))          return false;
            if (fCourt  && !String(it.court||'').toLowerCase().includes(fCourt))              return false;
            if (fStatus && String(it.stu_member||'').trim() !== fStatus)                      return false;
            if (fMember && !String(it.m_name||'').toLowerCase().includes(fMember))            return false;
            if (fRegdate&& !String(it.reg_date||'').replace(/-/g,'').includes(fRegdate))      return false;
            if (fMgr    && String(it.m_name_id||'').trim() !== fMgr)                          return false;
            if (fCtype  && String(it.class_type||'').trim() !== fCtype)                       return false;
            return true;
        });

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center text-gray-400 text-xs">조회 결과가 없습니다.</td></tr>';
            return;
        }

        filtered.sort((a, b) => {
            const va = String(a[d1PickerSortKey_] || '');
            const vb = String(b[d1PickerSortKey_] || '');
            return d1PickerSortAsc_ ? va.localeCompare(vb) : vb.localeCompare(va);
        });
        // 정렬 화살표 갱신
        ['date','sakun','court','status','member','mgr'].forEach(k => {
            const el = document.getElementById('dpk-sort-' + k);
            if (el) el.textContent = '';
        });
        const keyMap = {'in-date':'date','sakun_no':'sakun','court':'court','stu_member':'status','m_name':'member','m_name_id':'mgr'};
        const arrowEl = document.getElementById('dpk-sort-' + (keyMap[d1PickerSortKey_] || ''));
        if (arrowEl) arrowEl.textContent = d1PickerSortAsc_ ? ' ↑' : ' ↓';

        tbody.innerHTML = filtered.map(it => {
            const inCart    = d1PickerCart.some(c => String(c.id) === String(it.id));
            const alreadyIn = String(it.class_d1_id||'') === String(selectedClassD1Id||'');
            const imgDot = (it.image_ids || it.image_id)
                ? '<span class="inline-block w-2.5 h-2.5 rounded-full bg-green-500"></span>' : '';
            const statusCls = getStatusTagClass ? getStatusTagClass(it.stu_member) : '';
            const rowBg = inCart ? 'bg-indigo-50 border-l-4 border-indigo-400'

            const cursor = alreadyIn ? 'cursor-not-allowed' : 'cursor-pointer hover:bg-indigo-50';
            return `<tr class="${cursor} transition-colors ${rowBg}"
                onclick="${alreadyIn ? '' : `d1PickerClickRow('${it.id}')`}"
                title="${alreadyIn ? '이미 이 회차에 등록된 물건' : '클릭하면 우측에 추가됩니다'}">
                <td class="item-col-date text-center text-gray-600 whitespace-nowrap">${escapeHtml(it['in-date']||'')}</td>
                <td class="item-col-img text-center">${imgDot}</td>
                <td class="item-col-sakun text-left font-medium ${inCart?'text-indigo-700':'text-gray-800'}">${escapeHtml(it.sakun_no||'')}</td>
                <td class="item-col-court text-left text-gray-600">${escapeHtml(it.court||'')}</td>

    function confirmD1ItemPicker() {
        if (d1PickerCart.length === 0) { showStatus('선택된 물건이 없습니다.', 'error'); return; }

        const d1Info = allClassD1Data.find(d => String(d.class_d1_id) === String(selectedClassD1Id));
        const className = d1Info ? [d1Info.class_type, d1Info.class_name].filter(Boolean).join('') : '';

    function showD1ItemRegisterPanel() {
        if (!selectedClassD1Id || selectedClassD1Id === '__summary__') {
            showStatus('먼저 회차를 선택하세요.', 'error');
            return;
        }
        const panel = document.getElementById('d1ItemRegisterPanel');
        if (!panel) return;
        panel.classList.toggle('content-hidden');
        if (!panel.classList.contains('content-hidden')) {
            d1PendingItems = [];
            renderD1PendingItems_();
            const input = document.getElementById('d1-item-search');
            if (input) { input.value = ''; setTimeout(() => input.focus(), 100); }
        }

    function searchD1Items() {
        const kw = (document.getElementById('d1-item-search')?.value || '').trim().toLowerCase();
        const dropdown = document.getElementById('d1-item-dropdown');
        if (!dropdown) return;
        if (kw.length < 2) { dropdown.classList.add('hidden'); return; }

        const results = allBiddingData.filter(it => {
            const sakun = String(it.sakun_no || '').toLowerCase();
            return sakun.includes(kw);
        }).slice(0, 20);

        if (results.length === 0) { dropdown.classList.add('hidden'); return; }

        dropdown.innerHTML = results.map(it => {
            const alreadyPending = d1PendingItems.some(p => String(p.id) === String(it.id));
            const alreadyIn = String(it.class_d1_id || '') === String(selectedClassD1Id || '');
            const disabled = alreadyPending || alreadyIn;
            const label = alreadyIn ? ' (등록됨)' : alreadyPending ? ' (추가됨)' : '';
            return `<div class="px-3 py-1.5 text-sm cursor-pointer hover:bg-indigo-50 ${disabled ? 'text-gray-400' : 'text-gray-800'}"
                onclick="${disabled ? '' : `addD1PendingItem('${it.id}')`}">
                ${escapeHtml(it.sakun_no || '')} <span class="text-xs text-gray-400">${escapeHtml(it.court || '')}</span>${label}
            </div>`;
        }).join('');
        dropdown.classList.remove('hidden');
    }

    function addD1PendingItem(itemId) {
        const item = allBiddingData.find(it => String(it.id) === String(itemId));
        if (!item) return;
        if (d1PendingItems.some(p => String(p.id) === String(itemId))) return;
        d1PendingItems.push({ id: item.id, sakun_no: item.sakun_no, court: item.court, stu_member: item.stu_member });
        renderD1PendingItems_();
        const input = document.getElementById('d1-item-search');
        const dropdown = document.getElementById('d1-item-dropdown');
        if (input) input.value = '';
        if (dropdown) dropdown.classList.add('hidden');
    }

    function removeD1PendingItem(itemId) {
        d1PendingItems = d1PendingItems.filter(p => String(p.id) !== String(itemId));
        renderD1PendingItems_();
    }

    function renderD1PendingItems_() {
        const el = document.getElementById('d1-item-pending-list');
        if (!el) return;
        if (d1PendingItems.length === 0) {
            el.innerHTML = '<div class="text-xs text-gray-400 text-center py-1">추가할 물건을 검색하세요</div>';
            return;
        }
        el.innerHTML = d1PendingItems.map(p => `
            <div class="flex items-center justify-between bg-white rounded px-2 py-1 text-xs border border-gray-200">
                <span class="text-gray-700">${escapeHtml(p.sakun_no || '')} <span class="text-gray-400">${escapeHtml(p.court || '')}</span></span>
                <button type="button" onclick="removeD1PendingItem('${p.id}')" class="text-red-400 hover:text-red-600 ml-2">✕</button>
            </div>`).join('');

        if (!selectedClassD1Id || selectedClassD1Id === '__summary__') { showStatus('회차를 선택하세요.', 'error'); return; }
        if (d1PendingItems.length === 0) { showStatus('등록할 물건을 추가하세요.', 'error'); return; }

        // 현재 선택된 회차 정보에서 수업명/날짜 추출
        const d1Info = allClassD1Data.find(d => String(d.class_d1_id) === String(selectedClassD1Id));
        const className = d1Info ? [d1Info.class_type, d1Info.class_name].filter(Boolean).join('') : '';
        const classDate = d1Info ? String(d1Info.class_date || '').replace(/-/g, '') : '';
        const classLoop = d1Info ? (d1Info.class_loop || '') : '';
        const itemIds = d1PendingItems.map(p => p.id);

        google.script.run
            .withSuccessHandler(r => {

                    showStatus(r.message, 'success');

                    renderD1PendingItems_();

                    showStatus(r.message, 'error');
                }
            })

                    <th class="px-2 py-1.5 text-center font-bold text-gray-600 cursor-pointer hover:bg-gray-100 select-none" onclick="d1ItemsSort_('stu_member')">상태${arrow('stu_member')}</th>
                    <th class="px-2 py-1.5 text-center font-bold text-gray-600 cursor-pointer hover:bg-gray-100 select-none" onclick="d1ItemsSort_('m_name_id')">담당${arrow('m_name_id')}</th>

    // ── 수업정보 카드 드래그 폭/높이 조절 + localStorage 저장 ──────
    (function initCsdDragResize() {
        const LS_LIST = 'csd_list_pane_width';
        const LS_CARD = 'csd_item_card_width';

        function makeDraggable(dividerId, leftElId, rightElId, lsKey, minLeft, minRight) {
            function setup() {
                const divider = document.getElementById(dividerId);
                const leftEl = document.getElementById(leftElId);
                if (!divider || !leftEl) return;

                // localStorage 복원
                const saved = localStorage.getItem(lsKey);
                if (saved) leftEl.style.width = saved;

                let dragging = false, startX = 0, startWidth = 0;

                divider.addEventListener('mousedown', e => {
                    dragging = true;
                    startX = e.clientX;
                    startWidth = leftEl.getBoundingClientRect().width;
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    e.preventDefault();
                });

                document.addEventListener('mousemove', e => {
                    if (!dragging) return;
                    const parent = leftEl.parentElement;
                    if (!parent) return;
                    const containerWidth = parent.getBoundingClientRect().width;
                    const delta = e.clientX - startX;
                    const newWidth = Math.min(Math.max(startWidth + delta, minLeft), containerWidth - minRight);
                    leftEl.style.width = newWidth + 'px';
                });

                document.addEventListener('mouseup', () => {
                    if (!dragging) return;
                    dragging = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    // 저장
                    localStorage.setItem(lsKey, leftEl.style.width);
                });
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', setup);
            } else {
                setup();
            }
        }

        // 세로 조절용 헬퍼 (위-아래)
        function makeDraggableHeight(dividerId, targetElId, otherElId, lsKey, minTarget, minOther, isBottomTarget = false) {
            function setup() {
                const divider = document.getElementById(dividerId);
                const targetEl = document.getElementById(targetElId);
                if (!divider || !targetEl) return;

                // localStorage 복원
                const saved = localStorage.getItem(lsKey);
                if (saved) targetEl.style.height = saved;

                let dragging = false, startY = 0, startHeight = 0;

                divider.addEventListener('mousedown', e => {
                    dragging = true;
                    startY = e.clientY;
                    startHeight = targetEl.getBoundingClientRect().height;
                    document.body.style.cursor = 'row-resize';
                    document.body.style.userSelect = 'none';
                    e.preventDefault();
                });

                document.addEventListener('mousemove', e => {
                    if (!dragging) return;
                    const parent = targetEl.parentElement;
                    if (!parent) return;
                    const containerHeight = parent.getBoundingClientRect().height;
                    const delta = e.clientY - startY;
                    const sign = isBottomTarget ? -1 : 1;
                    const newHeight = Math.min(Math.max(startHeight + (delta * sign), minTarget), containerHeight - minOther);
                    targetEl.style.height = newHeight + 'px';
                });

                document.addEventListener('mouseup', () => {
                    if (!dragging) return;
                    dragging = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    // 저장
                    localStorage.setItem(lsKey, targetEl.style.height);
                });
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', setup);
            } else {
                setup();
            }
        }

        function makeDraggableWidth(dividerId, rightPanelId, lsKey, minLeft, minRight) {
            const divider = document.getElementById(dividerId);
            const rightEl = document.getElementById(rightPanelId);
            if (!divider || !rightEl) return;
            const saved = localStorage.getItem(lsKey);
            if (saved) rightEl.style.width = saved;
            let dragging = false, startX = 0, startW = 0;
            divider.addEventListener('mousedown', e => {
                dragging = true; startX = e.clientX; startW = rightEl.getBoundingClientRect().width;
                document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; e.preventDefault();
            });
            document.addEventListener('mousemove', e => {
                if (!dragging) return;
                const container = rightEl.parentElement;
                if (!container) return;
                const containerW = container.getBoundingClientRect().width;
                const newW = Math.min(Math.max(startW - (e.clientX - startX), minRight), containerW - minLeft);
                rightEl.style.width = newW + 'px';
            });
            document.addEventListener('mouseup', () => {
                if (!dragging) return;
                dragging = false; document.body.style.cursor = ''; document.body.style.userSelect = '';
                localStorage.setItem(lsKey, rightEl.style.width);
            });
        }

        const LS_BATCH = 'csd_batch_grid_width';
        const LS_SIDEBAR_H = 'csd_sidebar_top_height';
        const LS_ITEM_TAB_H = 'csd_item_tab_top_height';
        const LS_PICKER_RIGHT_W = 'csd_picker_right_width';

        // 1) 사이드바 - 메인 상세 영역 구분 (가로)
        makeDraggable('classScheduleDivider', 'classScheduleListPane', 'classScheduleDetailPane', LS_LIST, 200, 200);

        // 2) 사이드바 내부: 종목리스트 ↔ 수업리스트 (세로)
        // 하단 요소(d1BatchArea)의 높이를 조절하도록 변경하여 리사이징 정합성 확보
        makeDraggableHeight('classScheduleListPaneDivider', 'd1BatchArea', null, LS_SIDEBAR_H, 100, 100, true);

        // 3) 전체요약 그리드 좌우 (회원 상세 탭 내부)
        makeDraggable('d1SummaryDivider', 'd1SummaryLeft', 'd1SummaryRight', 'csd_summary_width', 200, 150);

        // 4) 물건 탭 내부: 회차 카드 ↔ 물건 등록/리스트 (세로)
        makeDraggableHeight('d1ItemTabDivider', 'd1ItemTabCardArea', 'd1ItemCard', LS_ITEM_TAB_H, 80, 120);

        // 5) 물건 선택 모달: 좌/우 패널 가로 리사이즈
        makeDraggableWidth('d1PickerPanelDivider', 'd1PickerRightPanel', LS_PICKER_RIGHT_W, 300, 200);

        // 5) 기타 (레거시 또는 유지보수용)
        // makeDraggable('d1BatchDivider', 'd1BatchListGrid', null, LS_BATCH, 80, 150);
    })();

    // ── D1 전용 자동완성 ──────────────────────────────────────────
    var _d1AcBound = false;
    var _d1AcContainer = null;
    var _d1AcItems = [];
    var _d1AcIdx = 0;
    var _d1AcOpen = false;

    function bindD1MemberAc_() {
        const inputEl = document.getElementById('d1-add-member-name');
        const memberIdEl = document.getElementById('d1-add-member-id');
        if (!inputEl || _d1AcBound) return;
        _d1AcBound = true;

        // 컨테이너 생성
        if (!_d1AcContainer) {
            _d1AcContainer = document.createElement('div');
            _d1AcContainer.style.cssText = 'position:absolute;z-index:99999;display:none;';
            _d1AcContainer.className = 'bg-white border border-gray-200 rounded-lg shadow-lg overflow-auto';
            _d1AcContainer.addEventListener('mousedown', e => e.preventDefault());
            document.body.appendChild(_d1AcContainer);
        }

        inputEl.addEventListener('input', () => {
            memberIdEl.value = '';
            document.getElementById('d1-add-member-info').textContent = '';
            if (inputEl.value.trim()) {
                openD1Ac_(inputEl.value);
            } else {
                closeD1MemberAc_();
            }
        });
        inputEl.addEventListener('focus', () => {
            if (inputEl.value.trim()) openD1Ac_(inputEl.value);
        });
        inputEl.addEventListener('blur', () => setTimeout(closeD1MemberAc_, 200));
        inputEl.addEventListener('keydown', e => {
            if (!_d1AcOpen) return;
            if (e.key === 'ArrowDown') { e.preventDefault(); _d1AcIdx = Math.min(_d1AcIdx + 1, _d1AcItems.length - 1); renderD1Ac_(inputEl); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); _d1AcIdx = Math.max(_d1AcIdx - 1, 0); renderD1Ac_(inputEl); }
            else if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); selectD1AcItem_(_d1AcItems[_d1AcIdx]); }
            else if (e.key === 'Escape') closeD1MemberAc_();
        });
    }

    function openD1Ac_(query) {
        const members = getMemberDataSource_();
        const q = String(query || '').toLowerCase().trim();
        _d1AcItems = [];
        members.forEach(m => {
            const name = String(m.member_name || '').trim();
            if (!name) return;
            if (!q || name.toLowerCase().includes(q)) {
                _d1AcItems.push({ member_id: m.member_id, member_name: name, member: m });
            }
        });
        _d1AcIdx = 0;
        _d1AcOpen = _d1AcItems.length > 0;
        renderD1Ac_(document.getElementById('d1-add-member-name'));
    }

    function renderD1Ac_(inputEl) {
        if (!_d1AcContainer || !inputEl) return;
        if (!_d1AcOpen || _d1AcItems.length === 0) { _d1AcContainer.style.display = 'none'; return; }
        const r = inputEl.getBoundingClientRect();
        _d1AcContainer.style.left = (r.left + window.scrollX) + 'px';
        _d1AcContainer.style.top = (r.bottom + window.scrollY + 4) + 'px';
        _d1AcContainer.style.width = Math.max(260, r.width) + 'px';
        _d1AcContainer.style.maxHeight = '220px';
        _d1AcContainer.style.display = 'block';
        _d1AcContainer.innerHTML = _d1AcItems.map((it, idx) => {
            const m = it.member;
            const classId = String(m.class_id || '').trim();
            const cls = (typeof allClassesData !== 'undefined' && classId)
                ? (allClassesData.find(c => String(c.class_id) === classId) || {}) : {};
            const clsText = cls.class_name ? cls.class_name + (cls.class_loc ? ' (' + cls.class_loc + ')' : '') : '';
            const sub = [m.phone || '', clsText].filter(Boolean).join(' | ');
            const active = idx === _d1AcIdx ? 'bg-indigo-100' : 'hover:bg-indigo-50';
            return '<div data-idx="' + idx + '" class="px-3 py-2 text-sm cursor-pointer ' + active + '">' +
                '<span class="font-medium text-gray-900">' + escapeHtml(it.member_name) + '</span>' +
                (sub ? '<span class="ml-2 text-xs text-gray-400">' + escapeHtml(sub) + '</span>' : '') +
                '</div>';
        }).join('');
        Array.from(_d1AcContainer.querySelectorAll('[data-idx]')).forEach(node => {
            node.addEventListener('mouseenter', () => { _d1AcIdx = parseInt(node.getAttribute('data-idx')); renderD1Ac_(inputEl); });
            node.addEventListener('click', e => { e.stopPropagation(); selectD1AcItem_(_d1AcItems[parseInt(node.getAttribute('data-idx'))]); });
        });
    }

    function showAddMemberToD1Modal() {
        if (!selectedClassId) { showStatus('수업을 선택하세요.', 'error'); return; }
        if (!getCurrentBatchKey_()) { showStatus('배치를 선택하세요.', 'error'); return; }
        _memregCtx_ = 'batch';
        showMemberRegisterModal();
    }

    function selectD1AcItem_(it) {
        if (!it) return;
        const inputEl = document.getElementById('d1-add-member-name');
        const memberIdEl = document.getElementById('d1-add-member-id');
        const infoEl = document.getElementById('d1-add-member-info');
        if (inputEl) inputEl.value = it.member_name;
        if (memberIdEl) memberIdEl.value = it.member_id;

    function addToD1Pending() {
        const memberId = (document.getElementById('d1-add-member-id')?.value || '').trim();
        const memberName = (document.getElementById('d1-add-member-name')?.value || '').trim();
        if (!memberId) { showStatus('회원을 선택하세요.', 'error'); return; }
        if (d1PendingMembers.some(p => p.member_id === memberId)) {
            showStatus('이미 임시목록에 있습니다.', 'error'); return;
        }
        const infoText = (document.getElementById('d1-add-member-info')?.textContent || '');
        d1PendingMembers.push({ member_id: memberId, member_name: memberName, info: infoText });
        renderD1PendingList();
        // 입력 초기화
        const nameEl = document.getElementById('d1-add-member-name');
        const idEl = document.getElementById('d1-add-member-id');
        const infoEl = document.getElementById('d1-add-member-info');
        if (nameEl) nameEl.value = '';
        if (idEl) idEl.value = '';
        if (infoEl) infoEl.textContent = '';
        if (nameEl) nameEl.focus();
    }

    function removeD1Pending(memberId) {
        d1PendingMembers = d1PendingMembers.filter(p => p.member_id !== memberId);
        renderD1PendingList();
    }

    function renderD1PendingList() {
        const wrap = document.getElementById('d1PendingListWrap');
        const list = document.getElementById('d1PendingList');
        if (!wrap || !list) return;
        if (d1PendingMembers.length === 0) {
            wrap.classList.add('content-hidden');
            list.innerHTML = '';
            return;

        wrap.classList.remove('content-hidden');
        list.innerHTML = d1PendingMembers.map(p =>
            '<div class="flex items-center justify-between px-3 py-2 text-sm">' +
            '<div><span class="font-medium text-gray-900">' + escapeHtml(p.member_name) + '</span>' +
            (p.info ? '<span class="ml-2 text-xs text-gray-400">' + escapeHtml(p.info) + '</span>' : '') + '</div>' +
            '<button type="button" onclick="removeD1Pending(\'' + p.member_id + '\')" class="ml-2 text-red-400 hover:text-red-600 text-xs">✕</button>' +
            '</div>'
        ).join('');
    }

    function setupMemberSelectLogic() {

    function handleMemberNameChange(value) {
        if (!value) return;

        let member = null;
        let memberList = [];
        if (typeof allMembersNewData !== 'undefined' && Array.isArray(allMembersNewData)) {
            memberList = allMembersNewData;
        } else if (typeof allMembersData !== 'undefined' && Array.isArray(allMembersData)) {
            memberList = allMembersData;
        }

        // 1. 단순 이름 매칭
        member = memberList.find(m => m.member_name === value.trim());

        if (!member) {
            // 2. 명의 포함 형식 매칭
            const parts = value.split('(');
            if (parts.length > 1) {
                const namePart = parts[0].trim();
                const candidates = memberList.filter(m => m.member_name === namePart);

                member = candidates.find(m => {
                    const myunguis = [
                        m.name1 ? `(${m.name1_gubun || ''}) ${m.name1}` : null,
                        m.name2 ? `(${m.name2_gubun || ''}) ${m.name2}` : null,
                        m.name3 ? `(${m.name3_gubun || ''}) ${m.name3}` : null
                    ];
                    return myunguis.some(suffix => suffix && `${m.member_name} ${suffix}` === value);
                });
            }
        }

        if (member) {
            const formMemberId = document.getElementById('form-member-id');
            if (formMemberId) formMemberId.value = member.member_id || '';

            if (typeof updateMemberTokenInfo === 'function') {
                updateMemberTokenInfo('main');
            }
        }
    }

     */
    function openAuctionUrl() {
        const AUCTION_LOGIN_URL = 'https://www.auction1.co.kr/common/login_box.php';

        // 활성 창(모달 vs 메인 상세)에 따라 데이터 소스 결정
        const modal = document.getElementById('itemDetailModal');
        const isModalOpen = modal && !modal.classList.contains('content-hidden');
        const item = isModalOpen ? currentModalItemData : currentDetailItem;

        const _awin = 'width=896,height=900,left=100,top=50,resizable=yes,scrollbars=yes';
        // auction_id 없으면 무조건 로그인 페이지
        if (!item || !item.auction_id || !String(item.auction_id).trim()) {
            window.open(AUCTION_LOGIN_URL, '_auction', _awin);
            return;
        }

        // 첫 클릭: 로그인 페이지로 이동 (페이지 새로고침 시 초기화)
        if (!_auctionLoginShown) {
            _auctionLoginShown = true;
            window.open(AUCTION_LOGIN_URL, '_auction', _awin);
            showStatus('로그인 페이지를 열었습니다. 로그인 후 다시 [옥션원 가기] 버튼을 클릭하세요.', 'info');
            return;
        }

        const aid = String(item.auction_id).trim();
        const isGongmae = (item.court === '공매' || (item.sakun_no && item.sakun_no.includes('-')));

        // 설정값 확인
        const settings = (typeof auctionSettingsCache !== 'undefined') ? auctionSettingsCache : {};
        const pattern = isGongmae ? (settings.gongmae_pattern || '') : (settings.auction_pattern || '');

        let finalUrl = '';
        if (pattern && pattern.includes('[ID]')) {
            finalUrl = pattern.replace('[ID]', aid);
        } else if (pattern) {
            finalUrl = pattern + aid;
        } else {
            // 기본값 (설정이 없는 경우)
            const defaultBase = isGongmae ?
                'https://www.auction1.co.kr/pubauct/view.php?product_id=' :
                'https://www.auction1.co.kr/auction/ca_view.php?product_id=';
            finalUrl = defaultBase + aid;
        }

        if (finalUrl) {
            window.open(finalUrl, '_auction', _awin);
        } else {
            window.open(AUCTION_LOGIN_URL, '_auction', _awin);
        }
    }

    function loadModalInvestigationImages() {
        const imageList = document.getElementById('modal-investigation-image-list');
        const placeholder = document.getElementById('modal-investigation-placeholder');
        const footer = document.getElementById('modal-investigation-image-ids-footer');

        if (!imageList || !placeholder) return;

        imageList.innerHTML = '';

        // [OPTIMIZE] items 시트의 image_id가 있으면 즉시 1장만 렌더링
        if (currentModalItemData && currentModalItemData.image_id) {
            renderModalImagesByIDs([currentModalItemData.image_id]);
            return;
        }

        imageList.classList.add('content-hidden');
        placeholder.classList.remove('content-hidden');
        placeholder.textContent = '이미지 로딩 중...';

        if (!currentModalItemData || !currentModalItemData.id) {
            placeholder.textContent = '매칭된 이미지 없음';
            if (footer) footer.textContent = '';
            return;
        }

        google.script.run
            .withSuccessHandler(function (rows) {
                if (!rows || rows.length === 0) {
                    placeholder.textContent = '매칭된 이미지 없음';
                    if (footer) footer.textContent = '';
                    return;
                }
                const ids = rows.map(function (r) { return r.image_id; });
                renderModalImagesByIDs(ids, rows);
            })
            .withFailureHandler(function (err) {
                placeholder.textContent = '로딩 실패: ' + (err.message || '');
            })
            .getItemImages(currentModalItemData.id);
    }

    function renderModalImagesByIDs(ids, rowData) {
        const imageList = document.getElementById('modal-investigation-image-list');
        const placeholder = document.getElementById('modal-investigation-placeholder');
        const footer = document.getElementById('modal-investigation-image-ids-footer');

        if (!imageList || !placeholder) return;

        imageList.innerHTML = '';
        placeholder.classList.add('content-hidden');
        imageList.classList.remove('content-hidden');

        if (footer) footer.textContent = 'Image ID: ' + ids.join(', ');

        ids.forEach(function (id, idx) {
            const r = (rowData && rowData[idx]) ? rowData[idx] : { image_id: id };
            const wrap = document.createElement('div');
            wrap.className = 'w-full border border-gray-200 rounded-lg overflow-hidden bg-white capture-target relative';
            const img = document.createElement('img');
            img.className = 'investigation-image-max w-full cursor-pointer';
            img.alt = r.file_name || '이미지';
            img.dataset.id = r.image_id;
            img.dataset.uploader = r.uploader || '';

            if (r.image_id) {
                // [OPTIMIZE] 구글 드라이브 썸네일 URL 사용 (sz=w1000으로 적정화)
                img.src = 'https://drive.google.com/thumbnail?sz=w1000&id=' + encodeURIComponent(r.image_id);

                // 이미지 클릭 시 라이트박스 열기 (새 창 대신 앱 내 확대)
                img.onclick = function () {
                    openLightbox(this.src, r.file_name || '조사 이미지');
                };

                // 우측 상단 다운로드 버튼 추가
                const dlBtn = document.createElement('button');
                dlBtn.className = 'absolute top-2 right-2 p-1.5 bg-black bg-opacity-50 text-white rounded-full hover:bg-opacity-70 transition z-10';
                dlBtn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>';
                dlBtn.title = '다운로드';
                dlBtn.onclick = function (e) {
                    e.stopPropagation();
                    const url = 'https://drive.google.com/uc?export=download&id=' + encodeURIComponent(r.image_id);
                    window.open(url, '_blank');
                };
                wrap.appendChild(dlBtn);
            }
            wrap.appendChild(img);

            // 삭제 버튼 (Member View에서는 숨김)
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'mt-2 mx-2 mb-2 text-red-600 hover:text-red-800 text-sm font-medium';
            if (typeof IS_MEMBER_VIEW !== 'undefined' && IS_MEMBER_VIEW) btn.classList.add('content-hidden');
            btn.textContent = '삭제(X)';
            btn.onclick = function (ev) {
                ev.preventDefault();
                ev.stopPropagation();
                handleModalDeleteItemImage(currentModalItemData.id, r.image_id);
            };
            wrap.appendChild(btn);
            imageList.appendChild(wrap);
        });
    }

    function handleBulkAction() {
        const type = document.getElementById('bulk-action-type').value;
        const cbs = dataTableBody ? dataTableBody.querySelectorAll('input.item-row-cb:checked') : [];

        if (type === 'bid_request') {
            openBidRequestModal(cbs);
            return;
        }

        if (cbs.length === 0) {
            if (typeof showStatus === 'function') showStatus('항목을 먼저 선택해 주세요.', 'warning');
            return;
        }

        if (type === 'status') {
            openBulkStatusModal(cbs);
        } else if (type === 'multi_recommend') {
            openBulkMessageModal(cbs);
        } else if (type === 'delete') {
            handleBulkDelete(idsFromCbs(cbs));
        } else if (type === 'chuchen_new' || type === 'chuchen_done') {
            handleBulkChuchenState(cbs, type === 'chuchen_done' ? '전달완료' : '신규');
        } else if (type === 'bid_state_new' || type === 'bid_state_done' || type === 'bid_state_confirmed') {
            var stateMap = { bid_state_new: '신규', bid_state_done: '전달완료', bid_state_confirmed: '확인완료' };
            handleBulkBidState(cbs, stateMap[type]);
        } else if (type === 'bulk_image_id') {
            openBulkImageIdModal(cbs);
        } else if (type === 'fill_image_id') {
            openFillImageIdModal(cbs);
        } else {
            if (typeof showStatus === 'function') showStatus('작업 유형을 선택해 주세요.', 'warning');
        }
    }

        var filtered = Array.from(cbs).filter(cb => (cb.getAttribute('data-status') || '') === '추천');

        var items = ids.map(function (id) { return allBiddingData.find(function (d) { return String(d.id) === String(id); }) || { id: id }; });
        openBulkApplyConfirmModal(items,

            function () {

                    .withSuccessHandler(function (res) {

    function openBidRequestModal(selectedCbs) {
        const modal = document.getElementById('bulkMessageModal');
        const textarea = document.getElementById('bulk-message-textarea');
        const titleEl = document.getElementById('bulk-message-title');
        if (!modal || !textarea) return;

        if (titleEl) titleEl.textContent = '입찰가 확인 및 요청';

        const ids = idsFromCbs(selectedCbs);
        if (ids.length === 0) {
            showStatus('항목을 먼저 체크해 주세요.', 'warning');
            return;
        }

        const targetItems = allBiddingData.filter(item => ids.includes(String(item.id)));
        if (targetItems.length === 0) {
            showStatus('조건에 맞는 물건이 없습니다.', 'info');
            return;
        }

        // 날짜순 정렬
        targetItems.sort((a, b) => String(a['in-date']).localeCompare(String(b['in-date'])));

        // 메시지 생성
        let message = "대표님 입찰가 전달 부탁드립니다.\n\n";
        let lastDate = "";

        targetItems.forEach((item) => {
            const dt = String(item['in-date'] || '');
            if (lastDate && lastDate !== dt) {
                message += "\n";
            }
            const sakunNo = String(item.sakun_no || '').trim();
            const court = String(item.court || '').trim();
            const status = String(item.stu_member || '').trim();
            const member = String(item.m_name || '').trim();
            const manager = String(item.m_name_id || '').trim();

            message += `${dt}  ${sakunNo}  ${court}  ${status}  ${member}  ${manager}\n`;
            lastDate = dt;
        });

        message += "\n감사합니다.";

        textarea.value = message;
        modal.classList.remove('content-hidden');
    }
