    function _restore(){ if(btn){ btn.disabled=false; btn.innerHTML=orig||'↻ 새로고침'; } }
    google.script.run.withSuccessHandler(function(res){
      _restore();
      if(typeof loadData==='function') loadData(true);                      // 상세모달 캐시(allBiddingData) 갱신 → 신규 ?물건 등 물건번호 클릭 시 모달 열림
      if(!res || !res.success || !res.group){ return; }
      var i=-1; for(var k=0;k<_groups.length;k++){ if(_groups[k].group_key===key){ i=k; break; } }
      if(i>=0) _groups[i]=res.group;

  };

      return ((g.sakun_base||'')+' '+(g.court||'')+' '+(g.address_base||'')+' '+(g.in_date||'')+' '+_firstMgr(g)).toLowerCase().indexOf(q) >= 0;

  // ITEMS.m_name("회원 (구분) 명의") → {member, gubun(본인/개인/법인), myungui}
  function _memberNameById(id){ id=String(id||'').trim(); if(!id) return ''; var ms=_members||[]; for(var i=0;i<ms.length;i++){ if(String(ms[i].member_id)===id) return String(ms[i].name||ms[i].member_name||''); } return ''; }
  function _parseMName(mn, memberId){
    var s=String(mn||'').trim(), real=_memberNameById(memberId);
    if(!s) return { member:'', gubun:'', myungui:'' };
    // 구분은 (개인)/(법인) 만 인정. 그 외 괄호는 명의 이름의 일부.
    if(real && s.indexOf(real)===0){
      var rest=s.substring(real.length).trim();
      var rm=rest.match(/^\((개인|법인)\)\s*([\s\S]*)$/);
      if(rm) return { member:real, gubun:rm[1], myungui:rm[2].trim() };
      if(!rest) return { member:real, gubun:'본인', myungui:'' };
      return { member:real, gubun:'개인', myungui:rest };
    }
    var gm=s.match(/^([\s\S]*?)\s*\((개인|법인)\)\s*([\s\S]*)$/);
    if(gm) return { member:((gm[1]||'').trim()||real), gubun:gm[2], myungui:(gm[3]||'').trim() };
    var sp=s.indexOf(' ');
    if(sp>0){ var my2=s.substring(sp).trim(); return { member:s.substring(0,sp), gubun:(my2?'개인':'본인'), myungui:my2 }; }
    return { member:s, gubun:'본인', myungui:'' };
  }
  function computed(f, it, idx){
    if (f==='_seq') return String(idx+1);
    if (f==='_pMember')  return _parseMName(it.member_name, it.member_id).member;
    if (f==='_pGubun')   return it.member_name ? _parseMName(it.member_name, it.member_id).gubun : '';
    if (f==='_pMyungui') return _parseMName(it.member_name, it.member_id).myungui;
    if (f==='_addrBase') return _addrBase(it.address);
    if (f==='_dong') return _parseAddr(it.address).dong;
    if (f==='_floor') return _parseAddr(it.address).floor;
    if (f==='_ho') return _parseAddr(it.address).ho;
    if (f==='_pyeong'){ var sq=_num(it.building_area); return sq? (Math.round(sq*0.3025*100)/100)+'평':''; }   // ㎡ → 평
    if (f==='jinhaengbi') return it._fee||'';   // 자동계산(수식)
    if (f==='_ratio'){ var lp=_num(it.lowest_price), bp=_num(it.bidprice); return (lp&&bp)?(Math.round(bp/lp*100))+'%':''; }   // 소수점 첫째자리 반올림 → 정수%
    if (f==='_total'){ var t=_num(it.bidprice)+_num(it._fee); return t?_comma(t):''; }
    return it[f];
  }

      if(c.f==='_total'){ var done3=(_num(it.bidprice)>0 && _num(it.deposit)>0 && _num(it._fee)>0); return '<td class="'+cls+'" style="'+style+(done3?';color:#2563eb;font-weight:800':'')+'">'+esc(v)+'</td>'; }   // 입찰가·보증금·진행비 모두 입력 → 굵은 파랑
      if(c.f==='_pMember' && it.member_id){ var _pm=_parseMName(it.member_name,it.member_id); return '<td class="'+cls+'" style="'+style+'"><span class="dm-member-link" onclick="DM._hl(this);DM.openMyungui(\''+esc(it.member_id)+'\',\''+esc(_pm.myungui)+'\',\''+esc(_pm.member)+'\',\''+esc(it.link_item_id)+'\')" title="클릭 → 명의/계좌 정보">'+esc(v)+'</span></td>'; }   // 회원 클릭 → 명의 카드(선택 명의 표시)
      if(c.f==='_pGubun' && v){ var _gc=({'본인':'#2563eb','개인':'#16a34a','법인':'#9333ea'})[v]||'#64748b'; return '<td class="'+cls+'" style="'+style+';text-align:center"><span style="background:'+_gc+'1a;color:'+_gc+';padding:1px 8px;border-radius:9px;font-size:11px;font-weight:700">'+esc(v)+'</span></td>'; }   // 구분 색상 badge

      return '<td class="'+cls+'" style="'+style+'">'+esc(v)+'</td>';

  DM.openAuction = function(auctionId, court, sakun){

    var isGongmae=(court==='공매' || (sakun && String(sakun).indexOf('-')>=0));
    var st=(typeof auctionSettingsCache!=='undefined' && auctionSettingsCache)?auctionSettingsCache:{};

    _mcEl('dmMcMember').textContent=String(memberName||'').trim()||'불러오는 중…';   // 헤더 즉시 표시

  };

    var memberName=res.member_name||'';

      // 4) 명의가 1개뿐이면 그걸로
      if(!hit&&cands.length===1) hit=cands[0];

    }

    var btn=document.getElementById('dmBulkPrintBtn'), orig=btn?btn.innerHTML:'';

    function done(){ if(btn){ btn.disabled=false; btn.innerHTML=orig||'🖨 일괄프린트'; } }

  function renderSummary(){
    var bar=document.getElementById('dmSummary'); if(!bar) return;
    var items=curItems();
    if(!items.length){ bar.innerHTML='<span style="color:#6b7280">전체 0건</span>'; return; }
    // 상태 카운트
    var cnt={}, miss=0;
    items.forEach(function(it){ var st=String(it.stu_member||'미정').trim(); cnt[st]=(cnt[st]||0)+1; if(st==='입찰' && !(_num(it.bidprice)>0)) miss++; });

    DM_STATUSES.forEach(function(st){ var c=cnt[st]||0; if(!c) return;
      statusHtml+='<span style="color:#cbd5e1">|</span>';
      statusHtml+=schip(st, st+' '+c, DM_SCOLOR[st]||'#4b5563', (only.length===1 && only[0]===st && !_bidMissing && !_qOnly));
      if(st==='입찰' && miss>0) statusHtml+=schip('bid_missing','(미입력 '+miss+')','#dc2626',_bidMissing);
    });
    // 입찰 회원별 카운트 — 입찰 상태 물건만 (담당자별은 맨 위 헤더로 이동)

    });

    memOrder.sort(); var _mi=memOrder.indexOf('(미지정)'), _hasMi=_mi>=0; if(_hasMi) memOrder.splice(_mi,1);
    _summaryMembers = memOrder.concat(_hasMi?['(미지정)']:[]);

  DM.openItem = function(id){
    // 모달은 캐시(allBiddingData)를 쓰므로, 다물건에서 바꾼 최신 DB값(입찰가/회원)을 캐시에 동기화 후 오픈
    try {
      var it=curItems().filter(function(x){return x.link_item_id===id;})[0];
      if(it && typeof allBiddingData!=='undefined' && allBiddingData && allBiddingData.length){
        var bd=allBiddingData.find(function(b){return String(b.id)===String(id);});
        if(bd){
          if(it.bidprice!==undefined && it.bidprice!=='') bd.bidprice=it.bidprice;
          if(it.member_name) bd.m_name=it.member_name;
          if(it.member_id) bd.member_id=it.member_id;
        }
      }
    } catch(e){}
    var key=_selKey;
    try { if (typeof openDetailModalById==='function') openDetailModalById(id);
      else if (typeof openDetailModalWithTab==='function') openDetailModalWithTab(id); }
    catch(e){ console.error('[DM openItem]', e); }
    // 모달에서 수정/삭제 후 닫히면 그 물건만 캐시(allBiddingData)에서 즉시 반영 (서버 재조회 X → 추가 지연 없음)
    try {
      var modal=document.getElementById('itemDetailModal');
      if(modal && typeof MutationObserver!=='undefined' && !modal.classList.contains('content-hidden')){
        var obs=new MutationObserver(function(){ if(modal.classList.contains('content-hidden')){ obs.disconnect(); setTimeout(function(){ _syncItemFromCache(id); },300); } });   // 모달이 갱신한 캐시로 그리드+카운팅 즉시 반영(서버 재조회는 레이스로 옛값 복귀 → 안 함)
        obs.observe(modal,{attributes:true,attributeFilter:['class']});
      }
    } catch(e){}
  };
  // allBiddingData(모달이 갱신) → 다물건 그리드 항목 로컬 반영 (입찰가/회원/상태/전달상태)
  // 회원 member_id → 텔레그램 뱃지(Y/'') — allMembersNewData(telegram_enabled) 기준
  function _tgForMember(memberId){
    memberId=String(memberId||'').trim(); if(!memberId) return '';
    var src=(typeof allMembersNewData!=='undefined'&&allMembersNewData)?allMembersNewData:[];
    for(var i=0;i<src.length;i++){ if(String(src[i].member_id)===memberId) return (String(src[i].telegram_enabled||'')==='Y')?'Y':''; }
    return '';
  }
  function _syncItemFromCache(id){
    try {
      var g=_groups.filter(function(x){return x.group_key===_selKey;})[0]; if(!g) return;
      var idx=-1; for(var i=0;i<g.items.length;i++){ if(String(g.items[i].link_item_id)===String(id)){ idx=i; break; } }
      if(idx<0) return;
      var hasCache=(typeof allBiddingData!=='undefined'&&allBiddingData&&allBiddingData.length);
      var bd=hasCache?allBiddingData.find(function(b){return String(b.id)===String(id);}):null;
      if(hasCache && !bd){   // 캐시에서 사라짐 = 모달에서 삭제됨 → 그리드에서 제거
        g.items.splice(idx,1); g.count=g.items.length; try{ _saveGroupsCache(); }catch(_){}
        _computeFees(g.items); renderBody(); renderSummary();
        return;
      }
      if(!bd) return;
      var it=g.items[idx];
      var _oldM=String(it.member_name||'').trim()+'|'+String(it.member_id||'').trim();   // 변경 전 회원
      it.bidprice=String(bd.bidprice==null?'':bd.bidprice);
      it.member_name=String(bd.m_name||'');
      it.member_id=String(bd.member_id||'');
      if(bd.stu_member) it.stu_member=String(bd.stu_member);
      it.bid_state=String(bd.bid_state||'');
      it.tg=_tgForMember(it.member_id);   // 회원 변경/삭제 → T 뱃지 갱신
      var _newM=String(it.member_name||'').trim()+'|'+String(it.member_id||'').trim();
      if(_isManualFee(it) && _newM!==_oldM){ it.jinhaengbi=''; _clearDmFee(it); }   // 회원 바뀌면 수동 진행비 자동 삭제 → 자동 복귀
      _computeFees(g.items); renderBody(); renderSummary();   // 카운팅(상태/회원/?)도 즉시 갱신
    } catch(e){}
  }

  // 다물건 전용(명의/향/인증/비고) → damulgeon 시트 (3키)

  function _clearDmFee(it){
    if(typeof google==='undefined'||!google.script||!google.script.run) return;
    google.script.run.withSuccessHandler(function(){ try{ _saveGroupsCache(); }catch(_){} }).withFailureHandler(function(){})
      .saveDamulgeonRow({ in_date:it.in_date, sakun_no:it.sakun_no, court:it.court, jinhaengbi:'' });

  // [진행비 수동 저장] 입찰안내 모달 입찰표 ✏수정 → 진행비 직접입력 → 💾저장.
  //   현재 회원(_msgFocusGi)의 모든 물건 jinhaengbi 를 시트에 기록(한 건만 고쳐도 전부 굳힘=수동). 빈값=자동 복귀.
  // 모달 items(m.items)와 그리드 items(g.items)는 서로 다른 객체일 수 있음 → id로 양쪽 다 찾아 jinhaengbi 적용.
  function _applyFeeBoth(id, val){
    var done=false, m=_msgGroups[_msgFocusGi];
    function setIn(arr){ if(!arr) return; for(var i=0;i<arr.length;i++){ var x=arr[i]; if(String(x.link_item_id)===String(id)||String(x.id)===String(id)){ x.jinhaengbi=val; done=true; } } }
    if(m) setIn(m.items);
    var g=_groups.filter(function(x){return x.group_key===_selKey;})[0]; if(g) setIn(g.items);
    return done;
  }
  function _recomputeBoth(){ var m=_msgGroups[_msgFocusGi]; if(m) _computeFees(m.items); var g=_groups.filter(function(x){return x.group_key===_selKey;})[0]; if(g) _computeFees(g.items); }
  DM.saveFees = function(btn){
    var sec=btn.closest('.rsec'); if(!sec) return;
    var inps=sec.querySelectorAll('input.feeedit'); if(!inps.length){ alert('수정할 진행비가 없습니다.'); return; }
    var rows=[], m=_msgGroups[_msgFocusGi]||{items:[]};
    function refOf(id){ for(var i=0;i<m.items.length;i++){ var x=m.items[i]; if(String(x.link_item_id)===String(id)||String(x.id)===String(id)) return x; } return null; }
    for(var i=0;i<inps.length;i++){ var id=inps[i].getAttribute('data-item');
      var val=String(inps[i].value||'').replace(/[^\d]/g,'');   // 숫자만(빈값=자동복귀)
      _applyFeeBoth(id, val);   // 모달+그리드 객체 둘 다 적용
      var r=refOf(id); if(r) rows.push({ in_date:r.in_date, sakun_no:r.sakun_no, court:r.court, jinhaengbi:val });
    }
    if(!rows.length) return;
    var o=btn.textContent; btn.disabled=true; btn.textContent='저장 중…';

  // 엑셀(CSV) 출력 — 현재 화면(보이는 컬럼+표시값) 그대로
  DM.exportCsv = function(){
    if(!_selKey){ alert('사건을 선택하세요.'); return; }
    var cols=visCols().filter(function(c){ return c.t!=='check' && c.t!=='auction'; });   // 체크박스·옥션버튼 제외
    var items=filteredItems();
    if(!items.length){ alert('출력할 행이 없습니다.'); return; }
    function fmt(c,it,idx){
      if(c.t==='tg') return it.tg==='Y'?'T':'';
      if(c.t==='status') return String(it.stu_member||'');
      var v=computed(c.f,it,idx);
      if(c.num) v=_num(v)?_comma(v):'';
      return String(v==null?'':v);
    }
    function cq(s){ s=String(s==null?'':s); return /[",\n\r]/.test(s)?('"'+s.replace(/"/g,'""')+'"'):s; }
    var rows=[], g=_groups.filter(function(x){return x.group_key===_selKey;})[0];
    if(g){   // 상단: 그리드 상단(사건번호/법원/입찰일/물건수/담당/주소)
      var mgr=_firstMgr(g)?_mgrDisplay(_firstMgr(g)).disp:'';
      var addrFull=_addrBase((g.items[0]&&g.items[0].address)||g.address_base||'');
      rows.push(['사건번호',g.sakun_base||'','법원',g.court||'','입찰일',g.in_date||'','물건수',String(g.count||''),'담당',mgr].map(cq).join(','));
      rows.push(['주소',addrFull].map(cq).join(','));
      rows.push('');
    }
    rows.push(cols.map(function(c){return cq(c.label);}).join(','));
    items.forEach(function(it,idx){ rows.push(cols.map(function(c){return cq(fmt(c,it,idx));}).join(',')); });
    var csvStr='﻿'+rows.join('\r\n');   // BOM(한글 엑셀)
    var fn='다물건_'+(_selKey?String(_selKey).replace(/[^0-9A-Za-z가-힣]/g,'_'):'전체')+'.csv';
    var blob=new Blob([csvStr],{type:'text/csv;charset=utf-8;'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fn;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(a.href); },1500);
  };

    var v=String((_qGenEl('dmQGenMember')||{}).value||'').trim();
    var hid=(_qGenEl('dmQGenMemberId')||{}).value||'';
    var info=_qGenEl('dmQGenMemInfo'); if(!info) return;
    if(!v){ info.innerHTML=''; return; }
    info.innerHTML = hid ? '<span style="color:#16a34a">✓ 회원 선택됨</span>' : '<span style="color:#d97706">목록에서 선택하세요</span>';
  }
  DM.qGenSubmit=function(){
    if(!_qGenGroup){ _qGenStatus('사건이 선택되지 않았습니다.','error'); return; }
    var inDate=_qGenGroup.in_date, sakun=_qGenGroup.sakun, court=_qGenGroup.court;
    var mgr=(_qGenEl('dmQGenManager')||{}).value||'';
    var status=(_qGenEl('dmQGenStu')||{}).value||'추천';
    var memberName=String((_qGenEl('dmQGenMember')||{}).value||'').trim();
    var memberId=String((_qGenEl('dmQGenMemberId')||{}).value||'').trim();
    var cnt=parseInt((_qGenEl('dmQGenCnt')||{}).value,10);
    if(!String(sakun).trim()){ _qGenStatus('사건번호가 없습니다.','error'); return; }
    if(isNaN(cnt)||cnt<1){ _qGenStatus('생성 개수를 1 이상 입력하세요.','error'); return; }
    if(cnt>100){ _qGenStatus('1회 최대 100개까지 가능합니다.','error'); return; }
    if((status==='추천'||status==='입찰') && !memberName){ _qGenStatus('상태가 '+status+'이면 회원을 선택해야 합니다.','error'); var mi=_qGenEl('dmQGenMember'); if(mi) mi.focus(); return; }
    if(typeof google==='undefined'||!google.script||!google.script.run){ _qGenStatus('실행 환경이 아닙니다.','error'); return; }
    var btn=_qGenEl('dmQGenSubmitBtn'); if(btn){ btn.disabled=true; btn.style.opacity='0.65'; btn.style.cursor='wait'; btn.innerHTML='<span class="dm-spin" style="display:inline-block">↻</span> 생성 중…'; }
    _qGenStatus('생성 중…','info');
    google.script.run.withSuccessHandler(function(r){
      if(btn){ btn.disabled=false; btn.style.opacity=''; btn.style.cursor=''; btn.textContent='생성'; }
      if(r&&r.success){
        _renderQGen(r.info);
        _qGenStatus('✓ '+r.created+'개 생성 완료 (?'+r.fromNum+'~?'+r.toNum+')'+(r.message?(' · '+r.message):''),'success');
        if(DM.refreshGroup) DM.refreshGroup();   // 이 사건만 서버 재조회 갱신
      } else { _qGenStatus('실패: '+((r&&r.message)||'알 수 없음'),'error'); }
    }).withFailureHandler(function(e){ if(btn){ btn.disabled=false; btn.textContent='생성'; } _qGenStatus('오류: '+(e&&e.message||e),'error'); }).generateQItems(inDate,sakun,court,mgr,cnt,memberId,memberName,status);
  };

  DM.openMatchModal=function(){
    var its=curItems(); if(!its.length){ alert('사건을 먼저 선택하세요.'); return; }
    var qByMem={}, order=[];   // 좌: ?임의등록 + 입찰 회원
    its.forEach(function(it){ if(!(_isQ(it) && String(it.stu_member||'').trim()==='입찰')) return; var pm=_parseMName(it.member_name,it.member_id); var key=(pm.member||'(미지정)'); if(!qByMem[key]){ qByMem[key]={ member:key, member_id:String(it.member_id||''), member_name_full:String(it.member_name||''), items:[] }; order.push(key); } qByMem[key].items.push(it); });
    _matchMembers=order.map(function(k){ return qByMem[k]; });
    if(!_matchMembers.length){ alert('?임의등록(입찰) 회원이 없습니다.'); return; }
    _matchItems=its.filter(function(it){ var st=String(it.stu_member||'').trim(); return !_isQ(it) && (st==='미정'||st==='상품'); });   // 우: 실제 물건(미정·상품)
    _matchActive=0; _matchAssign={};
    _renderMatch();
    var mo=document.getElementById('dmMatchModal'); if(mo) mo.classList.remove('content-hidden');
  };
  DM.matchClose=function(){ var mo=document.getElementById('dmMatchModal'); if(mo) mo.classList.add('content-hidden'); };
  function _matchRemain(mi){ var m=_matchMembers[mi]; if(!m) return 0; var used=0; Object.keys(_matchAssign).forEach(function(id){ if(_matchAssign[id]===mi) used++; }); return m.items.length-used; }
  function _renderMatch(){
    var L=document.getElementById('dmMatchLeft'), R=document.getElementById('dmMatchRight'); if(!L||!R) return;
    L.innerHTML=_matchMembers.map(function(m,mi){
      var used=m.items.length-_matchRemain(mi), active=(mi===_matchActive);
      var list=m.items.map(function(it,i){ var done=(i<used);
        return '<div style="font-size:12px;padding:1px 2px;font-weight:700;color:'+(done?'#9ca3af':'#b45309')+';'+(done?'text-decoration:line-through':'')+'">'+esc(it.mulgeon_no||'?')+(done?' ✓ 매칭':'')+'</div>';
      }).join('');
      return '<div onclick="DM.matchPick('+mi+')" style="cursor:pointer;margin-bottom:8px;padding:8px 10px;border-radius:9px;'+(active?'background:#dbeafe;border:1px solid #2563eb':'background:#fff;border:1px solid #e5e7eb')+'">'
        +'<div style="display:flex;align-items:center;gap:6px">'
        +  '<span style="font-size:14px;font-weight:800;color:#111827">'+esc(m.member)+'</span>'
        +  '<span style="font-size:12px;font-weight:800;color:#b45309;background:#fef3c7;border-radius:10px;padding:0 7px">'+m.items.length+'</span>'
        +  '<span style="margin-left:auto;color:#64748b;font-size:11px">남은 '+_matchRemain(mi)+'</span>'
        +'</div>'
        +'<div style="margin-top:4px;border-top:1px dashed #e5e7eb;padding-top:3px">'+list+'</div>'
        +'</div>';
    }).join('') || '<div style="color:#9ca3af">? 회원 없음</div>';
    var fromCols=COLS.slice(COLS.map(function(c){return c.f;}).indexOf('_dong'));   // 동부터 그리드 그대로
    var head='<tr style="background:#eef2f7;color:#475569">'
      +'<th style="padding:4px 6px;position:sticky;left:0;background:#eef2f7">선택</th><th style="padding:4px 6px">물건</th><th style="padding:4px 6px">상태</th><th style="padding:4px 6px">물건종류</th><th style="padding:4px 6px">회원</th>'
      + fromCols.map(function(c){ return '<th style="padding:4px 6px;white-space:nowrap">'+esc(c.label)+'</th>'; }).join('')+'</tr>';
    var rows=_matchItems.map(function(it,idx){
      var id=String(it.link_item_id), asg=_matchAssign[id], asgName=(asg!=null&&_matchMembers[asg])?_matchMembers[asg].member:'';
      var cells=fromCols.map(function(c){ var v=computed(c.f,it,idx); if(c.num) v=_num(v)?_comma(v):''; return '<td style="padding:3px 6px;white-space:nowrap;text-align:'+c.a+'">'+esc(v==null?'':v)+'</td>'; }).join('');
      return '<tr style="border-bottom:1px solid #f1f5f9;'+(asg!=null?'background:#ecfdf5':'')+'">'
        +'<td style="padding:3px 6px;text-align:center;position:sticky;left:0;background:'+(asg!=null?'#ecfdf5':'#fff')+'"><input type="checkbox" '+(asg!=null?'checked':'')+' onclick="DM.matchToggle(\''+esc(id)+'\')"></td>'
        +'<td style="padding:3px 6px;text-align:center;font-weight:700">'+esc(it.mulgeon_no||'')+'</td>'
        +'<td style="padding:3px 6px;text-align:center">'+esc(it.stu_member||'')+'</td>'
        +'<td style="padding:3px 6px">'+esc(it.prop_kind||'')+'</td>'
        +'<td style="padding:3px 6px;font-weight:700;color:'+(asgName?'#16a34a':'#cbd5e1')+'">'+esc(asgName||'-')+'</td>'
        +cells+'</tr>';
    }).join('');
    R.innerHTML='<table style="border-collapse:collapse;font-size:12px;white-space:nowrap"><thead style="position:sticky;top:0;z-index:1">'+head+'</thead><tbody>'+rows+'</tbody></table>';
    var info=document.getElementById('dmMatchInfo'); if(info){ var tot=0; _matchMembers.forEach(function(m){ tot+=m.items.length; }); info.textContent='매칭 '+Object.keys(_matchAssign).length+'/'+tot; }
  }
  DM.matchPick=function(mi){ _matchActive=mi; _renderMatch(); };
  DM.matchToggle=function(id){
    if(_matchAssign[id]!=null){ delete _matchAssign[id]; _renderMatch(); return; }
    var mi=_matchActive;
    if(_matchRemain(mi)<=0){ alert(_matchMembers[mi].member+'님은 ? 물건 수만큼 이미 선택했습니다. 좌측에서 다음 회원을 선택하세요.'); return; }
    _matchAssign[id]=mi;
    if(_matchRemain(mi)<=0){ for(var n=mi+1;n<_matchMembers.length;n++){ if(_matchRemain(n)>0){ _matchActive=n; break; } } }   // 다 차면 다음 회원 자동
    _renderMatch();
  };
  DM.matchConfirm=function(){
    var ids=Object.keys(_matchAssign); if(!ids.length){ alert('매칭된 물건이 없습니다.'); return; }
    var byMi={}; ids.forEach(function(id){ var mi=_matchAssign[id]; (byMi[mi]=byMi[mi]||[]).push(id); });
    var pairs=[];
    Object.keys(byMi).forEach(function(miStr){ var mi=parseInt(miStr,10), m=_matchMembers[mi]; (byMi[miStr]||[]).forEach(function(rid,i){ var q=m.items[i]; if(!q) return; pairs.push({ member_id:m.member_id, member_name:m.member_name_full, qItemId:String(q.link_item_id), realItemId:String(rid) }); }); });
    if(!pairs.length){ alert('매칭 데이터 없음'); return; }
    if(!confirm('매칭 '+pairs.length+'건을 적용합니다.\n① ?물건 → 폐기\n② 추천기록 이동(요청일자 유지)\n③ 매칭물건 회원등록 + 입찰\n\n되돌리기 어렵습니다. 진행할까요?')) return;
    if(typeof google==='undefined'||!google.script||!google.script.run){ alert('실행 환경이 아닙니다.'); return; }
    var btn=document.querySelector('#dmMatchHead button'); if(btn){ btn.disabled=true; btn.textContent='적용 중…'; }
    google.script.run.withSuccessHandler(function(r){
      if(btn){ btn.disabled=false; btn.textContent='✔ 매칭하기'; }
      if(r&&r.success){ alert('✓ 매칭 완료 '+r.matched+'건\n· 폐기 '+r.discarded+' · 입찰배정 '+r.assigned+' · 추천이동 '+r.recMoved); DM.matchClose(); if(DM.refreshGroup) DM.refreshGroup(); }
      else alert('매칭 실패: '+((r&&r.msg)||'알 수 없음'));
    }).withFailureHandler(function(e){ if(btn){ btn.disabled=false; btn.textContent='✔ 매칭하기'; } alert('매칭 오류: '+(e&&e.message||e)); }).dmMatchMembers(pairs);
  };
  (function(){   // 헤더 드래그로 모달 이동
    var h=document.getElementById('dmMatchHead'), mo=document.getElementById('dmMatchModal'); if(!h||!mo) return;
    var drag=false,ox=0,oy=0;
    h.addEventListener('mousedown',function(e){ if(e.target.tagName==='BUTTON') return; drag=true; var r=mo.getBoundingClientRect(); ox=e.clientX-r.left; oy=e.clientY-r.top; document.body.style.userSelect='none'; e.preventDefault(); });
    document.addEventListener('mousemove',function(e){ if(!drag) return; mo.style.left=Math.max(0,e.clientX-ox)+'px'; mo.style.top=Math.max(0,e.clientY-oy)+'px'; mo.style.right='auto'; });
    document.addEventListener('mouseup',function(){ if(drag){ drag=false; document.body.style.userSelect=''; } });
  })();
  DM.bulkConfirm = function(){
    var act=_bulkAct, valEl=document.getElementById('dmBulkVal'), val=valEl?String(valEl.value).trim():'';
    var targets=_bulkTgts; if(!targets.length){ DM.bulkClose(); return; }
    if(act==='status'){   // 물건상태 일괄변경 — 입찰물건관리와 동일(updateBulkStatus, item_id=link_item_id)
      if(!val){ alert('변경할 상태를 선택하세요.'); return; }
      var sids=targets.map(function(it){ return String(it.link_item_id); }).filter(Boolean);
      if(!sids.length){ alert('대상 물건이 없습니다.'); return; }
      if(typeof google==='undefined'||!google.script||!google.script.run){ alert('실행 환경이 아닙니다.'); return; }
      var sbtn=document.getElementById('dmBulkConfirmBtn'); if(sbtn){ sbtn.disabled=true; sbtn.textContent='적용 중…'; }
      var sk=_selKey;
      google.script.run.withSuccessHandler(function(r){
        if(sbtn){ sbtn.disabled=false; sbtn.textContent='적용'; }
        DM.bulkClose(); _dot('✓ 상태변경 '+sids.length+'건 → '+val, true); if(DM.refreshGroup) DM.refreshGroup(sk);
      }).withFailureHandler(function(e){ if(sbtn){ sbtn.disabled=false; sbtn.textContent='적용'; } alert('상태변경 오류: '+(e&&e.message||e)); }).updateBulkStatus(sids, val);
      return;
    }
    var itemsRows=[], dmRows=[];
    if(act==='member'){
      if(!val){ alert('회원명을 입력하세요.'); return; }
      var mid=String((document.getElementById('dmBulkMemberId')||{}).value||'');
      if(!mid){ var rr=_memberByName(val); if(rr) mid=rr.member_id; }   // 수기 입력 폴백
      targets.forEach(function(it){ itemsRows.push({in_date:it.in_date,sakun_no:it.sakun_no,court:it.court,member_name:val,member_id:mid}); dmRows.push({in_date:it.in_date,sakun_no:it.sakun_no,court:it.court,jinhaengbi:''}); });   // member_name = 명의 포함값. 회원 바뀌므로 수동 진행비 제거(자동 복귀)
    } else if(act==='bidprice'){
      if(_bidMethod==='pct'){ if(isNaN(parseFloat((document.getElementById('dmBulkVal')||{}).value))){ alert('퍼센트(%)를 입력하세요.'); return; } }
      else if(!_bidWon){ alert('입찰가/금액을 입력하세요.'); return; }
      targets.forEach(function(it){ var nb=_bidFor(it); if(nb!=null) itemsRows.push({in_date:it.in_date,sakun_no:it.sakun_no,court:it.court,bidprice:String(nb)}); });
    } else {
      if(act!=='auth_method' && act!=='daeriin' && !val){ alert('값을 입력하세요.'); return; }   // 대리인·인증은 빈값(미선택=지움) 허용
      targets.forEach(function(it){ var r={in_date:it.in_date,sakun_no:it.sakun_no,court:it.court}; r[act]=val; dmRows.push(r); });
    }
    var need=(itemsRows.length?1:0)+(dmRows.length?1:0), done=0; if(!need){ DM.bulkClose(); return; }
    var btn=document.getElementById('dmBulkConfirmBtn'); if(btn){ btn.disabled=true; btn.textContent='적용 중…'; }
    var _key=_selKey;
    function fin(){ done++; if(done>=need){ if(btn){btn.disabled=false;btn.textContent='적용';} DM.bulkClose(); _dot('✓ 일괄적용 '+targets.length+'건', true); DM.refreshGroup(_key); } }
    if(itemsRows.length) google.script.run.withSuccessHandler(fin).withFailureHandler(function(e){ alert('적용 오류: '+(e&&e.message||e)); fin(); }).bulkAssignDamulgeon(itemsRows);
    if(dmRows.length) google.script.run.withSuccessHandler(fin).withFailureHandler(function(e){ alert('적용 오류: '+(e&&e.message||e)); fin(); }).bulkSaveDamulgeon(dmRows);
  };

  function setupSplitter(){
    var sp=document.getElementById('dmSplitter'), pane=document.getElementById('dmListPane');
    if(!sp||!pane||sp.dataset.bound) return;
    try{ var w=parseInt(localStorage.getItem(SPLIT_KEY)||'',10); if(!isNaN(w)&&w>=240&&w<=900) pane.style.width=w+'px'; }catch(_){}
    sp.dataset.bound='1';
    var drag=false,sx=0,sw=0;
    sp.addEventListener('mousedown',function(e){ drag=true;sx=e.clientX;sw=pane.getBoundingClientRect().width;sp.classList.add('dragging');document.body.style.userSelect='none';e.preventDefault();});
    document.addEventListener('mousemove',function(e){ if(!drag)return; var w=Math.max(240,Math.min(900,sw+(e.clientX-sx))); pane.style.width=w+'px';});
    document.addEventListener('mouseup',function(){ if(!drag)return; drag=false;sp.classList.remove('dragging');document.body.style.userSelect=''; try{localStorage.setItem(SPLIT_KEY,String(Math.round(pane.getBoundingClientRect().width)));}catch(_){}});
  }
  // 메시지 모달 스플리터 (좌 카드 ↔ 우 보고서) — PC별 저장
  var MSG_SPLIT_KEY='dmMsgListW';
  function setupMsgSplitter(){
    var sp=document.getElementById('dmMsgSplitter'), pane=document.getElementById('dmMsgList');
    if(!sp||!pane||sp.dataset.bound) return;
    sp.dataset.bound='1';
    var drag=false,sx=0,sw=0;
    sp.addEventListener('mousedown',function(e){ drag=true;sx=e.clientX;sw=pane.getBoundingClientRect().width;sp.style.background='#93c5fd';document.body.style.userSelect='none';e.preventDefault();});
    document.addEventListener('mousemove',function(e){ if(!drag)return; var w=Math.max(220,Math.min(640,sw+(e.clientX-sx))); pane.style.width=w+'px';});
    document.addEventListener('mouseup',function(){ if(!drag)return; drag=false;sp.style.background='#e5e7eb';document.body.style.userSelect=''; try{localStorage.setItem(MSG_SPLIT_KEY,String(Math.round(pane.getBoundingClientRect().width)));}catch(_){}});
  }
  function _applyMsgListW(){ try{ var w=parseInt(localStorage.getItem(MSG_SPLIT_KEY)||'',10); var pane=document.getElementById('dmMsgList'); if(pane&&!isNaN(w)&&w>=220&&w<=640) pane.style.width=w+'px'; }catch(_){} }
  // 내용(보고서)↔프린트물(문서패널) 스플리터 — 보고서 컬럼 폭 저장
  var DOC_SPLIT_KEY='dmDocReportW';
  function setupDocSplitter(){
    var sp=document.getElementById('dmDocSplitter'), pane=document.getElementById('dmMsgReportCol');
    if(!sp||!pane||sp.dataset.bound) return;
    sp.dataset.bound='1';
    var drag=false,sx=0,sw=0;
    sp.addEventListener('mousedown',function(e){ drag=true;sx=e.clientX;sw=pane.getBoundingClientRect().width;sp.style.background='#93c5fd';document.body.style.userSelect='none';e.preventDefault();});
    document.addEventListener('mousemove',function(e){ if(!drag)return; var w=Math.max(300,Math.min(940,sw+(e.clientX-sx))); pane.style.flexBasis=w+'px'; pane.style.width=w+'px';});
    document.addEventListener('mouseup',function(){ if(!drag)return; drag=false;sp.style.background='#cbd5e1';document.body.style.userSelect=''; try{localStorage.setItem(DOC_SPLIT_KEY,String(Math.round(pane.getBoundingClientRect().width)));}catch(_){}});
  }
  function _applyDocReportW(){ try{ var w=parseInt(localStorage.getItem(DOC_SPLIT_KEY)||'',10); var pane=document.getElementById('dmMsgReportCol'); if(pane&&!isNaN(w)&&w>=300&&w<=940){ pane.style.flexBasis=w+'px'; pane.style.width=w+'px'; } }catch(_){} }
  // ITEMS id 지수표기 복구 (1회용 버튼)
  DM.repairIds=function(){
    if(!confirm('ITEMS id 지수표기(1.78E+15) 복구를 실행합니다.\n다물건 등록분 id를 텍스트로 정리(값은 그대로 보존)합니다. 진행할까요?')) return;
    if(typeof google==='undefined'||!google.script||!google.script.run){ alert('실행 불가'); return; }
    google.script.run.withSuccessHandler(function(r){ if(r&&r.success) alert('복구 완료: 총 '+r.total+'행 중 '+r.changed+'행 텍스트 정리.\n새로고침합니다.'); else alert('실패: '+((r&&r.msg)||'?')); DM.load(); })
      .withFailureHandler(function(e){ alert('실패: '+(e&&e.message||e)); }).repairItemIds();
  };
  function _dmInit(){ setupSplitter(); setupMsgSplitter(); }
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', _dmInit);
  else _dmInit();
})();
</script>
