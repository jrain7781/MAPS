<!-- ============================================================================
     다물건 관리 (DaMultiItemManagement) — Phase C 프론트
       좌측 사건 리스트(담당자 표시) + 우측 상세카드 + 25열 그리드
       (열고정 명의까지 / 컬럼 리사이즈 / 가로스크롤 / 상태배지 / 사건번호→수정모달 / 물건번호·회원명 필터)
       백엔드(SheetDB.js): getDamulgeonList / saveDamulgeonRow / exportDamulgeonCsv
       회원 드래그매칭(Phase D), 진행비 자동계산/요율표(Phase E)는 이후 단계.
     ============================================================================ -->
<style>
  #DaMultiItemManagement .dmgrid-th { padding:5px 6px; font-weight:700; color:#475569; border-bottom:2px solid #cbd5e1; border-right:1px solid #e2e8f0; white-space:nowrap; background:#f1f5f9; font-size:12px; position:sticky; top:0; z-index:4; box-sizing:border-box; }
  #DaMultiItemManagement td.dmgrid-td { border-bottom:1px solid #f1f5f9; border-right:1px solid #f1f5f9; white-space:nowrap; padding:3px 6px; font-size:12px; color:#334155; background:#fff; box-sizing:border-box; }
  #DaMultiItemManagement tr:hover td.dmgrid-td { background:#f8fafc; }
  #DaMultiItemManagement .dmgrid-input:focus { background:#fffbeb !important; outline:1px solid #fbbf24; }
  #DaMultiItemManagement #dmSplitter:hover, #DaMultiItemManagement #dmSplitter.dragging { background:#93c5fd; }
  #DaMultiItemManagement .dm-th-grip { position:absolute; top:0; right:-3px; width:7px; height:100%; cursor:col-resize; z-index:7; }
  #DaMultiItemManagement .dm-th-grip:hover { background:#93c5fd; }
  #DaMultiItemManagement .dm-frozen-edge { border-right:2px solid #cbd5e1 !important; }
  #DaMultiItemManagement .dm-sakun-link { color:#1d4ed8; cursor:pointer; text-decoration:underline; text-underline-offset:2px; font-weight:600; }
  #DaMultiItemManagement .dm-sakun-link:hover { color:#1e40af; }
</style>
<script>
(function () {
  'use strict';
  var DM = window.DM = {};
  var _groups = [];      // getDamulgeonList 그룹(사건 단위)
  var _filtered = [];    // 좌측 리스트 검색 필터분
  var _selKey = null;    // 선택 group_key
  var _loading = false;
  var _members = null;   // 일괄등록 회원 목록 캐시
  var _bulkTargets = []; // 일괄등록 대상 행
  var SPLIT_KEY = 'dmListW';
  var COLW_KEY = 'dmGridColW';
  var FROZEN = 10;       // 체크~명의(0~9) 열고정
  var _colW = {};        // 컬럼 인덱스 → px (사용자 조절)

  // 컬럼: label / f / t(타입) / a(정렬) / w(폭) / src(데이터 출처: items파랑·dm노랑·link/calc회색)
  //   t: check체크 / ro읽기 / text텍스트편집(dm) / auth인증(dm) / bid입찰가편집(items저장) / calc자동 / status상태 / sakun링크
  var COLS = [
    { label:'',         f:'_check',       t:'check',  a:'center', w:32,  src:'' },
    { label:'순번',     f:'_seq',         t:'ro',     a:'center', w:42,  src:'calc' },
    { label:'입찰일',   f:'in_date',      t:'ro',     a:'center', w:68,  src:'items' },
    { label:'법원',     f:'court',        t:'ro',     a:'left',   w:60,  src:'items' },
    { label:'사건번호', f:'sakun_no',     t:'sakun',  a:'left',   w:116, src:'items' },
    { label:'물건종류', f:'prop_kind',    t:'ro',     a:'left',   w:78,  src:'items' },
    { label:'물건',     f:'mulgeon_no',   t:'ro',     a:'center', w:42,  src:'items' },
    { label:'상태',     f:'stu_member',   t:'status', a:'center', w:56,  src:'items' },
    { label:'회원',     f:'member_name',  t:'ro',     a:'left',   w:68,  src:'items' },
    { label:'명의',     f:'myungui',      t:'text',   a:'left',   w:68,  src:'dm' },
    { label:'등급',     f:'grade',        t:'ro',     a:'center', w:54,  src:'link' },
    { label:'주소',     f:'_addrBase',    t:'ro',     a:'left',   w:190, src:'items' },
    { label:'건물면적', f:'building_area',t:'ro',     a:'right',  w:70,  src:'items' },
    { label:'최저매각가',f:'lowest_price',t:'ro',     a:'right',  w:96,  src:'items' },
    { label:'입찰가',   f:'bidprice',     t:'bid',    a:'right',  w:96,  src:'items' },
    { label:'비율',     f:'_ratio',       t:'calc',   a:'right',  w:54,  src:'calc' },
    { label:'보증금',   f:'deposit',      t:'ro',     a:'right',  w:90,  src:'items' },
    { label:'진행비',   f:'jinhaengbi',   t:'text',   a:'right',  w:84,  src:'dm' },
    { label:'총입금요청',f:'_total',      t:'calc',   a:'right',  w:104, src:'calc' },
    { label:'향',       f:'hyang',        t:'text',   a:'center', w:50,  src:'dm' },
    { label:'입찰대리인',f:'daeriin',     t:'daeriin',a:'left',   w:88,  src:'dm' },
    { label:'인증',     f:'auth_method',  t:'auth',   a:'center', w:60,  src:'dm' },
    { label:'비고',     f:'dm_note',      t:'text',   a:'left',   w:130, src:'dm' }
  ];
  // 헤더 배경색 (출처 구분)
  function srcBg(src){ return src==='items' ? '#dbeafe' : (src==='dm' ? '#fef9c3' : (src==='link' ? '#e0e7ff' : '#f1f5f9')); }
  // 입찰대리인 후보 = 직원(gubun='직원')
  function _staff(){ return (_members||[]).filter(function(m){ return m.gubun==='직원'; }); }

  function _num(v){ var n=parseFloat(String(v==null?'':v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?0:n; }
  function _comma(v){ var n=_num(v); return n? n.toLocaleString('ko-KR') : String(v==null?'':v); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  // 동/층/호수 토큰 제거 (숫자+동만 → 건물동, 법정동은 보존). 우측 상세 + 그리드 주소.
  // 동/층/호수 + 대괄호 조사내용([특수권리 등]) 제거. 법정동(전포동)은 숫자 없어 보존.
  function _addrBase(a){ var s=String(a||''); s=s.replace(/\[[^\]]*\]/g,''); s=s.replace(/\d+\s*동/g,'').replace(/(지하\s*\d+|[Bb]\d+|\d+)\s*층/g,'').replace(/\d+\s*호/g,''); return s.replace(/[,\s]+$/,'').replace(/^[,\s]+/,'').replace(/\s{2,}/g,' ').trim(); }
  function widthOf(i){ return (_colW[i]!=null)?_colW[i]:COLS[i].w; }
  function frozenLeft(i){ var x=0; for(var k=0;k<i;k++) x+=widthOf(k); return x; }
  function totalW(){ var x=0; for(var i=0;i<COLS.length;i++) x+=widthOf(i); return x; }
  function applyTableWidth(){ var t=document.getElementById('dmGrid'); if(t) t.style.width=totalW()+'px'; }
  function _firstMgr(g){ return (g.items && g.items.length) ? (g.items[0].m_name_id||'') : ''; }  // 가장 빠른 물건번호(정렬됨)의 담당자

  DM.load = function () {
    if (_loading) return;
    _loading = true;
    try { _colW = JSON.parse(localStorage.getItem(COLW_KEY)||'{}')||{}; } catch(_){ _colW={}; }
    loadMembers(function(){ if(_selKey) renderBody(); });   // 직원 드롭다운/텔레그램용 회원 선로드 후 그리드 갱신
    var list = document.getElementById('dmList');
    if (list) list.innerHTML = '<li style="color:#9ca3af;font-size:12px;padding:12px">불러오는 중…</li>';
    if (typeof google === 'undefined' || !google.script || !google.script.run) { _loading=false; return; }
    google.script.run
      .withSuccessHandler(function (res) {
        _loading = false;
        if (!res || !res.success) { if(list) list.innerHTML='<li style="color:#ef4444;font-size:12px;padding:12px">로드 실패: '+esc(res&&res.message||'?')+'</li>'; return; }
        _groups = res.groups || [];
        _filtered = _groups.slice();
        renderList();
        if (_selKey && _groups.some(function(g){return g.group_key===_selKey;})) selectGroup(_selKey);
        else if (_filtered.length) selectGroup(_filtered[0].group_key);
        else renderDetail(null);
      })
      .withFailureHandler(function (e) { _loading=false; if(list) list.innerHTML='<li style="color:#ef4444;font-size:12px;padding:12px">오류: '+esc(e&&e.message||e)+'</li>'; })
      .getDamulgeonList();
  };

  DM.filterList = function (q) {
    q = String(q||'').trim().toLowerCase();
    _filtered = !q ? _groups.slice() : _groups.filter(function(g){
      return ((g.sakun_base||'')+' '+(g.court||'')+' '+(g.address_base||'')+' '+(g.in_date||'')+' '+_firstMgr(g)).toLowerCase().indexOf(q) >= 0;
    });
    renderList();
  };

  function renderList(){
    var list = document.getElementById('dmList');
    var cnt = document.getElementById('dmListCount');
    if (cnt) cnt.textContent = '('+_filtered.length+(_filtered.length!==_groups.length?('/'+_groups.length):'')+')';
    if (!list) return;
    if (!_filtered.length){ list.innerHTML='<li style="color:#9ca3af;font-size:12px;padding:12px">다물건(상품·2물건+)이 없습니다.</li>'; return; }
    list.innerHTML = _filtered.map(function(g){
      var sel = g.group_key===_selKey;
      var mgr = _firstMgr(g);
      return '<li onclick="DM.select(\''+esc(g.group_key)+'\')" '
        + 'style="padding:7px 9px;margin-bottom:5px;border-radius:6px;cursor:pointer;border:1px solid '+(sel?'#60a5fa':'#e5e7eb')+';background:'+(sel?'#eff6ff':'#fff')+'">'
        + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">'
        +   '<span style="font-weight:700;color:#1f2937">'+esc(g.sakun_base)+'</span>'
        +   '<span style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0">'
        +     '<span style="font-size:11px;padding:1px 6px;border-radius:9px;background:#fef3c7;color:#92400e;font-weight:700">'+g.count+'물건</span>'
        +     (mgr? '<span style="font-size:11px;color:#0e7490;font-weight:700">'+esc(mgr)+'</span>' : '')   // 담당자 = 물건카운트 아래
        +   '</span>'
        + '</div>'
        + '<div style="font-size:11px;color:#6b7280;margin-top:2px">'+esc(g.in_date)+' · '+esc(g.court)+'</div>'
        + '<div style="font-size:11px;color:#9ca3af;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(g.address_base||'')+'">'+esc(g.address_base||'')+'</div>'
        + '</li>';
    }).join('');
  }

  DM.select = function (key){ selectGroup(key); };
  function selectGroup(key){
    _selKey = key; renderList();
    var g = _groups.filter(function(x){return x.group_key===key;})[0];
    var fm=document.getElementById('dmFilterMulgeon'), fn=document.getElementById('dmFilterMember');
    if(fm) fm.value=''; if(fn) fn.value='';
    renderDetail(g);
  }

  function computed(f, it, idx){
    if (f==='_seq') return String(idx+1);
    if (f==='_addrBase') return _addrBase(it.address);
    if (f==='_ratio'){ var lp=_num(it.lowest_price), bp=_num(it.bidprice); return (lp&&bp)?(Math.round(bp/lp*1000)/10)+'%':''; }
    if (f==='_total'){ var t=_num(it.bidprice)+_num(it.jinhaengbi); return t?_comma(t):''; }
    return it[f];
  }

  function tdStyle(c, ci){
    var s = 'text-align:'+c.a+';width:'+widthOf(ci)+'px;min-width:'+widthOf(ci)+'px;max-width:'+widthOf(ci)+'px;overflow:hidden;text-overflow:ellipsis';
    if (ci < FROZEN) s += ';position:sticky;left:'+frozenLeft(ci)+'px;z-index:2';
    return s;
  }
  function cell(c, ci, it, idx){
    var cls = 'dmgrid-td' + (ci===FROZEN-1?' dm-frozen-edge':'');
    var style = tdStyle(c, ci);
    if (c.t==='check'){
      return '<td class="'+cls+'" style="'+style+';text-align:center"><input type="checkbox" class="dm-row-cb" data-id="'+esc(it.link_item_id)+'"></td>';
    }
    if (c.t==='sakun'){
      return '<td class="'+cls+'" style="'+style+'"><span class="dm-sakun-link" onclick="DM.openItem(\''+esc(it.link_item_id)+'\')" title="클릭 → 입찰 수정 모달">'+esc(it.sakun_no)+'</span></td>';
    }
    if (c.t==='status'){
      var st = String(it.stu_member||'');
      var klass = (typeof getStatusTagClass==='function') ? getStatusTagClass(st) : '';
      return '<td class="'+cls+'" style="'+style+'"><span class="'+klass+'">'+esc(st)+'</span></td>';
    }
    if (c.t==='ro' || c.t==='calc'){
      var v = computed(c.f, it, idx);
      if (c.a==='right' && (c.f==='lowest_price'||c.f==='deposit'||c.f==='building_area')) v=_comma(v);
      if (c.f==='member_name'){   // #3 회원명 앞 텔레그램 뱃지 (입찰물건관리 방식)
        var badge = (it.tg==='Y') ? '<span class="telegram-badge">T</span> ' : '';
        return '<td class="'+cls+'" style="'+style+'">'+badge+esc(v)+'</td>';
      }
      return '<td class="'+cls+'" style="'+style+'">'+esc(v)+'</td>';
    }
    if (c.t==='num' || c.t==='text' || c.t==='bid'){
      var val = it[c.f]==null?'':it[c.f];
      var inStyle = 'width:100%;border:0;text-align:'+c.a+';padding:3px 6px;font-size:12px;box-sizing:border-box;';
      if (c.t==='bid'){   // #4 입찰가 색상 (입찰물건관리: 미입력=빨강, 입력=진회색 굵게)
        inStyle += 'background:transparent;font-weight:700;color:'+(_num(val)>0 ? '#1f2937' : '#dc2626')+';';
      } else {
        inStyle += (c.src==='dm') ? 'background:#fffdf3;' : 'background:transparent;';   // dm 편집칸 옅은 노랑
      }
      var inCls = (c.t==='bid') ? 'dmgrid-input bidprice-cell' : 'dmgrid-input';
      return '<td class="'+cls+'" style="'+style+';padding:0"><input type="text" value="'+esc(val)+'" data-f="'+c.f+'" oninput="DM.edit(this)" onfocus="this.select()" onclick="this.select()" class="'+inCls+'" style="'+inStyle+'"></td>';
    }
    if (c.t==='auth'){
      var cur=it[c.f]||'';
      return '<td class="'+cls+'" style="'+style+';padding:0;text-align:center"><select data-f="'+c.f+'" onchange="DM.edit(this)" style="width:100%;border:0;background:transparent;font-size:12px;padding:2px">'
        + '<option value=""'+(cur===''?' selected':'')+'>-</option>'
        + '<option'+(cur==='종이'?' selected':'')+'>종이</option>'
        + '<option'+(cur==='전자'?' selected':'')+'>전자</option></select></td>';
    }
    if (c.t==='daeriin'){   // #2 입찰대리인 = 직원(gubun='직원') 드롭다운
      var cur2 = it.daeriin || '';
      var staff = _staff();
      var opts = '<option value="">-</option>' + staff.map(function(s){ return '<option'+(s.name===cur2?' selected':'')+'>'+esc(s.name)+'</option>'; }).join('');
      if (cur2 && staff.every(function(s){ return s.name!==cur2; })) opts += '<option selected>'+esc(cur2)+'</option>';   // 목록에 없는 기존값 보존
      return '<td class="'+cls+'" style="'+style+';padding:0;background:#fffdf3"><select data-f="daeriin" onchange="DM.edit(this)" style="width:100%;border:0;background:transparent;font-size:12px;padding:2px">'+opts+'</select></td>';
    }
    return '<td class="'+cls+'" style="'+style+'"></td>';
  }

  function headHtml(){
    return '<tr>' + COLS.map(function(c, ci){
      var st = 'min-width:'+widthOf(ci)+'px;width:'+widthOf(ci)+'px;max-width:'+widthOf(ci)+'px;text-align:center;position:relative;background:'+srcBg(c.src);  // 제목 가운데정렬 + 출처색
      var cls = 'dmgrid-th'+(ci===FROZEN-1?' dm-frozen-edge':'');
      if (ci < FROZEN) st += ';position:sticky;left:'+frozenLeft(ci)+'px;z-index:6';
      if (c.t==='check'){
        return '<th class="'+cls+'" style="'+st+'"><input type="checkbox" id="dmCheckAll" onclick="DM.checkAll(this)" title="전체선택"></th>';
      }
      var grip = '<span class="dm-th-grip" data-c="'+ci+'" title="드래그로 폭 조절"></span>';
      return '<th class="'+cls+'" style="'+st+'">'+esc(c.label)+grip+'</th>';
    }).join('') + '</tr>';
  }
  DM.checkAll = function(el){ document.querySelectorAll('#dmGridBody .dm-row-cb').forEach(function(cb){ cb.checked = el.checked; }); };
  DM.selectedIds = function(){ var ids=[]; document.querySelectorAll('#dmGridBody .dm-row-cb:checked').forEach(function(cb){ ids.push(cb.getAttribute('data-id')); }); return ids; };

  function curItems(){ var g=_groups.filter(function(x){return x.group_key===_selKey;})[0]; return g?g.items:[]; }
  function filteredItems(){
    var fm=(document.getElementById('dmFilterMulgeon')||{}).value||'';
    var fn=(document.getElementById('dmFilterMember')||{}).value||'';
    fm=String(fm).trim().toLowerCase(); fn=String(fn).trim().toLowerCase();
    return curItems().filter(function(it){
      if (fm && String(it.mulgeon_no||'').toLowerCase().indexOf(fm)<0) return false;
      if (fn && String(it.member_name||'').toLowerCase().indexOf(fn)<0) return false;
      return true;
    });
  }

  function renderBody(){
    var tbody=document.getElementById('dmGridBody'); if(!tbody) return;
    var items=filteredItems();
    tbody.innerHTML = items.map(function(it){
      var idx = curItems().indexOf(it);
      return '<tr data-id="'+esc(it.link_item_id)+'">'+COLS.map(function(c,ci){ return cell(c,ci,it,idx); }).join('')+'</tr>';
    }).join('');
    var ca=document.getElementById('dmCheckAll'); if(ca) ca.checked=false;
    var info=document.getElementById('dmGridInfo');
    if(info){ var tot=curItems().length, sh=items.length; info.textContent = (sh===tot? ('물건 '+tot+'건') : ('표시 '+sh+'/'+tot+'건')) + ' · 수동필드 입력 시 자동저장'; }
  }
  DM.applyFilter = function(){ renderBody(); };

  function renderDetail(g){
    var head=document.getElementById('dmDetailHead');
    var thead=document.getElementById('dmGridHead'), tbody=document.getElementById('dmGridBody');
    if (!g){
      if(head) head.innerHTML='<div style="color:#9ca3af;font-size:14px">좌측에서 사건을 선택하세요.</div>';
      if(thead) thead.innerHTML=''; if(tbody) tbody.innerHTML='';
      var info0=document.getElementById('dmGridInfo'); if(info0) info0.textContent='';
      fillDatalists([]);
      return;
    }
    var addrFull = _addrBase((g.items[0]&&g.items[0].address) || g.address_base || '');  // 동/층/호 + 조사내용 제거, 전체 표시
    if (head) head.innerHTML =
      '<div style="display:flex;align-items:baseline;gap:10px;white-space:nowrap;overflow-x:auto">'
      +   '<span style="font-size:17px;font-weight:800;color:#111827;flex-shrink:0">'+esc(g.sakun_base)+'</span>'
      +   '<span style="font-size:13px;font-weight:700;color:#1d4ed8;flex-shrink:0">'+esc(g.court)+'</span>'
      +   '<span style="font-size:12px;color:#4b5563;flex-shrink:0">입찰일 '+esc(g.in_date)+'</span>'
      +   '<span style="font-size:12px;padding:1px 8px;border-radius:9px;background:#fef3c7;color:#92400e;font-weight:700;flex-shrink:0">물건 '+g.count+'</span>'
      +   (_firstMgr(g)? '<span style="font-size:12px;padding:1px 8px;border-radius:9px;background:#cffafe;color:#0e7490;font-weight:700;flex-shrink:0">담당 '+esc(_firstMgr(g))+'</span>':'')
      +   '<span style="font-size:15px;font-weight:700;color:#111827;flex-shrink:0;margin-left:20px">'+esc(addrFull)+'</span>'
      + '</div>';
    if (thead) thead.innerHTML = headHtml();
    applyTableWidth();
    fillDatalists(g.items);
    renderBody();
    bindResizers();
  }

  function fillDatalists(items){
    var dm=document.getElementById('dmMulgeonList'), dn=document.getElementById('dmMemberList');
    if(dm){ var ms={}; items.forEach(function(it){ if(it.mulgeon_no) ms[it.mulgeon_no]=1; });
      dm.innerHTML = Object.keys(ms).sort(function(a,b){return (parseInt(a,10)||0)-(parseInt(b,10)||0);}).map(function(v){return '<option value="'+esc(v)+'">';}).join(''); }
    if(dn){ var ns={}; items.forEach(function(it){ if(it.member_name) ns[it.member_name]=1; });
      dn.innerHTML = Object.keys(ns).sort().map(function(v){return '<option value="'+esc(v)+'">';}).join(''); }
  }

  DM.openItem = function(id){
    try { if (typeof openDetailModalById==='function') openDetailModalById(id);
      else if (typeof openDetailModalWithTab==='function') openDetailModalWithTab(id); }
    catch(e){ console.error('[DM openItem]', e); }
  };

  var _saveTimers = {};
  DM.edit = function (el){
    var tr=el.closest('tr'); if(!tr) return;
    var id=tr.getAttribute('data-id'), f=el.getAttribute('data-f');
    var it=curItems().filter(function(x){return x.link_item_id===id;})[0]; if(!it) return;
    it[f]=el.value;
    if (f==='bidprice'||f==='jinhaengbi') refreshCalc(tr,it);
    var tk=id+'|'+f;
    if (_saveTimers[tk]) clearTimeout(_saveTimers[tk]);
    _saveTimers[tk]=setTimeout(function(){ (f==='bidprice') ? saveItemBid(it) : saveDmAux(it); },600);
  };
  function refreshCalc(tr,it){
    var tds=tr.children;
    COLS.forEach(function(c,i){ if(c.t==='calc' && tds[i]) tds[i].textContent=computed(c.f,it,0); });
  }
  function _dot(txt, hide){ var dot=document.getElementById('dmSaveDot'); if(!dot) return; dot.style.opacity='1'; dot.textContent=txt; if(hide) setTimeout(function(){dot.style.opacity='0';},1200); }
  // 다물건 전용(명의/향/인증/비고) → damulgeon 시트 (3키)
  function saveDmAux(it){
    if (typeof google==='undefined'||!google.script||!google.script.run) return;
    var row={ in_date:it.in_date, sakun_no:it.sakun_no, court:it.court, myungui:it.myungui, hyang:it.hyang, daeriin:it.daeriin, jinhaengbi:it.jinhaengbi, auth_method:it.auth_method, dm_note:it.dm_note };
    _dot('● 저장 중');
    google.script.run.withSuccessHandler(function(){ _dot('✓ 저장됨', true); })
      .withFailureHandler(function(e){ _dot('⚠ 저장실패'); console.error('[DM aux save]',e); })
      .saveDamulgeonRow(row);
  }
  // 입찰가 → ITEMS.bidprice (연계, 단일 소스)
  function saveItemBid(it){
    if (typeof google==='undefined'||!google.script||!google.script.run) return;
    _dot('● 입찰가 저장 중');
    google.script.run.withSuccessHandler(function(r){ _dot(r&&r.success?'✓ 입찰가 저장(ITEMS)':'⚠ '+((r&&r.message)||'실패'), true); })
      .withFailureHandler(function(e){ _dot('⚠ 입찰가 저장실패'); console.error('[DM bid save]',e); })
      .saveDamulgeonItemBid(it.in_date, it.sakun_no, it.court, it.bidprice);
  }

  // ── 컬럼 리사이즈 ──
  function bindResizers(){
    var grips=document.querySelectorAll('#DaMultiItemManagement .dm-th-grip');
    grips.forEach(function(g){
      g.addEventListener('mousedown', function(e){
        e.preventDefault(); e.stopPropagation();
        var ci=parseInt(g.dataset.c,10);
        var startX=e.clientX, startW=widthOf(ci);
        document.body.style.userSelect='none'; document.body.style.cursor='col-resize';
        function mm(ev){ var w=Math.max(30, startW+(ev.clientX-startX)); _colW[ci]=w; var col=document.querySelectorAll('#dmGrid thead th')[ci]; if(col){ col.style.width=w+'px'; col.style.minWidth=w+'px'; col.style.maxWidth=w+'px'; } applyTableWidth(); }
        function mu(){ document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); document.body.style.userSelect=''; document.body.style.cursor='';
          try{ localStorage.setItem(COLW_KEY, JSON.stringify(_colW)); }catch(_){}
          var g2=_groups.filter(function(x){return x.group_key===_selKey;})[0]; if(g2) renderDetail(g2);  // 폭 변경 → 고정열 오프셋 재계산
        }
        document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
      });
    });
  }

  DM.exportCsv = function(){
    if (typeof google==='undefined'||!google.script||!google.script.run) return;
    var keys=_selKey?[_selKey]:[];
    google.script.run
      .withSuccessHandler(function(res){
        if(!res||!res.success){ alert('CSV 실패: '+(res&&res.message||'?')); return; }
        var fn='다물건_'+(_selKey?String(_selKey).replace(/[^0-9A-Za-z가-힣]/g,'_'):'전체')+'.csv';
        var blob=new Blob([res.csv],{type:'text/csv;charset=utf-8;'});
        var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fn;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(function(){ URL.revokeObjectURL(a.href); },1500);
      })
      .withFailureHandler(function(e){ alert('CSV 오류: '+(e&&e.message||e)); })
      .exportDamulgeonCsv(keys);
  };

  // ── 일괄등록 모달 (회원/명의/입찰가 %) ──
  function loadMembers(cb){
    if (_members) { cb && cb(); return; }
    if (typeof google==='undefined'||!google.script||!google.script.run){ _members=[]; cb&&cb(); return; }
    google.script.run.withSuccessHandler(function(res){ _members=(res&&res.members)||[]; cb&&cb(); })
      .withFailureHandler(function(){ _members=[]; cb&&cb(); }).getDamulgeonMembers();
  }
  // 회원명(수기) → member_id 해석 (입찰물건관리 validateMember 방식). allMembersNewData 우선.
  function _memberByName(name){
    name=String(name||'').trim(); if(!name) return null;
    var src=(typeof allMembersNewData!=='undefined' && allMembersNewData && allMembersNewData.length)?allMembersNewData:(_members||[]);
    var clean=name.replace(/^\([^)]+\)\s*/,'').split(/[\s(]/)[0].trim();
    for(var i=0;i<src.length;i++){
      var nm=String(src[i].member_name||src[i].name||'').trim();
      var cn=nm.replace(/^\([^)]+\)\s*/,'').split(/[\s(]/)[0].trim();
      if(nm===name || (clean && cn===clean)) return { member_id:String(src[i].member_id||''), name:nm };
    }
    return null;
  }
  function _fillMemberDatalist(){
    var dl=document.getElementById('dmMemberNamesList'); if(!dl) return;
    var src=(typeof allMembersNewData!=='undefined' && allMembersNewData && allMembersNewData.length)?allMembersNewData:(_members||[]);
    var seen={}, opts=[];
    src.forEach(function(m){ var nm=String(m.member_name||m.name||'').trim(); if(nm && !seen[nm]){ seen[nm]=1; opts.push('<option value="'+esc(nm)+'">'); } });
    dl.innerHTML=opts.join('');
  }

  // 일괄작업 선택 → 값 입력칸 동적 생성 (회원=수기+자동완성, 인증=종이/전자, 나머지=텍스트)
  DM.bulkActionChange = function(){
    var act=(document.getElementById('dmBulkAction')||{}).value||'';
    var wrap=document.getElementById('dmBulkValWrap'); if(!wrap) return;
    var st='border:1px solid #d1d5db;border-radius:6px;padding:3px 6px;font-size:12px';
    if(act==='member'){ loadMembers(_fillMemberDatalist); _fillMemberDatalist(); wrap.innerHTML='<input id="dmBulkVal" list="dmMemberNamesList" placeholder="회원명(수기 입력)" autocomplete="off" onfocus="this.select()" style="'+st+';width:150px">'; }
    else if(act==='myungui'){ wrap.innerHTML='<input id="dmBulkVal" placeholder="명의" onfocus="this.select()" style="'+st+';width:120px">'; }
    else if(act==='bidprice'){ wrap.innerHTML='최저가의 <input id="dmBulkVal" type="number" step="0.1" placeholder="%" onfocus="this.select()" style="'+st+';width:72px;text-align:right"> %'; }
    else if(act==='jinhaengbi'){ wrap.innerHTML='<input id="dmBulkVal" placeholder="진행비(원)" onfocus="this.select()" style="'+st+';width:110px;text-align:right">'; }
    else if(act==='hyang'){ wrap.innerHTML='<input id="dmBulkVal" placeholder="향" onfocus="this.select()" style="'+st+';width:90px">'; }
    else if(act==='auth_method'){ wrap.innerHTML='<select id="dmBulkVal" style="'+st+'"><option value="">선택</option><option>종이</option><option>전자</option></select>'; }
    else { wrap.innerHTML=''; }
  };

  // 일괄적용 — 체크된 행에만. 회원/입찰가 → ITEMS, 명의/진행비/향/인증 → 다물건 시트.
  DM.bulkApply2 = function(){
    var act=(document.getElementById('dmBulkAction')||{}).value||'';
    if(!act){ alert('일괄작업을 선택하세요.'); return; }
    var valEl=document.getElementById('dmBulkVal'); var val=valEl?String(valEl.value).trim():'';
    var ids=DM.selectedIds();
    if(!ids.length){ alert('그리드에서 체크박스로 물건을 선택하세요.'); return; }
    var targets=curItems().filter(function(it){ return ids.indexOf(it.link_item_id)>=0; });
    if(!targets.length){ alert('선택된 물건이 없습니다.'); return; }
    var itemsRows=[], dmRows=[];
    if(act==='member'){
      if(!val){ alert('회원명을 입력하세요.'); return; }
      var mem=_memberByName(val);
      if(!mem){ if(!confirm('회원목록에 없는 이름입니다. 회원명만 기록할까요?')) return; mem={member_id:'',name:val}; }
      targets.forEach(function(it){ itemsRows.push({in_date:it.in_date,sakun_no:it.sakun_no,court:it.court,member_name:mem.name,member_id:mem.member_id}); });
    } else if(act==='bidprice'){
      var pct=parseFloat(val); if(isNaN(pct)){ alert('퍼센트(%)를 입력하세요.'); return; }
      targets.forEach(function(it){ itemsRows.push({in_date:it.in_date,sakun_no:it.sakun_no,court:it.court,bidprice:String(Math.round(_num(it.lowest_price)*pct/100))}); });
    } else {   // myungui/jinhaengbi/hyang/auth_method → 다물건 시트
      if(act!=='auth_method' && !val){ alert('값을 입력하세요.'); return; }
      targets.forEach(function(it){ var r={in_date:it.in_date,sakun_no:it.sakun_no,court:it.court}; r[act]=val; dmRows.push(r); });
    }
    var need=(itemsRows.length?1:0)+(dmRows.length?1:0), done=0; if(!need) return;
    _dot('● 일괄적용 중');
    function fin(){ done++; if(done>=need){ _dot('✓ 일괄적용 '+targets.length+'건', true); DM.load(); } }
    if(itemsRows.length) google.script.run.withSuccessHandler(fin).withFailureHandler(function(e){ alert('적용 오류: '+(e&&e.message||e)); fin(); }).bulkAssignDamulgeon(itemsRows);
    if(dmRows.length) google.script.run.withSuccessHandler(fin).withFailureHandler(function(e){ alert('적용 오류: '+(e&&e.message||e)); fin(); }).bulkSaveDamulgeon(dmRows);
  };

  function setupSplitter(){
    var sp=document.getElementById('dmSplitter'), pane=document.getElementById('dmListPane');
    if(!sp||!pane||sp.dataset.bound) return;
    try{ var w=parseInt(localStorage.getItem(SPLIT_KEY)||'',10); if(!isNaN(w)&&w>=240&&w<=900) pane.style.width=w+'px'; }catch(_){}
    sp.dataset.bound='1';
    var drag=false,sx=0,sw=0;
    sp.addEventListener('mousedown',function(e){ drag=true;sx=e.clientX;sw=pane.getBoundingClientRect().width;sp.classList.add('dragging');document.body.style.userSelect='none';e.preventDefault();});
    document.addEventListener('mousemove',function(e){ if(!drag)return; var w=Math.max(240,Math.min(900,sw+(e.clientX-sx))); pane.style.width=w+'px';});
    document.addEventListener('mouseup',function(){ if(!drag)return; drag=false;sp.classList.remove('dragging');document.body.style.userSelect=''; try{localStorage.setItem(SPLIT_KEY,String(Math.round(pane.getBoundingClientRect().width)));}catch(_){}});
  }
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', setupSplitter);
  else setupSplitter();
})();
</script>
