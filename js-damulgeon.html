<!-- ============================================================================
     다물건 관리 (DaMultiItemManagement) — Phase C 프론트
       좌측 사건 리스트(담당자 표시) + 우측 상세카드 + 25열 그리드
       (열고정 명의까지 / 컬럼 리사이즈 / 가로스크롤 / 상태배지 / 사건번호→수정모달 / 물건번호·회원명 필터)
       백엔드(SheetDB.js): getDamulgeonList / saveDamulgeonRow / exportDamulgeonCsv
       회원 드래그매칭(Phase D), 진행비 자동계산/요율표(Phase E)는 이후 단계.
     ============================================================================ -->
<style>
  #DaMultiItemManagement .dmgrid-th { padding:5px 6px; font-weight:700; color:#475569; border-bottom:2px solid #cbd5e1; border-right:1px solid #e2e8f0; white-space:nowrap; background:#f1f5f9; font-size:12px; position:sticky; top:0; z-index:4; box-sizing:border-box; }
  #DaMultiItemManagement td.dmgrid-td { border-bottom:1px solid #f1f5f9; border-right:1px solid #f1f5f9; white-space:nowrap; padding:3px 6px; font-size:12px; color:#334155; background:#fff; box-sizing:border-box; }
  #DaMultiItemManagement tr:hover td.dmgrid-td { background:#f8fafc; }
  #DaMultiItemManagement .dmgrid-input:focus { background:#fffbeb !important; outline:1px solid #fbbf24; }
  #DaMultiItemManagement #dmSplitter:hover, #DaMultiItemManagement #dmSplitter.dragging { background:#93c5fd; }
  #DaMultiItemManagement .dm-th-grip { position:absolute; top:0; right:-3px; width:7px; height:100%; cursor:col-resize; z-index:7; }
  #DaMultiItemManagement .dm-th-grip:hover { background:#93c5fd; }
  #DaMultiItemManagement .dm-frozen-edge { border-right:2px solid #cbd5e1 !important; }
  #DaMultiItemManagement .dm-sakun-link { color:#1d4ed8; cursor:pointer; text-decoration:underline; text-underline-offset:2px; font-weight:600; }
  #DaMultiItemManagement .dm-sakun-link:hover { color:#1e40af; }
  @keyframes dmSpin { to { transform:rotate(360deg); } }
  .dm-spin { animation:dmSpin .7s linear infinite; }
</style>
<script>
(function () {
  'use strict';
  var DM = window.DM = {};
  var _groups = [];      // getDamulgeonList 그룹(사건 단위)
  var _filtered = [];    // 좌측 리스트 검색 필터분
  var _selKey = null;    // 선택 group_key
  var _loading = false;
  var _members = null;   // 일괄등록 회원 목록 캐시
  var _bulkTargets = []; // 일괄등록 대상 행
  var SPLIT_KEY = 'dmListW';
  var COLW_KEY = 'dmGridColW';
  var _colW = {};        // 필드명 → px (사용자 조절, localStorage 저장)

  // 컬럼: label / f / t(타입) / a(정렬) / w(폭) / src(데이터 출처: items파랑·dm노랑·link/calc회색)
  //   t: check체크 / ro읽기 / text텍스트편집(dm) / auth인증(dm) / bid입찰가편집(items저장) / calc자동 / status상태 / sakun링크
  //   frozen=좌측 고정열, hideable=기본정보 숨기기 대상, num=천단위콤마
  var COLS = [
    { label:'',         f:'_check',       t:'check',  a:'center', w:32,  src:'',     frozen:true },
    { label:'순번',     f:'_seq',         t:'ro',     a:'center', w:40,  src:'calc', frozen:true },
    { label:'입찰일',   f:'in_date',      t:'ro',     a:'center', w:66,  src:'items',frozen:true, hideable:true },
    { label:'법원',     f:'court',        t:'ro',     a:'left',   w:60,  src:'items',frozen:true, hideable:true },
    { label:'사건번호', f:'sakun_no',     t:'sakun',  a:'left',   w:116, src:'items',frozen:true, hideable:true },
    { label:'물건종류', f:'prop_kind',    t:'ro',     a:'left',   w:78,  src:'items',frozen:true },
    { label:'물건',     f:'mulgeon_no',   t:'ro',     a:'center', w:42,  src:'items',frozen:true },
    { label:'상태',     f:'stu_member',   t:'status', a:'center', w:56,  src:'items',frozen:true },
    { label:'T',        f:'tg',           t:'tg',     a:'center', w:28,  src:'link', frozen:true },
    { label:'회원',     f:'member_name',  t:'ro',     a:'left',   w:96,  src:'items',frozen:true },
    { label:'명의',     f:'myungui',      t:'text',   a:'left',   w:68,  src:'dm',   frozen:true },
    { label:'등급',     f:'grade',        t:'ro',     a:'center', w:54,  src:'link' },
    { label:'주소',     f:'_addrBase',    t:'ro',     a:'left',   w:190, src:'items', hideable:true },
    { label:'동',       f:'_dong',        t:'ro',     a:'center', w:42,  src:'items' },
    { label:'층',       f:'_floor',       t:'ro',     a:'center', w:40,  src:'items' },
    { label:'호수',     f:'_ho',          t:'ro',     a:'center', w:48,  src:'items' },
    { label:'건물면적', f:'building_area',t:'ro',     a:'right',  w:74,  src:'items' },
    { label:'평',       f:'_pyeong',      t:'ro',     a:'right',  w:52,  src:'calc' },
    { label:'향',       f:'hyang',        t:'text',   a:'center', w:50,  src:'dm' },
    { label:'최저매각가',f:'lowest_price',t:'ro',     a:'right',  w:96,  src:'items', num:true },
    { label:'입찰가',   f:'bidprice',     t:'bid',    a:'right',  w:96,  src:'items', num:true },
    { label:'비율',     f:'_ratio',       t:'calc',   a:'right',  w:54,  src:'calc' },
    { label:'보증금',   f:'deposit',      t:'ro',     a:'right',  w:90,  src:'items', num:true },
    { label:'진행비',   f:'jinhaengbi',   t:'ro',     a:'right',  w:84,  src:'calc', num:true },
    { label:'총입금요청',f:'_total',      t:'calc',   a:'right',  w:104, src:'calc' },
    { label:'입찰대리인',f:'daeriin',     t:'daeriin',a:'left',   w:88,  src:'dm' },
    { label:'인증',     f:'auth_method',  t:'auth',   a:'center', w:60,  src:'dm' },
    { label:'비고',     f:'dm_note',      t:'text',   a:'left',   w:130, src:'dm' }
  ];
  var _hideBasic=false, _sortField='', _sortDir=1, _statusSel={};
  function visCols(){ return COLS.filter(function(c){ return !(_hideBasic && c.hideable); }); }
  function _numCols(f){ return f==='lowest_price'||f==='deposit'||f==='bidprice'||f==='jinhaengbi'; }
  // 헤더 배경색 (출처: items파랑 / dm노랑 / 수식(계산·연계)연녹색)
  function srcBg(src){ return src==='items' ? '#dbeafe' : (src==='dm' ? '#fef9c3' : ((src==='link'||src==='calc') ? '#dcfce7' : '#f1f5f9')); }
  // 입찰대리인 후보 = 구분에 '직원' 포함된 회원 (gubun 은 "직원,강사" 처럼 콤마 목록)
  function _staff(){ return (_members||[]).filter(function(m){ return String(m.gubun||'').indexOf('직원')>=0; }); }

  function _num(v){ var n=parseFloat(String(v==null?'':v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?0:n; }
  function _comma(v){ var n=_num(v); return n? n.toLocaleString('ko-KR') : String(v==null?'':v); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  // 동/층/호수 토큰 제거 (숫자+동만 → 건물동, 법정동은 보존). 우측 상세 + 그리드 주소.
  // 동/층/호수 + 대괄호 조사내용([특수권리 등]) 제거. 법정동(전포동)은 숫자 없어 보존.
  function _addrBase(a){ var s=String(a||''); s=s.replace(/\[[^\]]*\]/g,''); s=s.replace(/\d+\s*동/g,'').replace(/(지하\s*\d+|[Bb]\d+|\d+)\s*층/g,'').replace(/\d+\s*호/g,''); return s.replace(/[,\s]+$/,'').replace(/^[,\s]+/,'').replace(/\s{2,}/g,' ').trim(); }
  // items 주소 → 동/층/호수 분리 (건물 동=숫자+동, 호수 앞2자리로 층 추정)
  function _parseAddr(a){ var s=String(a||''); var ho='',fl='',dong='';
    var mHo=s.match(/(\d+)\s*호/); if(mHo) ho=mHo[1];
    var mFl=s.match(/(지하\s*\d+|[Bb]\d+|\d+)\s*층/); if(mFl) fl=mFl[1];
    var mDg=s.match(/(\d+)\s*동/); if(mDg) dong=mDg[1];
    if(!fl && ho && ho.length>=3) fl=ho.slice(0,ho.length-2);
    return {dong:dong,floor:fl,ho:ho};
  }
  // 진행비 자동: 법원 지역 + 회원별 입찰건수 (입찰진행비표 근거). 부산/경상=8만+건당6만, 그외=8만→7만→이후6만
  function _feeRegion(court){ var c=String(court||''); if(c.indexOf('부산')>=0) return 'bg'; if(c.indexOf('대구')>=0||c.indexOf('울산')>=0||c.indexOf('창원')>=0) return 'gs'; return 'etc'; }
  function _computeFees(items){
    var by={};
    (items||[]).forEach(function(it){ it._fee=''; var m=String(it.member_name||'').trim(); if(m) (by[m]=by[m]||[]).push(it); });
    Object.keys(by).forEach(function(m){
      var arr=by[m].slice().sort(function(a,b){ return (parseInt(a.mulgeon_no,10)||0)-(parseInt(b.mulgeon_no,10)||0); });
      arr.forEach(function(it,i){
        var bgGs=(_feeRegion(it.court)!=='etc');
        it._fee = String(bgGs ? (i===0?80000:60000) : (i===0?80000:(i===1?70000:60000)));
      });
    });
  }
  function widthOf(c){ return (_colW[c.f]!=null)?_colW[c.f]:c.w; }
  function totalW(){ var x=0; visCols().forEach(function(c){ x+=widthOf(c); }); return x; }
  function applyTableWidth(){ var t=document.getElementById('dmGrid'); if(t) t.style.width=totalW()+'px'; }
  // 가시열 렌더정보: 각 열의 sticky left(고정열) + 마지막 고정열 edge
  function _renderCols(){
    var vc=visCols(), out=[], fl=0, last=-1;
    vc.forEach(function(c,i){ var o={c:c, left:(c.frozen?fl:null)}; if(c.frozen){ fl+=widthOf(c); last=i; } out.push(o); });
    out.forEach(function(o,i){ o.edge=(i===last); });
    return out;
  }
  function _firstMgr(g){ return (g.items && g.items.length) ? (g.items[0].m_name_id||'') : ''; }  // 가장 빠른 물건번호(정렬됨)의 담당자

  DM.load = function () {
    if (_loading) return;
    _loading = true;
    try { _colW = JSON.parse(localStorage.getItem(COLW_KEY)||'{}')||{}; } catch(_){ _colW={}; }
    try { _hideBasic = localStorage.getItem('dmHideBasic')==='1'; var hb=document.getElementById('dmHideBasic'); if(hb) hb.checked=_hideBasic; } catch(_){}   // 기본정보 숨기기 복원(PC별)
    loadMembers(function(){ if(_selKey) renderBody(); });   // 직원 드롭다운/텔레그램용 회원 선로드 후 그리드 갱신
    var list = document.getElementById('dmList');
    if (list) list.innerHTML = '<li style="color:#9ca3af;font-size:12px;padding:12px">불러오는 중…</li>';
    if (typeof google === 'undefined' || !google.script || !google.script.run) { _loading=false; return; }
    google.script.run
      .withSuccessHandler(function (res) {
        _loading = false;
        if (!res || !res.success) { if(list) list.innerHTML='<li style="color:#ef4444;font-size:12px;padding:12px">로드 실패: '+esc(res&&res.message||'?')+'</li>'; return; }
        _groups = res.groups || [];
        _filtered = _groups.slice();
        renderList();
        if (_selKey && _groups.some(function(g){return g.group_key===_selKey;})) selectGroup(_selKey);
        else if (_filtered.length) selectGroup(_filtered[0].group_key);
        else renderDetail(null);
      })
      .withFailureHandler(function (e) { _loading=false; if(list) list.innerHTML='<li style="color:#ef4444;font-size:12px;padding:12px">오류: '+esc(e&&e.message||e)+'</li>'; })
      .getDamulgeonList();
  };

  // 수정 후 그 사건(그리드)만 빠르게 갱신 — 전체 재조회 버퍼링 없이
  DM.refreshGroup = function(key){
    key = key || _selKey; if(!key || typeof google==='undefined' || !google.script || !google.script.run) return;
    var btn=document.getElementById('dmRefreshBtn'), orig=btn?btn.innerHTML:'';
    if(btn){ btn.disabled=true; btn.innerHTML='<span class="dm-spin" style="display:inline-block">↻</span> 새로고침중…'; }
    function _restore(){ if(btn){ btn.disabled=false; btn.innerHTML=orig||'↻ 새로고침'; } }
    google.script.run.withSuccessHandler(function(res){
      _restore();
      if(!res || !res.success || !res.group){ return; }
      var i=-1; for(var k=0;k<_groups.length;k++){ if(_groups[k].group_key===key){ i=k; break; } }
      if(i>=0) _groups[i]=res.group;
      DM.filterList((document.getElementById('dmSearch')||{}).value||'');   // 좌측 갱신
      if(_selKey===key) renderDetail(res.group);                            // 우측 그리드 갱신
    }).withFailureHandler(function(){ _restore(); }).getDamulgeonGroup(key);
  };

  DM.filterList = function (q) {
    q = String(q||'').trim().toLowerCase();
    _filtered = !q ? _groups.slice() : _groups.filter(function(g){
      return ((g.sakun_base||'')+' '+(g.court||'')+' '+(g.address_base||'')+' '+(g.in_date||'')+' '+_firstMgr(g)).toLowerCase().indexOf(q) >= 0;
    });
    renderList();
  };

  function renderList(){
    var list = document.getElementById('dmList');
    var cnt = document.getElementById('dmListCount');
    if (cnt) cnt.textContent = '('+_filtered.length+(_filtered.length!==_groups.length?('/'+_groups.length):'')+')';
    if (!list) return;
    if (!_filtered.length){ list.innerHTML='<li style="color:#9ca3af;font-size:12px;padding:12px">다물건(상품·2물건+)이 없습니다.</li>'; return; }
    list.innerHTML = _filtered.map(function(g){
      var sel = g.group_key===_selKey;
      var mgr = _firstMgr(g);
      return '<li onclick="DM.select(\''+esc(g.group_key)+'\')" '
        + 'style="padding:7px 9px;margin-bottom:5px;border-radius:6px;cursor:pointer;border:1px solid '+(sel?'#2563eb':'#e5e7eb')+';background:'+(sel?'#bfdbfe':'#fff')+(sel?';box-shadow:inset 0 0 0 1px #2563eb,0 1px 4px rgba(37,99,235,.25)':'')+'">'
        + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">'
        +   '<span style="font-weight:700;color:#1f2937">'+esc(g.sakun_base)+'</span>'
        +   '<span style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0">'
        +     '<span style="font-size:11px;padding:1px 6px;border-radius:9px;background:#fef3c7;color:#92400e;font-weight:700">'+g.count+'물건</span>'
        +     (mgr? '<span style="font-size:11px;color:#0e7490;font-weight:700">'+esc(mgr)+'</span>' : '')   // 담당자 = 물건카운트 아래
        +   '</span>'
        + '</div>'
        + '<div style="font-size:11px;color:#6b7280;margin-top:2px">'+esc(g.in_date)+' · '+esc(g.court)+'</div>'
        + '<div style="font-size:11px;color:#9ca3af;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(g.address_base||'')+'">'+esc(g.address_base||'')+'</div>'
        + '</li>';
    }).join('');
  }

  DM.select = function (key){ selectGroup(key); };
  function selectGroup(key){
    _selKey = key; renderList();
    var g = _groups.filter(function(x){return x.group_key===key;})[0];
    var fm=document.getElementById('dmFilterMulgeon'), fn=document.getElementById('dmFilterMember');
    if(fm) fm.value=''; if(fn) fn.value='';
    renderDetail(g);
  }

  function computed(f, it, idx){
    if (f==='_seq') return String(idx+1);
    if (f==='_addrBase') return _addrBase(it.address);
    if (f==='_dong') return _parseAddr(it.address).dong;
    if (f==='_floor') return _parseAddr(it.address).floor;
    if (f==='_ho') return _parseAddr(it.address).ho;
    if (f==='_pyeong'){ var sq=_num(it.building_area); return sq? (Math.round(sq*0.3025*100)/100)+'평':''; }   // ㎡ → 평
    if (f==='jinhaengbi') return it._fee||'';   // 자동계산(수식)
    if (f==='_ratio'){ var lp=_num(it.lowest_price), bp=_num(it.bidprice); return (lp&&bp)?(Math.round(bp/lp*100))+'%':''; }   // 소수점 첫째자리 반올림 → 정수%
    if (f==='_total'){ var t=_num(it.bidprice)+_num(it._fee); return t?_comma(t):''; }
    return it[f];
  }

  function cell(c, it, idx, left, edge){
    var w=widthOf(c);
    var style='text-align:'+c.a+';width:'+w+'px;min-width:'+w+'px;max-width:'+w+'px;overflow:hidden;text-overflow:ellipsis';
    if(left!=null) style+=';position:sticky;left:'+left+'px;z-index:2';
    var cls='dmgrid-td'+(edge?' dm-frozen-edge':'');
    if(c.t==='check') return '<td class="'+cls+'" style="'+style+';text-align:center"><input type="checkbox" class="dm-row-cb" data-id="'+esc(it.link_item_id)+'"></td>';
    if(c.t==='tg') return '<td class="'+cls+'" style="'+style+';text-align:center">'+((it.tg==='Y')?'<span class="telegram-badge">T</span>':'')+'</td>';
    if(c.t==='sakun') return '<td class="'+cls+'" style="'+style+'"><span class="dm-sakun-link" onclick="DM.openItem(\''+esc(it.link_item_id)+'\')" title="클릭 → 입찰 수정 모달">'+esc(it.sakun_no)+'</span></td>';
    if(c.t==='status'){ var st=String(it.stu_member||''); var k=(typeof getStatusTagClass==='function')?getStatusTagClass(st):''; return '<td class="'+cls+'" style="'+style+'"><span class="'+k+'">'+esc(st)+'</span></td>'; }
    if(c.t==='ro' || c.t==='calc'){
      var v=computed(c.f,it,idx); if(c.num) v=_comma(v);
      if(c.f==='mulgeon_no' && it.link_item_id) return '<td class="'+cls+'" style="'+style+'"><span class="dm-sakun-link" onclick="DM.openItem(\''+esc(it.link_item_id)+'\')" title="클릭 → 입찰 수정 모달">'+esc(v)+'</span></td>';   // 사건번호 숨김 시 물건번호로 모달
      if(c.f==='_total'){ var done3=(_num(it.bidprice)>0 && _num(it.deposit)>0 && _num(it._fee)>0); return '<td class="'+cls+'" style="'+style+(done3?';color:#2563eb;font-weight:800':'')+'">'+esc(v)+'</td>'; }   // 입찰가·보증금·진행비 모두 입력 → 굵은 파랑
      return '<td class="'+cls+'" style="'+style+'">'+esc(v)+'</td>';
    }
    if(c.t==='num' || c.t==='text' || c.t==='bid'){
      var val=it[c.f]==null?'':it[c.f]; if(c.num) val=_comma(val);
      var inS='width:100%;border:0;text-align:'+c.a+';padding:3px 6px;font-size:12px;box-sizing:border-box;';
      if(c.t==='bid'){ var delivered=(it.bid_state && it.bid_state!=='신규'); inS+='background:transparent;font-weight:700;color:'+(delivered?'#1f2937':'#dc2626')+';'; }   // 전달 전(신규/미전달)=빨강, 전달완료/확인완료=검정 (입찰물건관리 동일)
      else inS+=(c.src==='dm')?'background:#fffdf3;':'background:transparent;';
      var ic=(c.t==='bid')?'dmgrid-input bidprice-cell':'dmgrid-input';
      return '<td class="'+cls+'" style="'+style+';padding:0"><input type="text" value="'+esc(val)+'" data-f="'+c.f+'" oninput="DM.edit(this)" onfocus="this.select()" onclick="this.select()" class="'+ic+'" style="'+inS+'"></td>';
    }

        if(num) return (_num(va)-_num(vb))*_sortDir;

  // 회원명(수기) → 회원객체 해석 (이름 또는 명의 매칭). allMembersNewData(명의 name1~10 포함) 우선.
  function _memberByName(name){
    name=String(name||'').trim(); if(!name) return null;
    var src=(typeof allMembersNewData!=='undefined' && allMembersNewData && allMembersNewData.length)?allMembersNewData:(_members||[]);
    var clean=name.replace(/^\([^)]+\)\s*/,'').split(/[\s(]/)[0].trim();
    for(var i=0;i<src.length;i++){
      var m=src[i], nm=String(m.member_name||m.name||'').trim();
      var cn=nm.replace(/^\([^)]+\)\s*/,'').split(/[\s(]/)[0].trim();
      if(nm===name || (clean && cn===clean)) return { member_id:String(m.member_id||''), name:nm, m:m };
      for(var k=1;k<=10;k++){ if(String(m['name'+k]||'').trim()===name) return { member_id:String(m.member_id||''), name:nm, m:m }; }   // 명의 매칭
    }
    return null;
  }

      DM.bidMethod('pct');
    }
    else if(act==='jinhaengbi'){ area.innerHTML='<label style="font-size:12px;color:#374151;font-weight:600">진행비(원)</label><br><input id="dmBulkVal" placeholder="진행비" oninput="DM.bulkPrev()" onfocus="this.select()" style="'+st+';width:150px;text-align:right;margin-top:5px">'; }
    else if(act==='hyang'){ area.innerHTML='<label style="font-size:12px;color:#374151;font-weight:600">향</label><br><input id="dmBulkVal" placeholder="향" oninput="DM.bulkPrev()" onfocus="this.select()" style="'+st+';width:120px;margin-top:5px">'; }
    else if(act==='daeriin'){ area.innerHTML='<label style="font-size:12px;color:#374151;font-weight:600">입찰대리인 (구분에 직원 포함)</label><br><select id="dmBulkVal" onchange="DM.bulkPrev()" style="'+st+';min-width:170px;margin-top:5px"><option value="">불러오는 중…</option></select>'; loadMembers(function(){ var s=document.getElementById('dmBulkVal'); if(s) s.innerHTML='<option value="">선택</option>'+_staff().map(function(m){ var n=m.name||m.member_name||''; return n?'<option>'+esc(n)+'</option>':''; }).join(''); DM.bulkPrev(); }); }
    else if(act==='auth_method'){ area.innerHTML='<label style="font-size:12px;color:#374151;font-weight:600">인증방식</label><br><select id="dmBulkVal" onchange="DM.bulkPrev()" style="'+st+';margin-top:5px"><option value="">선택</option><option>종이</option><option>전자</option></select>'; }
    renderBulkList();
    document.getElementById('dmBulkModal').classList.remove('content-hidden');
    setTimeout(function(){ var v=document.getElementById('dmBulkVal'); if(v) v.focus(); },60);
  };
  // 회원 자동완성 — 입찰물건관리 buildMemberAcItems_(전역) 그대로 호출 → 명의 포함 항목 드롭다운
  DM.memberAcInput = function(){
    var inp=document.getElementById('dmBulkVal'), ul=document.getElementById('dmMemberAc'); if(!inp||!ul) return;
    var hid=document.getElementById('dmBulkMemberId'); if(hid) hid.value='';   // 타이핑하면 선택 해제
    _acItems = (typeof buildMemberAcItems_==='function') ? (buildMemberAcItems_(inp.value)||[]) : [];
    if(!_acItems.length){ ul.style.display='none'; ul.innerHTML=''; }
    else {
      ul.innerHTML=_acItems.map(function(it,i){
        var sty=(it.kind==='myungui')?'padding-left:22px;color:#374151':'font-weight:700;color:#111827';
        return '<li onmousedown="DM.memberAcPick('+i+')" onmouseenter="this.style.background=\'#eef2ff\'" onmouseleave="this.style.background=\'transparent\'" style="padding:6px 10px;cursor:pointer;border-radius:5px;white-space:nowrap;'+sty+'">'+esc(it.displayText)+(it.rightText?(' <span style="color:#94a3b8;font-size:11px">'+esc(it.rightText)+'</span>'):'')+'</li>';
      }).join('');
      ul.style.display='block';
    }
    bulkMemInfo(); renderBulkList();
  };
  DM.memberAcPick = function(i){
    var it=_acItems[i]; if(!it) return;
    var inp=document.getElementById('dmBulkVal'); if(inp) inp.value=it.inputValue;   // "이정우 (MJ) 한한한" (명의 포함)
    var hid=document.getElementById('dmBulkMemberId'); if(hid) hid.value=it.member_id||'';
    var ul=document.getElementById('dmMemberAc'); if(ul) ul.style.display='none';
    bulkMemInfo(); renderBulkList();
  };
  DM.memberAcBlur = function(){ setTimeout(function(){ var ul=document.getElementById('dmMemberAc'); if(ul) ul.style.display='none'; },200); };
  function bulkMemInfo(){
    var v=String((document.getElementById('dmBulkVal')||{}).value||'').trim();
    var hid=(document.getElementById('dmBulkMemberId')||{}).value||'';
    var info=document.getElementById('dmBulkMemInfo'); if(!info) return;
    if(!v){ info.innerHTML=''; return; }
    info.innerHTML = hid ? '<span style="color:#16a34a">✓ 선택됨 (명의 포함): '+esc(v)+'</span>' : '<span style="color:#d97706">목록에서 명의를 선택하세요 (또는 이름 그대로 적용)</span>';
  }
  DM.bulkMemberInfo = bulkMemInfo;
  DM.bulkPrev = function(){ renderBulkList(); };
  // 입찰가 3옵션 위젯 (직접입력/퍼센트/최저가+금액) — 입찰물건관리 입찰가 입력 재사용(parseBidWon_·bidStyleGet_, 자유/분리 PC저장)
  function _bidWidgetHtml(){
    var style=(typeof bidStyleGet_==='function')?bidStyleGet_():'free';
    return '<div style="font-size:11px;margin-bottom:5px">'
      +'<label style="margin-right:10px;cursor:pointer"><input type="radio" name="dmBidStyle" '+(style==='free'?'checked':'')+' onclick="DM.setBidStyle(\'free\')"> 자유</label>'
      +'<label style="cursor:pointer"><input type="radio" name="dmBidStyle" '+(style==='split'?'checked':'')+' onclick="DM.setBidStyle(\'split\')"> 분리</label></div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span id="dmBidFreeWrap"'+(style==='split'?' style="display:none"':'')+'><input id="dmBidFree" placeholder="예: 14억5900만 / 145900000" oninput="DM.bidInput()" onfocus="this.select()" style="border:1px solid #d1d5db;border-radius:6px;padding:5px 8px;font-size:13px;width:210px;text-align:right"></span>'
      +'<span id="dmBidSplitWrap"'+(style==='free'?' style="display:none"':'')+'><input id="dmBidEok" inputmode="numeric" placeholder="억" oninput="DM.bidInput()" onfocus="this.select()" style="border:1px solid #d1d5db;border-radius:6px;padding:5px 6px;font-size:13px;width:56px;text-align:right"> 억 <input id="dmBidMan" inputmode="numeric" placeholder="만" oninput="DM.bidInput()" onfocus="this.select()" style="border:1px solid #d1d5db;border-radius:6px;padding:5px 6px;font-size:13px;width:68px;text-align:right"> 만</span>'
      +'<span style="font-size:13px;font-weight:700;color:#2563eb">= <span id="dmBidWonDisp">0</span> 원</span></div>';
  }
  DM.setBidStyle = function(s){ try{ localStorage.setItem('bidInputStyle', s==='split'?'split':'free'); }catch(_){}; var f=document.getElementById('dmBidFreeWrap'), sp=document.getElementById('dmBidSplitWrap'); if(f) f.style.display=(s==='split')?'none':''; if(sp) sp.style.display=(s==='free')?'none':''; DM.bidInput(); };
  DM.bidInput = function(){
    var style=(typeof bidStyleGet_==='function')?bidStyleGet_():'free', won=0;
    if(style==='split'){ var ev=parseInt(((document.getElementById('dmBidEok')||{}).value||'').replace(/[^0-9]/g,'')||'0',10)||0; var mv=parseInt(((document.getElementById('dmBidMan')||{}).value||'').replace(/[^0-9]/g,'')||'0',10)||0; won=ev*100000000+mv*10000; }
    else { var v=(document.getElementById('dmBidFree')||{}).value||''; won=(typeof parseBidWon_==='function')?(parseBidWon_(v)||0):_num(v); }
    _bidWon=won; var d=document.getElementById('dmBidWonDisp'); if(d) d.textContent=_comma(won);
    renderBulkList();
  };
  DM.bidMethod = function(m){
    _bidMethod=m; _bidWon=0;
    var a=document.getElementById('dmBidValArea'); if(!a) return;
    if(m==='pct'){ a.innerHTML='최저가의 <input id="dmBulkVal" type="number" step="0.1" placeholder="%" oninput="DM.bulkPrev()" onfocus="this.select()" style="border:1px solid #d1d5db;border-radius:6px;padding:4px 6px;font-size:13px;width:84px;text-align:right"> %'; }
    else { a.innerHTML=(m==='plus'?'<div style="font-size:11px;color:#6b7280;margin-bottom:4px">최저가 + 아래 금액을 각 물건에 적용</div>':'')+_bidWidgetHtml(); DM.bidInput(); }
    renderBulkList();
  };
  // 항목별 적용 입찰가 (방식별)
  function _bidFor(it){
    if(_bidMethod==='pct'){ var p=parseFloat((document.getElementById('dmBulkVal')||{}).value); return isNaN(p)?null:Math.round(_num(it.lowest_price)*p/100); }
    if(_bidMethod==='direct'){ return _bidWon||null; }
    if(_bidMethod==='plus'){ return _bidWon? (_num(it.lowest_price)+_bidWon) : null; }
    return null;
  }
  function renderBulkList(){
    var tb=document.getElementById('dmBulkList'); if(!tb) return;
    var act=_bulkAct, valEl=document.getElementById('dmBulkVal'), val=valEl?String(valEl.value).trim():'';
    var memName=(act==='member')?val:'';   // 입력값 그대로(명의 포함: "이정우 (MJ) 한한한")
    tb.innerHTML=_bulkTgts.map(function(it,idx){
      var cur, next;
      if(act==='member'){ cur=it.member_name||''; next=memName; }
      else if(act==='bidprice'){ cur=it.bidprice?_comma(it.bidprice):''; var nb=_bidFor(it); next=(nb==null)?'':_comma(String(nb)); }
      else { cur=it[act]||''; next=val; }
      var changed = next && String(cur)!==String(next);
      var bg = (idx%2) ? '#fafafa' : '#fff';
      return '<tr style="background:'+bg+';border-bottom:1px solid #f1f5f9">'
        +'<td style="padding:5px 8px;white-space:nowrap;font-weight:600;color:#1f2937">'+esc(it.sakun_no)+'</td>'
        +'<td style="padding:5px 8px;white-space:nowrap;color:#6b7280">'+esc(it.court)+'</td>'
        +'<td style="padding:5px 8px;text-align:right;white-space:nowrap;color:#475569">'+_comma(it.lowest_price)+'</td>'
        +'<td style="padding:5px 8px;white-space:nowrap;color:#94a3b8">'+esc(cur||'-')+'</td>'
        +'<td style="text-align:center;color:#cbd5e1">→</td>'
        +'<td style="padding:5px 8px;white-space:nowrap;font-weight:700;color:'+(changed?'#4f46e5':(next?'#94a3b8':'#cbd5e1'))+'">'+esc(next||'(미입력)')+'</td>'
        +'</tr>';
    }).join('');
  }
  DM.bulkClose = function(){ var m=document.getElementById('dmBulkModal'); if(m) m.classList.add('content-hidden'); };
  DM.bulkConfirm = function(){
    var act=_bulkAct, valEl=document.getElementById('dmBulkVal'), val=valEl?String(valEl.value).trim():'';
    var targets=_bulkTgts; if(!targets.length){ DM.bulkClose(); return; }
    var itemsRows=[], dmRows=[];
    if(act==='member'){
      if(!val){ alert('회원명을 입력하세요.'); return; }
      var mid=String((document.getElementById('dmBulkMemberId')||{}).value||'');
      if(!mid){ var rr=_memberByName(val); if(rr) mid=rr.member_id; }   // 수기 입력 폴백
      targets.forEach(function(it){ itemsRows.push({in_date:it.in_date,sakun_no:it.sakun_no,court:it.court,member_name:val,member_id:mid}); });   // member_name = 명의 포함값
    } else if(act==='bidprice'){
      if(_bidMethod==='pct'){ if(isNaN(parseFloat((document.getElementById('dmBulkVal')||{}).value))){ alert('퍼센트(%)를 입력하세요.'); return; } }
      else if(!_bidWon){ alert('입찰가/금액을 입력하세요.'); return; }
      targets.forEach(function(it){ var nb=_bidFor(it); if(nb!=null) itemsRows.push({in_date:it.in_date,sakun_no:it.sakun_no,court:it.court,bidprice:String(nb)}); });
    } else {
      if(act!=='auth_method' && !val){ alert('값을 입력하세요.'); return; }
      targets.forEach(function(it){ var r={in_date:it.in_date,sakun_no:it.sakun_no,court:it.court}; r[act]=val; dmRows.push(r); });
    }
    var need=(itemsRows.length?1:0)+(dmRows.length?1:0), done=0; if(!need){ DM.bulkClose(); return; }
    var btn=document.getElementById('dmBulkConfirmBtn'); if(btn){ btn.disabled=true; btn.textContent='적용 중…'; }
    var _key=_selKey;
    function fin(){ done++; if(done>=need){ if(btn){btn.disabled=false;btn.textContent='적용';} DM.bulkClose(); _dot('✓ 일괄적용 '+targets.length+'건', true); DM.refreshGroup(_key); } }
    if(itemsRows.length) google.script.run.withSuccessHandler(fin).withFailureHandler(function(e){ alert('적용 오류: '+(e&&e.message||e)); fin(); }).bulkAssignDamulgeon(itemsRows);
    if(dmRows.length) google.script.run.withSuccessHandler(fin).withFailureHandler(function(e){ alert('적용 오류: '+(e&&e.message||e)); fin(); }).bulkSaveDamulgeon(dmRows);
  };

  function setupSplitter(){
    var sp=document.getElementById('dmSplitter'), pane=document.getElementById('dmListPane');
    if(!sp||!pane||sp.dataset.bound) return;
    try{ var w=parseInt(localStorage.getItem(SPLIT_KEY)||'',10); if(!isNaN(w)&&w>=240&&w<=900) pane.style.width=w+'px'; }catch(_){}
    sp.dataset.bound='1';
    var drag=false,sx=0,sw=0;
    sp.addEventListener('mousedown',function(e){ drag=true;sx=e.clientX;sw=pane.getBoundingClientRect().width;sp.classList.add('dragging');document.body.style.userSelect='none';e.preventDefault();});
    document.addEventListener('mousemove',function(e){ if(!drag)return; var w=Math.max(240,Math.min(900,sw+(e.clientX-sx))); pane.style.width=w+'px';});
    document.addEventListener('mouseup',function(){ if(!drag)return; drag=false;sp.classList.remove('dragging');document.body.style.userSelect=''; try{localStorage.setItem(SPLIT_KEY,String(Math.round(pane.getBoundingClientRect().width)));}catch(_){}});
  }
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', setupSplitter);
  else setupSplitter();
})();
</script>
