<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입찰가 라디오 정렬 목업</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { padding: 30px; background:#f1f5f9; font-family: -apple-system, system-ui, sans-serif; }
  .card { background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:20px; margin-bottom:24px; max-width:320px; }
  .tag { font-size:12px; font-weight:700; color:#6366f1; margin-bottom:10px; }
  .guide { outline:1px dashed #cbd5e1; }
</style>
</head>
<body>

<!-- ===== BEFORE (현재) ===== -->
<div class="card">
  <div class="tag">BEFORE — 현재</div>
  <label class="block text-sm font-medium text-gray-700" style="white-space:nowrap;min-height:22px">입찰가
    <span style="margin-left:4px;font-size:11px;font-weight:400;color:#64748b;white-space:nowrap">
      <label style="cursor:pointer"><input type="radio" name="b-bs" checked>자유</label>
      <label style="cursor:pointer;margin-left:4px"><input type="radio" name="b-bs">분리</label>
      <span>(<label style="cursor:pointer"><input type="radio" name="b-ba" checked>1</label><label style="cursor:pointer;margin-left:3px"><input type="radio" name="b-ba">2</label>)</span>
    </span>
  </label>
  <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
    <input placeholder="억" class="w-full px-2 py-2 border border-gray-300 rounded-lg text-right">
    <span class="text-sm font-bold text-gray-600">억</span>
    <input placeholder="만" class="w-full px-2 py-2 border border-gray-300 rounded-lg text-right">
    <span class="text-sm font-bold text-gray-600">만</span>
  </div>
</div>

<!-- ===== AFTER (수정안) ===== -->
<div class="card">
  <div class="tag">AFTER — 수정안 (세로 가운데 + 간격)</div>
  <label class="block text-sm font-medium text-gray-700" style="white-space:nowrap;min-height:22px">입찰가
    <span style="margin-left:6px;font-size:11px;font-weight:400;color:#64748b;white-space:nowrap;display:inline-flex;align-items:center;gap:8px;vertical-align:middle">
      <label style="cursor:pointer;display:inline-flex;align-items:center;gap:3px"><input type="radio" name="a-bs" checked style="margin:0">자유</label>
      <label style="cursor:pointer;display:inline-flex;align-items:center;gap:3px"><input type="radio" name="a-bs" style="margin:0">분리</label>
      <span style="display:inline-flex;align-items:center;gap:3px">(<label style="cursor:pointer;display:inline-flex;align-items:center;gap:3px"><input type="radio" name="a-ba" checked style="margin:0">1</label><label style="cursor:pointer;display:inline-flex;align-items:center;gap:3px"><input type="radio" name="a-ba" style="margin:0">2</label>)</span>
    </span>
  </label>
  <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
    <input placeholder="억" class="w-full px-2 py-2 border border-gray-300 rounded-lg text-right">
    <span class="text-sm font-bold text-gray-600">억</span>
    <input placeholder="만" class="w-full px-2 py-2 border border-gray-300 rounded-lg text-right">
    <span class="text-sm font-bold text-gray-600">만</span>
  </div>
</div>

</body>
</html>
