<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>회원 물건카드 · 폰트 조절 시안</title>
<style>
  :root{
    --fs-date: 18px;
    --fs-court: 12px;
    --fs-manager: 12px;
    --fs-sakun: 18px;
    --fs-price: 18px;
    --fs-btn: 14px;
    --fs-view: 13px;
    /* 세로 높이/여백 */
    --pv-head: 11px;
    --gap-head: 7px;
    --pv-sakun: 10px;
    --pv-price: 11px;
  }
  * { box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  body { font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif; background:#e9edf2; margin:0; padding:24px 12px 70px; color:#0f172a; }
  .title { text-align:center; font-size:1.4rem; font-weight:900; }
  .sub { text-align:center; color:#64748b; font-size:.88rem; margin:6px 0 22px; }
  .layout { display:flex; gap:26px; justify-content:center; flex-wrap:wrap; align-items:flex-start; }

  /* ── 조절 패널 ── */
  .panel { width:330px; background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:16px 18px; box-shadow:0 6px 20px -8px rgba(15,23,42,.15); }
  .panel h3 { margin:0 0 12px; font-size:1rem; }
  .ctrl { margin-bottom:13px; }
  .ctrl-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
  .ctrl-top label { font-weight:800; font-size:.9rem; color:#334155; }
  .ctrl-top .val { font-weight:800; font-size:.82rem; color:#2563eb; }
  .ctrl-top .val small { color:#94a3b8; font-weight:600; }
  .ctrl-in { display:flex; gap:8px; align-items:center; }
  .ctrl-in input[type=range]{ flex:1; accent-color:#4f46e5; }
  .ctrl-in input[type=number]{ width:58px; padding:4px 6px; border:1px solid #cbd5e1; border-radius:7px; font-size:.85rem; text-align:center; }
  .summary { margin-top:14px; border-top:1px dashed #e2e8f0; padding-top:12px; }
  .summary textarea { width:100%; height:104px; border:1px solid #cbd5e1; border-radius:8px; padding:8px; font-family:ui-monospace,monospace; font-size:.78rem; color:#334155; resize:vertical; }
  .summary button { margin-top:8px; width:100%; padding:9px; border:none; border-radius:9px; background:#4f46e5; color:#fff; font-weight:800; cursor:pointer; }
  .summary button:active { transform:scale(.98); }

  /* ── 카드 (C-1 정제) ── */
  .stage { width:372px; max-width:94vw; background:#f3f4f6; border:1px solid #e2e8f0; border-radius:22px; padding:16px; box-shadow:inset 0 2px 8px rgba(15,23,42,.04); }
  .cp { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border:1px solid #e2e8f0; background:#f8fafc; border-radius:8px; color:#94a3b8; cursor:pointer; flex-shrink:0; padding:0; transition:all .12s; }
  .cp:hover{ background:#eef2f7; color:#475569; } .cp:active{ transform:scale(.88); } .cp svg{ width:14px; height:14px; }
  /* 헤더(컬러 배경)용 복사버튼 — 반투명 화이트 */
  .cp-h { display:inline-flex; align-items:center; justify-content:center; width:23px; height:23px; border:1px solid rgba(255,255,255,.42); background:rgba(255,255,255,.18); border-radius:7px; color:#fff; cursor:pointer; flex-shrink:0; padding:0; transition:all .12s; }
  .cp-h:hover{ background:rgba(255,255,255,.32); } .cp-h:active{ transform:scale(.88); } .cp-h svg{ width:13px; height:13px; }

  .c1-card { background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 10px 26px -12px rgba(15,23,42,.28); border:1px solid #eef2f7; }
  .c1-card + .c1-card { margin-top:14px; }
  .c1-head { display:flex; align-items:center; justify-content:space-between; padding:var(--pv-head) 15px; gap:10px; }
  .c1-head.rec { background:linear-gradient(135deg,#fb923c,#f97316); } .c1-head.bid { background:linear-gradient(135deg,#6366f1,#4f46e5); }
  .head-left { display:flex; flex-direction:column; align-items:flex-start; gap:var(--gap-head); min-width:0; }
  .c1-date { color:#fff; font-weight:900; font-size:var(--fs-date); text-shadow:0 1px 2px rgba(0,0,0,.15); white-space:nowrap; }
  .c1-date .dow { font-weight:800; opacity:.92; }
  .cm { display:flex; flex-direction:row; align-items:center; gap:6px; min-width:0; }
  /* 법원·담당자 = 반투명 화이트 라운드 배지 */
  .court, .manager { display:inline-flex; align-items:center; max-width:100%; padding:3px 11px; border-radius:9px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; background:rgba(255,255,255,.20); border:1px solid rgba(255,255,255,.34); text-shadow:0 1px 1px rgba(0,0,0,.12); }
  .court { font-weight:800; font-size:var(--fs-court); background:#fff; color:#334155; border-color:rgba(255,255,255,.7); text-shadow:none; }
  .manager { font-weight:700; font-size:var(--fs-manager); background:rgba(255,255,255,.16); }

  .c1-btn { border:none; cursor:pointer; padding:10px 22px; border-radius:13px; font-weight:900; font-size:var(--fs-btn); color:#fff; flex-shrink:0; transition:transform .07s ease, box-shadow .07s ease, filter .12s; }
  .c1-btn.rec { background:linear-gradient(180deg,#fdbb74,#f97316); box-shadow:0 5px 0 #c2410c, 0 9px 14px -4px rgba(249,115,22,.55), inset 0 1px 0 rgba(255,255,255,.5); }
  .c1-btn.bid { background:linear-gradient(180deg,#818cf8,#4f46e5); box-shadow:0 5px 0 #3730a3, 0 9px 14px -4px rgba(79,70,229,.55), inset 0 1px 0 rgba(255,255,255,.5); }
  .c1-btn:hover{ filter:brightness(1.05); }
  .c1-btn.rec:active { transform:translateY(4px); box-shadow:0 1px 0 #c2410c, 0 2px 6px -2px rgba(249,115,22,.5), inset 0 1px 0 rgba(255,255,255,.35); }
  .c1-btn.bid:active { transform:translateY(4px); box-shadow:0 1px 0 #3730a3, 0 2px 6px -2px rgba(79,70,229,.5), inset 0 1px 0 rgba(255,255,255,.35); }

  .c1-body { padding:0 15px; }
  .sakun-row { display:flex; align-items:flex-start; gap:7px; padding:var(--pv-sakun) 0; }
  .sakun { flex:1; min-width:0; font-weight:900; color:#1e293b; font-size:var(--fs-sakun); line-height:1.3; word-break:keep-all; overflow-wrap:anywhere; }
  .sakun-row .cp { margin-top:2px; }
  .price-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:var(--pv-price) 0; border-top:1px dashed #e5e7eb; }
  .price-left { display:flex; align-items:center; gap:7px; }
  .price { font-weight:900; font-size:var(--fs-price); } .price.na{ color:#9ca3af; font-weight:500; } .price.ok{ color:#7c3aed; }
  .view { display:inline-flex; align-items:center; gap:5px; color:#334155; background:#eef2f7; padding:8px 15px; border-radius:13px; font-weight:800; font-size:var(--fs-view); cursor:pointer; border:none; }
</style>
</head>
<body>
  <div class="title">회원 물건카드 · 폰트 직접 조절</div>
  <div class="sub">슬라이더/숫자로 각 폰트를 바꾸면 오른쪽 카드에 실시간 반영됩니다. 마음에 드는 값 나오면 아래 “요약”을 저에게 보내주세요.</div>

  <div class="layout">
    <!-- 조절 패널 -->
    <div class="panel">
      <h3>🎚️ 폰트 크기 (px)</h3>
      <div class="ctrl" data-var="--fs-date">
        <div class="ctrl-top"><label>입찰일자</label><span class="val"></span></div>
        <div class="ctrl-in"><input type="range" min="12" max="30" step="1"><input type="number" min="8" max="40"></div>
      </div>
      <div class="ctrl" data-var="--fs-court">
        <div class="ctrl-top"><label>법원</label><span class="val"></span></div>
        <div class="ctrl-in"><input type="range" min="10" max="26" step="1"><input type="number" min="8" max="40"></div>
      </div>
      <div class="ctrl" data-var="--fs-manager">
        <div class="ctrl-top"><label>담당자</label><span class="val"></span></div>
        <div class="ctrl-in"><input type="range" min="10" max="24" step="1"><input type="number" min="8" max="40"></div>
      </div>
      <div class="ctrl" data-var="--fs-sakun">
        <div class="ctrl-top"><label>사건번호</label><span class="val"></span></div>
        <div class="ctrl-in"><input type="range" min="12" max="30" step="1"><input type="number" min="8" max="40"></div>
      </div>
      <div class="ctrl" data-var="--fs-price">
        <div class="ctrl-top"><label>입찰가</label><span class="val"></span></div>
        <div class="ctrl-in"><input type="range" min="12" max="28" step="1"><input type="number" min="8" max="40"></div>
      </div>
      <div class="ctrl" data-var="--fs-btn">
        <div class="ctrl-top"><label>추천/입찰 버튼</label><span class="val"></span></div>
        <div class="ctrl-in"><input type="range" min="12" max="26" step="1"><input type="number" min="8" max="40"></div>
      </div>
      <div class="ctrl" data-var="--fs-view">
        <div class="ctrl-top"><label>조사내용보기</label><span class="val"></span></div>
        <div class="ctrl-in"><input type="range" min="10" max="22" step="1"><input type="number" min="8" max="40"></div>
      </div>

      <h3 style="margin-top:18px">📐 세로 높이/여백 (px)</h3>
      <div class="ctrl" data-var="--pv-head">
        <div class="ctrl-top"><label>헤더 칸 높이</label><span class="val"></span></div>
        <div class="ctrl-in"><input type="range" min="2" max="30" step="1"><input type="number" min="0" max="60"></div>
      </div>
      <div class="ctrl" data-var="--gap-head">
        <div class="ctrl-top"><label>날짜↔법원 간격</label><span class="val"></span></div>
        <div class="ctrl-in"><input type="range" min="0" max="24" step="1"><input type="number" min="0" max="60"></div>
      </div>
      <div class="ctrl" data-var="--pv-sakun">
        <div class="ctrl-top"><label>사건번호 칸 높이</label><span class="val"></span></div>
        <div class="ctrl-in"><input type="range" min="2" max="30" step="1"><input type="number" min="0" max="60"></div>
      </div>
      <div class="ctrl" data-var="--pv-price">
        <div class="ctrl-top"><label>입찰가 칸 높이</label><span class="val"></span></div>
        <div class="ctrl-in"><input type="range" min="2" max="30" step="1"><input type="number" min="0" max="60"></div>
      </div>
      <div class="summary">
        <textarea id="sum" readonly></textarea>
        <button id="copyBtn">📋 현재 값 복사</button>
      </div>
    </div>

    <!-- 카드 -->
    <div class="stage">
      <div class="c1-card">
        <div class="c1-head rec">
          <div class="head-left">
            <span class="c1-date">7월 22일 <span class="dow">(수)</span></span>
            <div class="cm"><span class="court">부산</span><button class="cp-h" title="법원 복사 — 풀네임(부산지방법원)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button><span class="manager">MJ</span></div>
          </div>
          <button class="c1-btn rec">추천</button>
        </div>
        <div class="c1-body">
          <div class="sakun-row">
            <span class="sakun">2024타경1391(4)</span>
            <button class="cp" title="사건번호 복사"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button>
          </div>
          <div class="price-row">
            <div class="price-left"><span class="price na">가격미정</span></div>
            <button class="view">🔍 조사내용보기 ›</button>
          </div>
        </div>
      </div>

      <div class="c1-card">
        <div class="c1-head bid">
          <div class="head-left">
            <span class="c1-date">7월 25일 <span class="dow">(토)</span></span>
            <div class="cm"><span class="court">의정부고양</span><button class="cp-h" title="법원 복사 — 풀네임(의정부지방법원 고양지원)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button><span class="manager">박대원</span></div>
          </div>
          <button class="c1-btn bid">입찰</button>
        </div>
        <div class="c1-body">
          <div class="sakun-row">
            <span class="sakun">2024타경536838(12)</span>
            <button class="cp" title="사건번호 복사"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button>
          </div>
          <div class="price-row">
            <div class="price-left">
              <span class="price ok">1억 2,500만원</span>
              <button class="cp" title="입찰가 복사 — 표시값 말고 숫자 원본(125000000)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button>
            </div>
            <button class="view">🔍 조사내용보기 ›</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    var LABELS = { '--fs-date':'입찰일자', '--fs-court':'법원', '--fs-manager':'담당자', '--fs-sakun':'사건번호', '--fs-price':'입찰가', '--fs-btn':'버튼', '--fs-view':'조사내용보기',
                   '--pv-head':'헤더 높이', '--gap-head':'날짜↔법원 간격', '--pv-sakun':'사건번호 칸', '--pv-price':'입찰가 칸' };
    var ctrls = Array.prototype.slice.call(document.querySelectorAll('.ctrl'));
    function px(v){ return v + 'px'; }
    function rem(v){ return (v/16).toFixed(2) + 'rem'; }
    function updateSummary(){
      var lines = ctrls.map(function(c){
        var v = c.querySelector('input[type=number]').value;
        var vr = c.dataset.var;
        var isFont = vr.indexOf('--fs-')===0;
        return LABELS[vr] + ': ' + px(v) + (isFont ? '  (' + rem(v) + ')' : '');
      });
      document.getElementById('sum').value = lines.join('\n');
    }
    ctrls.forEach(function(c){
      var vr = c.dataset.var;
      var range = c.querySelector('input[type=range]');
      var num = c.querySelector('input[type=number]');
      var val = c.querySelector('.val');
      var cur = parseInt(getComputedStyle(document.documentElement).getPropertyValue(vr));
      var lo = parseInt(num.getAttribute('min')); if(isNaN(lo)) lo=0;
      var hi = parseInt(num.getAttribute('max')); if(isNaN(hi)) hi=100;
      var isFont = vr.indexOf('--fs-')===0;
      function apply(v){
        v = Math.max(lo, Math.min(hi, parseInt(v)||cur));
        document.documentElement.style.setProperty(vr, px(v));
        range.value = v; num.value = v;
        val.innerHTML = px(v) + (isFont ? ' <small>(' + rem(v) + ')</small>' : '');
        updateSummary();
      }
      range.addEventListener('input', function(){ apply(range.value); });
      num.addEventListener('input', function(){ apply(num.value); });
      apply(cur);
    });
    document.getElementById('copyBtn').addEventListener('click', function(){
      var ta = document.getElementById('sum'); ta.select(); document.execCommand('copy');
      this.textContent = '✅ 복사됨!'; var b=this; setTimeout(function(){ b.textContent='📋 현재 값 복사'; }, 1500);
    });
  </script>
</body>
</html>
