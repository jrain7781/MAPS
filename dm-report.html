<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2">
<title><?= reportTitle ?></title>
<meta property="og:title" content="<?= reportTitle ?>">
<meta property="og:description" content="<?= reportDesc ?>">
<meta name="description" content="<?= reportDesc ?>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { overflow-x:hidden; }
  body{ margin:0; background:#eef1f5; font-family:'Inter','Malgun Gothic','맑은 고딕',sans-serif; -webkit-text-size-adjust:100%; }
  .dmw-top{ text-align:center; padding:14px 12px 4px; color:#64748b; font-size:12px; }
  .dmw-wrap{ max-width:460px; margin:0 auto; padding:8px 12px 40px; }
  /* 게이트(본인확인) */
  #gate{ max-width:340px; margin:48px auto; background:#fff; border-radius:14px; box-shadow:0 8px 30px rgba(0,0,0,.12); padding:26px 22px; text-align:center; }
  #gate .lock{ font-size:34px; }
  #gate h2{ font-size:17px; margin:10px 0 4px; color:#111827; }
  #gate p{ font-size:13px; color:#6b7280; margin:0 0 16px; }
  #gate input{ width:140px; font-size:22px; letter-spacing:6px; text-align:center; padding:10px; border:2px solid #cbd5e1; border-radius:10px; }
  #gate input:focus{ outline:none; border-color:#1f3a5f; }
  #gate button{ display:block; width:100%; margin-top:14px; background:#1f3a5f; color:#fff; border:0; border-radius:10px; padding:12px; font-size:15px; font-weight:800; cursor:pointer; }
  #gateMsg{ margin-top:12px; font-size:13px; font-weight:700; min-height:18px; }
  #gateMsg.err{ color:#dc2626; } #gateMsg.ok{ color:#16a34a; }
  /* ===== 보고서 디자인 ===== */
  #dmMsgReport .rrep-card, #dmMsgReport .rbody, #dmMsgReport .rsec, #dmMsgReport .rsec-bd, #dmMsgReport .rkv { max-width:100%; box-sizing:border-box; }
  #dmMsgReport .rrep-card { border:1px solid #cdd5df; border-radius:10px; overflow:hidden; background:#fff; line-height:1.4; box-shadow:0 4px 18px rgba(0,0,0,.08); }
  #dmMsgReport .rrep-h { display:flex; flex-direction:column; align-items:center; text-align:center; gap:3px; padding:13px 12px; background:#1f3a5f; color:#fff; }
  #dmMsgReport .rrep-title { font-size:15px; } #dmMsgReport .rrep-h b { font-size:1.55em; }
  #dmMsgReport .rh-cnt { font-size:11px; font-weight:700; background:#fde68a; color:#92400e; padding:1px 7px; border-radius:9px; vertical-align:middle; }
  #dmMsgReport .rrep-loc { font-size:12px; font-weight:600; color:#cfe0f5; }
  #dmMsgReport .rbody { padding:11px; font-size:var(--dmrf,15px); }   /* 관리자가 모달에서 정한 글자크기(payload.opts.font) 적용 */
  #dmMsgReport .rsec { border:2px solid; border-radius:8px; margin:0 0 9px; overflow:hidden; }
  /* 직접입찰: 회원(명의) 카드 앞 붉은 세로 리본(같은 높이의 짧은 카드) */
  #dmMsgReport .dm-jik-wrap { display:flex; align-items:stretch; gap:6px; margin:0 0 9px; }
  #dmMsgReport .dm-jik-wrap > .rsec { flex:1; min-width:0; margin:0; }
  #dmMsgReport .dm-jik-ribbon { flex:0 0 34px; width:34px; border-radius:8px; background:#dc2626; color:#fff; font-weight:900; letter-spacing:2px; writing-mode:vertical-rl; text-orientation:upright; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 3px rgba(220,38,38,.4); }
  #dmMsgReport .rsec-h { padding:5px 10px; font-weight:800; font-size:1.02em; }
  #dmMsgReport .rsec-h .rh-sub { font-weight:700; font-size:.82em; padding:0 6px; border-radius:8px; background:rgba(255,255,255,.6); }
  #dmMsgReport .rsec-a { border-color:#9db4d4; } #dmMsgReport .rsec-a .rsec-h { background:#e6eef8; color:#1e3a5f; }
  #dmMsgReport .rsec-b { border-color:#b7c4ad; } #dmMsgReport .rsec-b .rsec-h { background:#eaf0e4; color:#3a4a2a; }
  #dmMsgReport .rkv { width:100%; border-collapse:collapse; font-size:.93em; }
  #dmMsgReport .rkv td { border:1px solid #e8edf3; padding:6px 8px; vertical-align:middle; color:#1f2937; word-break:keep-all; overflow-wrap:break-word; }
  #dmMsgReport .rkv .rk { width:84px; background:#fafbfc; color:#64748b; font-weight:600; white-space:nowrap; }
  #dmMsgReport .rsec-b .rkv .rk { background:#fbfcf8; }
  #dmMsgReport .rkv .rv.hl-y { font-weight:800; }
  #dmMsgReport .rkv .rv.hl-r { color:#dc2626; font-weight:700; }
  #dmMsgReport .rkv .rv.hl-need { background:#fde047; color:#92400e; font-weight:800; }
  #dmMsgReport .rsec-must { border-color:#ef4444; }
  #dmMsgReport .rsec-must .rsec-h { background:#fee2e2; color:#b91c1c; }
  #dmMsgReport .rsec-must .rmust-bd { padding:8px 12px 9px; background:#fffdf5; }
  #dmMsgReport .rsec-must .rmust-li { margin:4px 0; font-weight:700; line-height:1.45; color:#1f2937; }
  #dmMsgReport .rsec-must .rmust-li .mneed { background:#fde047; color:#92400e; padding:1px 5px; border-radius:4px; font-weight:800; }
  #dmMsgReport .rsub { border-collapse:collapse; font-size:.93em; table-layout:auto; width:100%; }   /* 기본은 다른 카드(.rkv)와 동일 크기. 폭 넘치면 _fitBid가 '들어가는 최대 폰트'로만 축소 */
  #dmMsgReport .rsub .rnum { font-size:1.05em; font-weight:700; }   /* 금액 크게 */
  #dmMsgReport .rsub .rtot td { font-size:1.18em; }   /* 총비용 행 크게 */
  #dmMsgReport .rsub th { text-align:center; background:#eef2f7; color:#475569; padding:5px 2px; border:1px solid #dce3ec; font-weight:700; vertical-align:middle; line-height:1.35; }
  #dmMsgReport .rsub td { border:1px solid #eef2f7; padding:5px 2px; white-space:normal; word-break:keep-all; vertical-align:middle; line-height:1.35; }
  #dmMsgReport .rsub .rnum { padding-left:2px; padding-right:3px; }
  #dmMsgReport .rsub .bgrip { display:none; }
  #dmMsgReport .rsub .rnum { text-align:right; white-space:nowrap; } #dmMsgReport .rsub .hl-y { font-weight:700; }
  #dmMsgReport .rsub tfoot td { background:#f6f8fb; } #dmMsgReport .rsub .rtot td { color:#dc2626; font-weight:800; background:#fff5f5; }
  #dmMsgReport .dmcp{ background:#0e7490; color:#fff; border:0; border-radius:5px; padding:4px 11px; font-size:.82em; font-weight:700; cursor:pointer; flex:0 0 auto; white-space:nowrap; }
  #dmMsgReport .dmcp:active{ background:#0b5563; }
  #dmMsgReport .cpline{ display:flex; align-items:center; gap:8px; margin:2px 0; }
  #dmMsgReport .cpline .cpv{ flex:1 1 auto; min-width:0; word-break:keep-all; overflow-wrap:break-word; }
  /* 회원 입력칸 + 명의 카드 [✏수정][💾저장] */
  #dmMsgReport .rrep-card{ position:relative; }
  #dmMsgReport .dmreload2{ position:absolute; top:8px; right:8px; z-index:3; background:#fbbf24; color:#1f3a5f; border:0; border-radius:8px; padding:6px 13px; font-size:13px; font-weight:800; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.25); }
  #dmMsgReport .dmreload2:active{ background:#f59e0b; }
  #dmMsgReport .rsec{ position:relative; }
  #dmMsgReport .dmedit{ width:100%; box-sizing:border-box; border:1px solid #f59e0b; border-radius:6px; padding:8px 9px; font-size:1em; background:#fffbeb; color:#92400e; }
  #dmMsgReport .dmedit:focus{ outline:none; border-color:#d97706; background:#fff; }
  #dmMsgReport .dmedit-acct{ flex-direction:column; gap:5px; } #dmMsgReport .dmedit-acct .dmedit{ width:100%; }
  #dmMsgReport .dmpdf{ display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
  #dmMsgReport .dmpdf-btn{ display:inline-block; background:#1f3a5f; color:#fff; border-radius:7px; padding:7px 14px; font-weight:800; cursor:pointer; font-size:.92em; white-space:nowrap; }
  #dmMsgReport .dmpdf-btn:active{ background:#16294a; }
  #dmMsgReport .dmpdf-msg{ font-size:.85em; color:#6b7280; word-break:break-all; }
  #dmMsgReport .dmpdf-list{ display:flex; flex-direction:column; gap:8px; }
  #dmMsgReport .dmpdf-row{ display:flex; align-items:center; gap:7px; flex-wrap:wrap; padding:5px 0; border-bottom:1px dashed #e5e7eb; }
  #dmMsgReport .dmpdf-row:last-child{ border-bottom:0; }
  #dmMsgReport .dmpdf-mul{ font-weight:800; color:#1f3a5f; min-width:52px; }
  #dmMsgReport .dmpdf-file{ display:inline-flex; align-items:center; gap:3px; background:#eef2ff; border:1px solid #c7d2fe; border-radius:6px; padding:2px 7px; font-size:.82em; }
  #dmMsgReport .dmpdf-file a{ color:#1d4ed8; text-decoration:none; word-break:break-all; }
  #dmMsgReport .dmpdf-del{ background:#fef2f2; color:#dc2626; border:1px solid #fecaca; border-radius:6px; padding:3px 11px; font-size:.82em; font-weight:800; cursor:pointer; white-space:nowrap; }
  #dmMsgReport .dmpdf-del:active{ background:#fee2e2; }
  #dmMsgReport .dmneed{ color:#92400e; font-weight:700; }
  /* 기본: 채워진칸=값 / 빈칸=입력. 수정모드(.editmode): 전부 입력 */
  #dmMsgReport .dmf > .dmedit, #dmMsgReport .dmf > .dmedit-acct{ display:none; }
  #dmMsgReport .dmf[data-filled="0"] > .dmdisp{ display:none; }
  #dmMsgReport .dmf[data-filled="0"] > .dmedit{ display:block; }
  #dmMsgReport .dmf[data-filled="0"] > .dmedit-acct{ display:flex; }
  #dmMsgReport .rsec.editmode .dmf > .dmdisp{ display:none; }
  #dmMsgReport .rsec.editmode .dmf > .dmedit{ display:block; }
  #dmMsgReport .rsec.editmode .dmf > .dmedit-acct{ display:flex; }
  #dmMsgReport .dmcard-btns{ position:absolute; top:4px; right:6px; z-index:2; display:flex; gap:6px; }
  #dmMsgReport .dmedt{ background:#fff; color:#1d4ed8; border:1px solid #93c5fd; border-radius:7px; padding:4px 11px; font-size:13px; font-weight:800; cursor:pointer; }
  #dmMsgReport .dmsave{ background:#f59e0b; color:#fff; border:0; border-radius:7px; padding:4px 12px; font-size:13px; font-weight:800; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.3); }
  #dmMsgReport .dmsave:active{ background:#d97706; } #dmMsgReport .dmsave:disabled{ cursor:default; opacity:.95; }
</style>
</head>
<body>
  <!-- 본인확인 게이트 -->
  <div id="gate" style="display:none">
    <div class="lock">🔒</div>
    <h2>본인 확인</h2>
    <p>등록된 <b>전화번호 뒷 4자리</b>를 입력하세요.</p>
    <input id="g4" type="tel" inputmode="numeric" maxlength="4" placeholder="0000">
    <button id="gBtn" onclick="DMV.submit()">확인</button>
    <div id="gateMsg"></div>
  </div>
  <!-- 보고서(확인 후 표시) -->
  <div id="repWrap" style="display:none">
    <div class="dmw-wrap"><div id="dmMsgReport"><?!= embedHtml ?></div></div>
  </div>
  <div id="loading" style="text-align:center;padding:60px 12px;color:#94a3b8;font-size:14px">불러오는 중…</div>
  <?!= include('dm-builder'); ?>

<script>
  var TOKEN = '<?= token ?>';
  var GATED = ('<?= gated ?>' === 'true');
  var STATUS = '<?= reportStatus ?>';
  var HAS_EMBED = ('<?= hasEmbed ?>' === 'true');
  var KEY = 'dmv4_' + TOKEN;
  window.DM = window.DM || {};
  // 유튜브 임베드
  DM.playYt = function(id){
    id = id || 'S2xVZjJeQd0';
    var ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:80;display:flex;align-items:center;justify-content:center;padding:18px';
    ov.onclick = function(e){ if(e.target===ov && ov.parentNode) ov.parentNode.removeChild(ov); };
    ov.innerHTML = '<div style="position:relative;width:96%;max-width:900px">'
      + '<button onclick="var o=this.closest(\'div\').parentNode; if(o&&o.parentNode)o.parentNode.removeChild(o);" style="position:absolute;top:-40px;right:0;background:#fff;border:0;border-radius:6px;padding:6px 14px;font-weight:800;cursor:pointer">✕ 닫기</button>'
      + '<div style="position:relative;padding-bottom:56.25%;height:0;border-radius:8px;overflow:hidden;background:#000"><iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1&rel=0" style="position:absolute;inset:0;width:100%;height:100%;border:0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe></div></div>';
    document.body.appendChild(ov);
  };
  DM.copyVal = function(btn){
    var v = btn.getAttribute('data-c') || '';
    function ok(){ var o = btn.getAttribute('data-o')||btn.textContent; btn.setAttribute('data-o', o); btn.textContent='✓ 복사됨'; btn.style.background='#16a34a'; setTimeout(function(){ btn.textContent=o; btn.style.background=''; }, 1200); }
    function fb(){ var ta=document.createElement('textarea'); ta.value=v; ta.style.position='fixed'; ta.style.top='-1000px'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); try{ document.execCommand('copy'); ok(); }catch(e){ alert('복사 실패 — 값을 길게 눌러 복사해 주세요'); } document.body.removeChild(ta); }
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(v).then(ok).catch(fb); }
    else fb();
  };

  var DMV = {
    el: function(id){ return document.getElementById(id); },
    show: function(which){ DMV.el('gate').style.display = which==='gate'?'block':'none'; DMV.el('repWrap').style.display = which==='rep'?'block':'none'; DMV.el('loading').style.display = which==='loading'?'block':'none'; },
    msg: function(t, cls){ var m=DMV.el('gateMsg'); m.textContent=t||''; m.className = cls||''; },
    // 보고서 주입: payload 있으면 동적 빌드(회원 저장분 라이브 반영), 없으면 html 스냅샷 폴백
    inject: function(res){
      var host = DMV.el('dmMsgReport'); if(!host) return;
      if(res && res.payload && window.DMBuild){
        var pl = (typeof res.payload === 'string') ? JSON.parse(res.payload) : res.payload;
        pl.detailMap = res.detailMap || {};
        pl.uploads = res.uploads || {};   // 물건별 전자서명 PDF 현황
        var f = pl.opts && parseInt(pl.opts.font, 10);
        if(f && f>=10 && f<=24) host.style.setProperty('--dmrf', f+'px');   // 관리자가 정한 글자크기 적용
        host.innerHTML = window.DMBuild.report(pl);
      } else if(res && res.html != null){ host.innerHTML = res.html; }
      DMV.fitBid();   // 입찰표: 들어가면 기본크기, 넘치면 '들어가는 최대 폰트'로
      setTimeout(function(){ DMV.fitBid&&DMV.fitBid(); }, 300);   // 레이아웃 확정 후 재측정(첫 측정 부정확 보정)
    },
    // 입찰표(.rsub): 컨테이너 폭에 들어가면 기본(.93em=다른 카드와 동일) 유지, 넘치면 '들어가는 최대 폰트'로 비례 축소(과축소 없음).
    fitBid: function(){
      var host = DMV.el('dmMsgReport'); if(!host) return;
      requestAnimationFrame(function(){
        host.querySelectorAll('table.rsub').forEach(function(t){
          t.style.fontSize='';   // 기본(최대)에서 측정 시작
          var p = t.parentElement; if(!p) return;
          var cs = getComputedStyle(p);
          var avail = p.clientWidth - (parseFloat(cs.paddingLeft)||0) - (parseFloat(cs.paddingRight)||0);
          if(avail < 80) return;                 // 폭 미확정(레이아웃 전) — 다음 호출에서 처리
          var natural = t.scrollWidth;
          if(natural <= avail + 1) return;       // 들어감 → 기본(최대) 폰트 유지(다른 카드와 동일)
          var base = parseFloat(getComputedStyle(t).fontSize) || 14;
          var fs = Math.max(9, Math.floor(base * avail / natural * 2) / 2);   // 들어가는 최대 폰트(비례식)
          t.style.fontSize = fs + 'px';
          var g = 0; while(t.scrollWidth > avail + 1 && fs > 9 && g < 8){ fs -= 0.5; t.style.fontSize = fs + 'px'; g++; }   // 미세보정
        });
      });
    },
    handle: function(res, typed){
      res = res || {};
      if(res.status === 'ok'){
        if(GATED && typed) { try{ localStorage.setItem(KEY, typed); }catch(e){} }
        DMV.inject(res);
        if(res.title) document.title = res.title;
        DMV.show('rep');
      } else if(res.status === 'fail'){
        try{ localStorage.removeItem(KEY); }catch(e){}
        DMV.show('gate'); DMV.msg('번호가 일치하지 않습니다. (남은 ' + (res.left!=null?res.left:'') + '회)', 'err');
        var i=DMV.el('g4'); i.value=''; i.focus();
      } else if(res.status === 'locked'){
        DMV.show('gate'); DMV.el('g4').style.display='none'; DMV.el('gBtn').style.display='none';
        try{ localStorage.removeItem(KEY); }catch(e){}
        DMV.msg('3회 틀려 링크가 폐기되었습니다. 담당자에게 새 링크를 요청해 주세요.', 'err');
      } else if(res.status === 'expired'){
        DMV.show('gate'); DMV.el('g4').style.display='none'; DMV.el('gBtn').style.display='none';
        try{ localStorage.removeItem(KEY); }catch(e){}
        DMV.msg('입찰일이 지나 만료된 링크입니다.', 'err');
      } else { // revoked / 기타
        DMV.show('gate'); DMV.el('g4').style.display='none'; DMV.el('gBtn').style.display='none';
        try{ localStorage.removeItem(KEY); }catch(e){}
        DMV.msg('유효하지 않은 링크입니다. 담당자에게 새 링크를 요청해 주세요.', 'err');
      }
    },
    verify: function(typed){
      if(typeof google==='undefined'||!google.script||!google.script.run){ DMV.show('gate'); DMV.msg('실행 환경 오류',''); return; }
      DMV.show('loading');
      google.script.run.withSuccessHandler(function(res){ DMV.handle(res, typed); })
        .withFailureHandler(function(e){ DMV.show('gate'); DMV.msg('오류: '+(e&&e.message||e),'err'); })
        .dmRenderData(TOKEN, typed||'');   // 동적: 게이트 통과 시 라이브 데이터(저장분 반영)
    },
    // 🔄 새로고침: 전체 reload(빈화면) 대신 동적 데이터만 재조회 → 회원이 저장한 내용 즉시 반영
    reload: function(){
      var saved=''; try{ saved=localStorage.getItem(KEY)||''; }catch(e){}
      if(GATED && !saved){ DMV.show('gate'); return; }   // 게이트 링크인데 인증 기록 없음 → 빈값 전송 시 실패카운트 방지
      var btn=document.querySelector('#dmMsgReport .dmreload2'), o=btn?btn.textContent:'';
      if(typeof google==='undefined'||!google.script||!google.script.run){ return; }
      if(btn){ btn.disabled=true; btn.textContent='새로고침 중…'; }
      google.script.run.withSuccessHandler(function(res){ if(btn){ btn.disabled=false; btn.textContent=o; } DMV.handle(res, saved); })
        .withFailureHandler(function(e){ if(btn){ btn.disabled=false; btn.textContent=o; } alert('새로고침 오류: '+(e&&e.message||e)); })
        .dmRenderData(TOKEN, saved||'');
    },
    submit: function(){
      var v = (DMV.el('g4').value||'').replace(/[^0-9]/g,'');
      if(v.length<4){ DMV.msg('4자리를 입력하세요.','err'); return; }
      DMV.verify(v);
    },
    showInvalid: function(msg){
      DMV.show('gate');
      var i=DMV.el('g4'), b=DMV.el('gBtn'); if(i) i.style.display='none'; if(b) b.style.display='none';
      var lk=document.querySelector('#gate .lock'); if(lk) lk.textContent='⚠';
      var h=document.querySelector('#gate h2'); if(h) h.textContent='안내';
      var p=document.querySelector('#gate p'); if(p) p.style.display='none';
      DMV.msg(msg, 'err');
    },
    init: function(){
      if(STATUS==='revoked'){ DMV.showInvalid('유효하지 않은 링크입니다. 담당자에게 새 링크를 요청해 주세요.'); return; }
      if(STATUS==='expired'){ DMV.showInvalid('입찰일이 지나 만료된 링크입니다.'); return; }
      if(HAS_EMBED){ DMV.show('rep');                          // 게이트 없음 → 임베드 스냅샷 즉시 표시 후 동적으로 교체(새로고침=DB최신)
        if(typeof google!=='undefined'&&google.script&&google.script.run){
          google.script.run.withSuccessHandler(function(res){ if(res&&res.status==='ok') DMV.inject(res); }).withFailureHandler(function(){}).dmRenderData(TOKEN, '');
        } return; }
      var saved=''; try{ saved=localStorage.getItem(KEY)||''; }catch(e){}
      if(saved){ DMV.verify(saved); }                          // 게이트: 이 기기 기억 → 자동확인
      else { DMV.show('gate'); setTimeout(function(){ var i=DMV.el('g4'); if(i) i.focus(); }, 100); }
    }
  };
  // 노란칸(누락 항목) 일괄 저장 — 명의 카드 제목 옆 💾 저장. 같은 카드(.rsec) 안의 입력칸만 저장.
  DMV.saveFields = function(btn){
    var scope = (btn.closest && btn.closest('.rsec')) || document.getElementById('dmMsgReport') || document;
    var inputs = scope.querySelectorAll('.dmedit'), edits = [], filled = 0;
    for(var i=0;i<inputs.length;i++){
      var el=inputs[i];
      if(el.offsetParent===null) continue;   // 화면에 보이는 입력칸만(수정모드 ON 또는 빈칸). 채워진 숨김칸 제외
      var v=(el.value||'').trim();
      if(!v) continue;
      filled++;
      edits.push({ idx: parseInt(el.getAttribute('data-idx'),10), field: el.getAttribute('data-field'), value: v });
    }
    if(!filled){ alert('입력한 내용이 없습니다. 노란 칸을 채운 뒤 저장해 주세요.'); return; }
    if(typeof google==='undefined'||!google.script||!google.script.run){ alert('저장 환경 오류'); return; }
    var o = btn.getAttribute('data-o') || btn.textContent; btn.setAttribute('data-o', o);
    btn.disabled=true; btn.textContent='저장 중…'; btn.style.background='#9ca3af';
    google.script.run.withSuccessHandler(function(r){
      if(r&&r.success){ btn.disabled=true; btn.textContent='✓ 저장됨'; btn.style.background='#16a34a'; alert('저장되었습니다. 담당자에게 전달됩니다. 감사합니다!'); if(DMV&&DMV.reload) DMV.reload(); }
      else { btn.disabled=false; btn.textContent=o; btn.style.background=''; alert('저장 실패: '+((r&&r.msg)||'알 수 없음')); }
    }).withFailureHandler(function(e){ btn.disabled=false; btn.textContent=o; btn.style.background=''; alert('저장 오류: '+(e&&e.message||e)); })
      .dmSaveMemberFields(TOKEN, edits);
  };
  // 전자서명 PDF 업로드 — 물건별, 파일 선택 시 자동 업로드(서버 Drive 저장)
  DMV.uploadPdf = function(inp){
    var f = inp.files && inp.files[0]; if(!f) return;
    var row = inp.closest ? inp.closest('.dmpdf-row') : (inp.parentNode && inp.parentNode.parentNode);
    var msg = row ? row.querySelector('.dmpdf-msg') : null;
    var itemId = inp.getAttribute('data-item') || '';
    function setMsg(t,c){ if(msg){ msg.textContent=t; msg.style.color=c||'#6b7280'; } }
    if(f.type!=='application/pdf' && !/\.pdf$/i.test(f.name)){ setMsg('PDF 파일만 가능합니다.','#dc2626'); inp.value=''; return; }
    if(f.size > 12*1024*1024){ setMsg('12MB 이하 PDF만 가능합니다.','#dc2626'); inp.value=''; return; }
    if(typeof google==='undefined'||!google.script||!google.script.run){ setMsg('업로드 환경 오류','#dc2626'); return; }
    setMsg('업로드 중… '+f.name);
    var rd=new FileReader();
    rd.onload=function(){
      var b64=String(rd.result||'').split(',')[1]||'';
      google.script.run.withSuccessHandler(function(r){
        if(r&&r.success){ setMsg('✓ 업로드됨','#16a34a'); if(DMV.reload) DMV.reload(); }   // 갱신 → 파일/삭제버튼 표시
        else { setMsg('업로드 실패: '+((r&&r.msg)||'알 수 없음'),'#dc2626'); }
      }).withFailureHandler(function(e){ setMsg('업로드 오류: '+(e&&e.message||e),'#dc2626'); })
        .dmUploadPdf(TOKEN, f.name, b64, itemId);   // 물건단위 item_id 전달
    };
    rd.onerror=function(){ setMsg('파일 읽기 실패','#dc2626'); };
    rd.readAsDataURL(f);
  };
  // 잘못 올린 PDF 삭제 (회원 본인 것만 — 서버에서 토큰 검증)
  DMV.deletePdf = function(url, btn){
    if(!url) return;
    if(!confirm('이 PDF를 삭제할까요?')) return;
    if(typeof google==='undefined'||!google.script||!google.script.run){ alert('환경 오류'); return; }
    if(btn){ btn.disabled=true; btn.textContent='…'; }
    google.script.run.withSuccessHandler(function(r){
      if(r&&r.success){ if(DMV.reload) DMV.reload(); }
      else { if(btn){ btn.disabled=false; btn.textContent='🗑'; } alert('삭제 실패: '+((r&&r.msg)||'?')); }
    }).withFailureHandler(function(e){ if(btn){ btn.disabled=false; btn.textContent='🗑'; } alert('삭제 오류: '+(e&&e.message||e)); })
      .dmDeleteUpload(url, TOKEN);
  };
  document.getElementById('g4') && document.getElementById('g4').addEventListener('keydown', function(e){ if(e.key==='Enter') DMV.submit(); });
  window.addEventListener('resize', function(){ clearTimeout(DMV._rt); DMV._rt=setTimeout(function(){ DMV.fitBid&&DMV.fitBid(); }, 150); });   // 회전/리사이즈 시 입찰표 재맞춤
  DMV.init();
</script>
